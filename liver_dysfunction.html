// ===== スコアリングロジック =====
function calcScores(answers) {
  var scores = {};
  var keys = Object.keys(DISEASES);
  var i;
  for (i = 0; i < keys.length; i++) {
    scores[keys[i]] = 0;
  }

  // Step 1: パターン分類 (highest weights)
  var pat = answers.pattern;
  if (pat === "hepatocellular") {
    scores.acute_viral += 6; scores.chronic_hbv_hcv += 6; scores.nafld += 6;
    scores.alcohol += 6; scores.aih += 6; scores.acetaminophen += 6;
    scores.ischemic += 6; scores.budd_chiari += 6; scores.wilson += 6;
    scores.hemochromatosis += 6; scores.dili += 5;
    scores.choledocholithiasis -= 3; scores.cholangitis -= 3;
    scores.pbc -= 3; scores.psc -= 3; scores.malignancy -= 3;
  } else if (pat === "cholestatic") {
    scores.choledocholithiasis += 6; scores.cholangitis += 6;
    scores.pbc += 6; scores.psc += 6; scores.malignancy += 5;
    scores.igg4_sc += 6;
    scores.acute_viral -= 3; scores.chronic_hbv_hcv -= 3;
    scores.nafld -= 3; scores.alcohol -= 3; scores.aih -= 3;
    scores.acetaminophen -= 3; scores.ischemic -= 3;
    scores.budd_chiari -= 3; scores.wilson -= 3;
    scores.hemochromatosis -= 3; scores.muscle -= 3;
  } else if (pat === "mixed") {
    scores.dili += 6; scores.ebv_cmv += 6; scores.congestive += 6;
    scores.malignancy += 4;
    scores.muscle -= 3;
  } else if (pat === "muscle") {
    scores.muscle += 6;
    scores.acute_viral -= 3; scores.chronic_hbv_hcv -= 3;
    scores.nafld -= 3; scores.alcohol -= 3; scores.aih -= 3;
    scores.acetaminophen -= 3; scores.ischemic -= 3;
    scores.budd_chiari -= 3; scores.wilson -= 3;
    scores.hemochromatosis -= 3; scores.choledocholithiasis -= 3;
    scores.cholangitis -= 3; scores.pbc -= 3; scores.psc -= 3;
    scores.igg4_sc -= 3; scores.dili -= 3; scores.ebv_cmv -= 3;
    scores.congestive -= 3; scores.malignancy -= 3;
  }

  // Step 2: Red flag (high weights +5)
  var rf = answers.red_flag || [];
  for (i = 0; i < rf.length; i++) {
    if (rf[i] === "encephalopathy") {
      scores.acetaminophen += 5; scores.ischemic += 5;
      scores.acute_viral += 4; scores.aih += 4;
    }
    if (rf[i] === "coagulopathy") {
      scores.acetaminophen += 5; scores.ischemic += 5;
      scores.acute_viral += 4; scores.aih += 4;
    }
    if (rf[i] === "cholangitis_sign") {
      scores.cholangitis += 5; scores.choledocholithiasis += 4;
    }
    if (rf[i] === "overdose") {
      scores.acetaminophen += 5; scores.dili += 4;
    }
    if (rf[i] === "shock") {
      scores.ischemic += 5; scores.congestive += 4; scores.cholangitis += 3;
    }
    if (rf[i] === "rapid_jaundice") {
      scores.cholangitis += 4; scores.choledocholithiasis += 4;
      scores.malignancy += 3; scores.acute_viral += 3;
    }
  }

  // Step 3: 経過
  var dur = answers.duration;
  if (dur === "acute") {
    scores.acute_viral += 4; scores.acetaminophen += 4;
    scores.ischemic += 4; scores.choledocholithiasis += 4;
    scores.cholangitis += 4; scores.dili += 3;
    scores.ebv_cmv += 3; scores.budd_chiari += 3;
    scores.nafld -= 2; scores.hemochromatosis -= 2;
    scores.pbc -= 2; scores.psc -= 2;
  } else if (dur === "subacute") {
    scores.dili += 4; scores.aih += 4;
    scores.malignancy += 3; scores.psc += 3;
    scores.acetaminophen -= 2; scores.ischemic -= 2;
  } else if (dur === "chronic") {
    scores.chronic_hbv_hcv += 4; scores.nafld += 4;
    scores.alcohol += 4; scores.pbc += 4;
    scores.psc += 4; scores.hemochromatosis += 4;
    scores.congestive += 3;
    scores.acetaminophen -= 2; scores.acute_viral -= 2;
    scores.cholangitis -= 2;
  }

  // Step 4: 重症度
  var sev = answers.severity;
  if (sev === "mild") {
    scores.chronic_hbv_hcv += 3; scores.nafld += 3;
    scores.hemochromatosis += 3; scores.pbc += 3;
    scores.psc += 3; scores.congestive += 3;
    scores.acetaminophen -= 2; scores.ischemic -= 2;
  } else if (sev === "moderate") {
    scores.acute_viral += 3; scores.aih += 3;
    scores.dili += 3; scores.ebv_cmv += 3;
    scores.pbc -= 2; scores.hemochromatosis -= 2;
  } else if (sev === "high") {
    scores.acetaminophen += 4; scores.ischemic += 4;
    scores.acute_viral += 3; scores.dili += 3;
    scores.budd_chiari += 3;
    scores.nafld -= 2; scores.hemochromatosis -= 2;
    scores.pbc -= 2;
  } else if (sev === "alt_1000") {
    scores.ischemic += 5; scores.acetaminophen += 5;
    scores.acute_viral += 4; scores.dili += 3;
    scores.choledocholithiasis += 3;
    scores.pbc -= 2; scores.psc -= 2;
  }

  // Step 5: 問診
  var hx = answers.history || [];
  for (i = 0; i < hx.length; i++) {
    if (hx[i] === "new_drug") {
      scores.dili += 4; scores.acetaminophen += 3;
    }
    if (hx[i] === "alcohol") {
      scores.alcohol += 5;
    }
    if (hx[i] === "metabolic") {
      scores.nafld += 5;
    }
    if (hx[i] === "young_neuro") {
      scores.wilson += 5;
    }
    if (hx[i] === "thrombosis") {
      scores.budd_chiari += 5;
    }
    if (hx[i] === "infection_risk") {
      scores.acute_viral += 4; scores.chronic_hbv_hcv += 3;
    }
  }

  // Step 6: ラボ
  var lab = answers.lab_results || [];
  for (i = 0; i < lab.length; i++) {
    if (lab[i] === "viral_positive") {
      scores.acute_viral += 5; scores.chronic_hbv_hcv += 5;
    }
    if (lab[i] === "autoimmune") {
      scores.aih += 5;
    }
    if (lab[i] === "iron_overload") {
      scores.hemochromatosis += 5;
    }
    if (lab[i] === "copper_abnormal") {
      scores.wilson += 5;
    }
    if (lab[i] === "igg4_high") {
      scores.igg4_sc += 5;
    }
    if (lab[i] === "ck_high") {
      scores.muscle += 5;
    }
  }

  // Step 7: 画像
  var img = answers.imaging;
  if (img === "bile_duct_dilated") {
    scores.choledocholithiasis += 5; scores.cholangitis += 4;
  } else if (img === "cirrhosis") {
    scores.chronic_hbv_hcv += 4; scores.nafld += 4;
    scores.alcohol += 4; scores.aih += 3; scores.pbc += 3;
  } else if (img === "venous_obstruction") {
    scores.budd_chiari += 5;
  } else if (img === "fatty_liver") {
    scores.nafld += 5;
  } else if (img === "mass_stricture") {
    scores.malignancy += 5;
  } else if (img === "mrcp_stricture") {
    scores.psc += 5;
  }

  return scores;
}

function getProbLevel(score, maxScore) {
  if (maxScore <= 0) return "very_low";
  var ratio = score / maxScore;
  if (ratio >= 0.6) return "high";
  if (ratio >= 0.35) return "moderate";
  if (ratio >= 0.15) return "low";
  return "very_low";
}

function getProbLabel(level) {
  if (level === "high") return "可能性 高";
  if (level === "moderate") return "可能性 中";
  if (level === "low") return "可能性 低";
  return "可能性 極低";
}

  var i, j, step, opt, isActive, isDone, cls, selected, checked, currentAnswers;

  // アルゴリズム説明
  html += '<div class="algo-note">';
  html += '<strong>使い方：</strong>各ステップの質問に順番に回答してください。すべてのステップ完了後に鑑別診断の候補が優先順位付きで表示されます。<br>';
  html += '<strong>R値（ALT/ALP比）：</strong>R = (ALT/ALT上限) / (ALP/ALP上限)。R≧5は肝細胞障害型、R≦2は胆汁うっ滞型、2&lt;R&lt;5は混合型。';
  html += '</div>';

  // プログレスバー
  html += '<div class="progress-bar">';
  for (i = 0; i < STEPS.length; i++) {
    if (i > 0) {
      html += '<div class="progress-line' + (i <= currentStep ? ' done' : '') + '"></div>';
    }
    var dotCls = "";
    if (i < currentStep) dotCls = " done";
    else if (i === currentStep) dotCls = " active";
    html += '<div class="progress-dot' + dotCls + '">';
    if (i < currentStep) {
      html += '&#10003;';
    } else {
      html += (i + 1);
    }
    html += '</div>';
  }
  html += '</div>';

  // 各ステップ
  for (i = 0; i < STEPS.length; i++) {
    step = STEPS[i];
    isActive = (i === currentStep);
    isDone = (i < currentStep);
    cls = isDone ? "completed" : (isActive ? "" : "inactive");

    html += '<div class="step-card ' + cls + '" id="step-' + i + '">';
    html += '<div class="step-header" onclick="jumpToStep(' + i + ')">';
    html += '<span class="step-number ' + (isDone ? 'done' : '') + '">' + (isDone ? '&#10003;' : (i + 1)) + '</span>';
    html += '<div class="step-title-wrap">';
    html += '<div class="step-title">' + step.title + '</div>';
    if (step.subtitle) {
      html += '<div class="step-subtitle">' + step.subtitle + '</div>';
    }
    html += '</div>';
    html += '</div>';

    if (isActive || isDone) {
      html += '<div class="step-body">';

      if (step.type === "single") {
        html += '<div class="option-group">';
        for (j = 0; j < step.options.length; j++) {
          opt = step.options[j];
          selected = (answers[step.id] === opt.id);
          html += '<button class="option-btn' + (selected ? ' selected' : '') + '"';
          html += ' onclick="selectSingle(\'' + step.id + '\', \'' + opt.id + '\', ' + i + ')"';
          if (isDone && !isActive) html += ' disabled';
          html += '>';
          html += '<span class="icon">' + (opt.icon || '') + '</span>' + opt.label;
          html += '</button>';
        }
        html += '</div>';
      } else {
        // multi select
        currentAnswers = answers[step.id] || [];
        html += '<div class="checklist">';
        for (j = 0; j < step.options.length; j++) {
          opt = step.options[j];
          checked = false;
          for (var k = 0; k < currentAnswers.length; k++) {
            if (currentAnswers[k] === opt.id) { checked = true; break; }
          }
          html += '<div class="check-item' + (checked ? ' checked' : '') + '"';
          html += ' onclick="toggleCheck(\'' + step.id + '\', \'' + opt.id + '\')">';
          html += '<input type="checkbox"' + (checked ? ' checked' : '') + '>';
          html += '<label><span class="icon" style="margin-right:6px;">' + (opt.icon || '') + '</span>' + opt.label + '</label>';
          html += '</div>';
        }
        html += '</div>';
        if (isActive) {
          html += '<p style="font-size:0.85em;color:#888;margin:8px 0 4px;text-align:center;">該当がなければ選択せずに「次へ」を押してください</p>';
          html += '<button class="next-btn" onclick="nextStep(' + i + ')">次へ &#9654;</button>';
        }
      }

      html += '</div>';
    }
    html += '</div>';
  }

  // 結果パネル
  if (currentStep >= STEPS.length) {
    html += renderResults();
  }

  // リセットボタン
  if (currentStep > 0) {
    html += '<button class="reset-btn" onclick="resetAll()">&#128260; 最初からやり直す</button>';
  }

  app.innerHTML = html;

  // 結果表示後スクロール
  if (currentStep >= STEPS.length) {
    setTimeout(function() {
      var panel = document.querySelector('.result-panel');
      if (panel) panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }
}

function selectSingle(stepId, value, stepIndex) {
  answers[stepId] = value;
  currentStep = stepIndex + 1;
  render();
  scrollToStep(currentStep);
}

function toggleCheck(stepId, value) {
  if (!answers[stepId]) answers[stepId] = [];
  var idx = -1;
  for (var i = 0; i < answers[stepId].length; i++) {
    if (answers[stepId][i] === value) { idx = i; break; }
  }
  if (idx >= 0) {
    answers[stepId].splice(idx, 1);
  } else {
    answers[stepId].push(value);
  }
  render();
}

function nextStep(stepIndex) {
  currentStep = stepIndex + 1;
  render();
  scrollToStep(currentStep);
}

function jumpToStep(idx) {
  if (idx < currentStep) {
    currentStep = idx;
    // 以降の回答をクリアしない（ユーザーが戻って修正可能）
    render();
  }
}

function scrollToStep(idx) {
  setTimeout(function() {
    var el = document.getElementById('step-' + idx) || document.querySelector('.result-panel');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function resetAll() {
  var keys = Object.keys(answers);
  for (var i = 0; i < keys.length; i++) {
    delete answers[keys[i]];
  }
  currentStep = 0;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleDetail(cardId) {
  var detail = document.getElementById('detail-' + cardId);
  var workup = document.getElementById('workup-' + cardId);
  var toggle = document.getElementById('toggle-' + cardId);
  if (detail) {
    if (detail.className.indexOf('open') >= 0) {
      detail.className = 'dx-detail';
      if (workup) workup.className = 'dx-workup';
      if (toggle) toggle.textContent = '詳細を表示 ▼';
    } else {
      detail.className = 'dx-detail open';
      if (workup) workup.className = 'dx-workup open';
      if (toggle) toggle.textContent = '詳細を閉じる ▲';
    }
  }
}

function renderResults() {
  var scores = calcScores(answers);
  var entries = [];
  var keys = Object.keys(scores);
  var i;
  for (i = 0; i < keys.length; i++) {
    if (scores[keys[i]] > 0) {
      entries.push({ id: keys[i], score: scores[keys[i]] });
    }
  }
  entries.sort(function(a, b) { return b.score - a.score; });

  var maxScore = entries.length > 0 ? entries[0].score : 0;

  var html = '<div class="result-panel show">';
  html += '<div class="result-header">&#128203; 鑑別診断の結果</div>';
  html += '<div class="result-body">';

  // Red flag アラート
  var rf = answers.red_flag || [];
  if (rf.length > 0) {
    var hasRedFlag = false;
    var alertHtml = '';
    for (i = 0; i < rf.length; i++) {
      hasRedFlag = true;
      if (rf[i] === "encephalopathy") alertHtml += '・意識障害/見当識障害 &rarr; <strong>急性肝不全の評価・移植施設への搬送検討</strong><br>';
      if (rf[i] === "coagulopathy") alertHtml += '・PT-INR延長 &rarr; <strong>急性肝不全の評価・ビタミンK投与・FFP検討</strong><br>';
      if (rf[i] === "cholangitis_sign") alertHtml += '・胆管炎徴候 &rarr; <strong>緊急胆道ドレナージ（ERCP/PTBD）</strong><br>';
      if (rf[i] === "overdose") alertHtml += '・過量服薬 &rarr; <strong>NAC投与・中毒専門医相談</strong><br>';
      if (rf[i] === "shock") alertHtml += '・ショック &rarr; <strong>循環管理・ICU管理</strong><br>';
      if (rf[i] === "rapid_jaundice") alertHtml += '・急速進行性黄疸 &rarr; <strong>閉塞性黄疸の除外・肝不全評価</strong><br>';
    }
    if (hasRedFlag) {
      html += '<div class="alert-box danger">';
      html += '<div class="alert-title">&#128680; 緊急対応を検討</div>';
      html += '<div>' + alertHtml + '</div>';
      html += '</div>';
    }
  }

  // 初期評価サマリー
  html += '<div class="summary-box">';
  html += '<div class="summary-title">&#127919; 肝機能障害の初期評価 3ステップ</div>';
  html += '<strong>(1)</strong> R値でパターン分類（肝細胞障害型 / 胆汁うっ滞型 / 混合型）<br>';
  html += '<strong>(2)</strong> 重症度評価（PT-INR、ビリルビン、意識レベル）<br>';
  html += '<strong>(3)</strong> 緊急介入の要否判定（急性肝不全 / 胆管炎 / 中毒）';
  html += '</div>';

  // 鑑別診断リスト
  if (entries.length === 0) {
    html += '<p style="color:var(--gray);text-align:center;padding:20px;">入力された情報からは特定の鑑別が示唆されませんでした。追加の検査情報を入力してください。</p>';
  } else {
    for (i = 0; i < entries.length; i++) {
      var d = DISEASES[entries[i].id];
      var level = getProbLevel(entries[i].score, maxScore);
      var levelLabel = getProbLabel(level);
      var cardId = entries[i].id;

      html += '<div class="dx-card ' + level + '" onclick="toggleDetail(\'' + cardId + '\')">';

      // 上段: 名前 + バッジ
      html += '<div class="dx-top">';
      html += '<div class="dx-name">';
      html += '<span>' + d.emoji + '</span>';
      html += '<span>' + d.name + '</span>';
      html += '</div>';
      html += '<span class="prob-badge">' + levelLabel + '</span>';
      html += '</div>';

      // カテゴリラベル
      html += '<span class="category-label ' + d.catClass + '">' + d.category + '</span>';

      // 詳細表示トグル
      html += '<div class="dx-toggle" id="toggle-' + cardId + '">詳細を表示 &#9660;</div>';

      // 詳細 (初期非表示)
      html += '<div class="dx-detail" id="detail-' + cardId + '">' + d.detail + '</div>';

      // 追加検査 (初期非表示)
      html += '<div class="dx-workup" id="workup-' + cardId + '">&#128269; 追加検査: ' + d.workup + '</div>';

      html += '</div>';
    }
  }

  // 消化器内科コンサルト基準
  html += '<div class="red-flag-box">';
  html += '<div class="rf-title">&#128681; 消化器内科・肝臓専門医への相談を考慮すべき状況</div>';
  html += '<ul>';
  html += '<li>急性肝不全の徴候（PT-INR延長 + 肝性脳症）</li>';
  html += '<li>原因不明の肝機能障害が持続する場合</li>';
  html += '<li>自己免疫性肝炎が疑われる場合（肝生検の適応検討）</li>';
  html += '<li>Wilson病が疑われる若年者</li>';
  html += '<li>胆道閉塞・胆管炎でERCP/PTBDが必要な場合</li>';
  html += '<li>悪性腫瘍が疑われる場合</li>';
  html += '<li>肝硬変・門脈圧亢進が判明した場合</li>';
  html += '<li>アセトアミノフェン中毒（NAC投与・移植評価）</li>';
  html += '</ul>';
  html += '</div>';

  // 追加の注意事項
  html += '<div class="summary-box" style="margin-top:16px;">';
  html += '<div class="summary-title">&#9888;&#65039; 肝機能障害評価の注意点</div>';
  html += '<strong>ALT vs AST：</strong>ALTは肝特異性が高いが、ASTは肝・筋・心・赤血球に分布。AST優位はアルコール性・筋障害・虚血性を示唆。<br>';
  html += '<strong>ALP上昇の確認：</strong>ALP上昇時はGGT同時上昇で肝胆道系由来を確認（骨由来ALPとの鑑別）。<br>';
  html += '<strong>薬剤歴：</strong>処方薬だけでなくOTC薬・サプリメント・漢方薬・健康食品も必ず聴取。<br>';
  html += '<strong>フォローアップ：</strong>軽度の肝機能異常でも持続する場合は精査を行い、肝硬変への進展を予防する。';
  html += '</div>';

  html += '</div></div>';
  return html;
}

// 初期描画
render();
</script>
