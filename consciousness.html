    scores.ncse += 4; scores.hepatic_enceph += 3;
    scores.septic_enceph += 2; scores.autoimmune_enceph += 2;
    scores.postictal += 1; scores.catatonia += 2;
    scores.functional_coma += 1;
  }
  if (onset === "unknown") {
    scores.drug_intox += 2; scores.hypoglycemia += 2;

    scores.co2_narcosis += 1;

  // --- Step 2: バイタル異常 ---
  var vitals = ans.vitals || [];

  if (vitals.indexOf("fever") >= 0) {
    scores.meningitis += 5; scores.septic_enceph += 4;
    scores.autoimmune_enceph += 2;
  }
  if (vitals.indexOf("hypothermia") >= 0) {
    scores.drug_intox += 3; scores.septic_enceph += 2;
    scores.hypoglycemia += 1;
  }
  if (vitals.indexOf("tachypnea_kussmaul") >= 0) {
    scores.hhs_dka += 4; scores.septic_enceph += 2;
  }
  if (vitals.indexOf("bradypnea") >= 0) {
    scores.drug_intox += 4; scores.co2_narcosis += 3;
  }
  if (vitals.indexOf("arrhythmia") >= 0) {
    scores.drug_intox += 2; scores.dysnatrem += 1;

  // --- Step 3: 局在徴候 ---
  var focal = ans.focal_signs || [];

    scores.dcvt += 2; scores.dysnatrem += 2;
    scores.drug_intox += 1;
  }
  if (assoc.indexOf("vomiting") >= 0) {
    scores.hydrocephalus += 2; scores.ich += 1;
    scores.meningitis += 1; scores.hhs_dka += 1;
  }
  if (assoc.indexOf("rash") >= 0) {
    scores.meningitis += 4;
  }
  if (assoc.indexOf("jaundice") >= 0) {
    scores.hepatic_enceph += 5;
  }
  if (assoc.indexOf("acetone_breath") >= 0) {
    scores.hhs_dka += 5;
  }
  if (assoc.indexOf("psychiatric_sx") >= 0) {
    scores.autoimmune_enceph += 4; scores.catatonia += 3;
    scores.functional_coma += 2; scores.drug_intox += 1;
  }
  if (assoc.indexOf("involuntary_mvt") >= 0) {
    scores.autoimmune_enceph += 4;
  }
  if (assoc.indexOf("autonomic") >= 0) {
    scores.autoimmune_enceph += 3; scores.drug_intox += 2;
    scores.catatonia += 1;
  }
  if (assoc.indexOf("trauma_signs") >= 0) {
    scores.sdh_edh += 6;
  }

  // --- Step 7: 背景因子 ---
  var bg = ans.background || [];
  if (bg.indexOf("alcohol") >= 0) {
    scores.wernicke += 4; scores.drug_intox += 2;
    scores.hepatic_enceph += 2; scores.postictal += 1;
  }
  if (bg.indexOf("diabetes") >= 0) {
    scores.hypoglycemia += 3; scores.hhs_dka += 3;
  }
  if (bg.indexOf("liver_disease") >= 0) {
    scores.hepatic_enceph += 5;
  }
  if (bg.indexOf("renal_disease") >= 0) {
    scores.dysnatrem += 2; scores.septic_enceph += 1;
  }
  if (bg.indexOf("cancer") >= 0) {
    scores.hydrocephalus += 1; scores.meningitis += 1;
    scores.autoimmune_enceph += 2;
  }
  if (bg.indexOf("immunosuppressed") >= 0) {
    scores.meningitis += 3; scores.septic_enceph += 1;
  }
  if (bg.indexOf("anticoagulant") >= 0) {
    scores.ich += 3; scores.sdh_edh += 3;
  }
  if (bg.indexOf("sedatives") >= 0) {
    scores.drug_intox += 4;
  }
  if (bg.indexOf("epilepsy") >= 0) {
    scores.ncse += 3; scores.postictal += 4;
  }
  if (bg.indexOf("young_female") >= 0) {
    scores.dcvt += 4; scores.autoimmune_enceph += 2;
  }
  if (bg.indexOf("malnutrition") >= 0) {
    scores.wernicke += 4;
  }
  if (bg.indexOf("hypertension_hx") >= 0) {
    scores.ich += 2; scores.large_infarct += 1;
  }
  if (bg.indexOf("psychiatric_hx") >= 0) {
    scores.catatonia += 2; scores.functional_coma += 2;
  }

  // --- Step 8: 臨床経過 ---
  var course = ans.course || [];
  if (course.indexOf("post_seizure_slow") >= 0) {
    scores.ncse += 5; scores.postictal += 2;
  }
  if (course.indexOf("wax_wane") >= 0) {
    scores.ncse += 3; scores.hepatic_enceph += 2;
    scores.septic_enceph += 1;
  }
  if (course.indexOf("progressive") >= 0) {
    scores.ich += 2; scores.large_infarct += 2;
    scores.hydrocephalus += 3; scores.sdh_edh += 2;
    scores.meningitis += 2;
  }
  if (course.indexOf("improve_glucose") >= 0) {
    scores.hypoglycemia += 8;
  }
  if (course.indexOf("improve_naloxone") >= 0) {
    scores.drug_intox += 8;
  }
  if (course.indexOf("ct_normal") >= 0) {
    scores.ich -= 4; scores.sdh_edh -= 4; scores.sah -= 2;
    scores.large_infarct -= 2; scores.hydrocephalus -= 3;
    scores.ncse += 2; scores.drug_intox += 1;
    scores.septic_enceph += 1; scores.dysnatrem += 1;
    scores.wernicke += 1; scores.autoimmune_enceph += 1;
    scores.functional_coma += 1;
  }
  if (course.indexOf("bilateral_thalamus") >= 0) {
    scores.dcvt += 6; scores.bao += 2;
  }
  if (course.indexOf("brainstem_lesion") >= 0) {
    scores.bao += 5; scores.ich += 2;
  }

  return scores;
}

// ===== UI描画 =====
var appEl = document.getElementById("app");
var currentStep = 0;
var answers = {};

function render() {
  var html = "";

  // アルゴリズム説明
  html += '<div class="algo-note">';
  html += '<strong>使い方：</strong>各ステップの質問に順番に回答してください。すべてのステップ完了後に鑑別診断の候補が優先順位付きで表示されます。<br>';
  html += '<strong>4本柱：</strong>①真の意識障害か ②すぐ是正すべき可逆的要因 ③構造性かびまん性か ④発作（NCSE）を見落としていないか';
  html += '<br><small>（Edlow, Lancet 2014; Schmidt, Scand J Trauma 2019; FOUR score: Wijdicks 2005準拠）</small>';
  html += '</div>';

  // 各ステップ
  for (var i = 0; i < STEPS.length; i++) {
    var step = STEPS[i];
    var isActive = i === currentStep;
    var isDone = i < currentStep;
    var cls = isDone ? "completed" : (isActive ? "" : "inactive");

    html += '<div class="step-card ' + cls + '" id="step-' + i + '">';
    html += '<div class="step-header">';
    html += '<span class="step-number ' + (isDone ? 'done' : '') + '">' + (isDone ? '✓' : (i + 1)) + '</span>';
    html += '<span class="step-title">' + step.title + '</span>';
    html += '</div>';

    if (isActive || isDone) {
      html += '<div class="step-body">';
      html += '<p style="font-weight:600;margin-bottom:4px;">' + step.question + '</p>';
      if (step.hint) html += '<p class="hint">' + step.hint + '</p>';

      if (step.type === "single") {
        html += '<div class="option-group">';
        for (var j = 0; j < step.options.length; j++) {
          var opt = step.options[j];
          var selected = answers[step.id] === opt.value;
          html += '<button class="option-btn ' + (selected ? 'selected' : '') + '"';
          html += ' onclick="selectSingle(\'' + step.id + '\', \'' + opt.value + '\', ' + i + ')"';
          if (isDone && !isActive) html += ' disabled';
          html += '>';
          html += '<span class="icon">' + (opt.icon || '') + '</span>' + opt.label;
          html += '</button>';
        }
        html += '</div>';
      } else {
        html += '<div class="checklist">';
        var currentAnswers = answers[step.id] || [];
        for (var j = 0; j < step.options.length; j++) {
          var opt = step.options[j];
          var checked = currentAnswers.indexOf(opt.value) >= 0;
          html += '<div class="check-item" onclick="toggleCheck(\'' + step.id + '\', \'' + opt.value + '\', this)">';
          html += '<input type="checkbox" ' + (checked ? 'checked' : '') + (isDone && !isActive ? ' disabled' : '') + '>';
          html += '<label>' + opt.label + '</label>';
          html += '</div>';
        }
        html += '</div>';
        if (isActive) {
          html += '<button class="next-btn" onclick="nextStep(' + i + ')">次へ ▶</button>';
        }
      }
      html += '</div>';
    }
    html += '</div>';
  }

  // 結果パネル
  if (currentStep >= STEPS.length) {
    html += renderResults();
  }

  // リセットボタン
  if (currentStep > 0) {
    html += '<button class="reset-btn" onclick="resetAll()">🔄 最初からやり直す</button>';
  }

  appEl.innerHTML = html;

  // 結果表示後スクロール
  if (currentStep >= STEPS.length) {
    setTimeout(function() {
      var panel = document.querySelector('.result-panel');
      if (panel) panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }
}

function selectSingle(stepId, value, stepIndex) {
  answers[stepId] = value;
  currentStep = stepIndex + 1;
  render();
  scrollToStep(currentStep);
}

function toggleCheck(stepId, value, el) {
  if (!answers[stepId]) answers[stepId] = [];
  var arr = answers[stepId];
  var idx = arr.indexOf(value);
  if (idx >= 0) { arr.splice(idx, 1); } else { arr.push(value); }
  var cb = el.querySelector('input[type="checkbox"]');
  if (cb) cb.checked = idx < 0;
}

function nextStep(stepIndex) {
  currentStep = stepIndex + 1;
  render();
  scrollToStep(currentStep);
}

function scrollToStep(idx) {
  setTimeout(function() {
    var el = document.getElementById("step-" + idx) || document.querySelector('.result-panel');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function resetAll() {
  var keys = Object.keys(answers);
  for (var i = 0; i < keys.length; i++) { delete answers[keys[i]]; }
  currentStep = 0;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== 結果描画 =====
function renderResults() {
  var scores = calcScores(answers);
  var entries = [];
  var keys = Object.keys(scores);
  for (var i = 0; i < keys.length; i++) {
    entries.push([keys[i], scores[keys[i]]]);
  }
  entries.sort(function(a, b) { return b[1] - a[1]; });

  var maxScore = entries.length > 0 ? entries[0][1] : 1;
  if (maxScore < 1) maxScore = 1;

  var html = '<div class="result-panel">';
  html += '<h2>📋 鑑別診断の結果</h2>';

  // --- 突然発症アラート ---
  if (answers.onset === "sudden") {
    html += '<div class="alert-box alert-red">';
    html += '<strong>🚨 突然発症の意識障害 — 緊急評価が必要</strong><br>';
    html += '血管性病変（脳出血、SAH、BAO）を最優先で除外してください。<br>';
    html += '初期評価：頭部CT → CTA（後方循環評価）。SAH疑いでCT陰性なら腰椎穿刺。';
    html += '</div>';
  }

  // --- 局在徴候アラート ---
  var focal = answers.focal_signs || [];
  var hasFocal = false;
  for (var i = 0; i < focal.length; i++) {
    if (focal[i] !== "none_focal") { hasFocal = true; break; }
  }
  if (hasFocal) {
    html += '<div class="alert-box alert-red">';
    html += '<strong>▶ 構造性Red Flags検出 — CT/CTAを急ぐ</strong><br>';
    if (focal.indexOf("anisocoria") >= 0) {
      html += '・瞳孔不同 → ヘルニア・局在性脳幹障害を最優先で評価<br>';
    }
    if (focal.indexOf("neck_stiffness") >= 0) {
      html += '・項部硬直 → 髄膜炎・SAHを考慮。血液培養後に抗菌薬開始を遅らせない<br>';
    }
    if (focal.indexOf("rapid_decline") >= 0) {
      html += '・急速な悪化 → 脳ヘルニア・血腫拡大・急性水頭症を考慮<br>';
    }
    html += '</div>';
  }

  // --- NCSE警告 ---
  var vitals = answers.vitals || [];
  var motor = ans_motor_check();
  var course = answers.course || [];
  if (scores.ncse >= 5 || course.indexOf("post_seizure_slow") >= 0) {
    html += '<div class="alert-box alert-yellow">';
    html += '<strong>⚡ 非けいれん性てんかん重積（NCSE）の可能性</strong><br>';
    html += '説明のつかない持続性意識障害ではEEGを前倒しで検討してください。<br>';
    html += 'けいれん後の覚醒遅延、微細な運動兆候、変動する意識はNCSEの手がかりです。';
    html += '</div>';
  }

  // --- Locked-in syndrome 警告 ---
  var pupils_ans = answers.pupils || [];
  if (pupils_ans.indexOf("vertical_preserved") >= 0) {
    html += '<div class="alert-box alert-blue">';
    html += '<strong>👁️ Locked-in syndrome の可能性</strong><br>';
    html += '垂直眼球運動・瞬目が保持されているなら、<strong>意識は保たれている可能性</strong>があります。<br>';
    html += '瞬目や上下視によるコマンド追従を必ず確認してください。腹側橋病変（BAO）を疑います。';
    html += '</div>';
  }

  // --- 4本柱チェックリスト ---
  html += '<div class="section-title">🏛️ 4本柱チェックリスト</div>';
  html += '<div class="alert-box" style="background:#F5F5F5;border:1px solid #ddd;">';
  html += '① <strong>真の意識障害か？</strong> — 失語、聴覚障害、locked-in syndrome、機能性無反応を除外<br>';
  html += '② <strong>すぐ是正すべき可逆的要因</strong> — 低血糖、低酸素、ショック、不整脈、体温異常<br>';
  html += '③ <strong>構造性かびまん性か？</strong> — 局在徴候あり→CT/CTA、なし→代謝・毒性・感染<br>';
  html += '④ <strong>発作を見落としていないか？</strong> — 説明困難な意識障害→EEGの閾値を下げる';
  html += '</div>';

  // --- 疾患カード ---
  html += '<div class="section-title">🔍 鑑別候補（スコア順）</div>';
  var shown = 0;
  for (var i = 0; i < entries.length; i++) {
    var id = entries[i][0];
    var score = entries[i][1];
    if (score <= 0) continue;

    var d = DISEASES[id];
    var level = getProbLevel(score, maxScore);
    var catLabel = getCatLabel(d.category);
    var catClass = "cat-" + d.category;

    html += '<div class="disease-card ' + level + '">';
    html += '<div class="disease-header">';
    html += '<span class="disease-name">' + d.emoji + ' ' + d.name + '</span>';
    html += '<span class="badge ' + level + '">';
    html += level === "high" ? "可能性 高" : (level === "medium" ? "可能性 中" : "可能性 低");
    html += '</span>';
    html += '</div>';
    html += '<span class="cat-tag ' + catClass + '">' + catLabel + '</span>';
    html += '<div class="disease-detail">' + d.detail + '</div>';
    html += '<div class="workup-line">🔍 追加検査: ' + d.workup + '</div>';
    html += '</div>';
    shown++;
  }

  if (shown === 0) {
    html += '<p style="color:var(--gray);text-align:center;padding:16px;">スコアが0以上の疾患はありませんでした。入力を見直してください。</p>';
  }

  // --- GCS vs FOUR score 比較表 ---
  html += '<div class="section-title">📊 GCS vs FOUR score 比較</div>';
  html += '<table class="ref-table">';
  html += '<tr><th>項目</th><th>GCS (Teasdale 1974)</th><th>FOUR score (Wijdicks 2005)</th></tr>';
  html += '<tr><td>構成</td><td>E(1-4) + V(1-5) + M(1-6) = 3-15</td><td>Eye(0-4) + Motor(0-4) + Brainstem(0-4) + Respiration(0-4) = 0-16</td></tr>';
  html += '<tr><td>挿管患者</td><td>V評価不能（VTと記載）</td><td>評価可能（Vの代わりにBrainstem・Respiration）</td></tr>';
  html += '<tr><td>脳幹反射</td><td>含まれない</td><td>瞳孔反射・角膜反射を評価</td></tr>';
  html += '<tr><td>Locked-in検出</td><td>困難</td><td>Eye responseで瞬目追従を評価可能</td></tr>';
  html += '<tr><td>最低点</td><td>3（死亡でも3）</td><td>0（より精密な重症度評価）</td></tr>';
  html += '</table>';

  // --- 落とし穴 ---
  html += '<div class="pitfall-box">';
  html += '<strong>⚠️ よくある落とし穴</strong><br>';
  html += '・最初に見つかった異常に固定しない — 33%で複数原因が併存（Schmidt 2019, n=1027）<br>';
  html += '・Postictal stateを長く信じすぎない — 改善なければNCSE・新規脳病変を再考<br>';
  html += '・「局在徴候なし＝代謝性」と短絡しない — 脳幹梗塞、両側視床病変は局在徴候が乏しい<br>';
  html += '・低血糖は脳卒中に似た局在徴候を呈しうる — 必ず血糖測定を先行<br>';
  html += '・鎮静薬・低体温の影響を差し引いてから神経所見を解釈する<br>';
  html += '・「心因性」のラベルは十分な除外診断の後に — 脳幹梗塞、NCSE、薬物を否定してから<br>';
  html += '・画像待ちで治療を遅らせない — 髄膜炎・脳炎では抗菌薬/アシクロビルを先行';
  html += '</div>';

  html += '</div>';
  return html;
}

function ans_motor_check() {
  return answers.motor || [];
}

function getProbLevel(score, maxScore) {
  if (score >= maxScore * 0.7 && score >= 4) return "high";
  if (score >= maxScore * 0.4 && score >= 2) return "medium";
  return "low";
}

function getCatLabel(cat) {
  if (cat === "structural") return "構造性脳病変";
  if (cat === "seizure") return "発作関連";
  if (cat === "metabolic") return "代謝・中毒性";
  if (cat === "infection") return "感染・炎症性";
  if (cat === "psychiatric") return "精神科的病態";
  return cat;
}

// 初期描画
render();
</script>
