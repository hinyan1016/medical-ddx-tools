<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>低ナトリウム血症 鑑別診断ツール</title>
<style>
  :root {
    --navy: #1B3A5C;
    --blue: #2C5AA0;
    --light-blue: #E8F0FE;
    --red: #DC3545;
    --yellow: #F5C518;
    --green: #28A745;
    --orange: #E8850C;
    --gray: #6C757D;
    --light-gray: #F4F6F8;
    --white: #FFFFFF;
    --shadow: 0 2px 8px rgba(27,58,92,0.10);
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "游ゴシック", "Yu Gothic", "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #E8F0FE 0%, #F4F6F8 100%);
    color: #222;
    min-height: 100vh;
    padding: 0 0 40px;
  }
  header {
    background: linear-gradient(135deg, var(--navy), var(--blue));
    color: var(--white);
    padding: 28px 20px 22px;
    text-align: center;
    box-shadow: 0 4px 16px rgba(27,58,92,0.18);
  }
  header h1 { font-size: 1.7em; font-weight: 700; letter-spacing: 0.04em; }
  header p { font-size: 0.92em; margin-top: 6px; opacity: 0.85; }

  .container { max-width: 820px; margin: 0 auto; padding: 24px 16px; }

  .step-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 18px;
    overflow: hidden;
    transition: opacity 0.3s;
  }
  .step-card.inactive { opacity: 0.45; pointer-events: none; }
  .step-card.completed { opacity: 1; }
  .step-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    background: var(--light-blue);
    border-bottom: 2px solid var(--blue);
    cursor: pointer;
  }
  .step-number {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--blue);
    color: var(--white);
    font-weight: 700;
    font-size: 0.95em;
    flex-shrink: 0;
  }
  .step-number.done { background: var(--green); }
  .step-title { font-weight: 700; font-size: 1.05em; color: var(--navy); }
  .step-body { padding: 18px; }

  .option-group { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
  .option-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border: 2px solid #D0D8E4;
    border-radius: 8px;
    background: var(--white);
    font-size: 0.97em;
    cursor: pointer;
    transition: all 0.18s;
    text-align: left;
    color: #222;
    font-family: inherit;
    width: 100%;
  }
  .option-btn:hover { border-color: var(--blue); background: var(--light-blue); }
  .option-btn.selected {
    border-color: var(--blue);
    background: var(--light-blue);
    font-weight: 700;
  }
  .option-btn .icon { font-size: 1.2em; flex-shrink: 0; width: 24px; text-align: center; }

  .checklist { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .check-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 8px;
    background: var(--light-gray);
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
    font-size: 0.95em;
  }
  .check-item:hover { background: #E0E8F0; }
  .check-item input[type="checkbox"] {
    width: 18px; height: 18px;
    accent-color: var(--blue);
    flex-shrink: 0;
    cursor: pointer;
  }
  .check-item label { cursor: pointer; flex: 1; }

  .result-panel {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: 0 4px 20px rgba(27,58,92,0.15);
    overflow: hidden;
    margin-top: 24px;
    display: none;
  }
  .result-panel.show { display: block; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .result-header {
    padding: 16px 20px;
    background: linear-gradient(135deg, var(--navy), var(--blue));
    color: var(--white);
    font-weight: 700;
    font-size: 1.15em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .result-body { padding: 20px; }

  .dx-card {
    border: 2px solid transparent;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 12px;
    position: relative;
    transition: all 0.2s;
  }
  .dx-card.high { border-color: var(--red); background: #FFF5F5; }
  .dx-card.medium { border-color: var(--orange); background: #FFF8F0; }
  .dx-card.low { border-color: var(--gray); background: var(--light-gray); }

  .dx-card .dx-name {
    font-weight: 700;
    font-size: 1.08em;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .dx-card .prob-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 0.78em;
    font-weight: 700;
    color: var(--white);
  }
  .dx-card.high .prob-badge { background: var(--red); }
  .dx-card.medium .prob-badge { background: var(--orange); }
  .dx-card.low .prob-badge { background: var(--gray); }

  .dx-card .dx-detail { font-size: 0.9em; color: #444; line-height: 1.6; }
  .dx-card .dx-detail strong { color: var(--navy); }
  .dx-card .dx-workup {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed #ccc;
    font-size: 0.88em;
    color: var(--blue);
  }

  .next-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 14px;
    padding: 10px 22px;
    background: var(--blue);
    color: var(--white);
    border: none;
    border-radius: 8px;
    font-size: 0.95em;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    font-family: inherit;
  }
  .next-btn:hover { background: var(--navy); }
  .next-btn:disabled { background: #B0BEC5; cursor: not-allowed; }

  .reset-btn {
    display: block;
    margin: 24px auto 0;
    padding: 10px 32px;
    background: var(--white);
    color: var(--red);
    border: 2px solid var(--red);
    border-radius: 8px;
    font-size: 0.95em;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .reset-btn:hover { background: var(--red); color: var(--white); }

  .hint {
    font-size: 0.85em;
    color: var(--gray);
    margin-top: 6px;
    line-height: 1.5;
  }

  .divider { height: 1px; background: #D0D8E4; margin: 14px 0; }

  .algo-note {
    background: #FFFDE7;
    border-left: 4px solid var(--yellow);
    padding: 12px 16px;
    border-radius: 0 8px 8px 0;
    margin-bottom: 18px;
    font-size: 0.9em;
    line-height: 1.6;
    color: #555;
  }
  .algo-note strong { color: var(--navy); }

  @media (max-width: 600px) {
    header h1 { font-size: 1.3em; }
    .step-body, .result-body { padding: 14px; }
    .dx-card { padding: 12px; }
  }
</style>
</head>

      { label: "肺疾患（肺炎・肺癌等）", value: "lung_disease" },
      { label: "中枢神経疾患（頭部外傷・脳出血等）", value: "cns_disease" },
      { label: "浮腫 / 胸水 / 腹水", value: "edema_effusion" },
      { label: "頸静脈怒張 / 起座呼吸", value: "jvd_orthopnea" },
      { label: "黄疸 / くも状血管腫", value: "jaundice_spider" },
      { label: "色素沈着 / 倦怠感 / 低血圧", value: "pigmentation" },
      { label: "寒がり / 便秘 / 嗄声 / 徐脈", value: "cold_intolerance" },
      { label: "泡立つ尿 / 高度蛋白尿", value: "foamy_urine" },
      { label: "該当なし", value: "none" },
    ]
  },
  {
    id: "drugs",
    title: "薬剤歴（該当するものをすべて選択）",
    question: "以下の薬剤を使用していますか？",
    hint: "低Na血症をきたしうる薬剤をチェック",
    type: "multi",
    options: [
      { label: "サイアザイド系利尿薬（ヒドロクロロチアジド等）", value: "thiazide" },
      { label: "SSRI / SNRI（パロキセチン等）", value: "ssri" },
      { label: "カルバマゼピン / オキシカルバゼピン", value: "carbamazepine" },
      { label: "三環系抗うつ薬", value: "tca" },
      { label: "抗精神病薬", value: "antipsychotic" },
      { label: "抗癌剤（シクロホスファミド / ビンクリスチン等）", value: "anticancer" },
      { label: "デスモプレシン", value: "desmopressin" },
      { label: "オキシトシン", value: "oxytocin" },
      { label: "該当薬剤なし", value: "none" },
    ]
  },
];

// ===== スコアリングエンジン =====
function calcScores(answers) {
  const scores = {};
  Object.keys(DISEASES).forEach(k => scores[k] = 0);

  // Step 1: 血清浸透圧
  const osm = answers.osmolality;
  if (osm === "high") {
    scores.hypertonic += 10;
    Object.keys(scores).forEach(k => { if (k !== "hypertonic") scores[k] -= 5; });
  } else if (osm === "normal") {
    scores.pseudo += 10;
    Object.keys(scores).forEach(k => { if (k !== "pseudo") scores[k] -= 5; });
  } else if (osm === "low") {
    const realCauses = ["siadh","hypovolemic_extrarenal","diuretic","adrenal","hypothyroid",
      "heart_failure","liver_cirrhosis","nephrotic","renal_failure","polydipsia","beer_potomania","drug_siadh"];
    realCauses.forEach(k => scores[k] += 2);
    scores.hypertonic -= 5;
    scores.pseudo -= 5;
  } else {
    Object.keys(scores).forEach(k => scores[k] += 1);
  }

  // Step 2: 体液量
  const vol = answers.volume;
  if (vol === "decreased") {
    scores.hypovolemic_extrarenal += 4;
    scores.diuretic += 3;
    scores.adrenal += 3;
    scores.siadh -= 1;
    scores.drug_siadh -= 1;
    scores.heart_failure -= 2;
    scores.liver_cirrhosis -= 2;
    scores.nephrotic -= 2;
    scores.polydipsia -= 1;
  } else if (vol === "normal") {
    scores.siadh += 4;
    scores.drug_siadh += 4;
    scores.hypothyroid += 3;
    scores.adrenal += 2;
    scores.polydipsia += 3;
    scores.beer_potomania += 3;
    scores.heart_failure -= 2;
    scores.liver_cirrhosis -= 2;
    scores.nephrotic -= 2;
    scores.hypovolemic_extrarenal -= 2;
  } else if (vol === "increased") {
    scores.heart_failure += 4;
    scores.liver_cirrhosis += 4;
    scores.nephrotic += 4;
    scores.renal_failure += 3;
    scores.siadh -= 2;
    scores.drug_siadh -= 2;
    scores.hypovolemic_extrarenal -= 3;
    scores.polydipsia -= 2;
    scores.beer_potomania -= 2;
  }

  // Step 3: 尿浸透圧
  const uosm = answers.urine_osm;
  if (uosm === "low") {
    scores.polydipsia += 5;
    scores.beer_potomania += 5;
    scores.siadh -= 3;
    scores.drug_siadh -= 3;
    scores.hypovolemic_extrarenal -= 2;
    scores.adrenal -= 1;
    scores.heart_failure -= 2;
    scores.liver_cirrhosis -= 2;
  } else if (uosm === "high") {
    scores.siadh += 3;
    scores.drug_siadh += 3;
    scores.hypovolemic_extrarenal += 2;
    scores.diuretic += 2;
    scores.adrenal += 2;
    scores.heart_failure += 2;
    scores.liver_cirrhosis += 2;
    scores.nephrotic += 2;
    scores.renal_failure += 2;
    scores.hypothyroid += 2;
    scores.polydipsia -= 4;
    scores.beer_potomania -= 3;
  }

  // Step 4: 尿中Na
  const una = answers.urine_na;
  if (una === "low") {
    scores.hypovolemic_extrarenal += 4;
    scores.heart_failure += 3;
    scores.liver_cirrhosis += 3;
    scores.nephrotic += 2;
    scores.siadh -= 2;
    scores.drug_siadh -= 2;
    scores.adrenal -= 1;
  } else if (una === "high") {
    scores.siadh += 4;
    scores.drug_siadh += 4;
    scores.diuretic += 3;
    scores.adrenal += 3;
    scores.renal_failure += 2;
    scores.hypovolemic_extrarenal -= 3;
    scores.heart_failure -= 1;
    scores.liver_cirrhosis -= 1;
  }

  // Step 5: 検査所見
  const labs = answers.labs || [];
  labs.forEach(v => {
    if (v === "low_bun") { scores.siadh += 3; scores.drug_siadh += 2; }
    if (v === "high_bun") { scores.hypovolemic_extrarenal += 3; scores.renal_failure += 2; }
    if (v === "low_uric") { scores.siadh += 4; scores.drug_siadh += 3; }
    if (v === "high_uric") { scores.hypovolemic_extrarenal += 3; scores.diuretic += 1; }
    if (v === "high_tsh") { scores.hypothyroid += 6; }
    if (v === "low_cortisol") { scores.adrenal += 6; }
    if (v === "high_k") { scores.adrenal += 4; scores.renal_failure += 2; }
    if (v === "high_cr") { scores.renal_failure += 5; }
    if (v === "high_glucose") { scores.hypertonic += 6; }
    if (v === "low_alb") { scores.nephrotic += 3; scores.liver_cirrhosis += 3; }
    if (v === "dyslipidemia") { scores.pseudo += 4; }
  });

  // Step 6: 臨床所見・病歴
  const sx = answers.symptoms || [];
  sx.forEach(v => {
    if (v === "gi_loss") scores.hypovolemic_extrarenal += 4;
    if (v === "excessive_water") scores.polydipsia += 5;
    if (v === "beer_low_protein") scores.beer_potomania += 5;
    if (v === "post_surgery") { scores.siadh += 3; scores.drug_siadh += 1; }
    if (v === "lung_disease") scores.siadh += 3;
    if (v === "cns_disease") scores.siadh += 3;
    if (v === "edema_effusion") {
      scores.heart_failure += 2; scores.liver_cirrhosis += 2;
      scores.nephrotic += 2; scores.renal_failure += 2;
    }
    if (v === "jvd_orthopnea") scores.heart_failure += 4;
    if (v === "jaundice_spider") scores.liver_cirrhosis += 4;
    if (v === "pigmentation") scores.adrenal += 3;
    if (v === "cold_intolerance") scores.hypothyroid += 3;
    if (v === "foamy_urine") scores.nephrotic += 3;
  });

  // Step 7: 薬剤
  const drugs = answers.drugs || [];
  drugs.forEach(v => {
    if (v === "thiazide") scores.diuretic += 6;
    if (v === "ssri") scores.drug_siadh += 4;
    if (v === "carbamazepine") scores.drug_siadh += 4;
    if (v === "tca") scores.drug_siadh += 3;
    if (v === "antipsychotic") scores.drug_siadh += 3;
    if (v === "anticancer") scores.drug_siadh += 3;
    if (v === "desmopressin") scores.drug_siadh += 4;
    if (v === "oxytocin") scores.drug_siadh += 3;
  });

  return scores;
}

function rankDiseases(scores) {
  return Object.entries(scores)
    .map(([key, score]) => ({ key, score, ...DISEASES[key] }))
    .filter(d => d.score > 0)
    .sort((a, b) => b.score - a.score);
}

function getProbLevel(score, maxScore) {
  const ratio = score / Math.max(maxScore, 1);
  if (ratio >= 0.7) return { level: "high", label: "可能性 高" };
  if (ratio >= 0.35) return { level: "medium", label: "可能性 中" };
  return { level: "low", label: "可能性 低" };
}

// ===== UIレンダリング =====
let currentStep = 0;
const answers = {};

function render() {
  const app = document.getElementById("app");
  let html = "";

  // アルゴリズムノート
  html += `<div class="algo-note">
    <strong>💡 診断アルゴリズム:</strong>
    血清浸透圧 → 体液量評価 → 尿浸透圧 → 尿中Na → 検査・病歴で系統的に鑑別します
  </div>`;

  STEPS.forEach((step, i) => {
    const state = i < currentStep ? "completed" : i === currentStep ? "" : "inactive";
    const numClass = i < currentStep ? "done" : "";
    html += `<div class="step-card ${state}" id="step-${i}">`;
    html += `<div class="step-header">
      <span class="step-number ${numClass}">${i < currentStep ? "✓" : i + 1}</span>
      <span class="step-title">${step.title}</span>
    </div>`;

    if (i <= currentStep) {
      html += `<div class="step-body">`;
      html += `<p style="font-weight:600; margin-bottom:4px;">${step.question}</p>`;
      if (step.hint) html += `<p class="hint">${step.hint}</p>`;

      if (step.type === "single") {
        html += `<div class="option-group">`;
        step.options.forEach(opt => {
          const sel = answers[step.id] === opt.value ? "selected" : "";
          html += `<button class="option-btn ${sel}" onclick="selectOption('${step.id}', '${opt.value}', ${i})">
            <span class="icon">${opt.icon}</span> ${opt.label}
          </button>`;
        });
        html += `</div>`;
      } else {
        html += `<div class="checklist">`;
        const checked = answers[step.id] || [];
        step.options.forEach(opt => {
          const isChecked = checked.includes(opt.value);
          html += `<div class="check-item" onclick="toggleCheck('${step.id}', '${opt.value}')">
            <input type="checkbox" ${isChecked ? "checked" : ""} tabindex="-1">
            <label>${opt.label}</label>
          </div>`;
        });
        html += `</div>`;
        if (i === currentStep) {
          const hasSelection = checked.length > 0;
          html += `<button class="next-btn" onclick="nextStep(${i})" ${hasSelection ? "" : "disabled"}>
            次へ ▶
          </button>`;
        }
      }
      html += `</div>`;
    }
    html += `</div>`;
  });

  // 結果表示
  if (currentStep >= STEPS.length) {
    const scores = calcScores(answers);
    const ranked = rankDiseases(scores);
    const maxScore = ranked.length > 0 ? ranked[0].score : 1;

    html += `<div class="result-panel show">`;
    html += `<div class="result-header">📊 鑑別診断結果</div>`;
    html += `<div class="result-body">`;
    html += `<p style="margin-bottom:14px; color:#555; font-size:0.9em;">入力された臨床情報に基づく鑑別疾患の優先度です。確定診断には追加検査が必要です。</p>`;

    ranked.forEach(d => {
      const prob = getProbLevel(d.score, maxScore);
      html += `<div class="dx-card ${prob.level}">
        <div class="dx-name">
          ${d.emoji} ${d.name}
          <span class="prob-badge">${prob.label}</span>
        </div>
        <div class="dx-detail">${d.detail}</div>
        <div class="dx-workup">🔍 <strong>追加検査:</strong> ${d.workup}</div>
      </div>`;
    });

    html += `<div class="divider"></div>`;
    html += `<p style="font-size:0.82em; color:#888; line-height:1.6;">
      ⚠️ 本ツールは臨床判断の補助を目的としており、確定診断を行うものではありません。<br>
      SIADHは除外診断です。甲状腺・副腎機能の評価を必ず行ってください。<br>
      実臨床では総合的な臨床判断が必要です。
    </p>`;
    html += `</div></div>`;
  }

  html += `<button class="reset-btn" onclick="resetAll()">🔄 最初からやり直す</button>`;
  app.innerHTML = html;

  if (currentStep < STEPS.length) {
    const el = document.getElementById(`step-${currentStep}`);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
  } else {
    const panel = document.querySelector(".result-panel");
    if (panel) panel.scrollIntoView({ behavior: "smooth", block: "start" });
  }
}

function selectOption(stepId, value, stepIndex) {
  answers[stepId] = value;
  currentStep = stepIndex + 1;
  render();
}

function toggleCheck(stepId, value) {
  if (!answers[stepId]) answers[stepId] = [];
  const arr = answers[stepId];
  const idx = arr.indexOf(value);

  if (value === "none" || value === "unknown") {
    answers[stepId] = idx >= 0 ? [] : [value];
  } else {
    const noneIdx = arr.indexOf("none");
    if (noneIdx >= 0) arr.splice(noneIdx, 1);
    const unkIdx = arr.indexOf("unknown");
    if (unkIdx >= 0) arr.splice(unkIdx, 1);
    if (idx >= 0) arr.splice(idx, 1);
    else arr.push(value);
  }
  render();
}

function nextStep(stepIndex) {
  currentStep = stepIndex + 1;
  render();
}

function resetAll() {
  currentStep = 0;
  Object.keys(answers).forEach(k => delete answers[k]);
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

render();
</script>
</body>
</html>
