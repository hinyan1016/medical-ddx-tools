      { label: "CCCR > 0.02（高カルシウム尿）", value: "high", icon: "⬆️" },
      { label: "24時間尿Ca > 400 mg/日", value: "very_high", icon: "🔺" },
      { label: "未検査 / 不明", value: "unknown", icon: "🤔" }
    ]
  },
  {
    id: "vitd_pthrp",
    title: "ビタミンD・PTHrP",
    question: "ビタミンD・PTHrP関連の検査結果は？",
    hint: "PTHrP高値→悪性腫瘍、25(OH)D高値→VitD中毒、1,25(OH)2D高値→肉芽腫/リンパ腫",
    type: "single",
    options: [
      { label: "PTHrP 高値", value: "pthrp_high", icon: "🔬" },
      { label: "25(OH)D 高値（>80 ng/mL）", value: "25ohd_high", icon: "☀️" },
      { label: "1,25(OH)2D 高値", value: "125ohd_high", icon: "🫁" },
      { label: "いずれも正常 / 低値", value: "all_normal", icon: "✅" },
      { label: "未検査 / 不明", value: "unknown", icon: "🤔" }
    ]
  },
  {
    id: "history",
    title: "背景疾患・病歴（該当するものをすべて選択）",
    question: "以下の背景疾患・病歴で該当するものは？",
    type: "multi",
    options: [
      { label: "悪性腫瘍の既往または疑い", value: "malignancy" },
      { label: "長期CKD / 透析歴", value: "ckd_dialysis" },
      { label: "腎移植後", value: "renal_transplant" },
      { label: "サルコイドーシス / 肉芽腫性疾患", value: "granuloma" },
      { label: "長期臥床 / 不動化（脊損・脳卒中後等）", value: "immobilization" },
      { label: "若年から持続する高Ca血症", value: "young_onset" },
      { label: "家族歴あり（高Ca血症）", value: "family_history" },
      { label: "体重減少 / 食欲低下", value: "weight_loss" },
      { label: "骨痛 / 病的骨折", value: "bone_pain" },
      { label: "腎結石の既往", value: "renal_stones" },
      { label: "該当なし", value: "none" }
    ]
  },
  {
    id: "drugs",
    title: "薬剤・サプリメント（該当するものをすべて選択）",
    question: "以下の薬剤・サプリメントを使用していますか？",
    hint: "市販薬やサプリメントも含めて確認",
    type: "multi",
    options: [
      { label: "リチウム", value: "lithium" },
      { label: "サイアザイド系利尿薬", value: "thiazide" },
      { label: "カルシウム製剤（大量）/ 炭酸カルシウム", value: "calcium_supplement" },
      { label: "ビタミンD製剤 / サプリメント", value: "vitd_supplement" },
      { label: "ビタミンA（大量）", value: "vita" },
      { label: "テオフィリン", value: "theophylline" },
      { label: "該当薬剤なし", value: "none" }
    ]
  }
];

// ===== スコアリングエンジン =====
function calcScores(answers) {
  var scores = {};
  Object.keys(DISEASES).forEach(function(k) { scores[k] = 0; });

  // Step 1: 症状・重症度
  var severity = answers.severity;
  if (severity === "asymptomatic") {
    scores.phpt += 3;
    scores.fhh += 3;
    scores.thiazide += 2;
    scores.malignancy_pthrp -= 2;
    scores.malignancy_bone -= 2;
  } else if (severity === "mild") {
    scores.phpt += 2;
    scores.fhh += 1;
    scores.thyrotoxicosis += 1;
  } else if (severity === "moderate") {
    scores.malignancy_pthrp += 2;
    scores.malignancy_bone += 2;
    scores.vitd_intox += 1;
    scores.fhh -= 2;
  } else if (severity === "severe") {
    scores.malignancy_pthrp += 4;
    scores.malignancy_bone += 3;
    scores.malignancy_calcitriol += 2;
    scores.fhh -= 4;
    scores.thiazide -= 2;
  }

  // Step 2: 発症経過
  var onset = answers.onset;
  if (onset === "chronic") {
    scores.phpt += 4;
    scores.fhh += 5;
    scores.thiazide += 2;
    scores.malignancy_pthrp -= 3;
    scores.malignancy_bone -= 2;
  } else if (onset === "subacute") {
    scores.malignancy_pthrp += 2;
    scores.malignancy_bone += 2;
    scores.granulomatous += 1;
    scores.vitd_intox += 1;
  } else if (onset === "acute") {
    scores.malignancy_pthrp += 4;
    scores.malignancy_bone += 3;
    scores.malignancy_calcitriol += 2;
    scores.immobilization += 2;
    scores.phpt -= 2;
    scores.fhh -= 4;
  }

  // Step 3: PTH値（最重要分岐）
  var pth = answers.pth;
  if (pth === "high") {
    scores.phpt += 6;
    scores.fhh += 4;
    scores.tertiary_hpt += 5;
    scores.lithium += 4;
    // PTH非依存性は大幅減点
    scores.malignancy_pthrp -= 5;
    scores.malignancy_bone -= 5;
    scores.malignancy_calcitriol -= 5;
    scores.vitd_intox -= 5;
    scores.granulomatous -= 5;
    scores.thyrotoxicosis -= 5;
    scores.adrenal_insufficiency -= 5;
    scores.immobilization -= 5;
    scores.milk_alkali -= 5;
  } else if (pth === "normal_unsuppressed") {
    scores.phpt += 5;
    scores.fhh += 5;
    scores.lithium += 3;
    scores.malignancy_pthrp -= 4;
    scores.malignancy_bone -= 4;
    scores.malignancy_calcitriol -= 4;
    scores.vitd_intox -= 4;
    scores.granulomatous -= 4;
    scores.thyrotoxicosis -= 4;
    scores.adrenal_insufficiency -= 4;
    scores.immobilization -= 4;
  } else if (pth === "suppressed") {
    scores.malignancy_pthrp += 4;
    scores.malignancy_bone += 4;
    scores.malignancy_calcitriol += 4;
    scores.vitd_intox += 4;
    scores.granulomatous += 4;
    scores.thyrotoxicosis += 3;
    scores.adrenal_insufficiency += 3;
    scores.immobilization += 3;
    scores.thiazide += 2;
    scores.milk_alkali += 3;
    // PTH依存性は大幅減点
    scores.phpt -= 6;
    scores.fhh -= 6;
    scores.tertiary_hpt -= 6;
    scores.lithium -= 4;
  }

  // Step 4: 尿中Ca・CCCR
  var urineCa = answers.urine_ca;
  if (urineCa === "very_low") {
    scores.fhh += 6;
    scores.phpt -= 2;
  } else if (urineCa === "borderline") {
    scores.fhh += 3;
    scores.phpt += 1;
  } else if (urineCa === "high") {
    scores.phpt += 4;
    scores.fhh -= 3;
  } else if (urineCa === "very_high") {
    scores.phpt += 5;
    scores.fhh -= 4;
    scores.immobilization += 2;
  }

  // Step 5: ビタミンD・PTHrP
  var vitd = answers.vitd_pthrp;
  if (vitd === "pthrp_high") {
    scores.malignancy_pthrp += 8;
    scores.malignancy_bone -= 2;
    scores.granulomatous -= 3;
    scores.vitd_intox -= 3;
  } else if (vitd === "25ohd_high") {
    scores.vitd_intox += 8;
    scores.malignancy_pthrp -= 3;
    scores.granulomatous -= 2;
  } else if (vitd === "125ohd_high") {
    scores.granulomatous += 6;
    scores.malignancy_calcitriol += 6;
    scores.vitd_intox -= 2;
    scores.malignancy_pthrp -= 2;
  } else if (vitd === "all_normal") {
    scores.malignancy_bone += 2;
    scores.thyrotoxicosis += 2;
    scores.adrenal_insufficiency += 2;
    scores.immobilization += 2;
    scores.thiazide += 1;
    scores.milk_alkali += 1;
    scores.vitd_intox -= 4;
    scores.granulomatous -= 2;
    scores.malignancy_calcitriol -= 3;
  }

  // Step 6: 背景疾患・病歴
  var hx = answers.history || [];
  hx.forEach(function(v) {
    if (v === "malignancy") {
      scores.malignancy_pthrp += 5;
      scores.malignancy_bone += 5;
      scores.malignancy_calcitriol += 3;
    }
    if (v === "ckd_dialysis") {
      scores.tertiary_hpt += 6;
    }
    if (v === "renal_transplant") {
      scores.tertiary_hpt += 5;
      scores.phpt += 1;
    }
    if (v === "granuloma") {
      scores.granulomatous += 6;
    }
    if (v === "immobilization") {
      scores.immobilization += 6;
    }
    if (v === "young_onset") {
      scores.fhh += 4;
      scores.phpt += 1;
    }
    if (v === "family_history") {
      scores.fhh += 5;
    }
    if (v === "weight_loss") {
      scores.malignancy_pthrp += 3;
      scores.malignancy_bone += 3;
      scores.malignancy_calcitriol += 2;
      scores.adrenal_insufficiency += 2;
    }
    if (v === "bone_pain") {
      scores.malignancy_bone += 4;
      scores.phpt += 1;
    }
    if (v === "renal_stones") {
      scores.phpt += 3;
    }
  });

  // Step 7: 薬剤・サプリメント
  var drugs = answers.drugs || [];
  drugs.forEach(function(v) {
    if (v === "lithium") {
      scores.lithium += 6;
    }
    if (v === "thiazide") {
      scores.thiazide += 5;
      scores.phpt += 1;
    }
    if (v === "calcium_supplement") {
      scores.milk_alkali += 6;
    }
    if (v === "vitd_supplement") {
      scores.vitd_intox += 5;
    }
    if (v === "vita") {
      scores.vitd_intox += 2;
    }
    if (v === "theophylline") {
      scores.thiazide += 1;
    }
  });

  return scores;
}

function rankDiseases(scores) {
  return Object.entries(scores)
    .map(function(entry) {
      var key = entry[0];
      var score = entry[1];
      var d = DISEASES[key];
      return { key: key, score: score, name: d.name, emoji: d.emoji, category: d.category, detail: d.detail, workup: d.workup };
    })
    .filter(function(d) { return d.score > 0; })
    .sort(function(a, b) { return b.score - a.score; });
}

function getProbLevel(score, maxScore) {
  var ratio = score / Math.max(maxScore, 1);
  if (ratio >= 0.7) return { level: "high", label: "可能性 高" };
  if (ratio >= 0.35) return { level: "medium", label: "可能性 中" };
  return { level: "low", label: "可能性 低" };
}

// ===== UIレンダリング =====
var currentStep = 0;
var answers = {};

function render() {
  var app = document.getElementById("app");
  var html = "";

  // アルゴリズムノート
  html += '<div class="algo-note">';
  html += '<strong>💡 診断アルゴリズム:</strong> ';
  html += '症状・経過 → <strong>PTH値で二分</strong> → 尿中Ca/CCCR → ビタミンD/PTHrP → 病歴・薬剤で系統的に鑑別します';
  html += '</div>';

  STEPS.forEach(function(step, i) {
    var state = i < currentStep ? "completed" : i === currentStep ? "" : "inactive";
    var numClass = i < currentStep ? "done" : "";
    html += '<div class="step-card ' + state + '" id="step-' + i + '">';
    html += '<div class="step-header">';
    html += '<span class="step-number ' + numClass + '">' + (i < currentStep ? "✓" : i + 1) + '</span>';
    html += '<span class="step-title">' + step.title + '</span>';
    html += '</div>';

    if (i <= currentStep) {
      html += '<div class="step-body">';
      html += '<p style="font-weight:600; margin-bottom:4px;">' + step.question + '</p>';
      if (step.hint) html += '<p class="hint">' + step.hint + '</p>';

      if (step.type === "single") {
        html += '<div class="option-group">';
        step.options.forEach(function(opt) {
          var sel = answers[step.id] === opt.value ? "selected" : "";
          html += '<button class="option-btn ' + sel + '" onclick="selectOption(\'' + step.id + '\', \'' + opt.value + '\', ' + i + ')">';
          html += '<span class="icon">' + opt.icon + '</span> ' + opt.label;
          html += '</button>';
        });
        html += '</div>';
      } else {
        html += '<div class="checklist">';
        var checked = answers[step.id] || [];
        step.options.forEach(function(opt) {
          var isChecked = checked.indexOf(opt.value) >= 0;
          html += '<div class="check-item" onclick="toggleCheck(\'' + step.id + '\', \'' + opt.value + '\')">';
          html += '<input type="checkbox" ' + (isChecked ? "checked" : "") + ' tabindex="-1">';
          html += '<label>' + opt.label + '</label>';
          html += '</div>';
        });
        html += '</div>';
        if (i === currentStep) {
          var hasSelection = checked.length > 0;
          html += '<button class="next-btn" onclick="nextStep(' + i + ')" ' + (hasSelection ? "" : "disabled") + '>';
          html += '次へ ▶';
          html += '</button>';
        }
      }
      html += '</div>';
    }
    html += '</div>';
  });

  // 結果表示
  if (currentStep >= STEPS.length) {
    var scores = calcScores(answers);
    var ranked = rankDiseases(scores);
    var maxScore = ranked.length > 0 ? ranked[0].score : 1;

    html += '<div class="result-panel show">';
    html += '<div class="result-header">📊 鑑別診断結果</div>';
    html += '<div class="result-body">';
    html += '<p style="margin-bottom:14px; color:#555; font-size:0.9em;">入力された臨床情報に基づく鑑別疾患の優先度です。確定診断には追加検査が必要です。</p>';

    ranked.forEach(function(d) {
      var prob = getProbLevel(d.score, maxScore);
      html += '<div class="dx-card ' + prob.level + '">';
      html += '<div class="dx-name">';
      html += d.emoji + ' ' + d.name;
      html += ' <span class="prob-badge">' + prob.label + '</span>';
      html += '</div>';
      html += '<div class="dx-detail">' + d.detail + '</div>';
      html += '<div class="dx-workup">🔍 <strong>追加検査:</strong> ' + d.workup + '</div>';
      html += '</div>';
    });

    html += '<div class="divider"></div>';
    html += '<p style="font-size:0.82em; color:#888; line-height:1.6;">';
    html += '⚠️ 本ツールは臨床判断の補助を目的としており、確定診断を行うものではありません。<br>';
    html += '高Ca血症の場面で「PTH正常」は"異常に正常"であり、PHPTやFHHを除外できません。<br>';
    html += '副甲状腺画像は診断ではなく手術計画のための局在診断です。<br>';
    html += '実臨床では総合的な臨床判断が必要です。';
    html += '</p>';
    html += '</div></div>';
  }

  html += '<button class="reset-btn" onclick="resetAll()">🔄 最初からやり直す</button>';
  app.innerHTML = html;

  if (currentStep < STEPS.length) {
    var el = document.getElementById("step-" + currentStep);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
  } else {
    var panel = document.querySelector(".result-panel");
    if (panel) panel.scrollIntoView({ behavior: "smooth", block: "start" });
  }
}

function selectOption(stepId, value, stepIndex) {
  answers[stepId] = value;
  currentStep = stepIndex + 1;
  render();
}

function toggleCheck(stepId, value) {
  if (!answers[stepId]) answers[stepId] = [];
  var arr = answers[stepId];
  var idx = arr.indexOf(value);

  if (value === "none" || value === "unknown") {
    answers[stepId] = idx >= 0 ? [] : [value];
  } else {
    var noneIdx = arr.indexOf("none");
    if (noneIdx >= 0) arr.splice(noneIdx, 1);
    var unkIdx = arr.indexOf("unknown");
    if (unkIdx >= 0) arr.splice(unkIdx, 1);
    if (idx >= 0) arr.splice(idx, 1);
    else arr.push(value);
  }
  render();
}

function nextStep(stepIndex) {
  currentStep = stepIndex + 1;
  render();
}

function resetAll() {
  currentStep = 0;
  Object.keys(answers).forEach(function(k) { delete answers[k]; });
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

render();
</script>
