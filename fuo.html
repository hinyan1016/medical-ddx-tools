// ===== スコアリング =====
function calcScores(ans) {
  var scores = {};
  var keys = Object.keys(DISEASES);
  for (var i = 0; i < keys.length; i++) { scores[keys[i]] = 0; }

  // --- Step 1: FUO病型 ---
  var ftype = ans.fuo_type || "";
  if (ftype === "classic") {
    scores.tb += 3; scores.ie += 3; scores.lymphoma += 3;
    scores.still += 3; scores.gca_pmr += 3; scores.abscess += 2;
    scores.drug_fever += 2; scores.sle += 2; scores.vasculitis += 2;
    scores.sarcoidosis += 1; scores.ibd += 1;
  }
  if (ftype === "nosocomial") {
    scores.drug_fever += 5; scores.abscess += 4;
    scores.pe_dvt += 4; scores.uti_complex += 3;
    scores.ie += 2;
  }
  if (ftype === "neutropenic") {
    scores.abscess += 4; scores.uti_complex += 2;
    scores.ie += 2;
  }
  if (ftype === "hiv") {
    scores.tb += 6; scores.lymphoma += 4;
    scores.abscess += 2; scores.ie += 2;
  }

  // --- Step 2: 発熱パターン ---
  var fp = ans.fever_pattern || "";
  if (fp === "remittent") {
    scores.still += 5; scores.abscess += 3;
    scores.lymphoma += 2; scores.ie += 1;
  }
  if (fp === "intermittent") {
    scores.abscess += 4; scores.lymphoma += 2;
    scores.malignancy_other += 1;
  }
  if (fp === "continuous") {
    scores.tb += 3; scores.ie += 2;
    scores.lymphoma += 1; scores.sle += 1;
  }
  if (fp === "low_grade") {
    scores.pe_dvt += 3; scores.thyroiditis += 2;
    scores.ibd += 2; scores.sle += 2;
    scores.gca_pmr += 1; scores.malignancy_other += 1;
  }
  if (fp === "periodic") {
    scores.lymphoma += 3; scores.still += 2;
    scores.ibd += 1;
  }

  // --- Step 3: 身体所見 ---
  var pf = ans.physical_findings || [];
  if (pf.indexOf("rash") >= 0) {
    scores.still += 5; scores.sle += 4;
    scores.vasculitis += 3; scores.drug_fever += 2;
  }
  if (pf.indexOf("lymphadenopathy") >= 0) {
    scores.lymphoma += 5; scores.tb += 3;
    scores.sarcoidosis += 3; scores.kikuchi += 4;
    scores.sle += 1; scores.malignancy_other += 2;
  }
  if (pf.indexOf("hepatosplenomegaly") >= 0) {
    scores.lymphoma += 4; scores.hlh += 4;
    scores.ie += 2; scores.malignancy_other += 3;
    scores.tb += 1;
  }
  if (pf.indexOf("heart_murmur") >= 0) {
    scores.ie += 7;
  }
  if (pf.indexOf("arthritis") >= 0) {
    scores.still += 4; scores.sle += 4;
    scores.vasculitis += 2; scores.ibd += 2;
    scores.sarcoidosis += 1;
  }
  if (pf.indexOf("oral_ulcer") >= 0) {
    scores.sle += 3; scores.still += 2;
    scores.ibd += 2;
  }
  if (pf.indexOf("temporal_artery") >= 0) {
    scores.gca_pmr += 7;
  }
  if (pf.indexOf("neck_pain") >= 0) {
    scores.thyroiditis += 7;
  }
  if (pf.indexOf("fundus_abnormal") >= 0) {
    scores.ie += 4; scores.sarcoidosis += 2;
    scores.vasculitis += 2;
  }
  if (pf.indexOf("skin_nodule") >= 0) {
    scores.vasculitis += 4; scores.sarcoidosis += 3;
    scores.ie += 2;
  }
  if (pf.indexOf("proximal_pain") >= 0) {
    scores.gca_pmr += 6;
  }
  if (pf.indexOf("leg_swelling") >= 0) {
    scores.pe_dvt += 5;
  }
  if (pf.indexOf("abdominal_pain") >= 0) {
    scores.abscess += 3; scores.ibd += 3;
    scores.uti_complex += 1;
  }
  if (pf.indexOf("none_physical") >= 0) {
    scores.drug_fever += 2; scores.pe_dvt += 1;
    scores.lymphoma += 1;
  }

  // --- Step 4: 検査所見 ---
  var lab = ans.lab_findings || [];
  if (lab.indexOf("very_high_esr") >= 0) {
    scores.gca_pmr += 5; scores.tb += 3;
    scores.abscess += 2; scores.lymphoma += 2;
    scores.malignancy_other += 2; scores.ie += 1;
  }
  if (lab.indexOf("high_ferritin") >= 0) {
    scores.still += 7; scores.hlh += 6;
    scores.lymphoma += 1;
  }
  if (lab.indexOf("high_ldh") >= 0) {
    scores.lymphoma += 5; scores.hlh += 2;
    scores.malignancy_other += 2; scores.pe_dvt += 1;
  }
  if (lab.indexOf("cytopenia") >= 0) {
    scores.hlh += 5; scores.sle += 3;
    scores.lymphoma += 3; scores.malignancy_other += 2;
    scores.kikuchi += 2; scores.tb += 1;
  }
  if (lab.indexOf("leukocytosis") >= 0) {
    scores.still += 4; scores.abscess += 3;
    scores.ie += 1;
  }
  if (lab.indexOf("eosinophilia") >= 0) {
    scores.drug_fever += 5; scores.vasculitis += 2;
  }
  if (lab.indexOf("liver_dysfunction") >= 0) {
    scores.still += 2; scores.hlh += 2;
    scores.lymphoma += 1; scores.abscess += 1;
    scores.drug_fever += 1;
  }
  if (lab.indexOf("renal_dysfunction") >= 0) {
    scores.vasculitis += 4; scores.sle += 3;
    scores.ie += 1;
  }
  if (lab.indexOf("high_tg") >= 0) {
    scores.hlh += 4;
  }
  if (lab.indexOf("low_fibrinogen") >= 0) {
    scores.hlh += 4;
  }
  if (lab.indexOf("high_calcium") >= 0) {
    scores.sarcoidosis += 5; scores.lymphoma += 2;
    scores.malignancy_other += 2;
  }
  if (lab.indexOf("ana_positive") >= 0) {
    scores.sle += 4; scores.still += -1;
  }
  if (lab.indexOf("abnormal_protein") >= 0) {
    scores.malignancy_other += 5;
  }

  // --- Step 5: 曝露歴 ---
  var exp = ans.exposure || [];
  if (exp.indexOf("animal_contact") >= 0) {
    scores.ie += 3; scores.tb += 1;
  }
  if (exp.indexOf("travel") >= 0) {
    scores.tb += 3;
  }
  if (exp.indexOf("sexual_risk") >= 0) {
    scores.ie += 1; scores.tb += 1;
  }
  if (exp.indexOf("iv_drug") >= 0) {
    scores.ie += 4; scores.abscess += 2;
  }
  if (exp.indexOf("dental_procedure") >= 0) {
    scores.ie += 3;
  }
  if (exp.indexOf("prosthetic_valve") >= 0) {
    scores.ie += 5;
  }
  if (exp.indexOf("implant_device") >= 0) {
    scores.abscess += 3; scores.ie += 1;
  }
  if (exp.indexOf("recent_surgery") >= 0) {
    scores.abscess += 4; scores.pe_dvt += 2;
    scores.uti_complex += 1;
  }
  if (exp.indexOf("immunosuppressed") >= 0) {
    scores.tb += 3; scores.abscess += 2;
  }
  if (exp.indexOf("medications") >= 0) {
    scores.drug_fever += 5;
  }
  if (exp.indexOf("malignancy_hx") >= 0) {
    scores.malignancy_other += 3; scores.lymphoma += 2;
    scores.pe_dvt += 1;
  }
  if (exp.indexOf("autoimmune_hx") >= 0) {
    scores.sle += 3; scores.vasculitis += 2;
    scores.hlh += 1;
  }
  if (exp.indexOf("elderly") >= 0) {
    scores.gca_pmr += 4; scores.malignancy_other += 2;
    scores.tb += 1; scores.lymphoma += 1;
  }
  if (exp.indexOf("young_female") >= 0) {
    scores.sle += 3; scores.kikuchi += 3;
    scores.still += 1;
  }

  // --- Step 6: 臓器症状 ---
  var org = ans.organ_symptoms || [];
  if (org.indexOf("weight_loss") >= 0) {
    scores.lymphoma += 3; scores.tb += 3;
    scores.malignancy_other += 3; scores.ibd += 2;
  }
  if (org.indexOf("night_sweats") >= 0) {
    scores.lymphoma += 4; scores.tb += 3;
  }
  if (org.indexOf("diarrhea_bloody") >= 0) {
    scores.ibd += 6;
  }
  if (org.indexOf("cough") >= 0) {
    scores.tb += 3; scores.vasculitis += 1;
    scores.sarcoidosis += 1;
  }
  if (org.indexOf("headache") >= 0) {
    scores.gca_pmr += 3;
  }
  if (org.indexOf("jaw_claudication") >= 0) {
    scores.gca_pmr += 6;
  }
  if (org.indexOf("visual_change") >= 0) {
    scores.gca_pmr += 4; scores.sarcoidosis += 2;
  }
  if (org.indexOf("sinus_symptoms") >= 0) {
    scores.vasculitis += 5;
  }
  if (org.indexOf("back_pain") >= 0) {
    scores.abscess += 3; scores.tb += 2;
  }
  if (org.indexOf("urinary_symptoms") >= 0) {
    scores.uti_complex += 5;
  }
  if (org.indexOf("numbness_weakness") >= 0) {
    scores.vasculitis += 3; scores.sle += 1;
  }
  if (org.indexOf("none_organ") >= 0) {
    scores.drug_fever += 2; scores.pe_dvt += 1;
  }

  // --- Step 7: 既施行検査 ---
  var wu = ans.workup_result || [];
  if (wu.indexOf("blood_culture_neg") >= 0) {
    scores.ie += 1;
    scores.abscess += -1;
  }
  if (wu.indexOf("blood_culture_pos") >= 0) {
    scores.ie += 4; scores.abscess += 3;
  }
  if (wu.indexOf("tb_test_pos") >= 0) {
    scores.tb += 5;
  }
  if (wu.indexOf("ct_lymphnode") >= 0) {
    scores.lymphoma += 4; scores.tb += 3;
    scores.sarcoidosis += 3; scores.kikuchi += 2;
    scores.malignancy_other += 2;
  }
  if (wu.indexOf("ct_abscess") >= 0) {
    scores.abscess += 6;
  }
  if (wu.indexOf("ct_bhl") >= 0) {
    scores.sarcoidosis += 6; scores.lymphoma += 2;
    scores.tb += 1;
  }
  if (wu.indexOf("echo_vegetation") >= 0) {
    scores.ie += 7;
  }
  if (wu.indexOf("pet_positive") >= 0) {
    scores.lymphoma += 3; scores.gca_pmr += 3;
    scores.abscess += 3; scores.tb += 2;
    scores.sarcoidosis += 2;
  }
  if (wu.indexOf("hiv_positive") >= 0) {
    scores.tb += 4; scores.lymphoma += 3;
  }

  return scores;
}

// ===== UI描画 =====
var appEl = document.getElementById("app");
var currentStep = 0;
var answers = {};

function render() {
  var html = "";

  html += '<div class="algo-note">';
  html += '<strong>使い方：</strong>各ステップの質問に順番に回答してください。すべてのステップ完了後に鑑別診断の候補が優先順位付きで表示されます。<br>';
  html += '<strong>3段階の原則：</strong>①病型を決める → ②病因群で整理 → ③<strong>PDC（potential diagnostic clues）が次の検査を決める</strong>';
  html += '<br><small>（Wright & Auwaerter Open Forum Infect Dis 2020; JAMA Netw Open 2022; Naito et al BMJ Open 2019 準拠）</small>';
  html += '</div>';

  for (var i = 0; i < STEPS.length; i++) {
    var step = STEPS[i];
    var isActive = i === currentStep;
    var isDone = i < currentStep;
    var cls = isDone ? "completed" : (isActive ? "" : "inactive");

    html += '<div class="step-card ' + cls + '" id="step-' + i + '">';
    html += '<div class="step-header">';
    html += '<span class="step-number ' + (isDone ? 'done' : '') + '">' + (isDone ? '✓' : (i + 1)) + '</span>';
    html += '<span class="step-title">' + step.title + '</span>';
    html += '</div>';

    if (isActive || isDone) {
      html += '<div class="step-body">';
      html += '<p style="font-weight:600;margin-bottom:4px;">' + step.question + '</p>';
      if (step.hint) html += '<p class="hint">' + step.hint + '</p>';

      if (step.type === "single") {
        html += '<div class="option-group">';
        for (var j = 0; j < step.options.length; j++) {
          var opt = step.options[j];
          var selected = answers[step.id] === opt.value;
          html += '<button class="option-btn ' + (selected ? 'selected' : '') + '"';
          html += ' onclick="selectSingle(\'' + step.id + '\', \'' + opt.value + '\', ' + i + ')"';
          if (isDone && !isActive) html += ' disabled';
          html += '>';
          html += '<span class="icon">' + (opt.icon || '') + '</span>' + opt.label;
          html += '</button>';
        }
        html += '</div>';
      } else {
        html += '<div class="checklist">';
        var currentAnswers = answers[step.id] || [];
        for (var j = 0; j < step.options.length; j++) {
          var opt = step.options[j];
          var checked = currentAnswers.indexOf(opt.value) >= 0;
          html += '<div class="check-item" onclick="toggleCheck(\'' + step.id + '\', \'' + opt.value + '\', this)">';
          html += '<input type="checkbox" ' + (checked ? 'checked' : '') + (isDone && !isActive ? ' disabled' : '') + '>';
          html += '<label>' + opt.label + '</label>';
          html += '</div>';
        }
        html += '</div>';
        if (isActive) {
          html += '<button class="next-btn" onclick="nextStep(' + i + ')">次へ ▶</button>';
        }
      }
      html += '</div>';
    }
    html += '</div>';
  }

  if (currentStep >= STEPS.length) {
    html += renderResults();
  }

  if (currentStep > 0) {
    html += '<button class="reset-btn" onclick="resetAll()">🔄 最初からやり直す</button>';
  }

  appEl.innerHTML = html;

  if (currentStep >= STEPS.length) {
    setTimeout(function() {
      var panel = document.querySelector('.result-panel');
      if (panel) panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }
}

function selectSingle(stepId, value, stepIndex) {
  answers[stepId] = value;
  currentStep = stepIndex + 1;
  render();
  scrollToStep(currentStep);
}

function toggleCheck(stepId, value, el) {
  if (!answers[stepId]) answers[stepId] = [];
  var arr = answers[stepId];
  var idx = arr.indexOf(value);
  if (idx >= 0) { arr.splice(idx, 1); } else { arr.push(value); }
  var cb = el.querySelector('input[type="checkbox"]');
  if (cb) cb.checked = idx < 0;
}

function nextStep(stepIndex) {
  currentStep = stepIndex + 1;
  render();
  scrollToStep(currentStep);
}

function scrollToStep(idx) {
  setTimeout(function() {
    var el = document.getElementById("step-" + idx) || document.querySelector('.result-panel');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function resetAll() {
  var keys = Object.keys(answers);
  for (var i = 0; i < keys.length; i++) { delete answers[keys[i]]; }
  currentStep = 0;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== 結果描画 =====
function renderResults() {
  var scores = calcScores(answers);
  var entries = [];
  var keys = Object.keys(scores);
  for (var i = 0; i < keys.length; i++) {
    entries.push([keys[i], scores[keys[i]]]);
  }
  entries.sort(function(a, b) { return b[1] - a[1]; });

  var maxScore = entries.length > 0 ? entries[0][1] : 1;
  if (maxScore < 1) maxScore = 1;

  var html = '<div class="result-panel">';
  html += '<h2>📋 鑑別診断の結果</h2>';

  // --- 病型別アラート ---
  if (answers.fuo_type === "nosocomial") {
    html += '<div class="alert-box alert-yellow">';
    html += '<strong>🏥 院内発熱の優先鑑別</strong><br>';
    html += '・<strong>薬剤熱</strong> — 系統的な薬剤歴確認が最優先<br>';
    html += '・<strong>深部膿瘍</strong> — 術後/処置後の造影CTを検討<br>';
    html += '・<strong>C. difficile感染</strong> — 抗菌薬使用後の下痢<br>';
    html += '・<strong>PE/DVT</strong> — 不動化、術後の微熱<br>';
    html += '・<strong>カテーテル関連感染</strong> — ライン刺入部の確認';
    html += '</div>';
  }
  if (answers.fuo_type === "neutropenic") {
    html += '<div class="alert-box alert-red">';
    html += '<strong>⚠️ 好中球減少時：感染症最優先の緊急病態</strong><br>';
    html += '・経験的広域抗菌薬を<strong>診断確定前に開始</strong>（好中球減少の例外）<br>';
    html += '・72-96時間以上の持続発熱 → <strong>侵襲性真菌症</strong>を考慮<br>';
    html += '・カテーテル感染の評価';
    html += '</div>';
  }
  if (answers.fuo_type === "hiv") {
    html += '<div class="alert-box alert-red">';
    html += '<strong>🔬 HIV関連FUO：結核を最優先で評価</strong><br>';
    html += '・<strong>結核</strong>が個別疾患として最も重要（肺外・播種性を含む）<br>';
    html += '・CD4 &lt;200：PCP、クリプトコックス、CMV、NTMも考慮<br>';
    html += '・リンパ腫（特に非ホジキンリンパ腫）の比率も高い';
    html += '</div>';
  }

  // --- HLHアラート ---
  if (scores.hlh >= 8) {
    html += '<div class="alert-box alert-red">';
    html += '<strong>⚡ HLH/MAS を積極的に疑う所見あり</strong><br>';
    html += '<strong>HScore ≥168</strong>で感度100%・特異度94%<br>';
    html += '確認項目：フェリチン（≥2,000で強く示唆）、TG、フィブリノゲン、血球減少、肝脾腫、骨髄検査';
    html += '</div>';
  }

  // --- Still病アラート ---
  if (scores.still >= 10) {
    html += '<div class="alert-box alert-yellow">';
    html += '<strong>🔥 成人Still病（AOSD）の可能性</strong><br>';
    html += '<strong>Yamaguchi基準</strong>：大項目2つ以上を含む計5項目以上で診断（感度93%）<br>';
    html += '<strong>大：</strong>①弛張熱≥39℃×1週 ②関節痛≥2週 ③サーモンピンク疹 ④好中球≥10,000<br>';
    html += '<strong>小：</strong>咽頭痛、リンパ節腫脹、肝脾腫、肝機能異常、RF/ANA陰性<br>';
    html += '※除外診断が前提（感染症・悪性腫瘍・他の膠原病を除外）';
    html += '</div>';
  }

  // --- 4本柱＋未診断 ---
  html += '<div class="section-title">🗂️ 4病因群＋未診断で整理</div>';
  html += '<div class="alert-box" style="background:#FFF8E1;border:1px solid #FFB300;">';
  html += '① <strong>感染症</strong> — 結核、心内膜炎（BCNE含む）、深部膿瘍、複雑性UTI<br>';
  html += '② <strong>悪性腫瘍</strong> — リンパ腫（最重要）、白血病、MDS、腎細胞癌<br>';
  html += '③ <strong>非感染性炎症性疾患</strong> — Still病、GCA/PMR、SLE、血管炎、サルコイドーシス<br>';
  html += '④ <strong>その他</strong> — 薬剤熱、PE/DVT、亜急性甲状腺炎、HLH/MAS<br>';
  html += '⑤ <strong>未診断</strong> — 日本の前向き研究では6か月時点で21.3%が未診断';
  html += '</div>';

  // --- 疾患カード ---
  html += '<div class="section-title">🔍 鑑別候補（スコア順）</div>';
  var shown = 0;
  for (var i = 0; i < entries.length; i++) {
    var id = entries[i][0];
    var score = entries[i][1];
    if (score <= 0) continue;

    var d = DISEASES[id];
    var level = getProbLevel(score, maxScore);
    var catLabel = getCatLabel(d.category);
    var catClass = "cat-" + d.category;

    html += '<div class="disease-card ' + level + '">';
    html += '<div class="disease-header">';
    html += '<span class="disease-name">' + d.emoji + ' ' + d.name + '</span>';
    html += '<span class="badge ' + level + '">';
    html += level === "high" ? "可能性 高" : (level === "medium" ? "可能性 中" : "可能性 低");
    html += '</span>';
    html += '</div>';
    html += '<span class="cat-tag ' + catClass + '">' + catLabel + '</span>';
    html += '<div class="disease-detail">' + d.detail + '</div>';
    html += '<div class="workup-line">🔍 追加検査: ' + d.workup + '</div>';
    html += '</div>';
    shown++;
  }

  if (shown === 0) {
    html += '<p style="color:var(--gray);text-align:center;padding:16px;">スコアが0以上の疾患はありませんでした。入力を見直してください。</p>';
  }

  // --- 検査進め方ガイド ---
  html += '<div class="section-title">📊 検査の進め方</div>';
  html += '<table class="ref-table">';
  html += '<tr><th>段階</th><th>検査</th></tr>';
  html += '<tr><td><strong>最小セット</strong></td><td>CBC分画、生化学（Ca含む）、ESR/CRP/フェリチン、血培3セット、尿検/尿培、TST/IGRA、HIV、胸腹骨盤CT</td></tr>';
  html += '<tr><td><strong>PDCあり</strong></td><td>PDCに応じた標的検査（心エコー、自己抗体、血清学、培養延長など）</td></tr>';
  html += '<tr><td><strong>PDC乏しい</strong></td><td><strong>18F-FDG PET/CT</strong>（感度84-86%、診断寄与55-75%、CTより30%以上高い診断yield）</td></tr>';
  html += '<tr><td><strong>標的あり</strong></td><td><strong>狙い撃ち生検</strong>（骨髄、リンパ節、肝、肺、皮膚、側頭動脈など）</td></tr>';
  html += '</table>';

  // --- 落とし穴 ---
  html += '<div class="pitfall-box">';
  html += '<strong>⚠️ 見逃しやすいポイント</strong><br>';
  html += '・<strong>CRPだけで切らない</strong> — 日本の前向き研究ではCRPに有意差なし、ESRが診断に寄与<br>';
  html += '・<strong>PDCなしに血清検査を闇雲に増やさない</strong> — 最小検査＋標的検査の方が実用的<br>';
  html += '・<strong>安定した古典型FUOで早すぎる経験的治療をしない</strong> — 経験的抗菌薬/ステロイドは診断の糸口を消す<br>';
  html += '・<strong>薬剤歴を系統的に確認する</strong> — 薬剤熱はFUOの重要原因、除外診断ではない<br>';
  html += '・<strong>身体診察は繰り返す</strong> — 1回の診察で見つからなかったPDCが後から拾えることがある<br>';
  html += '・<strong>培養陰性＝心内膜炎否定ではない</strong> — BCNEは心内膜炎の約20%';
  html += '</div>';

  html += '</div>';
  return html;
}

function getProbLevel(score, maxScore) {
  if (score >= maxScore * 0.7 && score >= 4) return "high";
  if (score >= maxScore * 0.4 && score >= 2) return "medium";
  return "low";
}

function getCatLabel(cat) {
  if (cat === "infection") return "感染症";
  if (cat === "malignancy") return "悪性腫瘍";
  if (cat === "inflammatory") return "炎症性疾患";
  if (cat === "other") return "その他";
  return cat;
}

render();
</script>

</html>
