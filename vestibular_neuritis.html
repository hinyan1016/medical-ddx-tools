<script>
// ===== データ定義 =====
var DISEASES = {

    workup: "Head Impulse Test、Frenzel眼鏡下眼振評価、温度刺激検査（caloric test）、vHIT、前庭機能検査"

    workup: "Dix-Hallpike検査、supine roll test（水平半規管型の場合）、Epley法による治療的診断"
  },
  meniere: {
    name: "メニエール病",
    emoji: "👂",
    category: "末梢性",

    workup: "聴力検査（低音域感音難聴）、蝸電図、内耳MRI（内リンパ水腫の評価）"

    workup: "片頭痛の病歴聴取、発作時の随伴症状（光過敏・音過敏・視覚性前兆）、他疾患の除外"

    workup: "MRI/MRA（発症早期は偽陰性あり）、血管リスク因子評価、神経内科コンサルト、必要に応じ再MRI"
  },
  other_central: {

    emoji: "⚠️",
    category: "中枢性",
    detail: "脱髄疾患（多発性硬化症）、小脳出血、脳幹腫瘍、Wernicke脳症なども急性めまいの原因となりうる。中枢性の眼振パターン（垂直眼振、注視方向性眼振、pure torsional nystagmus）や神経巣症状がある場合は中枢性病変を優先して考える。",
    workup: "MRI/MRA、神経学的精査、ビタミンB1（Wernicke疑い時）、脳脊髄液検査（脱髄疑い時）"
  }
};

// ===== ステップ定義 =====
var STEPS = [
  {
    id: "onset_duration",
    title: "発症様式と持続時間",
    question: "めまいの発症様式と持続時間は？",
    hint: "前庭神経炎は急性発症の持続性めまい（24時間以上）が典型",
    type: "single",
    options: [
      { label: "急性発症で24時間以上持続（持続性）", value: "acute_persistent", icon: "⏰" },
      { label: "頭位変換で誘発される短時間の反復性めまい", value: "positional_brief", icon: "🔄" },
      { label: "反復する発作性めまい（20分～数時間）", value: "episodic_hours", icon: "🔁" },
      { label: "反復する発作性めまい（数分～72時間、多彩）", value: "episodic_variable", icon: "🌊" },
      { label: "超急性発症（数秒～数分で完成）", value: "hyperacute", icon: "⚡" }
    ]
  },
  {
    id: "nystagmus",
    title: "眼振の性状",
    question: "自発眼振の性状はどれに最も近いですか？",
    hint: "Frenzel眼鏡下または暗所での評価が望ましい",
    type: "single",
    options: [
      { label: "方向固定性の水平回旋混合性眼振（視固定で抑制）", value: "peripheral_pattern", icon: "👁️" },
      { label: "注視方向で変わる眼振（gaze-evoked nystagmus）", value: "gaze_evoked", icon: "🔴" },
      { label: "垂直眼振（upbeat or downbeat）", value: "vertical", icon: "🔴" },
      { label: "純回旋性眼振", value: "pure_torsional", icon: "🔴" },
      { label: "頭位変換で誘発される眼振（Dix-Hallpike等）", value: "positional", icon: "💫" },
      { label: "自発眼振なし / 評価困難", value: "none_or_unknown", icon: "🤔" }
    ]
  },
  {
    id: "hit",
    title: "Head Impulse Test（HIT）",
    question: "Head Impulse Testの結果は？",
    hint: "患側への急速な頭部回旋でcatch-up saccadeが出れば陽性（VOR低下）",
    type: "single",
    options: [
      { label: "一側で陽性（catch-up saccadeあり）", value: "positive_unilateral", icon: "✅" },
      { label: "両側で陰性（正常VOR）", value: "negative", icon: "⚠️" },
      { label: "両側で陽性", value: "positive_bilateral", icon: "🔍" },
      { label: "未施行 / 評価困難", value: "not_done", icon: "🤔" }
    ]
  },
  {
    id: "skew_test",
    title: "Skew deviation / Test of Skew",
    question: "Skew deviation（垂直性の眼位ずれ）はありますか？",
    hint: "Alternate cover testで評価。Skew deviationは中枢性を強く示唆する",
    type: "single",
    options: [
      { label: "なし", value: "absent", icon: "✅" },
      { label: "あり（垂直性の眼位ずれを認める）", value: "present", icon: "🔴" },
      { label: "評価困難 / 未施行", value: "not_done", icon: "🤔" }
    ]
  },
  {
    id: "hearing",
    title: "聴覚症状",
    question: "急性の聴覚症状はありますか？",
    hint: "急性の難聴・耳鳴り・耳閉感は典型的前庭神経炎に合わない",
    type: "single",
    options: [
      { label: "聴覚症状なし", value: "none", icon: "✅" },
      { label: "急性の難聴あり", value: "hearing_loss", icon: "🔇" },
      { label: "耳鳴り・耳閉感あり", value: "tinnitus_fullness", icon: "👂" },

    ]

// ===== スコアリングエンジン =====
function calcScores(answers) {
  var scores = {};
  Object.keys(DISEASES).forEach(function(k) { scores[k] = 0; });

  // Step 1: onset_duration
  var onset = answers.onset_duration;
  if (onset === "acute_persistent") {
    scores.vestibular_neuritis += 5;
    scores.central_stroke += 4;
    scores.other_central += 3;
    scores.bppv -= 3;
    scores.meniere -= 1;
  } else if (onset === "positional_brief") {
    scores.bppv += 8;
    scores.vestibular_neuritis -= 3;
    scores.central_stroke -= 2;
    scores.meniere -= 2;
  } else if (onset === "episodic_hours") {
    scores.meniere += 6;
    scores.vestibular_migraine += 3;
    scores.vestibular_neuritis -= 3;
    scores.bppv -= 2;
  } else if (onset === "episodic_variable") {
    scores.vestibular_migraine += 6;
    scores.meniere += 2;
    scores.vestibular_neuritis -= 3;
    scores.bppv -= 1;
  } else if (onset === "hyperacute") {
    scores.central_stroke += 5;
    scores.other_central += 3;
    scores.vestibular_neuritis += 2;
  }

  // Step 2: nystagmus
  var nyst = answers.nystagmus;
  if (nyst === "peripheral_pattern") {
    scores.vestibular_neuritis += 5;
    scores.central_stroke -= 2;
    scores.other_central -= 2;
  } else if (nyst === "gaze_evoked") {
    scores.central_stroke += 5;
    scores.other_central += 5;
    scores.vestibular_neuritis -= 4;
    scores.bppv -= 3;
  } else if (nyst === "vertical") {
    scores.central_stroke += 6;
    scores.other_central += 6;
    scores.vestibular_neuritis -= 5;
    scores.bppv -= 4;
    scores.meniere -= 3;
  } else if (nyst === "pure_torsional") {
    scores.central_stroke += 5;
    scores.other_central += 5;
    scores.vestibular_neuritis -= 4;
  } else if (nyst === "positional") {
    scores.bppv += 5;
    scores.vestibular_neuritis -= 2;
  }

  // Step 3: HIT
  var hit = answers.hit;
  if (hit === "positive_unilateral") {
    scores.vestibular_neuritis += 5;
    scores.meniere += 1;
    // Note: does NOT exclude stroke - small penalty only
    scores.central_stroke -= 1;
  } else if (hit === "negative") {
    scores.central_stroke += 4;
    scores.other_central += 3;
    scores.vestibular_migraine += 2;
    scores.vestibular_neuritis -= 3;
  } else if (hit === "positive_bilateral") {
    scores.other_central += 2;
  }

  // Step 4: Skew
  var skew = answers.skew_test;
  if (skew === "present") {
    scores.central_stroke += 6;
    scores.other_central += 5;
    scores.vestibular_neuritis -= 4;
    scores.bppv -= 3;
    scores.meniere -= 3;
  } else if (skew === "absent") {
    scores.vestibular_neuritis += 2;
    scores.bppv += 1;
  }

  // Step 5: hearing
  var hear = answers.hearing;
  if (hear === "none") {
    scores.vestibular_neuritis += 3;
    scores.meniere -= 3;
  } else if (hear === "hearing_loss") {
    scores.meniere += 4;
    scores.central_stroke += 2;
    scores.vestibular_neuritis -= 4;
  } else if (hear === "tinnitus_fullness") {
    scores.meniere += 3;
    scores.vestibular_neuritis -= 3;
  } else if (hear === "fluctuating") {
    scores.meniere += 5;
    scores.vestibular_neuritis -= 3;
  }

  // Step 6: neuro signs
  var neuro = answers.neuro_signs || [];
  neuro.forEach(function(v) {
    if (v === "trunk_ataxia") { scores.central_stroke += 4; scores.other_central += 3; scores.vestibular_neuritis -= 2; }
    if (v === "gait_inability") { scores.central_stroke += 4; scores.other_central += 3; scores.vestibular_neuritis -= 2; }
    if (v === "dysarthria") { scores.central_stroke += 5; scores.other_central += 4; scores.vestibular_neuritis -= 4; }
    if (v === "motor_weakness") { scores.central_stroke += 6; scores.other_central += 4; scores.vestibular_neuritis -= 5; }
    if (v === "sensory_deficit") { scores.central_stroke += 5; scores.other_central += 4; scores.vestibular_neuritis -= 4; }
    if (v === "dysphagia") { scores.central_stroke += 5; scores.other_central += 4; scores.vestibular_neuritis -= 4; }
    if (v === "horner") { scores.central_stroke += 6; scores.other_central += 3; scores.vestibular_neuritis -= 5; }
  });

  // Step 7: risk/history
  var risk = answers.risk_history || [];
  risk.forEach(function(v) {
    if (v === "vascular_risk") { scores.central_stroke += 3; scores.other_central += 1; }
    if (v === "migraine_history") { scores.vestibular_migraine += 4; }
    if (v === "preceding_uri") { scores.vestibular_neuritis += 3; }
    if (v === "recurrent_vertigo") { scores.meniere += 3; scores.vestibular_migraine += 3; scores.vestibular_neuritis -= 2; }
    if (v === "elderly") { scores.central_stroke += 2; scores.bppv += 1; }
  });

  return scores;
}

function rankDiseases(scores) {
  var keys = Object.keys(scores);
  var arr = [];
  for (var i = 0; i < keys.length; i++) {
    var key = keys[i];
    var d = DISEASES[key];
    arr.push({ key: key, score: scores[key], name: d.name, emoji: d.emoji, category: d.category, detail: d.detail, workup: d.workup });
  }
  arr = arr.filter(function(d) { return d.score > 0; });
  arr.sort(function(a, b) { return b.score - a.score; });
  return arr;
}

function getProbLevel(score, maxScore) {
  var ratio = score / Math.max(maxScore, 1);
  if (ratio >= 0.7) return { level: "high", label: "可能性 高" };
  if (ratio >= 0.35) return { level: "medium", label: "可能性 中" };
  return { level: "low", label: "可能性 低" };
}

// ===== UIレンダリング =====
var currentStep = 0;
var answers = {};

function render() {
  var app = document.getElementById("app");
  var html = "";

  // アルゴリズムノート
  html += '<div class="algo-note">';
  html += '<strong>💡 診断アプローチ:</strong> ';
  html += '発症様式 → 眼振の性状 → HIT → Skew → 聴覚症状 → 神経所見 → リスク因子で系統的に鑑別します';
  html += '</div>';

  for (var i = 0; i < STEPS.length; i++) {
    var step = STEPS[i];
    var state = i < currentStep ? "completed" : i === currentStep ? "" : "inactive";
    var numClass = i < currentStep ? "done" : "";
    var numText = i < currentStep ? "✓" : String(i + 1);

    html += '<div class="step-card ' + state + '" id="step-' + i + '">';
    html += '<div class="step-header">';
    html += '<span class="step-number ' + numClass + '">' + numText + '</span>';
    html += '<span class="step-title">' + step.title + '</span>';
    html += '</div>';

    if (i <= currentStep) {
      html += '<div class="step-body">';
      html += '<p style="font-weight:600; margin-bottom:4px;">' + step.question + '</p>';
      if (step.hint) {
        html += '<p class="hint">' + step.hint + '</p>';
      }

      if (step.type === "single") {
        html += '<div class="option-group">';
        for (var j = 0; j < step.options.length; j++) {
          var opt = step.options[j];
          var sel = answers[step.id] === opt.value ? "selected" : "";
          html += '<button class="option-btn ' + sel + '" onclick="selectOption(\'' + step.id + '\', \'' + opt.value + '\', ' + i + ')">';
          html += '<span class="icon">' + opt.icon + '</span> ' + opt.label;
          html += '</button>';
        }
        html += '</div>';
      } else {
        html += '<div class="checklist">';
        var checked = answers[step.id] || [];
        for (var j = 0; j < step.options.length; j++) {
          var opt = step.options[j];
          var isChecked = checked.indexOf(opt.value) >= 0;
          html += '<div class="check-item" onclick="toggleCheck(\'' + step.id + '\', \'' + opt.value + '\')">';
          html += '<input type="checkbox" ' + (isChecked ? "checked" : "") + ' tabindex="-1">';
          html += '<label>' + opt.label + '</label>';
          html += '</div>';
        }
        html += '</div>';
        if (i === currentStep) {
          var hasSelection = checked.length > 0;
          html += '<button class="next-btn" onclick="nextStep(' + i + ')" ' + (hasSelection ? "" : "disabled") + '>';
          html += '次へ ▶';
          html += '</button>';
        }
      }
      html += '</div>';
    }
    html += '</div>';
  }

  // 結果表示
  if (currentStep >= STEPS.length) {
    var scores = calcScores(answers);
    var ranked = rankDiseases(scores);
    var maxScore = ranked.length > 0 ? ranked[0].score : 1;

    html += '<div class="result-panel show">';
    html += '<div class="result-header">📊 鑑別診断結果</div>';
    html += '<div class="result-body">';
    html += '<p style="margin-bottom:14px; color:#555; font-size:0.9em;">入力された臨床情報に基づく鑑別疾患の優先度です。確定診断には追加検査が必要です。</p>';

    for (var k = 0; k < ranked.length; k++) {
      var d = ranked[k];
      var prob = getProbLevel(d.score, maxScore);
      html += '<div class="dx-card ' + prob.level + '">';
      html += '<div class="dx-name">';
      html += d.emoji + ' ' + d.name + ' ';
      html += '<span class="prob-badge">' + prob.label + '</span>';
      html += '</div>';
      html += '<div class="dx-detail">' + d.detail + '</div>';
      html += '<div class="dx-workup">🔍 <strong>追加検査:</strong> ' + d.workup + '</div>';
      html += '</div>';
    }

    html += '<div class="divider"></div>';
    html += '<p style="font-size:0.82em; color:#888; line-height:1.6;">';
    html += '⚠️ 本ツールは臨床判断の補助を目的としており、確定診断を行うものではありません。<br>';
    html += '前庭神経炎の診断の最優先事項は脳卒中の除外です。HINTSは訓練された診察者が持続性AVSの患者に使用する前提で有用です。<br>';
    html += 'CT陰性ではstroke除外にならず、早期MRI陰性でも安心しすぎないでください。';
    html += '</p>';
    html += '</div></div>';
  }

  html += '<button class="reset-btn" onclick="resetAll()">🔄 最初からやり直す</button>';
  app.innerHTML = html;

  if (currentStep < STEPS.length) {
    var el = document.getElementById("step-" + currentStep);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
  } else {
    var panel = document.querySelector(".result-panel");
    if (panel) panel.scrollIntoView({ behavior: "smooth", block: "start" });
  }
}

function selectOption(stepId, value, stepIndex) {
  answers[stepId] = value;
  currentStep = stepIndex + 1;
  render();
}

function toggleCheck(stepId, value) {
  if (!answers[stepId]) answers[stepId] = [];
  var arr = answers[stepId];
  var idx = arr.indexOf(value);

  if (value === "none" || value === "unknown") {
    answers[stepId] = idx >= 0 ? [] : [value];
  } else {
    var noneIdx = arr.indexOf("none");
    if (noneIdx >= 0) arr.splice(noneIdx, 1);
    var unkIdx = arr.indexOf("unknown");
    if (unkIdx >= 0) arr.splice(unkIdx, 1);
    if (idx >= 0) arr.splice(idx, 1);
    else arr.push(value);
  }
  render();
}

function nextStep(stepIndex) {
  currentStep = stepIndex + 1;
  render();
}

function resetAll() {
  currentStep = 0;
  var keys = Object.keys(answers);
  for (var i = 0; i < keys.length; i++) {
    delete answers[keys[i]];
  }
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

render();
</script>
</body>
</html>
