  .step-card.inactive { opacity: 0.45; pointer-events: none; }
  .step-card.completed { opacity: 1; }
  .step-header {

    display: inline-flex; align-items: center; justify-content: center;

  .dx-card .dx-workup {

  .next-btn {
    display: inline-flex; align-items: center; gap: 6px; margin-top: 14px;
    padding: 10px 22px; background: var(--primary); color: var(--white); border: none;
    border-radius: 8px; font-size: 0.95em; font-weight: 600; cursor: pointer;

  .next-btn:hover { background: var(--primary-dark); }
  .next-btn:disabled { background: #B0BEC5; cursor: not-allowed; }

  .reset-btn {

    background: var(--white); color: var(--red); border: 2px solid var(--red);

  .reset-btn:hover { background: var(--red); color: var(--white); }

  .hint { font-size: 0.85em; color: var(--gray); margin-top: 6px; line-height: 1.5; }
  .divider { height: 1px; background: #D0D8E4; margin: 14px 0; }

  .algo-note {
    background: #FFF8E1; border-left: 4px solid var(--yellow);
    padding: 12px 16px; border-radius: 0 8px 8px 0; margin-bottom: 18px;
    font-size: 0.9em; line-height: 1.6; color: #555;

  .algo-note strong { color: var(--primary-dark); }

  .emergency-box {
    background: #FFF0F0; border: 2px solid var(--red); border-radius: 8px;
    padding: 14px 16px; margin-bottom: 18px; font-size: 0.9em; line-height: 1.6;
  }
  .emergency-box strong { color: var(--red); }

  @media (max-width: 600px) {
    header { padding: 12px 14px 14px; }
    header h1 { font-size: 1.2em; }
    header p { font-size: 0.85em; }
    .container { padding: 14px 10px; }
    .step-header { padding: 12px 14px; }
    .option-btn { min-height: 44px; font-size: 0.92em; -webkit-tap-highlight-color: transparent; }
    .step-card { margin-bottom: 14px; }
    .step-body, .result-body { padding: 14px; }
    .dx-card { padding: 12px; }
  }
</style>

    ]
  },
  {
    id: "basic_labs",
    title: "基本検査所見（該当をすべて選択）",
    question: "以下の検査所見で該当するものは？",
    hint: "初診時の基本検査（血液・尿・心電図）からの所見をチェック",
    type: "multi",
    options: [
      { label: "低カリウム血症（K<3.5mEq/L）", value: "hypokalemia" },
      { label: "高カルシウム血症", value: "hypercalcemia" },
      { label: "血清Cr上昇/eGFR低下", value: "renal_impairment" },

      { label: "TSH異常", value: "tsh_abnormal" },
      { label: "腎サイズ左右差（エコー）", value: "renal_asymmetry" },
      { label: "腎嚢胞多発（エコー）", value: "polycystic" },

    ]
  },
  {

    title: "背景・リスク因子（該当をすべて選択）",
    question: "以下の背景で該当するものは？",
    type: "multi",
    options: [
      { label: "NSAIDs常用", value: "nsaids" },
      { label: "副腎皮質ステロイド使用", value: "steroids" },
      { label: "経口避妊薬（OCP）使用", value: "ocp" },
      { label: "甘草含有漢方薬・サプリメント使用", value: "licorice" },
      { label: "その他の血圧上昇薬剤（エリスロポエチン・シクロスポリン等）", value: "other_drugs" },
      { label: "ACE-I/ARB開始後の腎機能悪化歴", value: "acei_renal" },
      { label: "若年女性", value: "young_female" },
      { label: "高血圧の家族歴が乏しい", value: "no_family_hx" },

    ]
  },
  {

    hint: "スクリーニング検査の結果が判明している場合にチェック",
    type: "multi",
    options: [
      { label: "PAC/PRA比（ARR）高値", value: "arr_high" },
      { label: "血漿遊離メタネフリン/蓄尿カテコールアミン高値", value: "catecholamine_high" },
      { label: "1mgデキサメタゾン抑制試験で抑制不十分", value: "dex_unsuppressed" },
      { label: "腎動脈超音波/MRA/CTAで腎動脈狭窄", value: "ras_found" },
      { label: "副腎CTで腫瘤あり", value: "adrenal_mass" },
      { label: "PSGでAHI高値（OSA確定）", value: "osa_confirmed" },
      { label: "コルチゾール日内変動消失", value: "cortisol_rhythm_lost" },
      { label: "検査未施行/不明", value: "unknown" }
    ]
  }
];

// ===== スコアリングエンジン =====
function calcScores(answers) {
  var s = {};
  Object.keys(DISEASES).forEach(function(k) { s[k] = 0; });

  // --- Step 1: 重症度 ---
  var sev = answers.severity;
  if (sev === "mild_moderate") {
    s.renal_parenchymal += 2; s.thyroid_hypo += 2; s.drug_induced += 2;
  } else if (sev === "severe") {
    s.pa += 3; s.pheochromocytoma += 3; s.renovascular += 3;
    s.renal_parenchymal += 2; s.cushing += 2;
  } else if (sev === "resistant") {
    s.pa += 5; s.osa += 5; s.renal_parenchymal += 3;
    s.renovascular += 3; s.pheochromocytoma += 2;
  } else if (sev === "malignant") {
    s.pheochromocytoma += 5; s.renovascular += 4; s.pa += 3;
    s.intracranial += 3; s.renal_parenchymal += 3;
  } else if (sev === "acute_rise") {
    s.pheochromocytoma += 4; s.renovascular += 3; s.thyroid_hyper += 2;
  }

  // --- Step 2: 年齢 ---
  var age = answers.age_onset;
  if (age === "pediatric") {
    s.coarctation += 6; s.renal_parenchymal += 4; s.renovascular += 3;
  } else if (age === "young") {
    s.renovascular += 3; s.coarctation += 3; s.pa += 2;
    s.pheochromocytoma += 2; s.thyroid_hyper += 2;
  } else if (age === "middle") {
    s.pa += 3; s.osa += 3; s.cushing += 2;
    s.renovascular += 2; s.pheochromocytoma += 2;
  } else if (age === "elderly") {
    s.renovascular += 3; s.renal_parenchymal += 3;
    s.osa += 2; s.pa += 2;
  }

  // --- Step 3: 随伴症状 ---
  var sx = answers.symptoms || [];
  sx.forEach(function(v) {
    if (v === "paroxysmal_triad") {
      s.pheochromocytoma += 8;
    }
    if (v === "cushingoid") {
      s.cushing += 7;
    }
    if (v === "weakness") {
      s.pa += 3; s.cushing += 3; s.thyroid_hyper += 2;
      s.hyperparathyroid += 2;
    }
    if (v === "osa_symptoms") {
      s.osa += 6;
    }
    if (v === "hyperthyroid") {
      s.thyroid_hyper += 7;
    }
    if (v === "hypothyroid") {
      s.thyroid_hypo += 7;
    }
    if (v === "hypercalcemia") {
      s.hyperparathyroid += 6;
    }
    if (v === "renal_symptoms") {
      s.renal_parenchymal += 5;
    }
    if (v === "icp_symptoms") {
      s.intracranial += 6;
    }
  });

  // --- Step 4: 身体所見 ---
  var ex = answers.exam_findings || [];
  ex.forEach(function(v) {
    if (v === "abdominal_bruit") {
      s.renovascular += 7;
    }
    if (v === "bp_difference") {
      s.coarctation += 7; s.renovascular += 2;
    }
    if (v === "femoral_delay") {
      s.coarctation += 7;
    }
    if (v === "goiter") {
      s.thyroid_hyper += 4; s.thyroid_hypo += 4;
    }
    if (v === "exophthalmos") {
      s.thyroid_hyper += 5;
    }
    if (v === "tachycardia") {
      s.thyroid_hyper += 4; s.pheochromocytoma += 3;
    }
    if (v === "bradycardia") {
      s.thyroid_hypo += 4; s.intracranial += 2;
    }
    if (v === "edema") {
      s.renal_parenchymal += 3; s.thyroid_hypo += 2;
    }
  });

  // --- Step 5: 基本検査所見 ---
  var labs = answers.basic_labs || [];
  labs.forEach(function(v) {
    if (v === "hypokalemia") {
      s.pa += 6; s.renovascular += 3; s.cushing += 3;
      s.drug_induced += 3;
    }
    if (v === "hypercalcemia") {
      s.hyperparathyroid += 7;
    }
    if (v === "renal_impairment") {
      s.renal_parenchymal += 6; s.renovascular += 3;
    }
    if (v === "proteinuria_hematuria") {
      s.renal_parenchymal += 6;
    }
    if (v === "glucose_abnormal") {
      s.cushing += 3; s.pa += 2;
    }
    if (v === "tsh_abnormal") {
      s.thyroid_hyper += 5; s.thyroid_hypo += 5;
    }
    if (v === "renal_asymmetry") {
      s.renovascular += 6;
    }
    if (v === "polycystic") {
      s.renal_parenchymal += 5;
    }
  });

  // --- Step 6: 背景・リスク ---
  var risk = answers.risk_history || [];
  risk.forEach(function(v) {
    if (v === "nsaids") { s.drug_induced += 5; }
    if (v === "steroids") { s.drug_induced += 5; s.cushing += 3; }
    if (v === "ocp") { s.drug_induced += 5; }
    if (v === "licorice") { s.drug_induced += 6; }
    if (v === "other_drugs") { s.drug_induced += 5; }
    if (v === "acei_renal") { s.renovascular += 6; }
    if (v === "young_female") { s.renovascular += 3; }
    if (v === "no_family_hx") {
      s.pa += 2; s.pheochromocytoma += 2; s.renovascular += 2;
      s.cushing += 2;
    }
    if (v === "adrenal_incidentaloma") {
      s.pa += 4; s.pheochromocytoma += 4; s.cushing += 3;
    }
  });

  // --- Step 7: 精密検査 ---
  var adv = answers.advanced_labs || [];
  adv.forEach(function(v) {
    if (v === "arr_high") { s.pa += 8; }
    if (v === "catecholamine_high") { s.pheochromocytoma += 9; }
    if (v === "dex_unsuppressed") { s.cushing += 8; }
    if (v === "ras_found") { s.renovascular += 9; }
    if (v === "adrenal_mass") {
      s.pa += 4; s.pheochromocytoma += 5; s.cushing += 4;
    }
    if (v === "osa_confirmed") { s.osa += 8; }
    if (v === "cortisol_rhythm_lost") { s.cushing += 6; }
  });

  return s;
}

function rankDiseases(scores) {
  return Object.entries(scores)
    .map(function(e) { return { key: e[0], score: e[1], name: DISEASES[e[0]].name, emoji: DISEASES[e[0]].emoji, category: DISEASES[e[0]].category, detail: DISEASES[e[0]].detail, workup: DISEASES[e[0]].workup }; })
    .filter(function(d) { return d.score > 0; })
    .sort(function(a, b) { return b.score - a.score; });
}

function getProbLevel(score, maxScore) {
  var ratio = score / Math.max(maxScore, 1);
  if (ratio >= 0.7) return { level: "high", label: "可能性 高" };
  if (ratio >= 0.35) return { level: "medium", label: "可能性 中" };
  return { level: "low", label: "可能性 低" };
}

// ===== UIレンダリング =====
var currentStep = 0;
var answers = {};

function render() {
  var app = document.getElementById("app");
  var html = "";

  html += '<div class="emergency-box">';
  html += '<strong>\u26a0\ufe0f 緊急対応が必要な場合：</strong>';
  html += '発作性の著明な血圧上昇（200mmHg超）＋頭痛・動悸・発汗 → <strong>褐色細胞腫クリーゼ疑い</strong>。';
  html += '悪性高血圧（眼底出血・乳頭浮腫・腎機能急速悪化）→ <strong>緊急降圧と二次性原因検索を同時進行</strong>。';
  html += '若年者の高血圧は約30%が二次性であり、積極的スクリーニングが必要です。';
  html += '</div>';

  html += '<div class="algo-note">';
  html += '<strong>\U0001f4a1 診断アルゴリズム:</strong> ';
  html += '高血圧の重症度 \u2192 発症年齢 \u2192 随伴症状 \u2192 身体所見 \u2192 基本検査 \u2192 背景・リスク因子 \u2192 精密検査 の7ステップで系統的にスクリーニングします。<br>';
  html += '<strong>高血圧患者の約10%以上に二次性原因</strong>が存在します。原発性アルドステロン症は最も見逃されやすく、<strong>低K血症がなくても否定できません</strong>（約25%は正K血症）。';
  html += '</div>';

  STEPS.forEach(function(step, i) {
    var state = i < currentStep ? "completed" : i === currentStep ? "" : "inactive";
    var numClass = i < currentStep ? "done" : "";
    html += '<div class="step-card ' + state + '" id="step-' + i + '">';
    html += '<div class="step-header">';
    html += '<span class="step-number ' + numClass + '">' + (i < currentStep ? "\u2713" : i + 1) + '</span>';
    html += '<span class="step-title">' + step.title + '</span>';
    html += '</div>';

    if (i <= currentStep) {
      html += '<div class="step-body">';
      html += '<p style="font-weight:600; margin-bottom:4px;">' + step.question + '</p>';
      if (step.hint) html += '<p class="hint">' + step.hint + '</p>';

      if (step.type === "single") {
        html += '<div class="option-group">';
        step.options.forEach(function(opt) {
          var sel = answers[step.id] === opt.value ? "selected" : "";
          html += '<button class="option-btn ' + sel + '" onclick="selectOption(\'' + step.id + '\', \'' + opt.value + '\', ' + i + ')">';
          html += '<span class="icon">' + opt.icon + '</span> ' + opt.label;
          html += '</button>';
        });
        html += '</div>';
      } else {
        html += '<div class="checklist">';
        var checked = answers[step.id] || [];
        step.options.forEach(function(opt) {
          var isChecked = checked.indexOf(opt.value) >= 0;
          html += '<div class="check-item" onclick="toggleCheck(\'' + step.id + '\', \'' + opt.value + '\')">';
          html += '<input type="checkbox" ' + (isChecked ? "checked" : "") + ' tabindex="-1">';
          html += '<label>' + opt.label + '</label>';
          html += '</div>';
        });
        html += '</div>';
        if (i === currentStep) {
          html += '<button class="next-btn" onclick="nextStep(' + i + ')">次へ \u25b6</button>';
        }
      }

      html += '</div>';
    }
    html += '</div>';
  });

  // 結果表示
  if (currentStep >= STEPS.length) {
    var scores = calcScores(answers);
    var ranked = rankDiseases(scores);
    var maxScore = ranked.length > 0 ? ranked[0].score : 1;

    html += '<div class="result-panel show">';
    html += '<div class="result-header">\U0001f4cb 鑑別診断結果</div>';
    html += '<div class="result-body">';

    if (ranked.length === 0) {
      html += '<p>該当する疾患が見つかりませんでした。入力内容を確認してください。</p>';
    } else {
      ranked.forEach(function(d) {
        var prob = getProbLevel(d.score, maxScore);
        html += '<div class="dx-card ' + prob.level + '">';
        html += '<div class="dx-name">' + d.emoji + ' ' + d.name;
        html += ' <span class="prob-badge">' + prob.label + '</span>';
        html += ' <span style="font-size:0.78em; color:var(--gray); font-weight:400;">(' + d.category + ')</span>';
        html += '</div>';
        html += '<div class="dx-detail">' + d.detail + '</div>';
        html += '<div class="dx-workup">\U0001f50d <strong>推奨検査:</strong> ' + d.workup + '</div>';
        html += '</div>';
      });
    }

    html += '</div></div>';
    html += '<button class="reset-btn" onclick="resetAll()">最初からやり直す</button>';
  }

  app.innerHTML = html;

  if (currentStep > 0 && currentStep <= STEPS.length) {
    var targetId = currentStep < STEPS.length ? "step-" + currentStep : "step-" + (STEPS.length - 1);
    var el = document.getElementById(targetId);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
  }
}

function selectOption(stepId, value, stepIndex) {
  answers[stepId] = value;
  currentStep = stepIndex + 1;
  render();
}

function toggleCheck(stepId, value) {
  if (!answers[stepId]) answers[stepId] = [];
  var idx = answers[stepId].indexOf(value);
  if (value === "none" || value === "unknown") {
    answers[stepId] = [value];
  } else {
    var noneIdx = answers[stepId].indexOf("none");
    if (noneIdx >= 0) answers[stepId].splice(noneIdx, 1);
    var unkIdx = answers[stepId].indexOf("unknown");
    if (unkIdx >= 0) answers[stepId].splice(unkIdx, 1);
    if (idx >= 0) {
      answers[stepId].splice(idx, 1);
    } else {
      answers[stepId].push(value);
    }
  }
  render();
}

function nextStep(stepIndex) {
  currentStep = stepIndex + 1;
  render();
}

function resetAll() {
  currentStep = 0;
  answers = {};
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

render();
</script>
