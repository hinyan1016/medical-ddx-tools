<style>
  :root {
    --primary-dark: #8B4513;
    --primary: #C2703E;
    --primary-light: #FFF3EB;
    --accent-bg: #FAEADD;
    --red: #DC3545;
    --yellow: #F5C518;
    --green: #28A745;
    --orange: #E8850C;
    --gray: #6C757D;
    --light-gray: #F4F6F8;
    --white: #FFFFFF;
    --shadow: 0 2px 8px rgba(139,69,19,0.10);
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "游ゴシック", "Yu Gothic", "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #FFF3EB 0%, #F8F4F0 100%);
    color: #222; min-height: 100vh; padding: 0 0 40px;
  }
  header {
    background: linear-gradient(135deg, #8B4513, #C2703E);
    color: var(--white); padding: 14px 20px 18px; text-align: center;
    box-shadow: 0 4px 16px rgba(139,69,19,0.18);
  }
  .back-bar { display: flex; align-items: center; margin-bottom: 8px; }
  .back-bar a {
    color: rgba(255,255,255,0.85); text-decoration: none; font-size: 0.85em;
    display: flex; align-items: center; gap: 4px; padding: 4px 8px;
    border-radius: 6px; transition: background 0.2s;
  }
  .back-bar a:active { background: rgba(255,255,255,0.15); }
  header h1 { font-size: 1.55em; font-weight: 700; letter-spacing: 0.04em; }
  header p { font-size: 0.92em; margin-top: 6px; opacity: 0.85; }

  .container { max-width: 820px; margin: 0 auto; padding: 24px 16px; }

  .step-card {
    background: var(--white); border-radius: var(--radius);
    box-shadow: var(--shadow); margin-bottom: 18px; overflow: hidden; transition: opacity 0.3s;
  }
  .step-card.inactive { opacity: 0.45; pointer-events: none; }
  .step-card.completed { opacity: 1; }
  .step-header {
    display: flex; align-items: center; gap: 10px; padding: 14px 18px;
    background: var(--accent-bg); border-bottom: 2px solid var(--primary); cursor: pointer;
  }
  .step-number {
    display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; border-radius: 50%; background: var(--primary);
    color: var(--white); font-weight: 700; font-size: 0.95em; flex-shrink: 0;
  }
  .step-number.done { background: var(--green); }
  .step-title { font-weight: 700; font-size: 1.05em; color: var(--primary-dark); }
  .step-body { padding: 18px; }

  .option-group { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
  .option-btn {
    display: flex; align-items: center; gap: 10px; padding: 12px 16px;
    border: 2px solid #D0D8E4; border-radius: 8px; background: var(--white);
    font-size: 0.97em; cursor: pointer; transition: all 0.18s; text-align: left;
    color: #222; font-family: inherit; width: 100%;
  }
  .option-btn:hover { border-color: var(--primary); background: var(--primary-light); }
  .option-btn.selected { border-color: var(--primary); background: var(--primary-light); font-weight: 700; }
  .option-btn .icon { font-size: 1.2em; flex-shrink: 0; width: 24px; text-align: center; }

  .checklist { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .check-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    border-radius: 8px; background: var(--light-gray); cursor: pointer;
    transition: background 0.15s; user-select: none; font-size: 0.95em;
  }
  .check-item:hover { background: #F0DFD0; }
  .check-item input[type="checkbox"] {
    width: 18px; height: 18px; accent-color: var(--primary); flex-shrink: 0; cursor: pointer;
  }
  .check-item label { cursor: pointer; flex: 1; }

  .result-panel {
    background: var(--white); border-radius: var(--radius);
    box-shadow: 0 4px 20px rgba(139,69,19,0.15); overflow: hidden;
    margin-top: 24px; display: none;
  }
  .result-panel.show { display: block; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .result-header {
    padding: 16px 20px; background: linear-gradient(135deg, #8B4513, #C2703E);
    color: var(--white); font-weight: 700; font-size: 1.15em;
    display: flex; align-items: center; gap: 8px;
  }
  .result-body { padding: 20px; }

  .dx-card {
    border: 2px solid transparent; border-radius: 8px; padding: 16px;
    margin-bottom: 12px; position: relative; transition: all 0.2s;
  }
  .dx-card.high { border-color: var(--red); background: #FFF5F5; }
  .dx-card.medium { border-color: var(--orange); background: #FFF8F0; }
  .dx-card.low { border-color: var(--gray); background: var(--light-gray); }

  .dx-card .dx-name {
    font-weight: 700; font-size: 1.08em; display: flex; align-items: center;
    gap: 8px; margin-bottom: 6px; flex-wrap: wrap;
  }
  .dx-card .prob-badge {
    display: inline-block; padding: 2px 10px; border-radius: 12px;
    font-size: 0.78em; font-weight: 700; color: var(--white);
  }
  .dx-card.high .prob-badge { background: var(--red); }
  .dx-card.medium .prob-badge { background: var(--orange); }
  .dx-card.low .prob-badge { background: var(--gray); }

  .dx-card .dx-detail { font-size: 0.9em; color: #444; line-height: 1.6; }
  .dx-card .dx-detail strong { color: var(--primary-dark); }
  .dx-card .dx-workup {
    margin-top: 8px; padding-top: 8px; border-top: 1px dashed #ccc;
    font-size: 0.88em; color: var(--primary);
  }

  .next-btn {
    display: inline-flex; align-items: center; gap: 6px; margin-top: 14px;
    padding: 10px 22px; background: var(--primary); color: var(--white); border: none;
    border-radius: 8px; font-size: 0.95em; font-weight: 600; cursor: pointer;
    transition: background 0.15s; font-family: inherit;
  }
  .next-btn:hover { background: var(--primary-dark); }
  .next-btn:disabled { background: #B0BEC5; cursor: not-allowed; }

  .reset-btn {
    display: block; margin: 24px auto 0; padding: 10px 32px;
    background: var(--white); color: var(--red); border: 2px solid var(--red);
    border-radius: 8px; font-size: 0.95em; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: all 0.15s;
  }
  .reset-btn:hover { background: var(--red); color: var(--white); }

  .hint { font-size: 0.85em; color: var(--gray); margin-top: 6px; line-height: 1.5; }
  .divider { height: 1px; background: #D0D8E4; margin: 14px 0; }

  .algo-note {
    background: #FFF8E1; border-left: 4px solid var(--yellow);
    padding: 12px 16px; border-radius: 0 8px 8px 0; margin-bottom: 18px;
    font-size: 0.9em; line-height: 1.6; color: #555;
  }
  .algo-note strong { color: var(--primary-dark); }

  .emergency-box {
    background: #FFF0F0; border: 2px solid var(--red); border-radius: 8px;
    padding: 14px 16px; margin-bottom: 18px; font-size: 0.9em; line-height: 1.6;
  }
  .emergency-box strong { color: var(--red); }

  @media (max-width: 600px) {
    header { padding: 12px 14px 14px; }
    header h1 { font-size: 1.2em; }
    header p { font-size: 0.85em; }
    .container { padding: 14px 10px; }
    .step-header { padding: 12px 14px; }
    .option-btn { min-height: 44px; font-size: 0.92em; -webkit-tap-highlight-color: transparent; }
    .step-card { margin-bottom: 14px; }
    .step-body, .result-body { padding: 14px; }
    .dx-card { padding: 12px; }
  }
</style>
</head>

function calcScores(answers) {
  var s = {};
  Object.keys(DISEASES).forEach(function(k) { s[k] = 0; });

    s.hiv += 2; s.hypothyroid += 2; s.fap += 2; s.anti_mag += 3;

    s.vasculitic += 6; s.hepatitis_c += 3; s.leprosy += 3;

    s.paraneoplastic += 5; s.sjogren += 4; s.cidp += 3;
    s.b6_abnormal += 3; s.gbs += 2;
  }

  // --- Step 2: 発症様式 ---
  var onset = answers.onset;
  if (onset === "acute") {
    s.gbs += 6; s.vasculitic += 3;
  } else if (onset === "subacute") {
    s.paraneoplastic += 4; s.cidp += 3; s.vasculitic += 3;
    s.sjogren += 2; s.drug_chemo += 2; s.b12_deficiency += 2;
  } else if (onset === "chronic") {
    s.diabetic += 4; s.alcoholic += 3; s.cmt += 4; s.fap += 3;
    s.cidp += 2; s.anti_mag += 3; s.uremic += 3; s.hypothyroid += 2;
    s.poems += 2; s.myeloma_al += 2; s.fabry += 2;
  } else if (onset === "relapsing") {
    s.cidp += 5; s.gbs += 2;
  }

  // --- Step 3: 電気生理 ---
  var ncs = answers.ncs;
  if (ncs === "axonal") {
    s.diabetic += 4; s.alcoholic += 3; s.b12_deficiency += 3; s.b1_deficiency += 3;
    s.uremic += 3; s.drug_chemo += 3; s.drug_other += 3; s.vasculitic += 3;
    s.hiv += 2; s.paraneoplastic += 3; s.cmt += 2; s.fap += 2;

    s.cidp += 6; s.gbs += 5; s.anti_mag += 5; s.cmt += 3;

  var sx = answers.symptoms || [];
  sx.forEach(function(v) {
    if (v === "numbness") {
      s.diabetic += 2; s.b12_deficiency += 2; s.drug_chemo += 2;
    }
    if (v === "pain") {
      s.diabetic += 3; s.alcoholic += 3; s.fabry += 4;
      s.vasculitic += 3; s.fap += 3; s.myeloma_al += 3; s.sarcoidosis += 2;
    }

      s.b12_deficiency += 5; s.paraneoplastic += 5; s.sjogren += 4;

    }
    if (v === "distal_weakness") {
      s.cmt += 3; s.cidp += 2; s.alcoholic += 2;
    }
    if (v === "proximal_weakness") {
      s.cidp += 5; s.gbs += 5; s.poems += 3;
    }
    if (v === "autonomic") {
      s.diabetic += 4; s.fap += 6; s.myeloma_al += 3;
      s.gbs += 2; s.fabry += 3;
    }
    if (v === "cranial") {
      s.gbs += 4; s.sarcoidosis += 4; s.leprosy += 2;
    }
    if (v === "tremor") {
      s.anti_mag += 4;
    }

      s.cmt += 6;

  // --- Step 5: 背景・既往歴 ---
  var hx = answers.history || [];

    if (v === "malnutrition") {
      s.b12_deficiency += 4; s.b1_deficiency += 4;
      s.copper_deficiency += 3; s.b6_abnormal += 2;

    if (v === "family_history") { s.cmt += 6; s.fap += 4; s.fabry += 3; }
    if (v === "hiv_risk") { s.hiv += 5; }
  });

  // --- Step 6: 検査所見 ---
  var labs = answers.labs || [];
  labs.forEach(function(v) {
    if (v === "glucose_abnormal") { s.diabetic += 5; }

    if (v === "paraneoplastic_ab") { s.paraneoplastic += 7; }
    if (v === "vegf") { s.poems += 7; }
    if (v === "sarcoid_marker") { s.sarcoidosis += 5; }
  });

  // --- Step 7: 追加所見 ---
  var add = answers.additional || [];
  add.forEach(function(v) {
    if (v === "skin_change") {
      s.poems += 4; s.fabry += 3; s.vasculitic += 3;
      s.leprosy += 3; s.sarcoidosis += 2;
    }
    if (v === "organomegaly") { s.poems += 4; s.myeloma_al += 3; s.sarcoidosis += 2; }

    if (v === "cardiac") { s.fap += 4; s.fabry += 3; s.myeloma_al += 3; }
    if (v === "pulmonary") { s.sarcoidosis += 5; s.vasculitic += 2; }
    if (v === "bone") { s.poems += 4; s.myeloma_al += 4; }
    if (v === "nerve_thickening") { s.cidp += 3; s.leprosy += 5; s.cmt += 2; }
    if (v === "young_onset") { s.cmt += 4; s.fabry += 4; }
    if (v === "constitutional") { s.paraneoplastic += 3; s.vasculitic += 3; s.myeloma_al += 2; }
  });

  return s;
}

function rankDiseases(scores) {
  return Object.entries(scores)
    .map(function(e) { return { key: e[0], score: e[1], name: DISEASES[e[0]].name, emoji: DISEASES[e[0]].emoji, category: DISEASES[e[0]].category, detail: DISEASES[e[0]].detail, workup: DISEASES[e[0]].workup }; })
    .filter(function(d) { return d.score > 0; })
    .sort(function(a, b) { return b.score - a.score; });
}

function getProbLevel(score, maxScore) {
  var ratio = score / Math.max(maxScore, 1);
  if (ratio >= 0.7) return { level: "high", label: "可能性 高" };
  if (ratio >= 0.35) return { level: "medium", label: "可能性 中" };
  return { level: "low", label: "可能性 低" };
}

// ===== UIレンダリング =====
var currentStep = 0;
var answers = {};

function render() {
  var app = document.getElementById("app");
  var html = "";

  html += '<div class="emergency-box">';
  html += '<strong>\u26a0\ufe0f \u6025\u6027\u767a\u75c7\u6642\u306e\u6ce8\u610f\uff1a</strong>GBS\u306f\u6025\u901f\u306b\u547c\u5438\u7b4b\u9ebb\u75fa\u306b\u81f3\u308b\u53ef\u80fd\u6027\u304c\u3042\u308a\u307e\u3059\u3002\u6025\u6027\u767a\u75c7\u306e\u56db\u80a2\u7b4b\u529b\u4f4e\u4e0b\u3067\u306f\u547c\u5438\u6a5f\u80fd\u306e\u30e2\u30cb\u30bf\u30ea\u30f3\u30b0\u3092\u6700\u512a\u5148\u3057\u3066\u304f\u3060\u3055\u3044\u3002\u8840\u7ba1\u708e\u6027\u30cb\u30e5\u30fc\u30ed\u30d1\u30c1\u30fc\u3082\u4e0d\u53ef\u9006\u306a\u795e\u7d4c\u969c\u5bb3\u3092\u304d\u305f\u3059\u305f\u3081<strong>\u65e9\u671f\u8a3a\u65ad\u304c\u91cd\u8981</strong>\u3067\u3059\u3002';
  html += '</div>';

  html += '<div class="algo-note">';
  html += '<strong>\ud83d\udca1 \u8a3a\u65ad\u30a2\u30eb\u30b4\u30ea\u30ba\u30e0:</strong> ';
  html += '\u5206\u5e03\u30d1\u30bf\u30fc\u30f3 \u2192 \u767a\u75c7\u69d8\u5f0f \u2192 \u96fb\u6c17\u751f\u7406\uff08\u8ef8\u7d22/\u8131\u9ac4\uff09 \u2192 \u81e8\u5e8a\u75c7\u72b6 \u2192 \u80cc\u666f\u30fb\u65e2\u5f80\u6b74 \u2192 \u691c\u67fb\u6240\u898b \u2192 \u8ffd\u52a0\u6240\u898b \u3067\u7cfb\u7d71\u7684\u306b\u9451\u5225\u3057\u307e\u3059\u3002<br>';
  html += '\u300c<strong>\u4ee3\u8b1d\u6027\u30fb\u6804\u990a\u6027 \u2192 \u514d\u75ab\u6027 \u2192 \u85ac\u5264\u6027 \u2192 \u611f\u67d3\u6027 \u2192 \u816b\u760d\u95a2\u9023 \u2192 \u907a\u4f1d\u6027</strong>\u300d\u306e\u9806\u306b\u9664\u5916\u3059\u308b\u306e\u304c\u5b9f\u8df5\u7684\u3067\u3059\u3002';
  html += '</div>';

  STEPS.forEach(function(step, i) {
    var state = i < currentStep ? "completed" : i === currentStep ? "" : "inactive";
    var numClass = i < currentStep ? "done" : "";
    html += '<div class="step-card ' + state + '" id="step-' + i + '">';
    html += '<div class="step-header">';
    html += '<span class="step-number ' + numClass + '">' + (i < currentStep ? "\u2713" : i + 1) + '</span>';
    html += '<span class="step-title">' + step.title + '</span>';
    html += '</div>';

    if (i <= currentStep) {
      html += '<div class="step-body">';
      html += '<p style="font-weight:600; margin-bottom:4px;">' + step.question + '</p>';
      if (step.hint) html += '<p class="hint">' + step.hint + '</p>';

      if (step.type === "single") {
        html += '<div class="option-group">';
        step.options.forEach(function(opt) {
          var sel = answers[step.id] === opt.value ? "selected" : "";
          html += '<button class="option-btn ' + sel + '" onclick="selectOption(\'' + step.id + '\', \'' + opt.value + '\', ' + i + ')">';
          html += '<span class="icon">' + opt.icon + '</span> ' + opt.label;
          html += '</button>';
        });
        html += '</div>';
      } else {
        html += '<div class="checklist">';
        var checked = answers[step.id] || [];
        step.options.forEach(function(opt) {
          var isChecked = checked.indexOf(opt.value) >= 0;
          html += '<div class="check-item" onclick="toggleCheck(\'' + step.id + '\', \'' + opt.value + '\')">';
          html += '<input type="checkbox" ' + (isChecked ? "checked" : "") + ' tabindex="-1">';
          html += '<label>' + opt.label + '</label>';
          html += '</div>';
        });
        html += '</div>';
        if (i === currentStep) {
          var hasSelection = checked.length > 0;
          html += '<button class="next-btn" onclick="nextStep(' + i + ')" ' + (hasSelection ? "" : "disabled") + '>';
          html += '\u6b21\u3078 \u25b6</button>';
        }
      }
      html += '</div>';
    }
    html += '</div>';
  });

  // 結果表示
  if (currentStep >= STEPS.length) {
    var scores = calcScores(answers);
    var ranked = rankDiseases(scores);
    var maxScore = ranked.length > 0 ? ranked[0].score : 1;

    html += '<div class="result-panel show">';
    html += '<div class="result-header">\ud83d\udcca \u9451\u5225\u8a3a\u65ad\u7d50\u679c</div>';
    html += '<div class="result-body">';
    html += '<p style="margin-bottom:14px; color:#555; font-size:0.9em;">\u5165\u529b\u3055\u308c\u305f\u81e8\u5e8a\u60c5\u5831\u306b\u57fa\u3065\u304f\u9451\u5225\u75be\u60a3\u306e\u512a\u5148\u5ea6\u3067\u3059\u3002\u78ba\u5b9a\u8a3a\u65ad\u306b\u306f\u8ffd\u52a0\u7cbe\u67fb\u304c\u5fc5\u8981\u3067\u3059\u3002</p>';

    ranked.forEach(function(d) {
      var prob = getProbLevel(d.score, maxScore);
      html += '<div class="dx-card ' + prob.level + '">';
      html += '<div class="dx-name">' + d.emoji + ' ' + d.name;
      html += ' <span class="prob-badge">' + prob.label + '</span></div>';
      html += '<div class="dx-detail">' + d.detail + '</div>';
      html += '<div class="dx-workup">\ud83d\udd0d <strong>\u8ffd\u52a0\u691c\u67fb:</strong> ' + d.workup + '</div>';
      html += '</div>';
    });

    html += '<div class="divider"></div>';
    html += '<p style="font-size:0.82em; color:#888; line-height:1.6;">';
    html += '\u26a0\ufe0f \u672c\u30c4\u30fc\u30eb\u306f\u81e8\u5e8a\u5224\u65ad\u306e\u88dc\u52a9\u3092\u76ee\u7684\u3068\u3057\u3066\u304a\u308a\u3001\u78ba\u5b9a\u8a3a\u65ad\u3092\u884c\u3046\u3082\u306e\u3067\u306f\u3042\u308a\u307e\u305b\u3093\u3002<br>';
    html += 'GBS\u304c\u7591\u308f\u308c\u308b\u5834\u5408\u306f\u547c\u5438\u6a5f\u80fd\u306e\u30e2\u30cb\u30bf\u30ea\u30f3\u30b0\u3092\u6700\u512a\u5148\u3057\u3066\u304f\u3060\u3055\u3044\u3002<br>';
    html += '\u8840\u7ba1\u708e\u304c\u7591\u308f\u308c\u308b\u5834\u5408\u306f\u795e\u7d4c\u751f\u691c\u3092\u7a4d\u6975\u7684\u306b\u691c\u8a0e\u3057\u3066\u304f\u3060\u3055\u3044\u3002<br>';
    html += 'POEMS\u75c7\u5019\u7fa4\u304c\u9451\u5225\u306b\u6319\u304c\u308b\u5834\u5408\u306fVEGF\u6e2c\u5b9a\u304c\u8a3a\u65ad\u7684\u4fa1\u5024\u304c\u9ad8\u3044\u3067\u3059\u3002';
    html += '</p>';
    html += '</div></div>';
  }

  html += '<button class="reset-btn" onclick="resetAll()">\ud83d\udd04 \u6700\u521d\u304b\u3089\u3084\u308a\u76f4\u3059</button>';
  app.innerHTML = html;

  if (currentStep < STEPS.length) {
    var el = document.getElementById("step-" + currentStep);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
  } else {
    var panel = document.querySelector(".result-panel");
    if (panel) panel.scrollIntoView({ behavior: "smooth", block: "start" });
  }
}

function selectOption(stepId, value, stepIndex) {
  answers[stepId] = value;
  currentStep = stepIndex + 1;
  render();
}

function toggleCheck(stepId, value) {
  if (!answers[stepId]) answers[stepId] = [];
  var arr = answers[stepId];
  var idx = arr.indexOf(value);

  if (value === "none" || value === "unknown") {
    answers[stepId] = idx >= 0 ? [] : [value];
  } else {
    var noneIdx = arr.indexOf("none");
    if (noneIdx >= 0) arr.splice(noneIdx, 1);
    var unkIdx = arr.indexOf("unknown");
    if (unkIdx >= 0) arr.splice(unkIdx, 1);
    if (idx >= 0) arr.splice(idx, 1);
    else arr.push(value);
  }
  render();
}

function nextStep(stepIndex) {
  currentStep = stepIndex + 1;
  render();
}

function resetAll() {
  currentStep = 0;
  Object.keys(answers).forEach(function(k) { delete answers[k]; });
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

render();
</script>
</body>
</html>
