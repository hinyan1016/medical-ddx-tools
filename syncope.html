// ===== スコアリングロジック =====
function calcScores(answers) {
  const scores = {};
  Object.keys(DISEASES).forEach(function(k) { scores[k] = 0; });

  var a = {
    triggers: answers.triggers || [],
    prodrome: answers.prodrome || [],
    during: answers.during || [],
    post_event: answers.post_event || [],
    cardiac_flags: answers.cardiac_flags || [],
    background: answers.background || [],
    family_other: answers.family_other || [],
  };

  // === Step 1: 誘因・状況 ===
  if (a.triggers.includes("prolonged_standing")) { scores.vasovagal += 4; scores.orthostatic += 2; }
  if (a.triggers.includes("pain_medical")) { scores.vasovagal += 4; }
  if (a.triggers.includes("emotional")) { scores.vasovagal += 3; scores.pnes += 1; }
  if (a.triggers.includes("hot_crowded")) { scores.vasovagal += 3; }
  if (a.triggers.includes("on_standing")) { scores.orthostatic += 5; scores.vasovagal += 1; }
  if (a.triggers.includes("situational")) { scores.situational += 5; }
  if (a.triggers.includes("neck_pressure")) { scores.carotid_sinus += 5; }
  if (a.triggers.includes("exertion")) { scores.cardiac_structural += 5; scores.cardiac_arrhythmia += 3; }
  if (a.triggers.includes("supine")) { scores.cardiac_arrhythmia += 4; scores.gtcs += 2; }
  if (a.triggers.includes("sleep")) { scores.gtcs += 5; scores.focal_impaired += 3; scores.cardiac_arrhythmia += 2; }
  if (a.triggers.includes("arm_exercise")) { scores.subclavian_steal += 5; }
  if (a.triggers.includes("no_trigger")) { scores.cardiac_arrhythmia += 2; scores.gtcs += 1; }

  // === Step 2: 前駆症状 ===
  if (a.prodrome.includes("lightheadedness")) { scores.vasovagal += 2; scores.orthostatic += 3; }
  if (a.prodrome.includes("autonomic")) { scores.vasovagal += 4; scores.orthostatic += 1; }
  if (a.prodrome.includes("visual_dimming")) { scores.vasovagal += 3; scores.orthostatic += 2; }
  if (a.prodrome.includes("palpitation")) { scores.cardiac_arrhythmia += 4; }
  if (a.prodrome.includes("dejavu")) { scores.focal_impaired += 5; }
  if (a.prodrome.includes("epigastric_rising")) { scores.focal_impaired += 5; }
  if (a.prodrome.includes("fear_aura")) { scores.focal_impaired += 3; scores.pnes += 1; }
  if (a.prodrome.includes("olfactory_gustatory")) { scores.focal_impaired += 4; }
  if (a.prodrome.includes("chest_pain")) { scores.cardiac_structural += 3; scores.sah += 1; }
  if (a.prodrome.includes("thunderclap_headache")) { scores.sah += 5; }
  if (a.prodrome.includes("no_prodrome")) { scores.cardiac_arrhythmia += 4; scores.cardiac_structural += 2; scores.gtcs += 1; }

  // === Step 3: 発作中の所見 ===
  if (a.during.includes("duration_short")) { scores.vasovagal += 2; scores.situational += 2; scores.orthostatic += 2; scores.carotid_sinus += 2; scores.cardiac_arrhythmia += 2; scores.absence += 3; }
  if (a.during.includes("duration_1_2min")) { scores.gtcs += 3; scores.focal_impaired += 3; }
  if (a.during.includes("duration_long")) { scores.pnes += 5; }
  if (a.during.includes("eye_closure")) { scores.pnes += 5; }
  if (a.during.includes("eye_open")) { scores.gtcs += 1; scores.focal_impaired += 1; scores.vasovagal += 1; }
  if (a.during.includes("pallor")) { scores.vasovagal += 3; scores.orthostatic += 2; scores.situational += 2; scores.cardiac_arrhythmia += 1; }
  if (a.during.includes("cyanosis")) { scores.gtcs += 4; }
  if (a.during.includes("tonic_clonic")) { scores.gtcs += 5; }
  if (a.during.includes("myoclonus_brief")) { scores.vasovagal += 2; scores.cardiac_arrhythmia += 1; }
  if (a.during.includes("asynchronous_movement")) { scores.pnes += 4; }
  if (a.during.includes("automatism")) { scores.focal_impaired += 5; }
  if (a.during.includes("head_turning")) { scores.gtcs += 2; scores.focal_impaired += 3; }
  if (a.during.includes("pelvic_thrust")) { scores.pnes += 4; }
  if (a.during.includes("lateral_tongue_bite")) { scores.gtcs += 5; scores.focal_impaired += 3; }
  if (a.during.includes("tip_tongue_bite")) { scores.vasovagal += 1; scores.pnes += 1; }
  if (a.during.includes("incontinence")) { scores.gtcs += 2; scores.focal_impaired += 1; }
  if (a.during.includes("stertorous_breathing")) { scores.gtcs += 3; }

  // === Step 4: 発作後 ===
  if (a.post_event.includes("rapid_recovery")) { scores.vasovagal += 3; scores.situational += 3; scores.orthostatic += 3; scores.carotid_sinus += 3; scores.cardiac_arrhythmia += 2; scores.absence += 3; }
  if (a.post_event.includes("prolonged_confusion")) { scores.gtcs += 5; scores.focal_impaired += 3; }
  if (a.post_event.includes("disorientation")) { scores.gtcs += 3; scores.focal_impaired += 2; }
  if (a.post_event.includes("myalgia")) { scores.gtcs += 3; }
  if (a.post_event.includes("headache")) { scores.gtcs += 2; scores.sah += 2; }
  if (a.post_event.includes("todd_paralysis")) { scores.focal_impaired += 5; scores.gtcs += 2; }
  if (a.post_event.includes("partial_memory")) { scores.pnes += 4; }
  if (a.post_event.includes("fatigue")) { scores.gtcs += 1; scores.focal_impaired += 1; }

  // === Step 5: 心原性レッドフラグ ===
  if (a.cardiac_flags.includes("ecg_abnormal")) { scores.cardiac_arrhythmia += 5; scores.cardiac_structural += 2; }
  if (a.cardiac_flags.includes("structural_heart")) { scores.cardiac_structural += 5; scores.cardiac_arrhythmia += 2; }
  if (a.cardiac_flags.includes("heart_failure")) { scores.cardiac_structural += 3; }
  if (a.cardiac_flags.includes("exertional_syncope")) { scores.cardiac_structural += 5; scores.cardiac_arrhythmia += 3; }
  if (a.cardiac_flags.includes("supine_syncope")) { scores.cardiac_arrhythmia += 4; scores.cardiac_structural += 2; }
  if (a.cardiac_flags.includes("pre_syncope_palpitation")) { scores.cardiac_arrhythmia += 4; }

  // === Step 6: 患者背景 ===
  if (a.background.includes("age_young")) { scores.vasovagal += 1; scores.absence += 1; }
  if (a.background.includes("age_over40")) { scores.carotid_sinus += 2; scores.cardiac_arrhythmia += 1; scores.cardiac_structural += 1; scores.orthostatic += 1; }
  if (a.background.includes("epilepsy_history")) { scores.gtcs += 3; scores.focal_impaired += 3; scores.absence += 2; }
  if (a.background.includes("cardiac_history")) { scores.cardiac_arrhythmia += 3; scores.cardiac_structural += 3; }
  if (a.background.includes("autonomic_disorder")) { scores.orthostatic += 4; }
  if (a.background.includes("diabetes_medication")) { scores.metabolic += 4; }
  if (a.background.includes("psychiatric")) { scores.pnes += 4; }
  if (a.background.includes("hypotensive_drugs")) { scores.orthostatic += 3; scores.vasovagal += 1; }
  if (a.background.includes("refractory_epilepsy")) { scores.pnes += 3; scores.gtcs += 1; scores.focal_impaired += 1; }
  if (a.background.includes("vascular_risk")) { scores.vba_tia += 2; scores.subclavian_steal += 2; scores.cardiac_structural += 1; }
  if (a.background.includes("recurrent")) { scores.vasovagal += 1; scores.pnes += 1; }

  // === Step 7: 家族歴・その他 ===
  if (a.family_other.includes("family_sudden_death")) { scores.cardiac_arrhythmia += 4; scores.cardiac_structural += 3; }
  if (a.family_other.includes("family_epilepsy")) { scores.gtcs += 2; scores.focal_impaired += 1; scores.absence += 2; }
  if (a.family_other.includes("family_channelopathy")) { scores.cardiac_arrhythmia += 5; }
  if (a.family_other.includes("bp_asymmetry")) { scores.subclavian_steal += 5; }
  if (a.family_other.includes("meningeal_signs")) { scores.sah += 5; }
  if (a.family_other.includes("pulse_deficit")) { scores.subclavian_steal += 3; }

  return scores;
}

function render() {
  let html = "";

  // アルゴリズム説明
  html += '<div class="algo-note">';
  html += '<strong>使い方：</strong>各ステップの質問に順番に回答してください。すべてのステップ完了後に鑑別診断の候補が優先順位付きで表示されます。<br>';
  html += '<strong>対象：</strong>一過性意識消失（Transient Loss of Consciousness: TLOC）の鑑別。ESC 2018失神ガイドライン・NICEガイドライン準拠。';
  html += '</div>';

  // 各ステップ
  STEPS.forEach(function(step, i) {
    var isActive = i === currentStep;
    var isDone = i < currentStep;
    var cls = isDone ? "completed" : (isActive ? "" : "inactive");

    html += '<div class="step-card ' + cls + '" id="step-' + i + '">';
    html += '<div class="step-header">';
    html += '<span class="step-number ' + (isDone ? 'done' : '') + '">' + (isDone ? '✓' : (i + 1)) + '</span>';
    html += '<span class="step-title">' + step.title + '</span>';
    html += '</div>';

    if (isActive || isDone) {
      html += '<div class="step-body">';
      html += '<p style="font-weight:600;margin-bottom:4px;">' + step.question + '</p>';
      if (step.hint) html += '<p class="hint">' + step.hint + '</p>';

      if (step.type === "single") {
        html += '<div class="option-group">';
        step.options.forEach(function(opt) {
          var selected = answers[step.id] === opt.value;
          html += '<button class="option-btn ' + (selected ? 'selected' : '') + '"';
          html += ' onclick="selectSingle(\'' + step.id + '\', \'' + opt.value + '\', ' + i + ')"';
          html += (isDone && !isActive) ? ' disabled' : '';
          html += '>';
          html += '<span class="icon">' + (opt.icon || '') + '</span>' + opt.label;
          html += '</button>';
        });
        html += '</div>';
      } else {
        html += '<div class="checklist">';
        var currentAnswers = answers[step.id] || [];
        step.options.forEach(function(opt) {
          var checked = currentAnswers.indexOf(opt.value) >= 0;
          html += '<div class="check-item" onclick="toggleCheck(\'' + step.id + '\', \'' + opt.value + '\', this)">';
          html += '<input type="checkbox" ' + (checked ? 'checked' : '') + ' ' + (isDone && !isActive ? 'disabled' : '') + '>';
          html += '<label>' + opt.label + '</label>';
          html += '</div>';
        });
        html += '</div>';
        if (isActive) {
          html += '<button class="next-btn" onclick="nextStep(' + i + ')">次へ ▶</button>';
        }
      }
      html += '</div>';
    }
    html += '</div>';
  });

  // 結果パネル
  if (currentStep >= STEPS.length) {
    html += renderResults();
  }

  // リセットボタン
  if (currentStep > 0) {
    html += '<button class="reset-btn" onclick="resetAll()">🔄 最初からやり直す</button>';
  }

  app.innerHTML = html;

  // 結果表示後スクロール
  if (currentStep >= STEPS.length) {
    setTimeout(function() {
      var panel = document.querySelector('.result-panel');
      if (panel) panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }
}

function selectSingle(stepId, value, stepIndex) {
  answers[stepId] = value;
  currentStep = stepIndex + 1;
  render();
  scrollToStep(currentStep);
}

function toggleCheck(stepId, value, el) {
  if (!answers[stepId]) answers[stepId] = [];
  var idx = answers[stepId].indexOf(value);
  if (idx >= 0) answers[stepId].splice(idx, 1);
  else answers[stepId].push(value);

  // 排他処理: "none"と他の選択肢
  if (value === "none" && answers[stepId].indexOf("none") >= 0) {
    answers[stepId] = ["none"];
  } else if (value !== "none" && answers[stepId].indexOf("none") >= 0) {
    answers[stepId] = answers[stepId].filter(function(v) { return v !== "none"; });
  }

  render();
}

function nextStep(stepIndex) {
  currentStep = stepIndex + 1;
  render();
  scrollToStep(currentStep);
}

function scrollToStep(idx) {
  setTimeout(function() {
    var el = document.getElementById("step-" + idx) || document.querySelector('.result-panel');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function resetAll() {
  Object.keys(answers).forEach(function(k) { delete answers[k]; });
  currentStep = 0;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderResults() {
  var scores = calcScores(answers);
  var sorted = Object.entries(scores)
    .filter(function(entry) { return entry[1] > 0; })
    .sort(function(a, b) { return b[1] - a[1]; });

  var maxScore = sorted.length > 0 ? sorted[0][1] : 0;

  var html = '<div class="result-panel show">';
  html += '<div class="result-header">📋 鑑別診断の結果</div>';
  html += '<div class="result-body">';

  // 心原性レッドフラグ警告
  var cf = answers.cardiac_flags || [];
  var hasCardiacFlag = cf.length > 0 && cf.indexOf("none") < 0;
  if (hasCardiacFlag) {
    html += '<div class="alert-box danger">';
    html += '<div class="alert-title">🚨 心原性失神のレッドフラグあり</div>';
    html += '<div>';
    if (cf.indexOf("ecg_abnormal") >= 0) html += '・心電図異常<br>';
    if (cf.indexOf("structural_heart") >= 0) html += '・構造的心疾患の既往<br>';
    if (cf.indexOf("heart_failure") >= 0) html += '・心不全の徴候<br>';
    if (cf.indexOf("exertional_syncope") >= 0) html += '・労作中の失神<br>';
    if (cf.indexOf("supine_syncope") >= 0) html += '・臥位での失神<br>';
    if (cf.indexOf("pre_syncope_palpitation") >= 0) html += '・失神前の動悸<br>';
    html += '<strong>→ 循環器内科への相談を強く推奨します。EGSYS score ≧3点は2年死亡率17-21%と関連します。</strong>';
    html += '</div></div>';
  }

  // SAH警告
  var prod = answers.prodrome || [];
  var fam = answers.family_other || [];
  if (prod.indexOf("thunderclap_headache") >= 0 || fam.indexOf("meningeal_signs") >= 0) {
    html += '<div class="alert-box danger">';
    html += '<div class="alert-title">🚨 くも膜下出血の除外が必要</div>';
    html += '<div>';
    html += '突然発症の雷鳴頭痛・髄膜刺激徴候は<strong>くも膜下出血</strong>の可能性があります。<br>';
    html += '<strong>→ 緊急の頭部CTおよび必要に応じて腰椎穿刺を検討してください。</strong>';
    html += '</div></div>';
  }

  // 初期対応サマリー
  html += '<div class="summary-box">';
  html += '<div class="summary-title">🎯 TLOC初期評価の3本柱</div>';
  html += '<strong>①</strong> 詳細な病歴聴取（患者＋目撃者） — 50-60%はこれだけで診断可能<br>';
  html += '<strong>②</strong> 身体診察（臥位・立位血圧測定を含む）<br>';
  html += '<strong>③</strong> 12誘導心電図（全例に必須）';
  html += '</div>';

  // 鑑別診断リスト
  if (sorted.length === 0) {
    html += '<p style="color:var(--gray);text-align:center;padding:20px;">入力された情報からは特定の鑑別が示唆されませんでした。追加の情報を入力してください。</p>';
  } else {
    sorted.forEach(function(entry) {
      var key = entry[0];
      var score = entry[1];
      var d = DISEASES[key];
      var level, levelLabel;
      if (score >= maxScore * 0.7 && score >= 3) { level = "high"; levelLabel = "可能性 高"; }
      else if (score >= maxScore * 0.4 && score >= 2) { level = "medium"; levelLabel = "可能性 中"; }
      else { level = "low"; levelLabel = "可能性 低"; }

      html += '<div class="dx-card ' + level + '">';
      html += '<div class="dx-name">';
      html += '<span>' + d.emoji + '</span>';
      html += '<span>' + d.name + '</span>';
      html += '<span class="prob-badge">' + levelLabel + '</span>';
      html += '</div>';
      html += '<span class="category-label ' + d.catClass + '">' + d.category + '</span>';
      html += '<div class="dx-detail">' + d.detail + '</div>';
      html += '<div class="dx-workup">🔍 推奨検査: ' + d.workup + '</div>';
      html += '</div>';
    });
  }

  // 鑑別の要点
  html += '<div class="summary-box" style="margin-top:16px;">';
  html += '<div class="summary-title">🔑 失神 vs てんかん vs PNES 鑑別のクリニカルパール</div>';
  html += '<strong>顔色：</strong>蒼白＝失神、チアノーゼ＝てんかん、正常＝PNES<br>';
  html += '<strong>舌咬傷：</strong>側面（LR+ 49）＝てんかんにほぼ特異的、尖部＝失神/PNES<br>';
  html += '<strong>閉眼：</strong>特異度92%でPNES（てんかん・失神は通常開眼）<br>';
  html += '<strong>発作後混濁：</strong>遷延（>5分）＝てんかん、速やかな回復＝失神<br>';
  html += '<strong>10/20ルール：</strong>ミオクローヌス<10回＝失神、>20回＝てんかん<br>';
  html += '<strong>持続時間：</strong><30秒＝失神、1-2分＝てんかん、>5分＝PNES（24倍）';
  html += '</div>';

  // 専門科相談の赤旗
  html += '<div class="red-flag-box">';
  html += '<div class="rf-title">🚩 専門科への相談を考慮すべき状況</div>';
  html += '<ul>';
  html += '<li><strong>循環器：</strong>心電図異常、労作中・臥位での失神、構造的心疾患、40歳未満の突然死家族歴</li>';
  html += '<li><strong>神経内科：</strong>舌側面の咬傷、発作後の遷延する意識混濁、Todd麻痺、初発のてんかん発作疑い</li>';
  html += '<li><strong>精神科/心療内科：</strong>ビデオ脳波でPNES確定後、背景にある心理的要因の評価・治療</li>';
  html += '<li><strong>脳神経外科：</strong>くも膜下出血の疑い（雷鳴頭痛、髄膜刺激徴候）</li>';
  html += '</ul>';
  html += '</div>';

  // EGSYS score参考
  html += '<div style="margin-top:20px;">';
  html += '<p style="font-weight:700;color:var(--navy);margin-bottom:8px;">📊 EGSYS Score（心原性失神の同定、参考）</p>';
  html += '<table class="ref-table">';
  html += '<thead><tr><th>所見</th><th>点数</th></tr></thead>';
  html += '<tbody>';
  html += '<tr><td>失神前の動悸</td><td>+4</td></tr>';
  html += '<tr><td>心電図異常 and/or 心疾患</td><td>+3</td></tr>';
  html += '<tr><td>労作中の失神</td><td>+3</td></tr>';
  html += '<tr><td>臥位での失神</td><td>+2</td></tr>';
  html += '<tr><td>自律神経性前駆症状（発汗・悪心・温感）</td><td>-1</td></tr>';
  html += '<tr><td>誘因あり（温環境、長時間立位、恐怖、痛み、感情）</td><td>-1</td></tr>';
  html += '</tbody>';
  html += '</table>';
  html += '<p style="font-size:0.85em;color:var(--gray);margin-top:4px;">≧3点：心原性失神の感度92%・特異度69%。≧3点の患者は2年死亡率17-21%。</p>';
  html += '</div>';

  // Sheldon Score参考
  html += '<div style="margin-top:16px;">';
  html += '<p style="font-weight:700;color:var(--navy);margin-bottom:8px;">📊 失神 vs てんかんの鑑別に有用な所見</p>';
  html += '<table class="ref-table">';
  html += '<thead><tr><th>所見</th><th>失神を示唆</th><th>てんかんを示唆</th><th>PNESを示唆</th></tr></thead>';
  html += '<tbody>';
  html += '<tr><td>前駆症状</td><td>自律神経症状</td><td>前兆（デジャビュ等）</td><td>変動的</td></tr>';
  html += '<tr><td>顔色</td><td>蒼白</td><td>チアノーゼ</td><td>正常</td></tr>';
  html += '<tr><td>持続時間</td><td>&lt;30秒</td><td>1-2分</td><td>&gt;5分</td></tr>';
  html += '<tr><td>開眼/閉眼</td><td>開眼</td><td>開眼</td><td>閉眼（特異度92%）</td></tr>';
  html += '<tr><td>舌咬傷</td><td>尖部</td><td>側面（LR+ 49）</td><td>尖部/なし</td></tr>';
  html += '<tr><td>発作後の回復</td><td>速やか（&lt;1分）</td><td>遷延する混迷（&gt;5分）</td><td>変動的</td></tr>';
  html += '<tr><td>筋肉痛</td><td>なし</td><td>あり</td><td>なし</td></tr>';
  html += '</tbody>';
  html += '</table>';
  html += '</div>';

  html += '</div></div>';
  return html;
}

// 初期描画
render();
</script>
