// ===== スコアリングエンジン =====
function calcScores(answers) {
  const s = {};
  Object.keys(DISEASES).forEach(k => s[k] = 0);

  // --- Step 1: 発症様式 ---
  const onset = answers.onset;
  if (onset === "hyperacute") {
    s.percheron_infarction += 5; s.deep_venous_thrombosis += 3;
  } else if (onset === "acute") {
    s.deep_venous_thrombosis += 4; s.japanese_encephalitis += 3;
    s.ane += 3; s.peri_ictal += 3; s.percheron_infarction += 2;
  } else if (onset === "subacute") {
    s.wernicke += 3; s.autoimmune_encephalitis += 3; s.adem += 3;
    s.dural_avf += 3; s.cns_lymphoma += 2; s.osmotic_demyelination += 2;
  } else if (onset === "chronic") {
    s.thalamic_glioma += 4; s.hepatic_encephalopathy += 3; s.cjd += 3;
    s.dural_avf += 2; s.cns_lymphoma += 2;
  }

  // --- Step 2: MRI画像パターン ---
  const mri = answers.mri_pattern || [];
  mri.forEach(v => {
    if (v === "dwi_restriction") {
      s.percheron_infarction += 5; s.cns_lymphoma += 4; s.cjd += 4;
    }
    if (v === "venous_abnormality") {
      s.deep_venous_thrombosis += 5; s.dural_avf += 5;
    }
    if (v === "hemorrhage") {
      s.deep_venous_thrombosis += 4; s.ane += 5;
    }
    if (v === "set_lesion") {
      s.wernicke += 7;
    }
    if (v === "mass_effect") {
      s.thalamic_glioma += 5; s.cns_lymphoma += 4;
    }
    if (v === "enhancement") {
      s.cns_lymphoma += 4; s.thalamic_glioma += 2; s.autoimmune_encephalitis += 2;
    }
    if (v === "cortical_ribbon") {
      s.cjd += 6;
    }
    if (v === "pulvinar") {
      s.cjd += 4; s.deep_venous_thrombosis += 2;
    }
    if (v === "symmetric_multifocal") {
      s.osmotic_demyelination += 3; s.hepatic_encephalopathy += 3;
      s.adem += 2; s.ane += 2;
    }
    if (v === "midbrain") {
      s.percheron_infarction += 5; s.wernicke += 2;
    }
  });

  // --- Step 3: 臨床症状 ---
  const sx = answers.symptoms || [];
  sx.forEach(v => {
    if (v === "consciousness") {
      s.percheron_infarction += 4; s.deep_venous_thrombosis += 3; s.ane += 3;
    }
    if (v === "vertical_gaze") {
      s.percheron_infarction += 6;
    }
    if (v === "memory") {
      s.percheron_infarction += 3; s.wernicke += 3; s.autoimmune_encephalitis += 3;
    }
    if (v === "seizure") {
      s.deep_venous_thrombosis += 3; s.japanese_encephalitis += 3;
      s.autoimmune_encephalitis += 3; s.peri_ictal += 5;
    }
    if (v === "fever") {
      s.japanese_encephalitis += 4; s.ane += 3;
    }
    if (v === "oculomotor") {
      s.wernicke += 4;
    }
    if (v === "ataxia") {
      s.wernicke += 4; s.osmotic_demyelination += 2;
    }
    if (v === "headache") {
      s.deep_venous_thrombosis += 3; s.japanese_encephalitis += 2;
    }
    if (v === "psychiatric") {
      s.autoimmune_encephalitis += 4; s.cjd += 3;
    }
    if (v === "myoclonus") {
      s.cjd += 5;
    }
    if (v === "rapid_dementia") {
      s.cjd += 5; s.thalamic_glioma += 2;
    }
    if (v === "asterixis") {
      s.hepatic_encephalopathy += 5;
    }
  });

  // --- Step 4: 背景・既往歴 ---
  const hx = answers.history || [];
  hx.forEach(v => {
    if (v === "malnutrition") { s.wernicke += 5; }
    if (v === "rapid_na_correction") { s.osmotic_demyelination += 7; }
    if (v === "liver_disease") { s.hepatic_encephalopathy += 6; }
    if (v === "preceding_infection") {
      s.adem += 5; s.ane += 3; s.japanese_encephalitis += 3;
    }
    if (v === "prothrombotic_female") { s.deep_venous_thrombosis += 3; }
    if (v === "coagulopathy") { s.deep_venous_thrombosis += 3; }
    if (v === "immunosuppressed") { s.cns_lymphoma += 3; s.japanese_encephalitis += 2; }
    if (v === "pediatric") { s.ane += 3; s.adem += 2; }
    if (v === "seizure_history") { s.peri_ictal += 6; }
    if (v === "atherosclerosis") { s.percheron_infarction += 3; }
  });

  // --- Step 5: 検査所見 ---
  const labs = answers.labs || [];
  labs.forEach(v => {
    if (v === "csf_pleocytosis") {
      s.japanese_encephalitis += 4; s.autoimmune_encephalitis += 3; s.adem += 2;
    }
    if (v === "csf_protein") {
      s.japanese_encephalitis += 2; s.autoimmune_encephalitis += 2; s.cns_lymphoma += 2;
    }
    if (v === "autoantibody") { s.autoimmune_encephalitis += 7; }
    if (v === "elevated_ammonia") { s.hepatic_encephalopathy += 6; }
    if (v === "low_b1") { s.wernicke += 6; }
    if (v === "elevated_ddimer") { s.deep_venous_thrombosis += 3; }
    if (v === "prion_marker") { s.cjd += 7; }
    if (v === "eeg_psd") { s.cjd += 5; }
    if (v === "eeg_epileptiform") { s.peri_ictal += 5; }
    if (v === "viral_positive") { s.ane += 3; s.japanese_encephalitis += 3; }
    if (v === "csf_cytology") { s.cns_lymphoma += 5; }
    if (v === "elevated_lactate") { s.deep_venous_thrombosis += 2; s.ane += 2; }
  });

  // --- Step 6: 追加画像所見 ---
  const img = answers.additional_imaging || [];
  img.forEach(v => {
    if (v === "venous_thrombus") { s.deep_venous_thrombosis += 7; }
    if (v === "avf_confirmed") { s.dural_avf += 7; }
    if (v === "midbrain_infarct") { s.percheron_infarction += 5; }
    if (v === "homogeneous_enhance") { s.cns_lymphoma += 5; }
    if (v === "mrs_abnormal") { s.thalamic_glioma += 4; s.cns_lymphoma += 3; }
    if (v === "t1_globus_pallidus") { s.hepatic_encephalopathy += 5; }
    if (v === "spinal_lesion") { s.adem += 4; s.autoimmune_encephalitis += 3; }
    if (v === "follow_up_improvement") { s.peri_ictal += 5; }
  });

  return s;
}

function rankDiseases(scores) {
  return Object.entries(scores)
    .map(([key, score]) => ({ key, score, ...DISEASES[key] }))
    .filter(d => d.score > 0)
    .sort((a, b) => b.score - a.score);
}

function getProbLevel(score, maxScore) {
  const ratio = score / Math.max(maxScore, 1);
  if (ratio >= 0.7) return { level: "high", label: "可能性 高" };
  if (ratio >= 0.35) return { level: "medium", label: "可能性 中" };
  return { level: "low", label: "可能性 低" };
}

// ===== UIレンダリング =====
let currentStep = 0;
const answers = {};

function render() {
  const app = document.getElementById("app");
  let html = "";

  html += `<div class="emergency-box">
    <strong>🚨 まず血管性病変を除外：</strong>脳深部静脈血栓症・Percheron動脈梗塞・硬膜動静脈瘻は<strong>見逃すと致命的</strong>です。DWI/ADC、SWI、MRV/CTVを最優先で評価してください。
  </div>`;

  html += `<div class="algo-note">
    <strong>💡 診断アルゴリズム:</strong>
    発症様式 → MRI画像パターン → 臨床症状 → 背景・既往歴 → 検査所見 → 追加画像 で系統的に鑑別します。<br>
    「<strong>血管性 → 感染・炎症 → 代謝・栄養 → 腫瘍 → 変性</strong>」の順に除外していくのが安全なアプローチです。
  </div>`;

  STEPS.forEach((step, i) => {
    const state = i < currentStep ? "completed" : i === currentStep ? "" : "inactive";
    const numClass = i < currentStep ? "done" : "";
    html += `<div class="step-card ${state}" id="step-${i}">`;
    html += `<div class="step-header">
      <span class="step-number ${numClass}">${i < currentStep ? "✓" : i + 1}</span>
      <span class="step-title">${step.title}</span>
    </div>`;

    if (i <= currentStep) {
      html += `<div class="step-body">`;
      html += `<p style="font-weight:600; margin-bottom:4px;">${step.question}</p>`;
      if (step.hint) html += `<p class="hint">${step.hint}</p>`;

      if (step.type === "single") {
        html += `<div class="option-group">`;
        step.options.forEach(opt => {
          const sel = answers[step.id] === opt.value ? "selected" : "";
          html += `<button class="option-btn ${sel}" onclick="selectOption('${step.id}', '${opt.value}', ${i})">
            <span class="icon">${opt.icon}</span> ${opt.label}
          </button>`;
        });
        html += `</div>`;
      } else {
        html += `<div class="checklist">`;
        const checked = answers[step.id] || [];
        step.options.forEach(opt => {
          const isChecked = checked.includes(opt.value);
          html += `<div class="check-item" onclick="toggleCheck('${step.id}', '${opt.value}')">
            <input type="checkbox" ${isChecked ? "checked" : ""} tabindex="-1">
            <label>${opt.label}</label>
          </div>`;
        });
        html += `</div>`;
        if (i === currentStep) {
          const hasSelection = checked.length > 0;
          html += `<button class="next-btn" onclick="nextStep(${i})" ${hasSelection ? "" : "disabled"}>
            次へ ▶
          </button>`;
        }
      }
      html += `</div>`;
    }
    html += `</div>`;
  });

  // 結果表示
  if (currentStep >= STEPS.length) {
    const scores = calcScores(answers);
    const ranked = rankDiseases(scores);
    const maxScore = ranked.length > 0 ? ranked[0].score : 1;

    html += `<div class="result-panel show">`;
    html += `<div class="result-header">📊 鑑別診断結果</div>`;
    html += `<div class="result-body">`;
    html += `<p style="margin-bottom:14px; color:#555; font-size:0.9em;">入力された臨床・画像情報に基づく鑑別疾患の優先度です。確定診断には追加精査が必要です。</p>`;

    ranked.forEach(d => {
      const prob = getProbLevel(d.score, maxScore);
      html += `<div class="dx-card ${prob.level}">
        <div class="dx-name">
          ${d.emoji} ${d.name}
          <span class="prob-badge">${prob.label}</span>
        </div>
        <div class="dx-detail">${d.detail}</div>
        <div class="dx-workup">🔍 <strong>追加検査:</strong> ${d.workup}</div>
      </div>`;
    });

    html += `<div class="divider"></div>`;
    html += `<p style="font-size:0.82em; color:#888; line-height:1.6;">
      ⚠️ 本ツールは臨床判断の補助を目的としており、確定診断を行うものではありません。<br>
      血管性病変（深部静脈血栓症・Percheron動脈梗塞・dAVF）は治療が遅れると致命的となるため、最優先で除外してください。<br>
      Wernicke脳症が疑われる場合は検査結果を待たずにチアミン大量静注を開始してください。<br>
      PCNSLが鑑別に挙がる場合、生検前のステロイド投与は診断を困難にするため避けてください。
    </p>`;
    html += `</div></div>`;
  }

  html += `<button class="reset-btn" onclick="resetAll()">🔄 最初からやり直す</button>`;
  app.innerHTML = html;

  if (currentStep < STEPS.length) {
    const el = document.getElementById(`step-${currentStep}`);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
  } else {
    const panel = document.querySelector(".result-panel");
    if (panel) panel.scrollIntoView({ behavior: "smooth", block: "start" });
  }
}

function selectOption(stepId, value, stepIndex) {
  answers[stepId] = value;
  currentStep = stepIndex + 1;
  render();
}

function toggleCheck(stepId, value) {
  if (!answers[stepId]) answers[stepId] = [];
  const arr = answers[stepId];
  const idx = arr.indexOf(value);

  if (value === "none" || value === "unknown") {
    answers[stepId] = idx >= 0 ? [] : [value];
  } else {
    const noneIdx = arr.indexOf("none");
    if (noneIdx >= 0) arr.splice(noneIdx, 1);
    const unkIdx = arr.indexOf("unknown");
    if (unkIdx >= 0) arr.splice(unkIdx, 1);
    if (idx >= 0) arr.splice(idx, 1);
    else arr.push(value);
  }
  render();
}

function nextStep(stepIndex) {
  currentStep = stepIndex + 1;
  render();
}

function resetAll() {
  currentStep = 0;
  Object.keys(answers).forEach(k => delete answers[k]);
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

render();
</script>
