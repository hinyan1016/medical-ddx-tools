<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1B3A5C">
<meta name="description" content="医学教育YouTube動画のスライド資料一覧。動画を見る時間がない方向けに、PDFと全スライドを閲覧できます。">
<title>スライド資料一覧 | 医学教育コンテンツ</title>
<style>
  :root {
    --navy: #1B3A5C;
    --blue: #2C5AA0;
    --light-blue: #E8F0FE;
    --bg: #F4F6F8;
    --white: #FFFFFF;
    --text: #222;
    --muted: #666;
    --shadow: 0 2px 12px rgba(27,58,92,0.12);
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "游ゴシック", "Yu Gothic", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
    line-height: 1.6;
  }
  header {
    background: linear-gradient(135deg, var(--navy), var(--blue));
    color: var(--white);
    padding: 40px 20px 32px;
    text-align: center;
    box-shadow: 0 4px 16px rgba(27,58,92,0.18);
  }
  header .breadcrumb {
    font-size: 0.82em;
    opacity: 0.75;
    margin-bottom: 10px;
  }
  header .breadcrumb a { color: var(--white); text-decoration: none; border-bottom: 1px dotted rgba(255,255,255,0.5); }
  header h1 { font-size: 1.7em; font-weight: 700; letter-spacing: 0.02em; }
  header p { font-size: 0.95em; margin-top: 10px; opacity: 0.88; }
  .container { max-width: 960px; margin: 0 auto; padding: 28px 16px; }
  .search-box { position: relative; margin-bottom: 20px; }
  .search-input {
    width: 100%;
    padding: 12px 14px 12px 42px;
    border: 2px solid #D1D5DB;
    border-radius: var(--radius);
    font-size: 1em;
    font-family: inherit;
    background: var(--white);
    box-shadow: var(--shadow);
    outline: none;
  }
  .search-input:focus { border-color: var(--blue); }
  .search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    font-size: 1.1em; color: #999; pointer-events: none;
  }
  .deck-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; }
  .deck-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    text-decoration: none;
    color: var(--text);
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
  }
  .deck-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 24px rgba(27,58,92,0.2);
  }
  .deck-card .thumb { background: #ddd; aspect-ratio: 16/9; overflow: hidden; }
  .deck-card .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .deck-card .body { padding: 16px 18px; flex: 1; display: flex; flex-direction: column; }
  .deck-card .deck-title { font-size: 1.02em; font-weight: 700; color: var(--navy); margin-bottom: 8px; line-height: 1.4; }
  .deck-card .deck-desc { font-size: 0.86em; color: #555; line-height: 1.55; flex: 1; }
  .deck-card .deck-meta { font-size: 0.78em; color: var(--muted); margin-top: 12px; display: flex; gap: 10px; flex-wrap: wrap; }
  .deck-card .tag {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 999px;
    background: var(--light-blue);
    color: var(--blue);
    font-weight: 600;
  }
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
  footer {
    max-width: 960px; margin: 40px auto 0; padding: 24px 16px;
    text-align: center; color: var(--muted); font-size: 0.85em; line-height: 1.8;
  }
  footer a { color: var(--navy); text-decoration: none; border-bottom: 1px dotted var(--navy); }
  @media (max-width: 600px) {
    header h1 { font-size: 1.35em; }
    .deck-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<header>
  <div class="breadcrumb"><a href="https://tools.ichisouzo-lab.com/">DDxツール</a> / スライド資料</div>
  <h1>📊 スライド資料一覧</h1>
  <p>動画を見る時間がない方向けの、YouTubeで使用したスライド資料です</p>
</header>

<div class="container">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="searchInput" placeholder="キーワードで検索（例: 認知症, 頭痛, 脳梗塞）">
  </div>

  <div class="deck-grid" id="deckGrid">
    {{DECK_CARDS}}
  </div>
  <div class="empty" id="emptyState" style="display:none;">該当するスライドが見つかりませんでした</div>
</div>

<footer>
  <p>
    <a href="https://tools.ichisouzo-lab.com/">🔍 臨床鑑別診断ツール</a> ・
    <a href="https://blog.ichisouzo-lab.com/">📝 ブログ</a> ・
    <a href="https://www.youtube.com/@hinyan1016">▶ YouTube</a>
  </p>
  <p style="margin-top:8px; font-size:0.82em;">
    本資料は医療従事者・医療系学生向けの学習教材です。診療判断は必ず最新ガイドライン・主治医判断に従ってください。
  </p>
</footer>

<script>
(function(){
  var input = document.getElementById('searchInput');
  var grid = document.getElementById('deckGrid');
  var empty = document.getElementById('emptyState');
  var cards = grid.querySelectorAll('.deck-card');

  input.addEventListener('input', function(){
    var q = input.value.trim().toLowerCase();
    var visible = 0;
    for (var i = 0; i < cards.length; i++) {
      var text = cards[i].getAttribute('data-search') || '';
      if (q === '' || text.indexOf(q) >= 0) {
        cards[i].style.display = '';
        visible++;
      } else {
        cards[i].style.display = 'none';
      }
    }
    empty.style.display = visible === 0 ? 'block' : 'none';
  });
})();
</script>
</body>
</html>
