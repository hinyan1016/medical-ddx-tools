// ===== スコアリングエンジン =====
function calcScores(answers) {
  var s = {};
  Object.keys(DISEASES).forEach(function(k) { s[k] = 0; });

  // --- Step 1: 麻痺の特徴 ---
  var lat = answers.laterality;
  if (lat === "unilateral_isolated") {
    s.microvascular += 5; s.ms += 2; s.ophthalmoplegic_migraine += 2;
    s.aneurysm += 2;
  } else if (lat === "unilateral_combined") {
    s.tolosa_hunt += 5; s.cavernous_sinus_tumor += 5; s.aneurysm += 3;
    s.nasopharyngeal_ca += 3; s.brainstem_stroke += 3; s.gradenigo += 3;
    s.metastatic_tumor += 3; s.neurosyphilis += 2;
  } else if (lat === "bilateral") {
    s.iih += 6; s.hydrocephalus += 6; s.tb_meningitis += 3;
    s.metastatic_tumor += 3; s.neurosyphilis += 2;
  }

  // --- Step 2: 発症様式 ---
  var onset = answers.onset;
  if (onset === "acute") {
    s.microvascular += 5; s.brainstem_stroke += 5; s.aneurysm += 4;
  } else if (onset === "subacute") {
    s.tolosa_hunt += 4; s.tb_meningitis += 3; s.neurosyphilis += 3;
    s.fungal_meningitis += 3; s.gca += 3; s.metastatic_tumor += 2;
    s.ms += 2;
  } else if (onset === "chronic") {
    s.clival_meningioma += 5; s.cavernous_sinus_tumor += 5; s.nasopharyngeal_ca += 4;
    s.metastatic_tumor += 3; s.iih += 3; s.hydrocephalus += 3;
    s.thyroid_eye += 3;
  } else if (onset === "fluctuating") {
    s.mg += 8;
  } else if (onset === "recurrent") {
    s.ophthalmoplegic_migraine += 5; s.ms += 4; s.tolosa_hunt += 3;
    s.mg += 3;
  }

  // --- Step 3: 疼痛 ---
  var pain = answers.pain;
  if (pain === "no_pain") {
    s.microvascular += 3; s.mg += 2; s.thyroid_eye += 2;
    s.clival_meningioma += 1;
  } else if (pain === "orbital_pain") {
    s.tolosa_hunt += 6; s.aneurysm += 3; s.cavernous_sinus_tumor += 2;
  } else if (pain === "temporal_pain") {
    s.gca += 7;
  } else if (pain === "thunderclap") {
    s.aneurysm += 8;
  } else if (pain === "chronic_headache") {
    s.iih += 5; s.hydrocephalus += 5; s.metastatic_tumor += 3;
  } else if (pain === "ear_pain") {
    s.gradenigo += 7;
  }

  // --- Step 4: 神経学的検査 ---
  var exam = answers.exam || [];
  exam.forEach(function(v) {
    if (v === "papilledema") {
      s.iih += 7; s.hydrocephalus += 6;
    }
    if (v === "ptosis") {
      s.tolosa_hunt += 3; s.cavernous_sinus_tumor += 3;
      s.aneurysm += 3; s.mg += 4;
    }
    if (v === "pupil_abnormal") {
      s.aneurysm += 4; s.tolosa_hunt += 2;
      s.neurosyphilis += 3;
    }
    if (v === "facial_palsy") {
      s.brainstem_stroke += 5; s.tb_meningitis += 2;
      s.neurosyphilis += 2;
    }
    if (v === "trigeminal") {
      s.cavernous_sinus_tumor += 4; s.nasopharyngeal_ca += 3;
      s.gradenigo += 4; s.tolosa_hunt += 2;
      s.clival_meningioma += 2;
    }
    if (v === "horner") {
      s.tolosa_hunt += 3; s.cavernous_sinus_tumor += 3;
      s.nasopharyngeal_ca += 2;
    }
    if (v === "long_tract") {
      s.brainstem_stroke += 6; s.ms += 2;
    }
    if (v === "proptosis") {
      s.thyroid_eye += 7; s.cavernous_sinus_tumor += 2;
    }
    if (v === "fatigable") {
      s.mg += 7;
    }
  });

  // --- Step 5: 背景・リスク因子 ---
  var bg = answers.background || [];
  bg.forEach(function(v) {
    if (v === "vascular_risk") {
      s.microvascular += 5; s.brainstem_stroke += 3;
    }
    if (v === "age_over50") {
      s.microvascular += 3; s.gca += 4;
      s.clival_meningioma += 2; s.metastatic_tumor += 2;
    }
    if (v === "age_under50") {
      s.ms += 3; s.iih += 2;
      s.ophthalmoplegic_migraine += 2;
    }
    if (v === "malignancy") {
      s.metastatic_tumor += 7; s.nasopharyngeal_ca += 2;
    }
    if (v === "immunocompromised") {
      s.fungal_meningitis += 5; s.tb_meningitis += 3;
      s.neurosyphilis += 2;
    }
    if (v === "otitis") {
      s.gradenigo += 6;
    }
    if (v === "thyroid") {
      s.thyroid_eye += 6;
    }
    if (v === "migraine") {
      s.ophthalmoplegic_migraine += 4;
    }
    if (v === "young_obese_female") {
      s.iih += 6;
    }
    if (v === "syphilis_risk") {
      s.neurosyphilis += 5;
    }
  });

  // --- Step 6: 画像・検査所見 ---
  var img = answers.imaging || [];
  img.forEach(function(v) {
    if (v === "brainstem_lesion") {
      s.brainstem_stroke += 8; s.ms += 3;
    }
    if (v === "skull_base_mass") {
      s.clival_meningioma += 7; s.cavernous_sinus_tumor += 7;
      s.metastatic_tumor += 5;
    }
    if (v === "demyelinating_lesion") {
      s.ms += 8;
    }
    if (v === "aneurysm_found") {
      s.aneurysm += 9;
    }
    if (v === "nasopharyngeal_mass") {
      s.nasopharyngeal_ca += 9;
    }
    if (v === "venous_sinus") {
      s.iih += 4;
    }
    if (v === "high_esr_crp") {
      s.gca += 6; s.tb_meningitis += 3;
      s.tolosa_hunt += 2;
    }
    if (v === "csf_abnormal") {
      s.tb_meningitis += 6; s.neurosyphilis += 5;
      s.fungal_meningitis += 5; s.metastatic_tumor += 3;
    }
    if (v === "syphilis_positive") {
      s.neurosyphilis += 8;
    }
    if (v === "high_opening_pressure") {
      s.iih += 7; s.hydrocephalus += 5;
    }
    if (v === "mg_antibody") {
      s.mg += 9;
    }
    if (v === "thyroid_abnormal") {
      s.thyroid_eye += 6;
    }
  });

  return s;
}

function rankDiseases(scores) {
  return Object.entries(scores)
    .map(function(e) { return { key: e[0], score: e[1], name: DISEASES[e[0]].name, emoji: DISEASES[e[0]].emoji, category: DISEASES[e[0]].category, detail: DISEASES[e[0]].detail, workup: DISEASES[e[0]].workup }; })
    .filter(function(d) { return d.score > 0; })
    .sort(function(a, b) { return b.score - a.score; });
}

function getProbLevel(score, maxScore) {
  var ratio = score / Math.max(maxScore, 1);
  if (ratio >= 0.7) return { level: "high", label: "可能性 高" };
  if (ratio >= 0.35) return { level: "medium", label: "可能性 中" };
  return { level: "low", label: "可能性 低" };
}

var currentStep = 0;
var answers = {};

  html += '高齢者の側頭部痛＋顎跛行＋視力低下 → <strong>巨細胞性動脈炎疑い：直ちにステロイド開始</strong>。';
  html += '</div>';

  html += '<div class="anatomy-box">';
  html += '<strong>\U0001f9ec 解剖学的ポイント：</strong>';
  html += '外転神経は<strong>頭蓋内走行距離が最も長い脳神経</strong>で、橋 → くも膜下腔 → Dorello管 → 海綿静脈洞 → 上眼窩裂 → 外直筋と走行します。';
  html += '海綿静脈洞内では内頚動脈に最も近接し、III/IVより動脈瘤圧迫を受けやすいのが特徴です。';
  html += '核病変では<strong>同側顔面神経麻痺</strong>を合併します（顔面神経丘の関係）。';
  html += '</div>';

  html += '<div class="algo-note">';
  html += '<strong>\U0001f4a1 診断アルゴリズム:</strong> ';
  html += '麻痺の特徴（片側/両側/合併症状） → 発症様式 → 疼痛評価 → 神経学的検査 → 背景・リスク因子 → 画像・検査所見 の6ステップで系統的に鑑別します。<br>';
  html += '50歳未満、リスク因子なし、進行性、3か月以上改善なし → <strong>造影MRI必須</strong>';
  html += '</div>';

  STEPS.forEach(function(step, i) {
    var state = i < currentStep ? "completed" : i === currentStep ? "" : "inactive";
    var numClass = i < currentStep ? "done" : "";
    html += '<div class="step-card ' + state + '" id="step-' + i + '">';
    html += '<div class="step-header">';
    html += '<span class="step-number ' + numClass + '">' + (i < currentStep ? "\u2713" : i + 1) + '</span>';
    html += '<span class="step-title">' + step.title + '</span>';
    html += '</div>';

    if (i <= currentStep) {
      html += '<div class="step-body">';
      html += '<p style="font-weight:600; margin-bottom:4px;">' + step.question + '</p>';
      if (step.hint) html += '<p class="hint">' + step.hint + '</p>';

      if (step.type === "single") {
        html += '<div class="option-group">';
        step.options.forEach(function(opt) {
          var sel = answers[step.id] === opt.value ? "selected" : "";
          html += '<button class="option-btn ' + sel + '" onclick="selectOption(\'' + step.id + '\', \'' + opt.value + '\', ' + i + ')">';
          html += '<span class="icon">' + opt.icon + '</span> ' + opt.label;
          html += '</button>';
        });
        html += '</div>';
      } else {
        html += '<div class="checklist">';
        var checked = answers[step.id] || [];
        step.options.forEach(function(opt) {
          var isChecked = checked.indexOf(opt.value) >= 0;
          html += '<div class="check-item" onclick="toggleCheck(\'' + step.id + '\', \'' + opt.value + '\')">';
          html += '<input type="checkbox" ' + (isChecked ? "checked" : "") + ' tabindex="-1">';
          html += '<label>' + opt.label + '</label>';
          html += '</div>';
        });
        html += '</div>';
        if (i === currentStep) {
          html += '<button class="next-btn" onclick="nextStep(' + i + ')">次へ ▶</button>';
        }
      }

      html += '</div>';
    }
    html += '</div>';
  });

  // 結果表示
  if (currentStep >= STEPS.length) {
    var scores = calcScores(answers);
    var ranked = rankDiseases(scores);
    var maxScore = ranked.length > 0 ? ranked[0].score : 1;

    html += '<div class="result-panel show">';
    html += '<div class="result-header">\U0001f4cb 鑑別診断結果</div>';
    html += '<div class="result-body">';

    if (ranked.length === 0) {
      html += '<p>該当する疾患が見つかりませんでした。入力内容を確認してください。</p>';
    } else {
      ranked.forEach(function(d) {
        var prob = getProbLevel(d.score, maxScore);
        html += '<div class="dx-card ' + prob.level + '">';
        html += '<div class="dx-name">' + d.emoji + ' ' + d.name;
        html += ' <span class="prob-badge">' + prob.label + '</span>';
        html += ' <span style="font-size:0.78em; color:var(--gray); font-weight:400;">(' + d.category + ')</span>';
        html += '</div>';
        html += '<div class="dx-detail">' + d.detail + '</div>';
        html += '<div class="dx-workup">\U0001f50d <strong>推奨検査:</strong> ' + d.workup + '</div>';
        html += '</div>';
      });
    }

    html += '</div></div>';
    html += '<button class="reset-btn" onclick="resetAll()">最初からやり直す</button>';
  }

  app.innerHTML = html;

  // 現在のステップにスクロール
  if (currentStep > 0 && currentStep <= STEPS.length) {
    var targetId = currentStep < STEPS.length ? "step-" + currentStep : "step-" + (STEPS.length - 1);
    var el = document.getElementById(targetId);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
  }
}

function selectOption(stepId, value, stepIndex) {
  answers[stepId] = value;
  currentStep = stepIndex + 1;
  render();
}

function toggleCheck(stepId, value) {
  if (!answers[stepId]) answers[stepId] = [];
  var idx = answers[stepId].indexOf(value);
  if (value === "none" || value === "unknown") {
    answers[stepId] = [value];
  } else {
    // noneやunknownを除去
    var noneIdx = answers[stepId].indexOf("none");
    if (noneIdx >= 0) answers[stepId].splice(noneIdx, 1);
    var unkIdx = answers[stepId].indexOf("unknown");
    if (unkIdx >= 0) answers[stepId].splice(unkIdx, 1);

    if (idx >= 0) {
      answers[stepId].splice(idx, 1);
    } else {
      answers[stepId].push(value);
    }
  }
  render();
}

function nextStep(stepIndex) {
  currentStep = stepIndex + 1;
  render();
}

function resetAll() {
  currentStep = 0;
  answers = {};
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// 初期描画
render();
</script>
</body>
</html>
