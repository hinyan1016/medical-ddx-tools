<title>歩行障害・協調運動障害 鑑別診断ツール</title>
<style>
  :root {
    --navy: #1A5276;
    --blue: #2E86C1;
    --light-blue: #EAF2F8;
    --red: #DC3545;
    --yellow: #F5C518;
    --green: #28A745;
    --orange: #E8850C;
    --gray: #6C757D;
    --light-gray: #F4F6F8;
    --white: #FFFFFF;
    --shadow: 0 2px 8px rgba(26,82,118,0.10);
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "游ゴシック", "Yu Gothic", "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #EAF2F8 0%, #F4F6F8 100%);
    color: #222;
    min-height: 100vh;
    padding: 0 0 40px;
  }
  header {
    background: linear-gradient(135deg, var(--navy), var(--blue));
    color: var(--white);
    padding: 14px 20px 18px;
    text-align: center;
    box-shadow: 0 4px 16px rgba(26,82,118,0.18);
  }
  .back-bar { display: flex; align-items: center; margin-bottom: 8px; }
  .back-bar a {
    color: rgba(255,255,255,0.85);
    text-decoration: none;
    font-size: 0.85em;
    display: flex; align-items: center; gap: 4px;
    padding: 4px 8px; border-radius: 6px;
    transition: background 0.2s;
  }
  .back-bar a:active { background: rgba(255,255,255,0.15); }
  header h1 { font-size: 1.6em; font-weight: 700; letter-spacing: 0.03em; }
  header p { font-size: 0.9em; margin-top: 6px; opacity: 0.85; }

  .container { max-width: 820px; margin: 0 auto; padding: 24px 16px; }

  .step-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 18px;
    overflow: hidden;
    transition: opacity 0.3s;
  }
  .step-card.inactive { opacity: 0.45; pointer-events: none; }
  .step-card.completed { opacity: 1; }
  .step-header {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 18px;
    background: var(--light-blue);
    border-bottom: 2px solid var(--blue);
    cursor: pointer;
  }
  .step-number {
    display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--blue); color: var(--white);
    font-weight: 700; font-size: 0.95em; flex-shrink: 0;
  }
  .step-number.done { background: var(--green); }
  .step-title { font-weight: 700; font-size: 1.05em; color: var(--navy); }
  .step-body { padding: 18px; }

  .option-group { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
  .option-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px;
    border: 2px solid #D0D8E4; border-radius: 8px;
    background: var(--white); font-size: 0.97em;
    cursor: pointer; transition: all 0.18s;
    text-align: left; color: #222; font-family: inherit; width: 100%;
  }
  .option-btn:hover { border-color: var(--blue); background: var(--light-blue); }
  .option-btn.selected { border-color: var(--blue); background: var(--light-blue); font-weight: 700; }
  .option-btn .icon { font-size: 1.2em; flex-shrink: 0; width: 24px; text-align: center; }

  .checklist { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .check-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: 8px;
    background: var(--light-gray); cursor: pointer;
    transition: background 0.15s; user-select: none; font-size: 0.95em;
  }
  .check-item:hover { background: #DAE8F5; }
  .check-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--blue); flex-shrink: 0; cursor: pointer; }
  .check-item label { cursor: pointer; flex: 1; }

  .result-panel {
    background: var(--white); border-radius: var(--radius);
    box-shadow: 0 4px 20px rgba(26,82,118,0.15);
    overflow: hidden; margin-top: 24px; display: none;
  }
  .result-panel.show { display: block; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .result-header {
    padding: 16px 20px;
    background: linear-gradient(135deg, var(--navy), var(--blue));
    color: var(--white); font-weight: 700; font-size: 1.15em;
    display: flex; align-items: center; gap: 8px;
  }
  .result-body { padding: 20px; }

  .dx-card {
    border: 2px solid transparent; border-radius: 8px;
    padding: 16px; margin-bottom: 12px;
    position: relative; transition: all 0.2s;
  }
  .dx-card.high { border-color: var(--red); background: #FFF5F5; }
  .dx-card.medium { border-color: var(--orange); background: #FFF8F0; }
  .dx-card.low { border-color: var(--gray); background: var(--light-gray); }

  .dx-card .dx-name {
    font-weight: 700; font-size: 1.08em;
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 6px; flex-wrap: wrap;
  }
  .dx-card .prob-badge {
    display: inline-block; padding: 2px 10px; border-radius: 12px;
    font-size: 0.78em; font-weight: 700; color: var(--white);
  }
  .dx-card.high .prob-badge { background: var(--red); }
  .dx-card.medium .prob-badge { background: var(--orange); }
  .dx-card.low .prob-badge { background: var(--gray); }

  .dx-card .dx-detail { font-size: 0.9em; color: #444; line-height: 1.65; }
  .dx-card .dx-detail strong { color: var(--navy); }
  .dx-card .dx-workup {
    margin-top: 8px; padding-top: 8px;
    border-top: 1px dashed #ccc;
    font-size: 0.88em; color: var(--blue);
  }
  .dx-card .dx-keys {
    margin-top: 6px; padding: 8px 10px;
    background: rgba(46,134,193,0.07); border-radius: 6px;
    font-size: 0.86em; color: #555;
  }

  .next-btn {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 14px; padding: 10px 22px;
    background: var(--blue); color: var(--white);
    border: none; border-radius: 8px;
    font-size: 0.95em; font-weight: 600;
    cursor: pointer; transition: background 0.15s; font-family: inherit;
  }
  .next-btn:hover { background: var(--navy); }
  .next-btn:disabled { background: #B0BEC5; cursor: not-allowed; }

  .reset-btn {
    display: block; margin: 24px auto 0;
    padding: 10px 32px;
    background: var(--white); color: var(--red);
    border: 2px solid var(--red); border-radius: 8px;
    font-size: 0.95em; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .reset-btn:hover { background: var(--red); color: var(--white); }

  .hint { font-size: 0.85em; color: var(--gray); margin-top: 6px; line-height: 1.5; }

  .algo-note {
    background: #FFFDE7; border-left: 4px solid var(--yellow);
    padding: 12px 16px; border-radius: 0 8px 8px 0;
    margin-bottom: 18px; font-size: 0.9em; line-height: 1.6; color: #555;
  }
  .algo-note strong { color: var(--navy); }

  .alert-box {
    background: #FFF3CD; border: 2px solid var(--orange);
    border-radius: 8px; padding: 14px 16px;
    margin-bottom: 16px; font-size: 0.92em; line-height: 1.6;
  }
  .alert-box.danger { background: #F8D7DA; border-color: var(--red); }
  .alert-box .alert-title {
    font-weight: 700; color: var(--red); margin-bottom: 4px;
    display: flex; align-items: center; gap: 6px;
  }

  .category-label {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: 0.78em; font-weight: 700; margin-bottom: 8px;
  }
  .cat-vascular   { background: #FCE4EC; color: #B71C1C; }
  .cat-degeneration { background: #FFF3E0; color: #BF360C; }
  .cat-treatable  { background: #E8F5E9; color: #1B5E20; }
  .cat-sensory    { background: #E3F2FD; color: #0D47A1; }
  .cat-vestibular { background: #E0F2F1; color: #004D40; }
  .cat-parkinsonism { background: #EDE7F6; color: #4A148C; }
  .cat-hydrocephalus { background: #F3E5F5; color: #6A1B9A; }
  .cat-spinal     { background: #E8EAF6; color: #1A237E; }
  .cat-peripheral { background: #F1F8E9; color: #33691E; }
  .cat-functional { background: #FFF8E1; color: #827717; }

  .summary-box {
    background: var(--light-blue); border-radius: 8px;
    padding: 14px 16px; margin-bottom: 16px;
    font-size: 0.92em; line-height: 1.6;
  }
  .summary-box .summary-title { font-weight: 700; color: var(--navy); margin-bottom: 6px; }

  .red-flag-box {
    background: #F8D7DA; border: 2px solid var(--red);
    border-radius: 8px; padding: 14px 16px; margin-top: 16px;
    font-size: 0.9em; line-height: 1.6;
  }
  .red-flag-box .rf-title {
    font-weight: 700; color: var(--red); margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .red-flag-box ul { padding-left: 20px; margin-top: 4px; }
  .red-flag-box li { margin-bottom: 4px; }

  @media (max-width: 600px) {
    header h1 { font-size: 1.25em; }
    .step-body, .result-body { padding: 14px; }
    .dx-card { padding: 12px; }
  }
</style>
</head>

    workup: "血清VitB12・MMA・homocysteine。脂質補正VitE。抗GAD65抗体（高力価≥2000 IU/mL）。抗tTG6抗体。傍腫瘍性抗体パネル。薬剤歴見直し・血中濃度。腫瘍検索（CT・PET）。髄液検査"
  },

  sensory_ataxia: {

    emoji: "🦶",
    category: "後索／末梢神経",
    catClass: "cat-sensory",
    detail: "深部感覚（振動覚・関節位置覚）障害による失調。患者は足元を見たがり、足をやや高く上げて強く踏みつけるように歩く（<strong>踏みつけ歩行</strong>）。<strong>感覚性Romberg陽性（閉眼で著明悪化）、暗所での破綻</strong>が診断の核心。<strong>開眼時からすでに不安定な小脳失調との重要な違いは、視覚で代償して歩けている点</strong>。原因：VitB12欠乏（後索障害）、CIDP、感覚神経節障害（ニューロノパチー：シェーグレン・傍腫瘍性）、遺伝性感覚性ニューロパチー（HSN）など。",

function calcScores(answers) {
  var scores = {};
  var keys = Object.keys(DISEASES);
  for (var i = 0; i < keys.length; i++) { scores[keys[i]] = 0; }

  var onset   = answers.onset || "";
  var gait    = answers.gait_pattern || "";
  var visual  = answers.visual_balance || "";
  var limb    = answers.limb_findings || [];
  var assoc   = answers.associated_sx || [];
  var bg      = answers.background || [];

  // --- 発症・経過 ---
  if (onset === "acute") {
    scores.acute_cerebellar_vascular += 6;
    scores.functional_gait += 1;
  }
  if (onset === "subacute") {
    scores.treatable_ataxia += 4;
    scores.cervical_myelopathy += 3;
    scores.vascular_parkinsonism += 3;
    scores.sensory_ataxia += 3;
    scores.functional_gait += 2;
  }
  if (onset === "chronic") {
    scores.chronic_cerebellar += 5;
    scores.sensory_ataxia += 4;
    scores.vestibular_ataxia += 5;
    scores.parkinsons += 6;
    scores.psp += 5;
    scores.msa += 5;
    scores.vascular_parkinsonism += 4;
    scores.inph += 5;
    scores.cervical_myelopathy += 4;
    scores.peripheral_neuropathy += 5;
    scores.functional_gait += 2;
  }
  if (onset === "episodic") {
    scores.vestibular_ataxia += 2;
    scores.functional_gait += 3;
  }

  // --- 歩容パターン ---
  if (gait === "wide_irregular") {
    scores.acute_cerebellar_vascular += 5;
    scores.chronic_cerebellar += 5;
    scores.treatable_ataxia += 4;
    scores.sensory_ataxia += 4;
    scores.vestibular_ataxia += 4;
    scores.cervical_myelopathy += 3;
    scores.functional_gait += 3;
  }
  if (gait === "small_step_narrow") {
    scores.parkinsons += 6;
    scores.psp += 5;
    scores.msa += 5;
    scores.vascular_parkinsonism += 4;
  }
  if (gait === "magnetic") {
    scores.inph += 7;
    scores.vascular_parkinsonism += 4;
    scores.psp += 2;
    scores.functional_gait += 2;
  }
  if (gait === "steppage") {
    scores.peripheral_neuropathy += 7;
  }
  if (gait === "spastic") {
    scores.cervical_myelopathy += 7;
  }

  // --- 視覚・体位の影響 ---
  if (visual === "open_unstable") {
    scores.acute_cerebellar_vascular += 5;
    scores.chronic_cerebellar += 5;
    scores.treatable_ataxia += 4;
    scores.msa += 3;
    scores.cervical_myelopathy += 3;
  }
  if (visual === "close_worse") {
    scores.sensory_ataxia += 7;
    scores.vestibular_ataxia += 4;
    scores.peripheral_neuropathy += 3;
  }
  if (visual === "head_move") {
    scores.vestibular_ataxia += 7;
  }
  if (visual === "only_walking") {
    scores.inph += 6;
    scores.vascular_parkinsonism += 5;
    scores.psp += 4;
    scores.functional_gait += 5;
  }
  if (visual === "variable") {
    scores.functional_gait += 8;
  }

  // --- 四肢・協調運動 ---
  if (limb.indexOf("limb_ataxia") >= 0) {
    scores.acute_cerebellar_vascular += 5;
    scores.chronic_cerebellar += 6;
    scores.treatable_ataxia += 4;
    scores.msa += 3;
  }
  if (limb.indexOf("deep_sensory") >= 0) {
    scores.sensory_ataxia += 7;
    scores.vestibular_ataxia += 3;
    scores.cervical_myelopathy += 3;
    scores.peripheral_neuropathy += 4;
  }
  if (limb.indexOf("umn_signs") >= 0) {
    scores.cervical_myelopathy += 7;
    scores.vascular_parkinsonism += 2;
    scores.acute_cerebellar_vascular += 2;
  }
  if (limb.indexOf("lmn_signs") >= 0) {
    scores.peripheral_neuropathy += 6;
    scores.sensory_ataxia += 3;
  }
  if (limb.indexOf("rigidity_tremor") >= 0) {
    scores.parkinsons += 7;
    scores.psp += 5;
    scores.msa += 6;
    scores.vascular_parkinsonism += 2;
  }
  if (limb.indexOf("relatively_preserved") >= 0) {
    scores.inph += 4;
    scores.vestibular_ataxia += 3;
    scores.functional_gait += 4;
    scores.psp += 3;
    scores.vascular_parkinsonism += 3;
  }

  // --- 随伴症状 ---
  if (assoc.indexOf("oculomotor") >= 0) {
    scores.acute_cerebellar_vascular += 5;
    scores.chronic_cerebellar += 4;
    scores.psp += 7;
    scores.msa += 3;
  }
  if (assoc.indexOf("dysarthria") >= 0) {
    scores.acute_cerebellar_vascular += 4;
    scores.chronic_cerebellar += 4;
    scores.psp += 4;
    scores.msa += 5;
  }
  if (assoc.indexOf("cognitive_bladder") >= 0) {
    scores.inph += 7;
    scores.vascular_parkinsonism += 3;
    scores.psp += 3;
  }
  if (assoc.indexOf("autonomic") >= 0) {
    scores.msa += 8;
    scores.parkinsons += 2;
  }
  if (assoc.indexOf("oscillopsia") >= 0) {
    scores.vestibular_ataxia += 8;
  }

  // --- 背景因子 ---
  if (bg.indexOf("rapid_progress") >= 0) {
    scores.treatable_ataxia += 5;
    scores.psp += 3;
    scores.msa += 3;
    scores.acute_cerebellar_vascular += 2;
  }
  if (bg.indexOf("drug_alcohol") >= 0) {
    scores.treatable_ataxia += 6;
  }
  if (bg.indexOf("vascular_risk") >= 0) {
    scores.vascular_parkinsonism += 6;
    scores.acute_cerebellar_vascular += 5;
  }
  if (bg.indexOf("family_history") >= 0) {
    scores.chronic_cerebellar += 6;
    scores.peripheral_neuropathy += 4;
  }
  if (bg.indexOf("canvas_clue") >= 0) {
    scores.vestibular_ataxia += 8;
  }

  return scores;
}

function rankDiseases(scores) {
  var arr = [];
  var keys = Object.keys(scores);
  for (var i = 0; i < keys.length; i++) {
    if (scores[keys[i]] > 0) {
      arr.push({ id: keys[i], score: scores[keys[i]], data: DISEASES[keys[i]] });
    }
  }
  arr.sort(function(a, b) { return b.score - a.score; });
  return arr;
}

function getProbLevel(score, maxScore) {
  var ratio = maxScore > 0 ? score / maxScore : 0;
  if (ratio >= 0.65) return "high";
  if (ratio >= 0.38) return "medium";
  return "low";
}

function getProbLabel(level) {
  if (level === "high") return "可能性高";
  if (level === "medium") return "可能性中";
  return "参考";
}

  var html = "";

  html += '<div class="algo-note">';
  html += '<strong>使い方：</strong>発症経過 → 歩容パターン → 視覚・体位の影響 → 四肢所見 → 随伴症状 → 背景因子の順に入力し、鑑別候補を絞り込みます。<br>';
  html += '<strong>注意：</strong>本ツールは診断補助を目的とし、最終診断は臨床的判断に基づいてください。<strong>急性発症の失調・歩行障害では小脳・脳幹血管障害の除外を最優先</strong>に行ってください。';
  html += '</div>';

  for (var i = 0; i < STEPS.length; i++) {
    var s = STEPS[i];
    var state = i < currentStep ? "completed" : (i === currentStep ? "" : "inactive");
    var numClass = i < currentStep ? "done" : "";

    html += '<div class="step-card ' + state + '" id="step-' + i + '">';
    html += '<div class="step-header">';
    html += '<span class="step-number ' + numClass + '">' + (i < currentStep ? "&#10003;" : (i + 1)) + '</span>';
    html += '<span class="step-title">' + s.title + '</span>';
    html += '</div>';

    if (i <= currentStep) {
      html += '<div class="step-body">';
      html += '<div style="font-size:0.97em;font-weight:600;color:#333;">' + s.question + '</div>';
      if (s.hint) {
        html += '<div class="hint">' + s.hint + '</div>';
      }

      if (s.type === "single") {
        html += '<div class="option-group">';
        for (var j = 0; j < s.options.length; j++) {
          var o = s.options[j];
          var sel = answers[s.id] === o.value ? " selected" : "";
          html += '<button class="option-btn' + sel + '" onclick="selectSingle(\'' + s.id + '\',\'' + o.value + '\',' + i + ')">';
          if (o.icon) html += '<span class="icon">' + o.icon + '</span>';
          html += o.label;
          html += '</button>';
        }
        html += '</div>';
      } else {
        html += '<div class="checklist">';
        var vals = answers[s.id] || [];
        for (var j = 0; j < s.options.length; j++) {
          var o = s.options[j];
          var chk = vals.indexOf(o.value) >= 0 ? ' checked' : '';
          html += '<div class="check-item" onclick="toggleCheck(\'' + s.id + '\',\'' + o.value + '\',' + i + ')">';
          html += '<input type="checkbox"' + chk + ' tabindex="-1">';
          html += '<label>' + o.label + '</label>';
          html += '</div>';
        }
        html += '</div>';
        if (i === currentStep) {
          var hasAny = vals.length > 0;
          html += '<button class="next-btn" onclick="nextStep(' + i + ')"' + (hasAny ? '' : ' disabled') + '>次へ &#8250;</button>';
        }
      }
      html += '</div>';
    }
    html += '</div>';
  }

  // 結果パネル
  if (currentStep >= STEPS.length) {
    var scores = calcScores(answers);
    var ranked = rankDiseases(scores);
    var maxScore = ranked.length > 0 ? ranked[0].score : 1;

    html += '<div class="result-panel show">';
    html += '<div class="result-header">&#128202; 鑑別診断リスト</div>';
    html += '<div class="result-body">';

    // サマリー
    var onsetLabel = "";
    if (answers.onset === "acute") onsetLabel = "急性発症（緊急評価が必要）";
    else if (answers.onset === "subacute") onsetLabel = "亜急性発症";
    else if (answers.onset === "chronic") onsetLabel = "慢性進行性";
    else onsetLabel = "エピソード性";

    var gaitLabel = "";
    if (answers.gait_pattern === "wide_irregular") gaitLabel = "広基性・不規則歩行";
    else if (answers.gait_pattern === "small_step_narrow") gaitLabel = "小刻み・狭基性歩行";
    else if (answers.gait_pattern === "magnetic") gaitLabel = "Magnetic gait・歩行開始困難";
    else if (answers.gait_pattern === "steppage") gaitLabel = "鶏歩（Steppage gait）";
    else if (answers.gait_pattern === "spastic") gaitLabel = "痙性歩行";

    html += '<div class="summary-box">';
    html += '<div class="summary-title">&#128204; 臨床パターン</div>';
    html += '<strong>経過：</strong>' + onsetLabel + '　<strong>歩容：</strong>' + gaitLabel;
    html += '</div>';

    // 急性発症アラート
    if (answers.onset === "acute") {
      html += '<div class="alert-box danger">';
      html += '<div class="alert-title">&#9888;&#65039; 急性発症：緊急対応が必要</div>';
      html += '急性失調・歩行障害では<strong>小脳・脳幹血管障害を最優先で除外</strong>してください。<br>';
      html += '「座位保持困難・立位保持不能レベルの体幹失調」はほぼ中枢性です。<strong>頭部MRI（DWI含む）を緊急施行</strong>してください。頭部CTは小脳病変の除外に不十分です。';
      html += '</div>';
    }

    // 疾患カード（上位7件まで表示）
    var showMax = ranked.length > 7 ? 7 : ranked.length;
    for (var k = 0; k < showMax; k++) {
      var r = ranked[k];
      var lvl = getProbLevel(r.score, maxScore);
      html += '<div class="dx-card ' + lvl + '">';
      html += '<span class="category-label ' + r.data.catClass + '">' + r.data.category + '</span>';
      html += '<div class="dx-name">';
      html += r.data.emoji + ' ' + r.data.name;
      html += ' <span class="prob-badge">' + getProbLabel(lvl) + '</span>';
      html += '</div>';
      html += '<div class="dx-detail">' + r.data.detail + '</div>';
      html += '<div class="dx-keys">&#128204; <strong>鑑別のポイント：</strong>' + r.data.keys.join('　/　') + '</div>';
      html += '<div class="dx-workup">&#128269; <strong>検査・対応：</strong>' + r.data.workup + '</div>';
      html += '</div>';
    }

    // ピットフォール
    html += '<div class="red-flag-box">';
    html += '<div class="rf-title">&#9888;&#65039; 歩行障害診療の落とし穴</div>';
    html += '<ul>';
    html += '<li><strong>広基性歩行＝小脳ではない</strong> ─ 感覚性失調・両側前庭障害・iNPH・前頭葉性歩行障害・機能性も広基性になる</li>';
    html += '<li><strong>Romberg陽性＝小脳ではない</strong> ─ 閉眼で著明悪化は深部感覚障害か前庭障害。小脳失調は開眼時からすでに不安定</li>';
    html += '<li><strong>「失調様歩行＋手の不器用さ＋腱反射亢進」は頚髄症を疑う</strong> ─ 頭部MRIだけでなく頚髄MRIを施行</li>';
    html += '<li><strong>治療可能な失調を見逃さない</strong> ─ 進行性失調でVitB12・VitE・抗GAD・薬剤歴を必ず確認</li>';
    html += '<li><strong>アルコール歴で検索を止めない</strong> ─ 薬剤・栄養・免疫性原因の検索は必要</li>';
    html += '<li><strong>機能性歩行障害は陽性所見で診断する</strong> ─ 後方歩行での改善・Hoover徴候・所見変動性を積極的に確認</li>';
    html += '<li><strong>PSPは発症早期の後方転倒が鍵</strong> ─ 垂直注視麻痺は進行してから出現することがある</li>';
    html += '</ul>';
    html += '</div>';

    html += '</div></div>';
  }

  if (currentStep > 0) {
    html += '<button class="reset-btn" onclick="resetAll()">&#8635; 最初からやり直す</button>';
  }

  app.innerHTML = html;

  if (currentStep < STEPS.length) {
    var el = document.getElementById("step-" + currentStep);
    if (el) {
      setTimeout(function() {
        el.scrollIntoView({ behavior: "smooth", block: "center" });
      }, 100);
    }
  } else {
    var rp = document.querySelector(".result-panel");
    if (rp) {
      setTimeout(function() {
        rp.scrollIntoView({ behavior: "smooth", block: "start" });
      }, 100);
    }
  }
}

function selectSingle(stepId, value, stepIndex) {
  answers[stepId] = value;
  currentStep = stepIndex + 1;
  render();
}

function toggleCheck(stepId, value, stepIndex) {
  if (!answers[stepId]) answers[stepId] = [];
  var arr = answers[stepId];
  var idx = arr.indexOf(value);
  var noneValues = ["none_sx", "none_bg"];
  var isNone = noneValues.indexOf(value) >= 0;

  if (isNone) {
    answers[stepId] = [value];
  } else {
    for (var n = 0; n < noneValues.length; n++) {
      var ni = arr.indexOf(noneValues[n]);
      if (ni >= 0) arr.splice(ni, 1);
    }
    if (idx >= 0) {
      arr.splice(idx, 1);
    } else {
      arr.push(value);
    }
  }
  render();
}

function nextStep(stepIndex) {
  currentStep = stepIndex + 1;
  render();
}

function resetAll() {
  answers = {};
  currentStep = 0;
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

render();
</script>
</body>
</html>
