<title>高ナトリウム血症 鑑別診断ツール</title>
<style>
  :root {
    --navy: #1B3A5C;
    --blue: #2C5AA0;
    --light-blue: #E8F0FE;
    --red: #DC3545;
    --yellow: #F5C518;
    --green: #28A745;
    --orange: #E8850C;
    --gray: #6C757D;
    --light-gray: #F4F6F8;
    --white: #FFFFFF;
    --shadow: 0 2px 8px rgba(27,58,92,0.10);
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "游ゴシック", "Yu Gothic", "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #FEF0E8 0%, #F8F4F4 100%);
    color: #222;
    min-height: 100vh;
    padding: 0 0 40px;
  }
  header {
    background: linear-gradient(135deg, #8B2500, #C04000);
    color: var(--white);
    padding: 14px 20px 18px;

    box-shadow: 0 4px 16px rgba(139,37,0,0.18);
  }
  .back-bar { display: flex; align-items: center; margin-bottom: 8px; }
  .back-bar a {
    color: rgba(255,255,255,0.85); text-decoration: none; font-size: 0.85em;
    display: flex; align-items: center; gap: 4px; padding: 4px 8px;
    border-radius: 6px; transition: background 0.2s;
  }
  .back-bar a:active { background: rgba(255,255,255,0.15); }
  header h1 { font-size: 1.7em; font-weight: 700; letter-spacing: 0.04em; }
  header p { font-size: 0.92em; margin-top: 6px; opacity: 0.85; }

  .container { max-width: 820px; margin: 0 auto; padding: 24px 16px; }

  .step-card {
    background: var(--white); border-radius: var(--radius);
    box-shadow: var(--shadow); margin-bottom: 18px; overflow: hidden; transition: opacity 0.3s;
  }
  .step-card.inactive { opacity: 0.45; pointer-events: none; }
  .step-card.completed { opacity: 1; }
  .step-header {
    display: flex; align-items: center; gap: 10px; padding: 14px 18px;
    background: #FDE8D8; border-bottom: 2px solid #C04000; cursor: pointer;
  }
  .step-number {
    display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; border-radius: 50%; background: #C04000;
    color: var(--white); font-weight: 700; font-size: 0.95em; flex-shrink: 0;

  .step-number.done { background: var(--green); }
  .step-title { font-weight: 700; font-size: 1.05em; color: #8B2500; }
  .step-body { padding: 18px; }

  .option-group { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
  .option-btn {
    display: flex; align-items: center; gap: 10px; padding: 12px 16px;
    border: 2px solid #D0D8E4; border-radius: 8px; background: var(--white);
    font-size: 0.97em; cursor: pointer; transition: all 0.18s; text-align: left;
    color: #222; font-family: inherit; width: 100%;
  }
  .option-btn:hover { border-color: #C04000; background: #FDE8D8; }
  .option-btn.selected { border-color: #C04000; background: #FDE8D8; font-weight: 700; }
  .option-btn .icon { font-size: 1.2em; flex-shrink: 0; width: 24px; text-align: center; }

  .checklist { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .check-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    border-radius: 8px; background: var(--light-gray); cursor: pointer;
    transition: background 0.15s; user-select: none; font-size: 0.95em;
  }
  .check-item:hover { background: #F0E0D0; }
  .check-item input[type="checkbox"] {
    width: 18px; height: 18px; accent-color: #C04000; flex-shrink: 0; cursor: pointer;
  }
  .check-item label { cursor: pointer; flex: 1; }

  .result-panel {
    background: var(--white); border-radius: var(--radius);
    box-shadow: 0 4px 20px rgba(139,37,0,0.15); overflow: hidden;
    margin-top: 24px; display: none;
  }
  .result-panel.show { display: block; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .result-header {
    padding: 16px 20px; background: linear-gradient(135deg, #8B2500, #C04000);
    color: var(--white); font-weight: 700; font-size: 1.15em;
    display: flex; align-items: center; gap: 8px;
  }
  .result-body { padding: 20px; }

  .dx-card {
    border: 2px solid transparent; border-radius: 8px; padding: 16px;
    margin-bottom: 12px; position: relative; transition: all 0.2s;
  }
  .dx-card.high { border-color: var(--red); background: #FFF5F5; }
  .dx-card.medium { border-color: var(--orange); background: #FFF8F0; }
  .dx-card.low { border-color: var(--gray); background: var(--light-gray); }

  .dx-card .dx-name {
    font-weight: 700; font-size: 1.08em; display: flex; align-items: center;
    gap: 8px; margin-bottom: 6px;
  }
  .dx-card .prob-badge {
    display: inline-block; padding: 2px 10px; border-radius: 12px;
    font-size: 0.78em; font-weight: 700; color: var(--white);
  }
  .dx-card.high .prob-badge { background: var(--red); }
  .dx-card.medium .prob-badge { background: var(--orange); }
  .dx-card.low .prob-badge { background: var(--gray); }

  .dx-card .dx-detail { font-size: 0.9em; color: #444; line-height: 1.6; }
  .dx-card .dx-detail strong { color: #8B2500; }
  .dx-card .dx-workup {
    margin-top: 8px; padding-top: 8px; border-top: 1px dashed #ccc;
    font-size: 0.88em; color: #C04000;
  }

  .next-btn {
    display: inline-flex; align-items: center; gap: 6px; margin-top: 14px;
    padding: 10px 22px; background: #C04000; color: var(--white); border: none;
    border-radius: 8px; font-size: 0.95em; font-weight: 600; cursor: pointer;
    transition: background 0.15s; font-family: inherit;
  }
  .next-btn:hover { background: #8B2500; }
  .next-btn:disabled { background: #B0BEC5; cursor: not-allowed; }

  .reset-btn {
    display: block; margin: 24px auto 0; padding: 10px 32px;
    background: var(--white); color: var(--red); border: 2px solid var(--red);
    border-radius: 8px; font-size: 0.95em; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: all 0.15s;
  }
  .reset-btn:hover { background: var(--red); color: var(--white); }

  .hint { font-size: 0.85em; color: var(--gray); margin-top: 6px; line-height: 1.5; }
  .divider { height: 1px; background: #D0D8E4; margin: 14px 0; }

  .algo-note {
    background: #FFF8E1; border-left: 4px solid var(--yellow);
    padding: 12px 16px; border-radius: 0 8px 8px 0; margin-bottom: 18px;
    font-size: 0.9em; line-height: 1.6; color: #555;
  }
  .algo-note strong { color: #8B2500; }

  @media (max-width: 600px) {
    header { padding: 12px 14px 14px; }
    header h1 { font-size: 1.25em; }
    header p { font-size: 0.85em; }
    .container { padding: 14px 10px; }
    .step-header { padding: 12px 14px; }
    .option-btn { min-height: 44px; font-size: 0.92em; -webkit-tap-highlight-color: transparent; }
    .step-card { margin-bottom: 14px; }
    .step-body, .result-body { padding: 14px; }
    .dx-card { padding: 12px; }
  }
</style>
</head>

  },
  {
    id: "ddavp",
    title: "DDAVP（デスモプレシン）負荷試験",
    question: "DDAVP投与後の尿浸透圧の反応は？",
    hint: "尿崩症が疑われる場合に実施。中枢性では尿浸透圧が上昇（＞50%増加）、腎性では反応なし",
    type: "single",
    options: [
      { label: "尿浸透圧が＞50%上昇（反応あり）", value: "responsive", icon: "✅" },
      { label: "尿浸透圧の変化なし（反応なし）", value: "unresponsive", icon: "❌" },
      { label: "未施行 / 不明", value: "unknown", icon: "🤔" },
    ]
  },
];

// ===== スコアリングエンジン =====
function calcScores(answers) {
  const scores = {};
  Object.keys(DISEASES).forEach(k => scores[k] = 0);

  // Step 1: 体液量
  const vol = answers.volume;
  if (vol === "decreased") {
    scores.extrarenal_loss += 4;
    scores.gi_loss += 4;
    scores.osmotic_diuresis += 3;
    scores.loop_diuretic += 3;
    scores.central_di += 2;
    scores.nephrogenic_di += 2;
    scores.inadequate_intake += 3;
    scores.na_overload -= 3;
    scores.mineralocorticoid -= 1;
  } else if (vol === "normal") {
    scores.central_di += 3;
    scores.nephrogenic_di += 3;
    scores.inadequate_intake += 3;
    scores.hypodipsia += 4;
    scores.extrarenal_loss += 1;
    scores.na_overload -= 2;
  } else if (vol === "increased") {
    scores.na_overload += 6;
    scores.mineralocorticoid += 4;
    scores.central_di -= 2;
    scores.nephrogenic_di -= 2;
    scores.extrarenal_loss -= 3;
    scores.gi_loss -= 3;
    scores.inadequate_intake -= 2;
  }

  // Step 2: 尿浸透圧
  const uosm = answers.urine_osm;
  if (uosm === "high") { // >800
    scores.extrarenal_loss += 4;
    scores.gi_loss += 4;
    scores.inadequate_intake += 4;
    scores.hypodipsia += 3;
    scores.na_overload += 2;
    scores.central_di -= 3;
    scores.nephrogenic_di -= 3;
    scores.osmotic_diuresis -= 2;
  } else if (uosm === "mid") { // 300-800
    scores.osmotic_diuresis += 4;
    scores.loop_diuretic += 4;
    scores.central_di += 2; // 部分型
    scores.nephrogenic_di += 2;
    scores.extrarenal_loss -= 1;
  } else if (uosm === "low") { // <300
    scores.central_di += 5;
    scores.nephrogenic_di += 5;
    scores.extrarenal_loss -= 3;
    scores.gi_loss -= 3;
    scores.inadequate_intake -= 2;
    scores.na_overload -= 2;
    scores.osmotic_diuresis -= 2;
  }

  // Step 3: 尿量
  const uvol = answers.urine_volume;
  if (uvol === "polyuria") {
    scores.central_di += 4;
    scores.nephrogenic_di += 4;
    scores.osmotic_diuresis += 4;
    scores.loop_diuretic += 3;
    scores.inadequate_intake -= 2;
    scores.extrarenal_loss -= 1;
  } else if (uvol === "normal") {
    scores.inadequate_intake += 2;
    scores.hypodipsia += 2;
    scores.extrarenal_loss += 1;
  } else if (uvol === "oliguria") {
    scores.extrarenal_loss += 3;
    scores.gi_loss += 2;
    scores.inadequate_intake += 3;
    scores.central_di -= 3;
    scores.nephrogenic_di -= 3;
    scores.osmotic_diuresis -= 3;
  }

  // Step 4: 検査所見
  const labs = answers.labs || [];
  labs.forEach(v => {
    if (v === "high_glucose") { scores.osmotic_diuresis += 6; }
    if (v === "high_bun_cr") { scores.extrarenal_loss += 3; scores.gi_loss += 3; scores.inadequate_intake += 3; }
    if (v === "high_ca") { scores.nephrogenic_di += 4; }
    if (v === "low_k") { scores.nephrogenic_di += 3; scores.mineralocorticoid += 3; scores.loop_diuretic += 2; }
    if (v === "high_urine_na") { scores.na_overload += 3; scores.loop_diuretic += 2; scores.mineralocorticoid += 2; }
    if (v === "low_urine_na") { scores.extrarenal_loss += 3; scores.gi_loss += 2; scores.inadequate_intake += 2; }
    if (v === "glycosuria") { scores.osmotic_diuresis += 5; }
    if (v === "high_bun_nutrition") { scores.osmotic_diuresis += 4; }
  });

  // Step 5: 臨床所見
  const sx = answers.symptoms || [];
  sx.forEach(v => {
    if (v === "fever_burn") scores.extrarenal_loss += 5;
    if (v === "diarrhea") scores.gi_loss += 5;
    if (v === "polyuria_polydipsia") { scores.central_di += 4; scores.nephrogenic_di += 4; }
    if (v === "head_trauma") { scores.central_di += 4; scores.hypodipsia += 3; }
    if (v === "cns_tumor") { scores.central_di += 4; scores.hypodipsia += 3; }
    if (v === "impaired_intake") { scores.inadequate_intake += 5; }
    if (v === "elderly_care") { scores.inadequate_intake += 4; }
    if (v === "icu") { scores.na_overload += 4; scores.osmotic_diuresis += 2; }
    if (v === "hypertension") { scores.mineralocorticoid += 4; }
    if (v === "volume_overload") { scores.na_overload += 4; }
  });

  // Step 6: 薬剤
  const drugs = answers.drugs || [];
  drugs.forEach(v => {
    if (v === "lithium") scores.nephrogenic_di += 6;
    if (v === "loop_diuretic") scores.loop_diuretic += 5;
    if (v === "mannitol") scores.osmotic_diuresis += 5;
    if (v === "nahco3") scores.na_overload += 5;
    if (v === "hypertonic_saline") scores.na_overload += 5;
    if (v === "high_protein_feed") scores.osmotic_diuresis += 4;
    if (v === "amphotericin") scores.nephrogenic_di += 4;
    if (v === "demeclocycline") scores.nephrogenic_di += 4;
  });

  // Step 7: DDAVP反応
  const ddavp = answers.ddavp;
  if (ddavp === "responsive") {
    scores.central_di += 6;
    scores.nephrogenic_di -= 4;
  } else if (ddavp === "unresponsive") {
    scores.nephrogenic_di += 6;
    scores.central_di -= 4;
  }

  return scores;
}

function rankDiseases(scores) {
  return Object.entries(scores)
    .map(([key, score]) => ({ key, score, ...DISEASES[key] }))
    .filter(d => d.score > 0)
    .sort((a, b) => b.score - a.score);
}

function getProbLevel(score, maxScore) {
  const ratio = score / Math.max(maxScore, 1);
  if (ratio >= 0.7) return { level: "high", label: "可能性 高" };
  if (ratio >= 0.35) return { level: "medium", label: "可能性 中" };
  return { level: "low", label: "可能性 低" };
}

// ===== UIレンダリング =====
let currentStep = 0;
const answers = {};

function render() {
  const app = document.getElementById("app");
  let html = "";

  html += `<div class="algo-note">
    <strong>💡 診断アルゴリズム:</strong>
    体液量評価 → 尿浸透圧 → 尿量 → 検査所見 → 病歴・薬剤 → DDAVP試験で系統的に鑑別します。<br>
    高Na血症は本質的に<strong>「水欠乏」</strong>の状態です。水分喪失（腎性 or 腎外性）か、水分摂取不足か、Na過剰負荷かを判別します。
  </div>`;

  STEPS.forEach((step, i) => {
    const state = i < currentStep ? "completed" : i === currentStep ? "" : "inactive";
    const numClass = i < currentStep ? "done" : "";
    html += `<div class="step-card ${state}" id="step-${i}">`;
    html += `<div class="step-header">
      <span class="step-number ${numClass}">${i < currentStep ? "✓" : i + 1}</span>
      <span class="step-title">${step.title}</span>
    </div>`;

    if (i <= currentStep) {
      html += `<div class="step-body">`;
      html += `<p style="font-weight:600; margin-bottom:4px;">${step.question}</p>`;
      if (step.hint) html += `<p class="hint">${step.hint}</p>`;

      if (step.type === "single") {
        html += `<div class="option-group">`;
        step.options.forEach(opt => {
          const sel = answers[step.id] === opt.value ? "selected" : "";
          html += `<button class="option-btn ${sel}" onclick="selectOption('${step.id}', '${opt.value}', ${i})">
            <span class="icon">${opt.icon}</span> ${opt.label}
          </button>`;
        });
        html += `</div>`;
      } else {
        html += `<div class="checklist">`;
        const checked = answers[step.id] || [];
        step.options.forEach(opt => {
          const isChecked = checked.includes(opt.value);
          html += `<div class="check-item" onclick="toggleCheck('${step.id}', '${opt.value}')">
            <input type="checkbox" ${isChecked ? "checked" : ""} tabindex="-1">
            <label>${opt.label}</label>
          </div>`;
        });
        html += `</div>`;
        if (i === currentStep) {
          const hasSelection = checked.length > 0;
          html += `<button class="next-btn" onclick="nextStep(${i})" ${hasSelection ? "" : "disabled"}>
            次へ ▶
          </button>`;
        }
      }
      html += `</div>`;
    }
    html += `</div>`;
  });

  // 結果表示
  if (currentStep >= STEPS.length) {
    const scores = calcScores(answers);
    const ranked = rankDiseases(scores);
    const maxScore = ranked.length > 0 ? ranked[0].score : 1;

    html += `<div class="result-panel show">`;
    html += `<div class="result-header">📊 鑑別診断結果</div>`;
    html += `<div class="result-body">`;
    html += `<p style="margin-bottom:14px; color:#555; font-size:0.9em;">入力された臨床情報に基づく鑑別疾患の優先度です。確定診断には追加検査が必要です。</p>`;

    ranked.forEach(d => {
      const prob = getProbLevel(d.score, maxScore);
      html += `<div class="dx-card ${prob.level}">
        <div class="dx-name">
          ${d.emoji} ${d.name}
          <span class="prob-badge">${prob.label}</span>
        </div>
        <div class="dx-detail">${d.detail}</div>
        <div class="dx-workup">🔍 <strong>追加検査:</strong> ${d.workup}</div>
      </div>`;
    });

    html += `<div class="divider"></div>`;
    html += `<p style="font-size:0.82em; color:#888; line-height:1.6;">
      ⚠️ 本ツールは臨床判断の補助を目的としており、確定診断を行うものではありません。<br>
      補正速度：急性（＜48h）では1 mEq/L/時以下、慢性（≧48h）では10〜12 mEq/L/日以下（≒0.5 mEq/L/時以下）が目安です。<br>
      慢性例の急速な補正は脳浮腫のリスクがあるため、頻回なNa再検と慎重なモニタリングが必要です。
    </p>`;
    html += `</div></div>`;
  }

  html += `<button class="reset-btn" onclick="resetAll()">🔄 最初からやり直す</button>`;
  app.innerHTML = html;

  if (currentStep < STEPS.length) {
    const el = document.getElementById(`step-${currentStep}`);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
  } else {
    const panel = document.querySelector(".result-panel");
    if (panel) panel.scrollIntoView({ behavior: "smooth", block: "start" });
  }
}

function selectOption(stepId, value, stepIndex) {
  answers[stepId] = value;
  currentStep = stepIndex + 1;
  render();
}

function toggleCheck(stepId, value) {
  if (!answers[stepId]) answers[stepId] = [];
  const arr = answers[stepId];
  const idx = arr.indexOf(value);

  if (value === "none" || value === "unknown") {
    answers[stepId] = idx >= 0 ? [] : [value];
  } else {
    const noneIdx = arr.indexOf("none");
    if (noneIdx >= 0) arr.splice(noneIdx, 1);
    const unkIdx = arr.indexOf("unknown");
    if (unkIdx >= 0) arr.splice(unkIdx, 1);
    if (idx >= 0) arr.splice(idx, 1);
    else arr.push(value);
  }
  render();
}

function nextStep(stepIndex) {
  currentStep = stepIndex + 1;
  render();
}

function resetAll() {
  currentStep = 0;
  Object.keys(answers).forEach(k => delete answers[k]);
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

render();
</script>
</body>
</html>
