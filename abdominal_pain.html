  {

// ===== スコアリングエンジン =====
function calcScores(answers) {
  const s = {};
  Object.keys(DISEASES).forEach(k => s[k] = 0);

  // --- Step 1: 疼痛部位 ---
  const loc = answers.location;
  if (loc === "epigastric") {
    s.peptic_ulcer += 5; s.acute_pancreatitis += 4; s.acute_cholecystitis += 2;
    s.mesenteric_ischemia += 2; s.gastroenteritis += 2; s.ruptured_aaa += 1;
  } else if (loc === "ruq") {
    s.acute_cholecystitis += 6; s.peptic_ulcer += 2; s.acute_pancreatitis += 1;
  } else if (loc === "luq") {
    s.acute_pancreatitis += 2; s.mesenteric_ischemia += 1;
  } else if (loc === "periumbilical") {
    s.acute_appendicitis += 3; s.bowel_obstruction += 4; s.mesenteric_ischemia += 3;
    s.gastroenteritis += 2; s.ruptured_aaa += 2;
  } else if (loc === "rlq") {
    s.acute_appendicitis += 6; s.ectopic_pregnancy += 3; s.ovarian_torsion += 3;
    s.pid += 2; s.diverticulitis += 1;
  } else if (loc === "llq") {
    s.diverticulitis += 6; s.ectopic_pregnancy += 2; s.ovarian_torsion += 2; s.pid += 2;
  } else if (loc === "suprapubic") {
    s.pid += 4; s.ectopic_pregnancy += 3; s.ovarian_torsion += 2; s.urolithiasis += 2;
  } else if (loc === "flank") {
    s.urolithiasis += 6; s.ruptured_aaa += 2;
  } else if (loc === "diffuse") {
    s.gastroenteritis += 3; s.bowel_obstruction += 3; s.mesenteric_ischemia += 3;
    s.ruptured_aaa += 2; s.peptic_ulcer += 2;
  }

  // --- Step 2: 発症様式 ---
  const onset = answers.onset;
  if (onset === "sudden") {
    s.ruptured_aaa += 5; s.mesenteric_ischemia += 4; s.peptic_ulcer += 4;
    s.ovarian_torsion += 4; s.urolithiasis += 4; s.ectopic_pregnancy += 3;
  } else if (onset === "acute") {
    s.acute_appendicitis += 3; s.acute_cholecystitis += 3; s.acute_pancreatitis += 3;
    s.bowel_obstruction += 3; s.ectopic_pregnancy += 2;
  } else if (onset === "subacute") {
    s.diverticulitis += 3; s.pid += 3; s.gastroenteritis += 2; s.acute_appendicitis += 1;
  } else if (onset === "intermittent") {
    s.urolithiasis += 4; s.bowel_obstruction += 4; s.gastroenteritis += 2;
    s.acute_cholecystitis += 2;
  }

  // --- Step 3: 疼痛の性状 ---
  const qual = answers.quality;
  if (qual === "constant_dull") {
    s.acute_pancreatitis += 3; s.acute_appendicitis += 2; s.acute_cholecystitis += 2;
    s.pid += 2; s.diverticulitis += 2;
  } else if (qual === "colicky") {
    s.urolithiasis += 5; s.bowel_obstruction += 5; s.acute_cholecystitis += 3;
    s.gastroenteritis += 3;
  } else if (qual === "sharp") {
    s.peptic_ulcer += 4; s.acute_appendicitis += 3; s.ruptured_aaa += 3;
    s.ovarian_torsion += 3; s.mesenteric_ischemia += 2;
  } else if (qual === "burning") {
    s.peptic_ulcer += 4; s.gastroenteritis += 2;
  }

  // --- Step 4: 身体所見 ---
  const exam = answers.exam || [];
  exam.forEach(v => {
    if (v === "fever") {
      s.acute_appendicitis += 3; s.acute_cholecystitis += 3; s.diverticulitis += 3;
      s.pid += 3; s.gastroenteritis += 2;
    }
    if (v === "tachycardia") {
      s.ruptured_aaa += 3; s.mesenteric_ischemia += 3; s.ectopic_pregnancy += 3;
      s.acute_pancreatitis += 2;
    }
    if (v === "hypotension") {
      s.ruptured_aaa += 5; s.ectopic_pregnancy += 4; s.mesenteric_ischemia += 3;
      s.acute_pancreatitis += 2;
    }
    if (v === "peritonitis") {
      s.peptic_ulcer += 5; s.acute_appendicitis += 4; s.mesenteric_ischemia += 3;
      s.ruptured_aaa += 3; s.diverticulitis += 2;
    }
    if (v === "murphy") { s.acute_cholecystitis += 6; }
    if (v === "mcburney") { s.acute_appendicitis += 6; }
    if (v === "hyperactive_bowel") { s.bowel_obstruction += 4; s.gastroenteritis += 3; }
    if (v === "decreased_bowel") { s.bowel_obstruction += 3; s.mesenteric_ischemia += 3; }
    if (v === "cva_tenderness") { s.urolithiasis += 4; }
    if (v === "pulsatile_mass") { s.ruptured_aaa += 7; }
    if (v === "distension") { s.bowel_obstruction += 5; s.mesenteric_ischemia += 2; }
  });

  // --- Step 5: 随伴症状 ---
  const sx = answers.symptoms || [];
  sx.forEach(v => {
    if (v === "vomiting") {
      s.bowel_obstruction += 4; s.acute_pancreatitis += 3; s.gastroenteritis += 3;
      s.acute_appendicitis += 2; s.acute_cholecystitis += 2;
    }
    if (v === "diarrhea") { s.gastroenteritis += 5; s.mesenteric_ischemia += 2; }
    if (v === "bloody_stool") { s.mesenteric_ischemia += 5; s.diverticulitis += 3; }
    if (v === "urinary_sx") { s.urolithiasis += 4; s.pid += 2; }
    if (v === "hematuria") { s.urolithiasis += 5; }
    if (v === "constipation") { s.bowel_obstruction += 5; s.diverticulitis += 2; }
    if (v === "jaundice") { s.acute_cholecystitis += 3; s.acute_pancreatitis += 2; }
    if (v === "amenorrhea") { s.ectopic_pregnancy += 6; }
    if (v === "vaginal_discharge") { s.pid += 4; }
    if (v === "back_pain") { s.acute_pancreatitis += 4; s.ruptured_aaa += 4; s.urolithiasis += 3; }
    if (v === "shoulder_pain") { s.ectopic_pregnancy += 3; s.acute_cholecystitis += 2; }
  });

  // --- Step 6: リスク因子 ---
  const risk = answers.risk || [];
  risk.forEach(v => {
    if (v === "reproductive_female") {
      s.ectopic_pregnancy += 3; s.ovarian_torsion += 3; s.pid += 3;
    }
    if (v === "prior_surgery") { s.bowel_obstruction += 5; }
    if (v === "nsaids") { s.peptic_ulcer += 4; }
    if (v === "alcohol") { s.acute_pancreatitis += 5; }
    if (v === "gallstone_hx") { s.acute_cholecystitis += 4; s.acute_pancreatitis += 3; }
    if (v === "atherosclerosis") { s.mesenteric_ischemia += 4; s.ruptured_aaa += 4; }
    if (v === "known_aaa") { s.ruptured_aaa += 6; }
    if (v === "diverticula_hx") { s.diverticulitis += 4; }
    if (v === "std_risk") { s.pid += 4; }
  });

  // --- Step 7: 検査所見 ---
  const labs = answers.labs || [];
  labs.forEach(v => {
    if (v === "leukocytosis") {
      s.acute_appendicitis += 2; s.acute_cholecystitis += 2;
      s.diverticulitis += 2; s.pid += 2;
    }
    if (v === "high_crp") {
      s.acute_pancreatitis += 2; s.acute_appendicitis += 2; s.diverticulitis += 2;
    }
    if (v === "elevated_lipase") { s.acute_pancreatitis += 7; }
    if (v === "elevated_hepatobiliary") { s.acute_cholecystitis += 5; s.acute_pancreatitis += 2; }
    if (v === "urine_blood") { s.urolithiasis += 5; }
    if (v === "positive_hcg") { s.ectopic_pregnancy += 7; }
    if (v === "elevated_lactate") { s.mesenteric_ischemia += 5; s.ruptured_aaa += 3; }
    if (v === "air_fluid_levels") { s.bowel_obstruction += 6; }
    if (v === "free_air") { s.peptic_ulcer += 7; }
    if (v === "anemia") { s.ruptured_aaa += 4; s.ectopic_pregnancy += 3; s.mesenteric_ischemia += 2; }
  });

  return s;
}

function rankDiseases(scores) {
  return Object.entries(scores)
    .map(([key, score]) => ({ key, score, ...DISEASES[key] }))
    .filter(d => d.score > 0)
    .sort((a, b) => b.score - a.score);
}

function getProbLevel(score, maxScore) {
  const ratio = score / Math.max(maxScore, 1);
  if (ratio >= 0.7) return { level: "high", label: "可能性 高" };
  if (ratio >= 0.35) return { level: "medium", label: "可能性 中" };
  return { level: "low", label: "可能性 低" };
}

// ===== UIレンダリング =====
let currentStep = 0;
const answers = {};

function render() {
  const app = document.getElementById("app");
  let html = "";

  html += `<div class="emergency-box">
    <strong>🚨 緊急徴候を最初に確認：</strong>ショック・腹膜刺激症状（板状硬）・大動脈拍動性腫瘤を認める場合は<strong>外科的緊急症</strong>として直ちに対応してください。
  </div>`;

  html += `<div class="algo-note">
    <strong>💡 診断アルゴリズム:</strong>
    疼痛部位 → 発症様式 → 疼痛性状 → 身体所見 → 随伴症状 → リスク因子 → 検査所見 で系統的に鑑別します。<br>
    「<strong>部位＋発症様式＋身体所見</strong>」の3要素で鑑別疾患をまず絞り込むのが基本です。
  </div>`;

  STEPS.forEach((step, i) => {
    const state = i < currentStep ? "completed" : i === currentStep ? "" : "inactive";
    const numClass = i < currentStep ? "done" : "";
    html += `<div class="step-card ${state}" id="step-${i}">`;
    html += `<div class="step-header">
      <span class="step-number ${numClass}">${i < currentStep ? "✓" : i + 1}</span>
      <span class="step-title">${step.title}</span>
    </div>`;

    if (i <= currentStep) {
      html += `<div class="step-body">`;
      html += `<p style="font-weight:600; margin-bottom:4px;">${step.question}</p>`;
      if (step.hint) html += `<p class="hint">${step.hint}</p>`;

      if (step.type === "single") {
        html += `<div class="option-group">`;
        step.options.forEach(opt => {
          const sel = answers[step.id] === opt.value ? "selected" : "";
          html += `<button class="option-btn ${sel}" onclick="selectOption('${step.id}', '${opt.value}', ${i})">
            <span class="icon">${opt.icon}</span> ${opt.label}
          </button>`;
        });
        html += `</div>`;
      } else {
        html += `<div class="checklist">`;
        const checked = answers[step.id] || [];
        step.options.forEach(opt => {
          const isChecked = checked.includes(opt.value);
          html += `<div class="check-item" onclick="toggleCheck('${step.id}', '${opt.value}')">
            <input type="checkbox" ${isChecked ? "checked" : ""} tabindex="-1">
            <label>${opt.label}</label>
          </div>`;
        });
        html += `</div>`;
        if (i === currentStep) {
          const hasSelection = checked.length > 0;
          html += `<button class="next-btn" onclick="nextStep(${i})" ${hasSelection ? "" : "disabled"}>
            次へ ▶
          </button>`;
        }
      }
      html += `</div>`;
    }
    html += `</div>`;
  });

  // 結果表示
  if (currentStep >= STEPS.length) {
    const scores = calcScores(answers);
    const ranked = rankDiseases(scores);
    const maxScore = ranked.length > 0 ? ranked[0].score : 1;

    html += `<div class="result-panel show">`;
    html += `<div class="result-header">📊 鑑別診断結果</div>`;
    html += `<div class="result-body">`;
    html += `<p style="margin-bottom:14px; color:#555; font-size:0.9em;">入力された臨床情報に基づく鑑別疾患の優先度です。確定診断には画像検査等の追加精査が必要です。</p>`;

    ranked.forEach(d => {
      const prob = getProbLevel(d.score, maxScore);
      html += `<div class="dx-card ${prob.level}">
        <div class="dx-name">
          ${d.emoji} ${d.name}
          <span class="prob-badge">${prob.label}</span>
        </div>
        <div class="dx-detail">${d.detail}</div>
        <div class="dx-workup">🔍 <strong>追加検査:</strong> ${d.workup}</div>
      </div>`;
    });

    html += `<div class="divider"></div>`;
    html += `<p style="font-size:0.82em; color:#888; line-height:1.6;">
      ⚠️ 本ツールは臨床判断の補助を目的としており、確定診断を行うものではありません。<br>
      妊娠可能年齢の女性では必ず妊娠反応を確認してください。<br>
      高齢者の腹痛は症状が非典型的になりやすく、重症化しやすいため低い閾値で画像検査を考慮してください。<br>
      腹膜刺激症状・ショックを伴う場合は直ちに外科コンサルトを行ってください。
    </p>`;
    html += `</div></div>`;
  }

  html += `<button class="reset-btn" onclick="resetAll()">🔄 最初からやり直す</button>`;
  app.innerHTML = html;

  if (currentStep < STEPS.length) {
    const el = document.getElementById(`step-${currentStep}`);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
  } else {
    const panel = document.querySelector(".result-panel");
    if (panel) panel.scrollIntoView({ behavior: "smooth", block: "start" });
  }
}

function selectOption(stepId, value, stepIndex) {
  answers[stepId] = value;
  currentStep = stepIndex + 1;
  render();
}

function toggleCheck(stepId, value) {
  if (!answers[stepId]) answers[stepId] = [];
  const arr = answers[stepId];
  const idx = arr.indexOf(value);

  if (value === "none" || value === "unknown") {
    answers[stepId] = idx >= 0 ? [] : [value];
  } else {
    const noneIdx = arr.indexOf("none");
    if (noneIdx >= 0) arr.splice(noneIdx, 1);
    const unkIdx = arr.indexOf("unknown");
    if (unkIdx >= 0) arr.splice(unkIdx, 1);
    if (idx >= 0) arr.splice(idx, 1);
    else arr.push(value);
  }
  render();
}

function nextStep(stepIndex) {
  currentStep = stepIndex + 1;
  render();
}

function resetAll() {
  currentStep = 0;
  Object.keys(answers).forEach(k => delete answers[k]);
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

render();
</script>

</html>
