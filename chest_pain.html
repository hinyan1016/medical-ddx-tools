// ===== スコアリング =====
function calcScores(ans) {
  var scores = {};
  var keys = Object.keys(DISEASES);
  for (var i = 0; i < keys.length; i++) { scores[keys[i]] = 0; }

  // --- Step 1: 安定性 ---
  var stab = ans.stability || "";
  if (stab === "unstable") {
    scores.acs += 4; scores.pe += 4; scores.aas += 4;
    scores.pneumothorax += 3; scores.pericarditis += 3;
    scores.arrhythmia += 2; scores.esophageal_rupture += 2;
  }
  if (stab === "moderate") {
    scores.acs += 2; scores.pe += 2; scores.aas += 2;
    scores.pericarditis += 2; scores.pneumothorax += 2;
    scores.pneumonia += 2; scores.pleuritis += 1;
  }
  if (stab === "stable") {
    scores.msk += 2; scores.gerd += 2; scores.panic += 2;
    scores.herpes_zoster += 1; scores.pleuritis += 1;
  }

  // --- Step 2: 発症様式 ---
  var onset = ans.onset || "";
  if (onset === "sudden_max") {
    scores.aas += 6; scores.pneumothorax += 4; scores.pe += 3;
    scores.esophageal_rupture += 2; scores.arrhythmia += 2;
  }
  if (onset === "sudden") {
    scores.pe += 4; scores.pneumothorax += 4; scores.acs += 2;
    scores.aas += 2; scores.arrhythmia += 2;
  }
  if (onset === "gradual") {
    scores.pneumonia += 4; scores.pericarditis += 3;
    scores.myocarditis += 3; scores.pleuritis += 3;
    scores.herpes_zoster += 2; scores.gerd += 2;
  }
  if (onset === "exertional") {
    scores.acs += 5; scores.arrhythmia += 2;
  }
  if (onset === "recurrent") {
    scores.gerd += 4; scores.msk += 4; scores.panic += 3;
    scores.acs += 2; scores.herpes_zoster += 1;
  }

  // --- Step 3: 痛みの性質 ---
  var pain = ans.pain_character || [];
  if (pain.indexOf("pressure") >= 0) {
    scores.acs += 4; scores.arrhythmia += 1;
  }
  if (pain.indexOf("sharp") >= 0) {
    scores.pericarditis += 3; scores.pleuritis += 3;
    scores.pneumothorax += 2; scores.msk += 2;
  }
  if (pain.indexOf("tearing") >= 0) {
    scores.aas += 7;
  }
  if (pain.indexOf("burning") >= 0) {
    scores.gerd += 5; scores.herpes_zoster += 2;
  }
  if (pain.indexOf("pleuritic") >= 0) {
    scores.pe += 4; scores.pleuritis += 4; scores.pneumonia += 3;
    scores.pericarditis += 3; scores.pneumothorax += 3;
  }
  if (pain.indexOf("positional") >= 0) {
    scores.pericarditis += 5; scores.msk += 2; scores.gerd += 1;
  }
  if (pain.indexOf("retrosternal") >= 0) {
    scores.acs += 3; scores.gerd += 3; scores.esophageal_rupture += 2;
  }
  if (pain.indexOf("radiation_arm") >= 0) {
    scores.acs += 5;
  }
  if (pain.indexOf("radiation_back") >= 0) {
    scores.aas += 5; scores.pericarditis += 1;
    scores.esophageal_rupture += 2;
  }
  if (pain.indexOf("unilateral") >= 0) {
    scores.pneumothorax += 3; scores.pleuritis += 2;
    scores.herpes_zoster += 3;
  }
  if (pain.indexOf("chest_wall_tender") >= 0) {
    scores.msk += 5; scores.herpes_zoster += 2;
  }
  if (pain.indexOf("dermatome") >= 0) {
    scores.herpes_zoster += 7;
  }

  // --- Step 4: バイタル ---
  var vit = ans.vitals || [];
  if (vit.indexOf("hypotension") >= 0) {
    scores.acs += 3; scores.pe += 3; scores.aas += 3;
    scores.pneumothorax += 3; scores.pericarditis += 3;
    scores.arrhythmia += 2; scores.esophageal_rupture += 2;
  }
  if (vit.indexOf("hypertension") >= 0) {
    scores.aas += 3; scores.acs += 1;
  }
  if (vit.indexOf("bp_diff") >= 0) {
    scores.aas += 7;
  }
  if (vit.indexOf("tachycardia") >= 0) {
    scores.pe += 3; scores.acs += 1; scores.arrhythmia += 3;
    scores.panic += 1;
  }
  if (vit.indexOf("bradycardia") >= 0) {
    scores.arrhythmia += 4; scores.acs += 1;
  }
  if (vit.indexOf("irregular_pulse") >= 0) {
    scores.arrhythmia += 5;
  }
  if (vit.indexOf("pulse_diff") >= 0) {
    scores.aas += 6;
  }
  if (vit.indexOf("hypoxia") >= 0) {
    scores.pe += 3; scores.pneumonia += 2; scores.pneumothorax += 2;
    scores.pericarditis += 1;
  }
  if (vit.indexOf("fever") >= 0) {
    scores.pneumonia += 5; scores.pericarditis += 2;
    scores.myocarditis += 2; scores.pleuritis += 2;
  }
  if (vit.indexOf("tachypnea") >= 0) {
    scores.pe += 2; scores.pneumonia += 1; scores.pneumothorax += 1;
  }

  // --- Step 5: 身体所見 ---
  var exam = ans.physical_exam || [];
  if (exam.indexOf("friction_rub") >= 0) {
    scores.pericarditis += 7;
  }
  if (exam.indexOf("unilateral_breath") >= 0) {
    scores.pneumothorax += 5; scores.pneumonia += 2;
    scores.pleuritis += 2;
  }
  if (exam.indexOf("hyperresonance") >= 0) {
    scores.pneumothorax += 5;
  }
  if (exam.indexOf("crackles") >= 0) {
    scores.pneumonia += 4; scores.acs += 1;
  }
  if (exam.indexOf("jvd") >= 0) {
    scores.pericarditis += 3; scores.pneumothorax += 2;
    scores.pe += 2; scores.acs += 1;
  }
  if (exam.indexOf("muffled_heart") >= 0) {
    scores.pericarditis += 5;
  }
  if (exam.indexOf("new_murmur") >= 0) {
    scores.acs += 3; scores.aas += 2;
  }
  if (exam.indexOf("leg_swelling") >= 0) {
    scores.pe += 5;
  }
  if (exam.indexOf("subcutaneous_emphysema") >= 0) {
    scores.esophageal_rupture += 7; scores.pneumothorax += 3;
  }
  if (exam.indexOf("neuro_deficit") >= 0) {
    scores.aas += 5;
  }
  if (exam.indexOf("vesicular_rash") >= 0) {
    scores.herpes_zoster += 8;
  }
  if (exam.indexOf("none_exam") >= 0) {
    scores.msk += 1; scores.gerd += 1;
    scores.panic += 1;
  }

  // --- Step 6: 随伴症状 ---
  var assoc = ans.associated || [];
  if (assoc.indexOf("cold_sweat") >= 0) {
    scores.acs += 4; scores.aas += 2;
  }
  if (assoc.indexOf("nausea_vomit") >= 0) {
    scores.acs += 2; scores.aas += 1;
    scores.esophageal_rupture += 1;
  }
  if (assoc.indexOf("dyspnea") >= 0) {
    scores.pe += 3; scores.acs += 2; scores.pneumothorax += 2;
    scores.pneumonia += 2; scores.pericarditis += 1;
  }
  if (assoc.indexOf("syncope") >= 0) {
    scores.pe += 3; scores.aas += 3; scores.arrhythmia += 3;
    scores.acs += 2; scores.pericarditis += 1;
  }
  if (assoc.indexOf("palpitation") >= 0) {
    scores.arrhythmia += 5; scores.panic += 2;
  }
  if (assoc.indexOf("hemoptysis") >= 0) {
    scores.pe += 4;
  }
  if (assoc.indexOf("cough_sputum") >= 0) {
    scores.pneumonia += 4; scores.pleuritis += 1;
  }
  if (assoc.indexOf("fever_symptom") >= 0) {
    scores.pneumonia += 3; scores.pericarditis += 2;
    scores.myocarditis += 2; scores.pleuritis += 2;
  }
  if (assoc.indexOf("prior_infection") >= 0) {
    scores.pericarditis += 4; scores.myocarditis += 5;
  }
  if (assoc.indexOf("post_vomiting") >= 0) {
    scores.esophageal_rupture += 8;
  }
  if (assoc.indexOf("heartburn") >= 0) {
    scores.gerd += 5;
  }
  if (assoc.indexOf("numbness") >= 0) {
    scores.panic += 3;
  }
  if (assoc.indexOf("anxiety") >= 0) {
    scores.panic += 3;
  }

  // --- Step 7: 背景因子 ---
  var bg = ans.background || [];
  if (bg.indexOf("cad_risk") >= 0) {
    scores.acs += 3; scores.aas += 1;
  }
  if (bg.indexOf("known_cad") >= 0) {
    scores.acs += 5;
  }
  if (bg.indexOf("vte_risk") >= 0) {
    scores.pe += 4;
  }
  if (bg.indexOf("dvt_pe_hx") >= 0) {
    scores.pe += 5;
  }
  if (bg.indexOf("aortic_disease") >= 0) {
    scores.aas += 5;
  }
  if (bg.indexOf("connective_tissue") >= 0) {
    scores.aas += 4;
  }
  if (bg.indexOf("recent_aortic_proc") >= 0) {
    scores.aas += 4;
  }
  if (bg.indexOf("immunosuppressed") >= 0) {
    scores.pneumonia += 2; scores.herpes_zoster += 2;
  }
  if (bg.indexOf("gerd_history") >= 0) {
    scores.gerd += 5;
  }
  if (bg.indexOf("psychiatric_hx") >= 0) {
    scores.panic += 4;
  }
  if (bg.indexOf("young_thin_male") >= 0) {
    scores.pneumothorax += 3;
  }
  if (bg.indexOf("lung_disease") >= 0) {
    scores.pneumothorax += 2; scores.pneumonia += 1;
  }
  if (bg.indexOf("cocaine_stimulant") >= 0) {
    scores.acs += 4; scores.aas += 2;
  }

  return scores;
}

// ===== UI描画 =====
var appEl = document.getElementById("app");
var currentStep = 0;
var answers = {};

function render() {
  var html = "";

  // アルゴリズム説明
  html += '<div class="algo-note">';
  html += '<strong>使い方：</strong>各ステップの質問に順番に回答してください。すべてのステップ完了後に鑑別診断の候補が優先順位付きで表示されます。<br>';
  html += '<strong>原則：</strong>どの分岐に見えても、<strong>ACSの評価はECGとトロポニンで並走</strong>させる。痛みの質だけでACSを否定しない。';
  html += '<br><small>（AHA/ACC Chest Pain GL 2021; AHA/ACC PE GL 2026; ACC/AHA Aortic GL 2022; ESC Pericardial GL 2015 準拠）</small>';
  html += '</div>';

  // 各ステップ
  for (var i = 0; i < STEPS.length; i++) {
    var step = STEPS[i];
    var isActive = i === currentStep;
    var isDone = i < currentStep;
    var cls = isDone ? "completed" : (isActive ? "" : "inactive");

    html += '<div class="step-card ' + cls + '" id="step-' + i + '">';
    html += '<div class="step-header">';
    html += '<span class="step-number ' + (isDone ? 'done' : '') + '">' + (isDone ? '✓' : (i + 1)) + '</span>';
    html += '<span class="step-title">' + step.title + '</span>';
    html += '</div>';

    if (isActive || isDone) {
      html += '<div class="step-body">';
      html += '<p style="font-weight:600;margin-bottom:4px;">' + step.question + '</p>';
      if (step.hint) html += '<p class="hint">' + step.hint + '</p>';

      if (step.type === "single") {
        html += '<div class="option-group">';
        for (var j = 0; j < step.options.length; j++) {
          var opt = step.options[j];
          var selected = answers[step.id] === opt.value;
          html += '<button class="option-btn ' + (selected ? 'selected' : '') + '"';
          html += ' onclick="selectSingle(\'' + step.id + '\', \'' + opt.value + '\', ' + i + ')"';
          if (isDone && !isActive) html += ' disabled';
          html += '>';
          html += '<span class="icon">' + (opt.icon || '') + '</span>' + opt.label;
          html += '</button>';
        }
        html += '</div>';
      } else {
        html += '<div class="checklist">';
        var currentAnswers = answers[step.id] || [];
        for (var j = 0; j < step.options.length; j++) {
          var opt = step.options[j];
          var checked = currentAnswers.indexOf(opt.value) >= 0;
          html += '<div class="check-item" onclick="toggleCheck(\'' + step.id + '\', \'' + opt.value + '\', this)">';
          html += '<input type="checkbox" ' + (checked ? 'checked' : '') + (isDone && !isActive ? ' disabled' : '') + '>';
          html += '<label>' + opt.label + '</label>';
          html += '</div>';
        }
        html += '</div>';
        if (isActive) {
          html += '<button class="next-btn" onclick="nextStep(' + i + ')">次へ ▶</button>';
        }
      }
      html += '</div>';
    }
    html += '</div>';
  }

  // 結果パネル
  if (currentStep >= STEPS.length) {
    html += renderResults();
  }

  // リセットボタン
  if (currentStep > 0) {
    html += '<button class="reset-btn" onclick="resetAll()">🔄 最初からやり直す</button>';
  }

  appEl.innerHTML = html;

  // 結果表示後スクロール
  if (currentStep >= STEPS.length) {
    setTimeout(function() {
      var panel = document.querySelector('.result-panel');
      if (panel) panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }
}

function selectSingle(stepId, value, stepIndex) {
  answers[stepId] = value;
  currentStep = stepIndex + 1;
  render();
  scrollToStep(currentStep);
}

function toggleCheck(stepId, value, el) {
  if (!answers[stepId]) answers[stepId] = [];
  var arr = answers[stepId];
  var idx = arr.indexOf(value);
  if (idx >= 0) { arr.splice(idx, 1); } else { arr.push(value); }
  var cb = el.querySelector('input[type="checkbox"]');
  if (cb) cb.checked = idx < 0;
}

function nextStep(stepIndex) {
  currentStep = stepIndex + 1;
  render();
  scrollToStep(currentStep);
}

function scrollToStep(idx) {
  setTimeout(function() {
    var el = document.getElementById("step-" + idx) || document.querySelector('.result-panel');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function resetAll() {
  var keys = Object.keys(answers);
  for (var i = 0; i < keys.length; i++) { delete answers[keys[i]]; }
  currentStep = 0;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== 結果描画 =====
function renderResults() {
  var scores = calcScores(answers);
  var entries = [];
  var keys = Object.keys(scores);
  for (var i = 0; i < keys.length; i++) {
    entries.push([keys[i], scores[keys[i]]]);
  }
  entries.sort(function(a, b) { return b[1] - a[1]; });

  var maxScore = entries.length > 0 ? entries[0][1] : 1;
  if (maxScore < 1) maxScore = 1;

  var html = '<div class="result-panel">';
  html += '<h2>📋 鑑別診断の結果</h2>';

  // --- 不安定アラート ---
  if (answers.stability === "unstable") {
    html += '<div class="alert-box alert-red">';
    html += '<strong>🚨 不安定：安定化しながら並列除外を進める</strong><br>';
    html += '・<strong>ACS / 高リスクPE / AAS / 緊張性気胸 / 心タンポナーデ</strong>を同時進行で考える<br>';
    html += '・ECG + 高感度トロポニン + 胸部X線 + ベッドサイドPOCUSを並行<br>';
    html += '・ショック＋JVD → PE/気胸/タンポナーデ、ショック＋ST変化 → ACS';
    html += '</div>';
  }

  // --- AAS高疑いアラート ---
  if (scores.aas >= 10) {
    html += '<div class="alert-box alert-red">';
    html += '<strong>🔴 急性大動脈症候群 高疑い</strong><br>';
    html += '突然発症の最大時激痛＋血圧/脈拍左右差＋神経脱落 → <strong>大動脈造影CTを最優先</strong><br>';
    html += 'D-dimerは低疑い例でのみ補助的に使用可（ADD-RS ≤1 かつ D-dimer &lt;500 → failure rate 0.3%）';
    html += '</div>';
  }

  // --- PE検査戦略 ---
  if (scores.pe >= 8) {
    html += '<div class="alert-box alert-yellow">';
    html += '<strong>⚠️ 肺塞栓の検査戦略</strong><br>';
    html += '前確率評価を先に行う：<br>';
    html += '・<strong>PERC 8項目全陰性</strong>（低疑い＋他の診断も十分あり得る場合のみ）→ PE検査省略可<br>';
    html += '・<strong>Wells ≤4（PE unlikely）</strong> → 年齢補正D-dimer → 陰性ならPE後退<br>';
    html += '・<strong>Wells &gt;4（PE likely）</strong> → CTPAへ直接進む';
    html += '</div>';
  }

  // --- 心膜炎診断基準 ---
  if (scores.pericarditis >= 8) {
    html += '<div class="alert-box alert-blue">';
    html += '<strong>📋 急性心膜炎の診断基準</strong><br>';
    html += '以下の<strong>4項目中2項目以上</strong>で診断：<br>';
    html += '① 典型的な胸膜性胸痛（前屈で軽快、臥位で悪化）<br>';
    html += '② 心膜摩擦音<br>';
    html += '③ ECG変化（びまん性ST上昇 and/or PR低下）<br>';
    html += '④ 新規または増悪する心嚢液貯留';
    html += '</div>';
  }

  // --- 並列除外6疾患 ---
  html += '<div class="section-title">🚨 並列除外すべき6疾患</div>';
  html += '<div class="alert-box" style="background:#FFF5F5;border:1px solid #E74C3C;">';
  html += '<strong>急性胸痛で常に除外を意識する6疾患</strong>：<br>';
  html += '① <strong>ACS</strong> — ECG + トロポニン再検で並走<br>';
  html += '② <strong>PE</strong> — 前確率評価 → D-dimer / CTPA<br>';
  html += '③ <strong>AAS</strong> — ADD-RS → 高疑いなら大動脈CT<br>';
  html += '④ <strong>急性心膜炎</strong> — 4項目中2項目以上<br>';
  html += '⑤ <strong>気胸</strong> — 胸部X線 / エコー<br>';
  html += '⑥ <strong>肺炎</strong> — 画像上の浸潤影が鍵';
  html += '</div>';

  // --- 疾患カード ---
  html += '<div class="section-title">🔍 鑑別候補（スコア順）</div>';
  var shown = 0;
  for (var i = 0; i < entries.length; i++) {
    var id = entries[i][0];
    var score = entries[i][1];
    if (score <= 0) continue;

    var d = DISEASES[id];
    var level = getProbLevel(score, maxScore);
    var catLabel = getCatLabel(d.category);
    var catClass = "cat-" + d.category;

    html += '<div class="disease-card ' + level + '">';
    html += '<div class="disease-header">';
    html += '<span class="disease-name">' + d.emoji + ' ' + d.name + '</span>';
    html += '<span class="badge ' + level + '">';
    html += level === "high" ? "可能性 高" : (level === "medium" ? "可能性 中" : "可能性 低");
    html += '</span>';
    html += '</div>';
    html += '<span class="cat-tag ' + catClass + '">' + catLabel + '</span>';
    html += '<div class="disease-detail">' + d.detail + '</div>';
    html += '<div class="workup-line">🔍 追加検査: ' + d.workup + '</div>';
    html += '</div>';
    shown++;
  }

  if (shown === 0) {
    html += '<p style="color:var(--gray);text-align:center;padding:16px;">スコアが0以上の疾患はありませんでした。入力を見直してください。</p>';
  }

  // --- 判断ルール早見表 ---
  html += '<div class="section-title">📊 すぐ使う判断ルール</div>';

  // Wells PE
  html += '<table class="ref-table">';
  html += '<tr><th colspan="2">Wells PE Score（2-level）</th></tr>';
  html += '<tr><td>DVTを示唆する所見</td><td><strong>3点</strong></td></tr>';
  html += '<tr><td>PE以外の診断が考えにくい</td><td><strong>3点</strong></td></tr>';
  html += '<tr><td>心拍数 &gt;100/分</td><td><strong>1.5点</strong></td></tr>';
  html += '<tr><td>3日超の不動化 or 4週以内の手術</td><td><strong>1.5点</strong></td></tr>';
  html += '<tr><td>DVT/PE既往</td><td><strong>1.5点</strong></td></tr>';
  html += '<tr><td>喀血</td><td><strong>1点</strong></td></tr>';
  html += '<tr><td>悪性腫瘍</td><td><strong>1点</strong></td></tr>';
  html += '<tr><td colspan="2"><strong>&gt;4点：PE likely → CTPA</strong> / <strong>≤4点：unlikely → D-dimer</strong></td></tr>';
  html += '</table>';

  // ADD-RS
  html += '<table class="ref-table" style="margin-top:12px;">';
  html += '<tr><th colspan="2">ADD-RS（大動脈解離）</th></tr>';
  html += '<tr><td>高リスク素因（Marfan/大動脈弁疾患/既知の瘤/家族歴/最近の大動脈操作）</td><td><strong>1点</strong></td></tr>';
  html += '<tr><td>高リスク疼痛（突然発症、強い痛み、ripping/tearing）</td><td><strong>1点</strong></td></tr>';
  html += '<tr><td>高リスク所見（脈拍/血圧左右差、灌流障害、神経脱落、新規AR雑音、低血圧）</td><td><strong>1点</strong></td></tr>';
  html += '<tr><td colspan="2"><strong>≥2点 → 大動脈CT</strong> / <strong>≤1 かつ D-dimer &lt;500 → failure rate 0.3%</strong></td></tr>';
  html += '</table>';

  // --- 落とし穴 ---
  html += '<div class="pitfall-box">';
  html += '<strong>⚠️ 見逃しやすいポイント</strong><br>';
  html += '・<strong>「胸膜性痛 ＝ 良性」ではない</strong> — まずPEを考え、同時にACSも切らない<br>';
  html += '・<strong>痛みの質だけでACSを否定しない</strong> — 鋭い痛み、圧痛、呼吸で変動する痛みでもACSは除外不可<br>';
  html += '・<strong>神経症状＋胸背部痛＋血圧差</strong> → AASを強く考える<br>';
  html += '・<strong>心膜炎で胸部X線が正常</strong>はあり得る → ECGと心エコーが重要<br>';
  html += '・<strong>発熱＋胸膜性痛 ≠ 肺炎確定</strong> — 画像上の浸潤影が鍵<br>';
  html += '・<strong>「不安だから過換気」と安易に判断しない</strong> — PEやACSでも不安感は伴う';
  html += '</div>';

  html += '</div>';
  return html;
}

function getProbLevel(score, maxScore) {
  if (score >= maxScore * 0.7 && score >= 4) return "high";
  if (score >= maxScore * 0.4 && score >= 2) return "medium";
  return "low";
}

function getCatLabel(cat) {
  if (cat === "cardiac") return "心臓";
  if (cat === "vascular") return "血管";
  if (cat === "pulm") return "肺・胸膜";
  if (cat === "gi") return "消化器";
  if (cat === "msk") return "筋骨格";
  if (cat === "other") return "その他";
  return cat;
}

// 初期描画
render();
</script>
</body>
</html>
