function calcScores(answers) {
  var s = {};
  Object.keys(DISEASES).forEach(function(k) { s[k] = 0; });

  // --- Step 1: 発症様式 ---
  var onset = answers.onset;
  if (onset === "acute") {
    s.gbs += 7; s.vasculitic += 3;

    s.paraneoplastic += 4; s.cidp += 3; s.vasculitic += 3;
    s.b12_deficiency += 2; s.drug_chemo += 2;
  } else if (onset === "chronic") {
    s.diabetic += 4; s.alcoholic += 3; s.cmt += 5; s.attrv += 3;
    s.cidp += 2; s.uremic += 3; s.thyroid += 2;
    s.poems += 2; s.amyloidosis += 3; s.idiopathic += 3;
  } else if (onset === "relapsing") {
    s.cidp += 6; s.gbs += 2;

  // --- Step 2: 分布パターン ---
  var pat = answers.pattern;
  if (pat === "symmetric_distal") {
    s.diabetic += 4; s.alcoholic += 3; s.b12_deficiency += 3; s.b1_deficiency += 3;
    s.uremic += 3; s.drug_chemo += 3; s.drug_other += 3; s.cmt += 3;
    s.hiv += 2; s.thyroid += 2; s.idiopathic += 3;
  } else if (pat === "symmetric_diffuse") {
    s.cidp += 4; s.gbs += 4; s.poems += 3;
  } else if (pat === "asymmetric") {
    s.vasculitic += 7; s.hcv += 3; s.toxic_exposure += 2;
  } else if (pat === "non_length") {
    s.paraneoplastic += 5; s.sjogren += 4; s.cidp += 3;
  }

  // --- Step 3: NCS所見 ---
  var ncs = answers.ncs;
  if (ncs === "axonal") {
    s.diabetic += 4; s.alcoholic += 3; s.b12_deficiency += 3; s.b1_deficiency += 3;
    s.uremic += 3; s.drug_chemo += 3; s.drug_other += 3; s.vasculitic += 3;
    s.hiv += 2; s.paraneoplastic += 3; s.toxic_exposure += 3;
    s.idiopathic += 2;
  } else if (ncs === "demyelinating") {
    s.cidp += 6; s.gbs += 5; s.cmt += 3; s.poems += 4;
  } else if (ncs === "mixed") {
    s.cidp += 3; s.vasculitic += 2; s.amyloidosis += 2; s.attrv += 2;
  } else if (ncs === "normal") {
    s.sarcoidosis += 3; s.sjogren += 2; s.attrv += 2; s.amyloidosis += 2;
  }

  // --- Step 4: 障害様式 ---
  var mod = answers.modality;
  if (mod === "sensory") {
    s.diabetic += 3; s.b12_deficiency += 3; s.drug_chemo += 3;
    s.paraneoplastic += 3; s.sjogren += 3; s.idiopathic += 2;
  } else if (mod === "motor") {
    s.cidp += 4; s.gbs += 4; s.cmt += 3; s.toxic_exposure += 2;
  } else if (mod === "sensorimotor") {
    s.cidp += 2; s.alcoholic += 2; s.vasculitic += 2; s.poems += 2;
    s.cmt += 2; s.amyloidosis += 2;
  } else if (mod === "autonomic") {
    s.diabetic += 4; s.amyloidosis += 6; s.attrv += 6; s.gbs += 2;
  }

  // --- Step 5: 随伴症状 ---
  var sx = answers.symptoms || [];
  sx.forEach(function(v) {
    if (v === "pain") {
      s.diabetic += 3; s.alcoholic += 3; s.vasculitic += 3;
      s.amyloidosis += 3; s.sarcoidosis += 2;
    }
    if (v === "sensory_ataxia") {
      s.b12_deficiency += 5; s.paraneoplastic += 5; s.sjogren += 4;
      s.copper_deficiency += 3; s.cidp += 2;
    }
    if (v === "autonomic") {
      s.diabetic += 4; s.amyloidosis += 5; s.attrv += 5; s.gbs += 2;
    }
    if (v === "cranial") {
      s.gbs += 4; s.sarcoidosis += 4;
    }
    if (v === "deformity") {
      s.cmt += 7;
    }
    if (v === "skin") {
      s.poems += 4; s.vasculitic += 3; s.sarcoidosis += 2;

      s.poems += 4; s.amyloidosis += 3; s.sarcoidosis += 2;

  var hx = answers.history || [];
  hx.forEach(function(v) {
    if (v === "diabetes") { s.diabetic += 6; }

    if (v === "renal_impairment") { s.uremic += 5; }
    if (v === "tsh_abnormal") { s.thyroid += 6; }
    if (v === "m_protein") { s.poems += 5; s.amyloidosis += 4; }
    if (v === "anca_inflammation") { s.vasculitic += 7; }
    if (v === "ssa_ssb") { s.sjogren += 6; }
    if (v === "csf_protein") { s.cidp += 5; s.gbs += 4; s.poems += 3; }
    if (v === "viral_positive") { s.hiv += 4; s.hcv += 4; }
    if (v === "vegf") { s.poems += 7; }
    if (v === "copper_low") { s.copper_deficiency += 7; }
    if (v === "sarcoid_marker") { s.sarcoidosis += 5; }
    if (v === "paraneoplastic_ab") { s.paraneoplastic += 8; }
    if (v === "high_mcv") { s.b12_deficiency += 4; s.folate_deficiency += 4; s.alcoholic += 2; }
  });

  return s;

  return Object.entries(scores)
    .map(function(e) { return { key: e[0], score: e[1], name: DISEASES[e[0]].name, emoji: DISEASES[e[0]].emoji, category: DISEASES[e[0]].category, detail: DISEASES[e[0]].detail, workup: DISEASES[e[0]].workup }; })
    .filter(function(d) { return d.score > 0; })
    .sort(function(a, b) { return b.score - a.score; });
}

function getProbLevel(score, maxScore) {
  var ratio = score / Math.max(maxScore, 1);
  if (ratio >= 0.7) return { level: "high", label: "可能性 高" };
  if (ratio >= 0.35) return { level: "medium", label: "可能性 中" };
  return { level: "low", label: "可能性 低" };
}

// ===== 推奨検査リスト生成 =====
function generateWorkupList(answers, ranked) {
  var tests = [];
  // 全例推奨
  tests.push({ cat: "全例必須", icon: "🔬", text: "血糖・HbA1c（糖尿病スクリーニング）" });
  tests.push({ cat: "全例必須", icon: "🔬", text: "BUN・Cr・eGFR（腎機能）" });
  tests.push({ cat: "全例必須", icon: "🔬", text: "TSH・FT4（甲状腺機能）" });
  tests.push({ cat: "全例必須", icon: "🔬", text: "ビタミンB1・B12・葉酸" });
  tests.push({ cat: "全例必須", icon: "🔬", text: "血清免疫固定電気泳動（M蛋白スクリーニング）" });
  tests.push({ cat: "全例必須", icon: "🔬", text: "HIV・HBV・HCV抗体" });
  tests.push({ cat: "全例必須", icon: "🔬", text: "CBC・MCV、肝機能、電解質" });
  tests.push({ cat: "全例必須", icon: "⚡", text: "神経伝導検査（NCS）・針筋電図（EMG）" });

  // 条件に応じた追加検査
  var topKeys = ranked.slice(0, 5).map(function(d) { return d.key; });
  var allSx = answers.symptoms || [];
  var allHx = answers.history || [];
  var allLabs = answers.labs || [];

  if (topKeys.indexOf("cidp") >= 0 || topKeys.indexOf("gbs") >= 0) {
    tests.push({ cat: "免疫性疑い", icon: "💉", text: "髄液検査（蛋白細胞解離）" });
  }
  if (topKeys.indexOf("cidp") >= 0) {
    tests.push({ cat: "CIDP疑い", icon: "🖼️", text: "MRI神経根（肥厚・造影増強）" });
    tests.push({ cat: "CIDP疑い", icon: "🧪", text: "抗NF155/CNTN1/Caspr1抗体" });
  }
  if (topKeys.indexOf("gbs") >= 0) {
    tests.push({ cat: "GBS疑い", icon: "🫁", text: "呼吸機能モニタリング（FVC）" });
    tests.push({ cat: "GBS疑い", icon: "🧪", text: "抗ガングリオシド抗体（GM1/GQ1b等）" });
  }
  if (topKeys.indexOf("vasculitic") >= 0) {
    tests.push({ cat: "血管炎疑い", icon: "🧪", text: "ANCA（MPO/PR3）、補体（C3/C4）" });
    tests.push({ cat: "血管炎疑い", icon: "🩹", text: "神経生検（血管炎所見の確認）" });
    tests.push({ cat: "血管炎疑い", icon: "🔬", text: "腎機能・尿沈渣、CRP・ESR" });
  }
  if (topKeys.indexOf("poems") >= 0) {
    tests.push({ cat: "POEMS疑い", icon: "🧪", text: "VEGF測定" });
    tests.push({ cat: "POEMS疑い", icon: "🖼️", text: "全身CT/PET-CT（硬化性骨病変）" });
  }
  if (topKeys.indexOf("amyloidosis") >= 0 || topKeys.indexOf("attrv") >= 0) {
    tests.push({ cat: "アミロイドーシス疑い", icon: "🧬", text: "TTR遺伝子検査" });
    tests.push({ cat: "アミロイドーシス疑い", icon: "🩹", text: "組織生検（腹壁脂肪・唾液腺等）" });
    tests.push({ cat: "アミロイドーシス疑い", icon: "🫀", text: "心エコー・BNP・トロポニン" });
    tests.push({ cat: "アミロイドーシス疑い", icon: "🧪", text: "血清遊離軽鎖（AL型鑑別）" });
  }
  if (topKeys.indexOf("paraneoplastic") >= 0) {
    tests.push({ cat: "傍腫瘍疑い", icon: "🧪", text: "傍腫瘍抗体パネル（抗Hu/CV2等）" });
    tests.push({ cat: "傍腫瘍疑い", icon: "🖼️", text: "全身CT/PET-CT（腫瘍検索）" });
  }
  if (topKeys.indexOf("sjogren") >= 0) {
    tests.push({ cat: "Sjogren疑い", icon: "🧪", text: "抗SS-A/SS-B抗体、抗核抗体" });
    tests.push({ cat: "Sjogren疑い", icon: "🔬", text: "Schirmer試験、唾液腺生検" });
  }
  if (topKeys.indexOf("sarcoidosis") >= 0) {
    tests.push({ cat: "サルコイドーシス疑い", icon: "🧪", text: "ACE・sIL-2R・リゾチーム" });
    tests.push({ cat: "サルコイドーシス疑い", icon: "🖼️", text: "胸部CT（BHL）、Gaシンチ/FDG-PET" });
  }
  if (topKeys.indexOf("cmt") >= 0) {
    tests.push({ cat: "遺伝性疑い", icon: "🧬", text: "遺伝子検査（PMP22重複:CMT1A等）" });
  }
  if (topKeys.indexOf("copper_deficiency") >= 0) {
    tests.push({ cat: "銅欠乏疑い", icon: "🧪", text: "血清銅・セルロプラスミン、血清亜鉛" });
  }
  if (topKeys.indexOf("toxic_exposure") >= 0 || allHx.indexOf("occupational") >= 0) {
    tests.push({ cat: "中毒疑い", icon: "⚠️", text: "血中鉛・尿中ヒ素・尿中水銀" });
  }
  if (allSx.indexOf("autonomic") >= 0 || answers.modality === "autonomic") {
    tests.push({ cat: "自律神経評価", icon: "🫀", text: "自律神経機能検査（心電図RR間隔変動・チルト試験・交感神経皮膚反応）" });
  }
  if (answers.ncs === "normal") {
    tests.push({ cat: "小径線維評価", icon: "🔬", text: "皮膚生検（表皮内神経線維密度: IENFD）" });
  }

  return tests;
}

// ===== UIレンダリング =====
var currentStep = 0;
var answers = {};

function render() {
  var app = document.getElementById("app");
  var html = "";

  html += '<div class="emergency-box">';
  html += '<strong>\u26a0\ufe0f 治療可能な原因を最優先で除外：</strong>';
  html += 'ビタミン欠乏（B1/B12）→ 補充で改善可。薬剤性 → 中止で改善可。';
  html += '<strong>CIDP</strong> → 免疫療法反応性。<strong>血管炎</strong> → 早期治療で進行防止。';
  html += '<strong>アミロイドーシス</strong>（心症状＋自律神経障害＋ニューロパチー）→ 早期専門施設紹介が予後を左右します。';
  html += '</div>';

  html += '<div class="algo-note">';
  html += '<strong>\u{1f4a1} 診断アルゴリズム:</strong> ';
  html += '発症様式 \u2192 分布パターン \u2192 NCS（軸索/脱髄） \u2192 障害様式 \u2192 随伴症状 \u2192 背景・既往歴 \u2192 検査所見 の7ステップで鑑別し、<strong>疾患候補に応じた必要検査リスト</strong>を自動生成します。<br>';
  html += '全検索で原因不明の場合も20-30%あり（特発性CIAP）、<strong>半年〜1年毎の再評価</strong>が重要です。';
  html += '</div>';

  STEPS.forEach(function(step, i) {
    var state = i < currentStep ? "completed" : i === currentStep ? "" : "inactive";
    var numClass = i < currentStep ? "done" : "";
    html += '<div class="step-card ' + state + '" id="step-' + i + '">';
    html += '<div class="step-header">';
    html += '<span class="step-number ' + numClass + '">' + (i < currentStep ? "\u2713" : i + 1) + '</span>';
    html += '<span class="step-title">' + step.title + '</span>';
    html += '</div>';

    if (i <= currentStep) {
      html += '<div class="step-body">';
      html += '<p style="font-weight:600; margin-bottom:4px;">' + step.question + '</p>';
      if (step.hint) html += '<p class="hint">' + step.hint + '</p>';

      if (step.type === "single") {
        html += '<div class="option-group">';
        step.options.forEach(function(opt) {
          var sel = answers[step.id] === opt.value ? "selected" : "";
          html += '<button class="option-btn ' + sel + '" onclick="selectOption(\'' + step.id + '\', \'' + opt.value + '\', ' + i + ')">';
          html += '<span class="icon">' + opt.icon + '</span> ' + opt.label;
          html += '</button>';
        });
        html += '</div>';
      } else {
        html += '<div class="checklist">';
        var checked = answers[step.id] || [];
        step.options.forEach(function(opt) {
          var isChecked = checked.indexOf(opt.value) >= 0;
          html += '<div class="check-item" onclick="toggleCheck(\'' + step.id + '\', \'' + opt.value + '\')">';
          html += '<input type="checkbox" ' + (isChecked ? "checked" : "") + ' tabindex="-1">';
          html += '<label>' + opt.label + '</label>';
          html += '</div>';
        });
        html += '</div>';
        if (i === currentStep) {
          html += '<button class="next-btn" onclick="nextStep(' + i + ')">次へ \u25b6</button>';
        }
      }
      html += '</div>';
    }
    html += '</div>';
  });

  // 結果表示
  if (currentStep >= STEPS.length) {
    var scores = calcScores(answers);
    var ranked = rankDiseases(scores);
    var maxScore = ranked.length > 0 ? ranked[0].score : 1;
    var workupList = generateWorkupList(answers, ranked);

    // 推奨検査リスト
    html += '<div class="workup-section">';
    html += '<h3>\u{1f4cb} この患者に推奨される検査リスト</h3>';
    html += '<ul class="workup-list">';
    workupList.forEach(function(t) {
      html += '<li><span class="wk-icon">' + t.icon + '</span>';
      html += '<span><span class="wk-cat">' + t.cat + '</span> ' + t.text + '</span>';
      html += '</li>';
    });
    html += '</ul>';
    html += '</div>';

    // 鑑別診断結果
    html += '<div class="result-panel show">';
    html += '<div class="result-header">\u{1f4cb} 鑑別診断結果</div>';
    html += '<div class="result-body">';

    if (ranked.length === 0) {
      html += '<p>該当する疾患が見つかりませんでした。入力内容を確認してください。</p>';
    } else {
      ranked.forEach(function(d) {
        var prob = getProbLevel(d.score, maxScore);
        html += '<div class="dx-card ' + prob.level + '">';
        html += '<div class="dx-name">' + d.emoji + ' ' + d.name;
        html += ' <span class="prob-badge">' + prob.label + '</span>';
        html += ' <span style="font-size:0.78em; color:var(--gray); font-weight:400;">(' + d.category + ')</span>';
        html += '</div>';
        html += '<div class="dx-detail">' + d.detail + '</div>';
        html += '<div class="dx-workup">\u{1f50d} <strong>推奨検査:</strong> ' + d.workup + '</div>';
        html += '</div>';
      });
    }

    html += '</div></div>';
    html += '<button class="reset-btn" onclick="resetAll()">最初からやり直す</button>';
  }

  app.innerHTML = html;

  if (currentStep > 0 && currentStep <= STEPS.length) {
    var targetId = currentStep < STEPS.length ? "step-" + currentStep : "step-" + (STEPS.length - 1);
    var el = document.getElementById(targetId);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
  }
}

function selectOption(stepId, value, stepIndex) {
  answers[stepId] = value;
  currentStep = stepIndex + 1;
  render();
}

function toggleCheck(stepId, value) {
  if (!answers[stepId]) answers[stepId] = [];
  var idx = answers[stepId].indexOf(value);
  if (value === "none" || value === "unknown") {
    answers[stepId] = [value];
  } else {
    var noneIdx = answers[stepId].indexOf("none");
    if (noneIdx >= 0) answers[stepId].splice(noneIdx, 1);
    var unkIdx = answers[stepId].indexOf("unknown");
    if (unkIdx >= 0) answers[stepId].splice(unkIdx, 1);
    if (idx >= 0) {
      answers[stepId].splice(idx, 1);
    } else {
      answers[stepId].push(value);
    }
  }
  render();
}

function nextStep(stepIndex) {
  currentStep = stepIndex + 1;
  render();
}

function resetAll() {
  currentStep = 0;
  answers = {};
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

render();
</script>
