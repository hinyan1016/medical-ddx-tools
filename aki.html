<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1B3A5C">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>急性腎障害（AKI）鑑別診断ツール</title>
<style>
  :root {
    --navy: #1B3A5C;
    --blue: #2C5AA0;
    --light-blue: #E8F0FE;
    --red: #DC3545;
    --yellow: #F5C518;
    --green: #28A745;
    --orange: #E8850C;
    --gray: #6C757D;
    --light-gray: #F4F6F8;
    --white: #FFFFFF;
    --shadow: 0 2px 8px rgba(27,58,92,0.10);
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "游ゴシック", "Yu Gothic", "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #E8F0FE 0%, #F4F6F8 100%);
    color: #222;
    min-height: 100vh;
    padding: 0 0 40px;
  }
  header {
    background: linear-gradient(135deg, var(--navy), var(--blue));
    color: var(--white);
    padding: 28px 20px 22px;
    text-align: center;
    box-shadow: 0 4px 16px rgba(27,58,92,0.18);
  }
  header h1 { font-size: 1.7em; font-weight: 700; letter-spacing: 0.04em; }
  header p { font-size: 0.92em; margin-top: 6px; opacity: 0.85; }

  .container { max-width: 820px; margin: 0 auto; padding: 24px 16px; }

  .step-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 18px;
    overflow: hidden;
    transition: opacity 0.3s;
  }
  .step-card.inactive { opacity: 0.45; pointer-events: none; }
  .step-card.completed { opacity: 1; }
  .step-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    background: var(--light-blue);
    border-bottom: 2px solid var(--blue);
    cursor: pointer;
  }
  .step-number {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--blue);
    color: var(--white);
    font-weight: 700;
    font-size: 0.95em;
    flex-shrink: 0;
  }
  .step-number.done { background: var(--green); }
  .step-title { font-weight: 700; font-size: 1.05em; color: var(--navy); }
  .step-body { padding: 18px; }

  .option-group { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
  .option-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border: 2px solid #D0D8E4;
    border-radius: 8px;
    background: var(--white);
    font-size: 0.97em;
    cursor: pointer;
    transition: all 0.18s;
    text-align: left;
    color: #222;
    font-family: inherit;
    width: 100%;
  }
  .option-btn:hover { border-color: var(--blue); background: var(--light-blue); }
  .option-btn.selected {
    border-color: var(--blue);
    background: var(--light-blue);
    font-weight: 700;
  }
  .option-btn .icon { font-size: 1.2em; flex-shrink: 0; width: 24px; text-align: center; }

  .checklist { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .check-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 8px;
    background: var(--light-gray);
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
    font-size: 0.95em;
  }
  .check-item:hover { background: #E0E8F0; }
  .check-item input[type="checkbox"] {
    width: 18px; height: 18px;
    accent-color: var(--blue);
    flex-shrink: 0;
    cursor: pointer;
  }
  .check-item label { cursor: pointer; flex: 1; }

  .result-panel {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: 0 4px 20px rgba(27,58,92,0.15);
    overflow: hidden;
    margin-top: 24px;
    display: none;
  }
  .result-panel.show { display: block; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .result-header {
    padding: 16px 20px;
    background: linear-gradient(135deg, var(--navy), var(--blue));
    color: var(--white);
    font-weight: 700;
    font-size: 1.15em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .result-body { padding: 20px; }

  .dx-card {
    border: 2px solid transparent;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 12px;
    position: relative;
    transition: all 0.2s;
  }
  .dx-card.high { border-color: var(--red); background: #FFF5F5; }
  .dx-card.medium { border-color: var(--orange); background: #FFF8F0; }
  .dx-card.low { border-color: var(--gray); background: var(--light-gray); }

  .dx-card .dx-name {
    font-weight: 700;
    font-size: 1.08em;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .dx-card .prob-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 0.78em;
    font-weight: 700;
    color: var(--white);
  }
  .dx-card.high .prob-badge { background: var(--red); }
  .dx-card.medium .prob-badge { background: var(--orange); }
  .dx-card.low .prob-badge { background: var(--gray); }

  .dx-card .dx-detail { font-size: 0.9em; color: #444; line-height: 1.6; }
  .dx-card .dx-detail strong { color: var(--navy); }
  .dx-card .dx-workup {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed #ccc;
    font-size: 0.88em;
    color: var(--blue);
  }

  .next-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 14px;
    padding: 10px 22px;
    background: var(--blue);
    color: var(--white);
    border: none;
    border-radius: 8px;
    font-size: 0.95em;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    font-family: inherit;
  }
  .next-btn:hover { background: var(--navy); }
  .next-btn:disabled { background: #B0BEC5; cursor: not-allowed; }

  .reset-btn {
    display: block;
    margin: 24px auto 0;
    padding: 10px 32px;
    background: var(--white);
    color: var(--red);
    border: 2px solid var(--red);
    border-radius: 8px;
    font-size: 0.95em;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .reset-btn:hover { background: var(--red); color: var(--white); }

  .hint {
    font-size: 0.85em;
    color: var(--gray);
    margin-top: 6px;
    line-height: 1.5;
  }

  .divider { height: 1px; background: #D0D8E4; margin: 14px 0; }

  .algo-note {
    background: #FFFDE7;
    border-left: 4px solid var(--yellow);
    padding: 12px 16px;
    border-radius: 0 8px 8px 0;
    margin-bottom: 18px;
    font-size: 0.9em;
    line-height: 1.6;
    color: #555;
  }
  .algo-note strong { color: var(--navy); }

  .alert-box {
    background: #FFF3CD;
    border: 2px solid var(--orange);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 16px;
    font-size: 0.92em;
    line-height: 1.6;
  }
  .alert-box.danger {
    background: #F8D7DA;
    border-color: var(--red);
  }
  .alert-box .alert-title {
    font-weight: 700;
    color: var(--red);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .kdigo-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88em;
    margin: 12px 0;
  }
  .kdigo-table th, .kdigo-table td {
    border: 1px solid #D0D8E4;
    padding: 8px 10px;
    text-align: left;
  }
  .kdigo-table th {
    background: var(--light-blue);
    color: var(--navy);
    font-weight: 700;
  }
  .kdigo-table tr:nth-child(even) td { background: var(--light-gray); }

  .category-label {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 0.78em;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .cat-prerenal { background: #E3F2FD; color: #1565C0; }
  .cat-postrenal { background: #FFF3E0; color: #E65100; }
  .cat-renal { background: #FCE4EC; color: #C62828; }

  .summary-box {
    background: var(--light-blue);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 16px;
    font-size: 0.92em;
    line-height: 1.6;
  }
  .summary-box .summary-title {
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 6px;
  }

  .red-flag-box {
    background: #F8D7DA;
    border: 2px solid var(--red);
    border-radius: 8px;
    padding: 14px 16px;
    margin-top: 16px;
    font-size: 0.9em;
    line-height: 1.6;
  }
  .red-flag-box .rf-title {
    font-weight: 700;
    color: var(--red);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .red-flag-box ul { padding-left: 20px; margin-top: 4px; }
  .red-flag-box li { margin-bottom: 4px; }

  @media (max-width: 600px) {
    header h1 { font-size: 1.3em; }
    .step-body, .result-body { padding: 14px; }
    .dx-card { padding: 12px; }
  }
</style>
</head>
<body>

<header>
  <h1>急性腎障害（AKI）鑑別診断ツール</h1>
  <p>臨床所見・検査所見からAKIの原因を系統的に鑑別</p>
</header>

<div class="container" id="app"></div>

<script>
// ===== 疾患データ =====

    type: "single",
    options: [
      { label: "水腎症あり / 膀胱残尿増加", value: "obstruction_yes", icon: "🚫" },
      { label: "無尿（尿量ほぼゼロ）", value: "anuria", icon: "⛔" },
      { label: "閉塞なし（エコーで除外済み）", value: "obstruction_no", icon: "✅" },
      { label: "未評価", value: "not_assessed", icon: "🤔" },
    ]
  },
  {
    id: "hemodynamics",
    title: "循環動態の評価",
    question: "現在の循環動態はどうですか？",
    hint: "腎前性AKIの評価。バイタルサイン・身体所見・IVCエコーなどから判断",
    type: "single",
    options: [

      { label: "ショック・敗血症", value: "shock", icon: "🆘" },
      { label: "心不全徴候（浮腫・頸静脈怒張・起座呼吸）", value: "heart_failure", icon: "❤️" },
      { label: "肝硬変・腹水あり", value: "liver_cirrhosis", icon: "🫁" },

    question: "腎毒性のある薬剤・物質への暴露はありますか？（該当するものをすべて選択）",
    hint: "薬剤性AKIの除外。被疑薬の中止が治療の第一歩",
    type: "multi",
    options: [
      { label: "NSAIDs", value: "nsaids" },
      { label: "ACE阻害薬 / ARB", value: "raas" },

    ]
  },
  {
    id: "urinalysis",
    title: "尿検査所見",
    question: "尿検査の所見は？（該当するものをすべて選択）",

    type: "multi",
    options: [
      { label: "褐色顆粒円柱（muddy brown casts）", value: "muddy_brown" },
      { label: "赤血球円柱 / 変形赤血球", value: "rbc_cast" },
      { label: "白血球円柱 / 尿中好酸球", value: "wbc_cast" },
      { label: "尿潜血陽性だが沈渣の赤血球は少ない", value: "myoglobin" },
      { label: "蛋白尿（≧1g/日 or 尿蛋白/Cr比≧1）", value: "proteinuria" },
      { label: "尿中Na < 20 mEq/L（Na保持傾向）", value: "low_una" },
      { label: "尿中Na > 40 mEq/L（Na喪失傾向）", value: "high_una" },
      { label: "FENa < 1%", value: "low_fena" },

    question: "以下の臨床所見・病歴で該当するものは？",
    hint: "全身症状の有無はAKIの原因特定に重要",
    type: "multi",
    options: [
      { label: "発熱・皮疹・関節痛（アレルギー徴候）", value: "allergy" },
      { label: "溶血性貧血・血小板減少", value: "tma_signs" },
      { label: "横紋筋融解の既往・CK著増", value: "rhabdo" },
      { label: "血痰・呼吸不全（肺腎症候群）", value: "pulm_renal" },
      { label: "網状皮斑（livedo reticularis）/ blue toe", value: "cholesterol_embolism" },
      { label: "心房細動・カテーテル操作後", value: "embolism" },
      { label: "排尿困難・前立腺肥大の既往", value: "bph" },
      { label: "結石の既往・側腹部痛", value: "stone" },
      { label: "大量の飲酒・外傷・長時間の圧迫", value: "crush" },
      { label: "術後・ICU在室中", value: "postop" },
      { label: "好酸球増多", value: "eosinophilia" },
      { label: "該当なし", value: "none" },
    ]
  },

// ===== スコアリングロジック =====
function calcScores(answers) {
  const scores = {};
  Object.keys(DISEASES).forEach(k => scores[k] = 0);

  const a = {
    urgency: answers.urgency || [],
    obstruction: answers.obstruction,
    hemodynamics: answers.hemodynamics,
    nephrotoxin: answers.nephrotoxin || [],
    urinalysis: answers.urinalysis || [],
    clinical: answers.clinical || [],
  };

  // 腎後性
  if (a.obstruction === "obstruction_yes" || a.obstruction === "anuria") {
    if (a.clinical.includes("bph")) scores.bph += 5;
    else if (a.clinical.includes("stone")) scores.ureteral_obstruction += 5;
    else { scores.bph += 3; scores.ureteral_obstruction += 3; }
  }
  if (a.clinical.includes("bph")) scores.bph += 2;
  if (a.clinical.includes("stone")) scores.ureteral_obstruction += 2;

  // 腎前性 - 循環動態
  if (a.hemodynamics === "hypovolemia") { scores.dehydration += 4; scores.nsaids_raas += 2; }
  if (a.hemodynamics === "shock") { scores.sepsis += 4; scores.atn_ischemic += 2; scores.dehydration += 2; }
  if (a.hemodynamics === "heart_failure") { scores.heart_failure += 5; }
  if (a.hemodynamics === "liver_cirrhosis") { scores.hepatorenal += 5; }

  // 尿所見
  if (a.urinalysis.includes("low_una") || a.urinalysis.includes("low_fena")) {
    scores.dehydration += 3; scores.heart_failure += 2; scores.hepatorenal += 2; scores.nsaids_raas += 2;
  }
  if (a.urinalysis.includes("high_una") || a.urinalysis.includes("high_fena")) {
    scores.atn_ischemic += 2; scores.atn_nephrotoxic += 2; scores.ain += 2; scores.rpgn += 1;
  }
  if (a.urinalysis.includes("muddy_brown")) { scores.atn_ischemic += 4; scores.atn_nephrotoxic += 3; }
  if (a.urinalysis.includes("rbc_cast")) { scores.rpgn += 5; scores.tma += 1; }
  if (a.urinalysis.includes("wbc_cast")) { scores.ain += 4; }
  if (a.urinalysis.includes("myoglobin")) { scores.atn_nephrotoxic += 4; }
  if (a.urinalysis.includes("proteinuria")) { scores.rpgn += 3; scores.tma += 1; }

  // 腎毒性物質
  if (a.nephrotoxin.includes("nsaids")) { scores.nsaids_raas += 3; scores.ain += 1; }
  if (a.nephrotoxin.includes("raas")) { scores.nsaids_raas += 3; }
  if (a.nephrotoxin.includes("aminoglycoside")) { scores.atn_nephrotoxic += 4; }
  if (a.nephrotoxin.includes("contrast")) { scores.atn_nephrotoxic += 3; }
  if (a.nephrotoxin.includes("ppi_betalactam")) { scores.ain += 4; }
  if (a.nephrotoxin.includes("ici")) { scores.ain += 4; }
  if (a.nephrotoxin.includes("chemo")) { scores.atn_nephrotoxic += 3; }

  // 臨床所見
  if (a.clinical.includes("allergy")) { scores.ain += 3; }
  if (a.clinical.includes("tma_signs")) { scores.tma += 5; }
  if (a.clinical.includes("rhabdo") || a.clinical.includes("crush")) { scores.atn_nephrotoxic += 4; }
  if (a.clinical.includes("pulm_renal")) { scores.rpgn += 4; }
  if (a.clinical.includes("cholesterol_embolism")) { scores.renal_artery += 4; }
  if (a.clinical.includes("embolism")) { scores.renal_artery += 3; }
  if (a.clinical.includes("postop")) { scores.atn_ischemic += 2; scores.dehydration += 1; }
  if (a.clinical.includes("eosinophilia")) { scores.ain += 2; scores.renal_artery += 1; }

  return scores;
}

// ===== UI描画 =====
const app = document.getElementById("app");
let currentStep = 0;
const answers = {};

function render() {
  let html = "";

  // アルゴリズム説明
  html += `<div class="algo-note">
    <strong>使い方：</strong>各ステップの質問に順番に回答してください。すべてのステップ完了後に鑑別診断の候補が優先順位付きで表示されます。<br>
    <strong>参考基準：</strong>KDIGO AKI診断基準 — 48時間以内にCr≧0.3 mg/dL上昇、または7日以内にCr≧基礎値の1.5倍、または尿量<0.5 mL/kg/時が6時間以上持続。
  </div>`;

  // 各ステップ
  STEPS.forEach((step, i) => {
    const isActive = i === currentStep;
    const isDone = i < currentStep;
    const cls = isDone ? "completed" : (isActive ? "" : "inactive");

    html += `<div class="step-card ${cls}" id="step-${i}">`;
    html += `<div class="step-header">
      <span class="step-number ${isDone ? 'done' : ''}">${isDone ? '✓' : (i + 1)}</span>
      <span class="step-title">${step.title}</span>
    </div>`;

    if (isActive || isDone) {
      html += `<div class="step-body">`;
      html += `<p style="font-weight:600;margin-bottom:4px;">${step.question}</p>`;
      if (step.hint) html += `<p class="hint">${step.hint}</p>`;

      if (step.type === "single") {
        html += `<div class="option-group">`;
        step.options.forEach(opt => {
          const selected = answers[step.id] === opt.value;
          html += `<button class="option-btn ${selected ? 'selected' : ''}"
            onclick="selectSingle('${step.id}', '${opt.value}', ${i})" ${isDone && !isActive ? 'disabled' : ''}>
            <span class="icon">${opt.icon || ''}</span>${opt.label}
          </button>`;
        });
        html += `</div>`;
      } else {
        html += `<div class="checklist">`;
        const currentAnswers = answers[step.id] || [];
        step.options.forEach(opt => {
          const checked = currentAnswers.includes(opt.value);
          html += `<div class="check-item" onclick="toggleCheck('${step.id}', '${opt.value}', this)">
            <input type="checkbox" ${checked ? 'checked' : ''} ${isDone && !isActive ? 'disabled' : ''}>
            <label>${opt.label}</label>
          </div>`;
        });
        html += `</div>`;
        if (isActive) {
          html += `<button class="next-btn" onclick="nextStep(${i})">次へ ▶</button>`;
        }
      }
      html += `</div>`;
    }
    html += `</div>`;
  });

  // 結果パネル
  if (currentStep >= STEPS.length) {
    html += renderResults();
  }

  // リセットボタン
  if (currentStep > 0) {
    html += `<button class="reset-btn" onclick="resetAll()">🔄 最初からやり直す</button>`;
  }

  app.innerHTML = html;

  // 結果表示後スクロール
  if (currentStep >= STEPS.length) {
    setTimeout(() => {
      const panel = document.querySelector('.result-panel');
      if (panel) panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }
}

function selectSingle(stepId, value, stepIndex) {
  answers[stepId] = value;
  currentStep = stepIndex + 1;
  render();
  scrollToStep(currentStep);
}

function toggleCheck(stepId, value, el) {
  if (!answers[stepId]) answers[stepId] = [];
  const idx = answers[stepId].indexOf(value);
  if (idx >= 0) answers[stepId].splice(idx, 1);
  else answers[stepId].push(value);

  // 排他処理: "none"と他の選択肢
  if (value === "none" && answers[stepId].includes("none")) {
    answers[stepId] = ["none"];
  } else if (value !== "none" && answers[stepId].includes("none")) {
    answers[stepId] = answers[stepId].filter(v => v !== "none");
  }

  render();
}

function nextStep(stepIndex) {
  currentStep = stepIndex + 1;
  render();
  scrollToStep(currentStep);
}

function scrollToStep(idx) {
  setTimeout(() => {
    const el = document.getElementById(`step-${idx}`) || document.querySelector('.result-panel');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function resetAll() {
  Object.keys(answers).forEach(k => delete answers[k]);
  currentStep = 0;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderResults() {
  const scores = calcScores(answers);
  const sorted = Object.entries(scores)
    .filter(([, s]) => s > 0)
    .sort((a, b) => b[1] - a[1]);

  const maxScore = sorted.length > 0 ? sorted[0][1] : 0;

  let html = `<div class="result-panel show">`;
  html += `<div class="result-header">📋 鑑別診断の結果</div>`;
  html += `<div class="result-body">`;

  // 緊急アラート
  const urgency = answers.urgency || [];
  const hasUrgency = urgency.length > 0 && !urgency.includes("none");
  if (hasUrgency) {
    html += `<div class="alert-box danger">
      <div class="alert-title">🚨 緊急透析の適応を検討</div>
      <div>`;
    if (urgency.includes("hyperK")) html += "・難治性高カリウム血症<br>";
    if (urgency.includes("pulm_edema")) html += "・利尿薬不応性肺水腫<br>";
    if (urgency.includes("acidosis")) html += "・重症代謝性アシドーシス<br>";
    if (urgency.includes("uremia")) html += "・尿毒症症状<br>";
    if (urgency.includes("toxin")) html += "・中毒物質の除去<br>";
    html += `<strong>→ 腎臓内科へ緊急相談し透析導入を検討してください。</strong></div></div>`;
  }

  // 初期対応サマリー
  html += `<div class="summary-box">`;
  html += `<div class="summary-title">🎯 初期対応の3つの柱</div>`;
  html += `<strong>①</strong> 尿路閉塞の除外（エコー・導尿）<br>`;
  html += `<strong>②</strong> 循環不全の是正（輸液・昇圧薬）<br>`;
  html += `<strong>③</strong> 腎毒性物質の中止（NSAIDs、RAS阻害薬、造影剤など）`;
  html += `</div>`;

  // 鑑別診断リスト
  if (sorted.length === 0) {
    html += `<p style="color:var(--gray);text-align:center;padding:20px;">入力された情報からは特定の鑑別が示唆されませんでした。追加の検査情報を入力してください。</p>`;
  } else {
    sorted.forEach(([key, score]) => {
      const d = DISEASES[key];
      let level, levelLabel;
      if (score >= maxScore * 0.7 && score >= 3) { level = "high"; levelLabel = "可能性 高"; }
      else if (score >= maxScore * 0.4 && score >= 2) { level = "medium"; levelLabel = "可能性 中"; }
      else { level = "low"; levelLabel = "可能性 低"; }

      html += `<div class="dx-card ${level}">`;
      html += `<div class="dx-name">
        <span>${d.emoji}</span>
        <span>${d.name}</span>
        <span class="prob-badge">${levelLabel}</span>
      </div>`;
      html += `<span class="category-label ${d.catClass}">${d.category}</span>`;
      html += `<div class="dx-detail">${d.detail}</div>`;
      html += `<div class="dx-workup">🔍 追加検査: ${d.workup}</div>`;
      html += `</div>`;
    });
  }

  // 腎臓内科コンサルトの赤旗
  html += `<div class="red-flag-box">
    <div class="rf-title">🚩 腎臓内科への早期相談を考慮すべき状況</div>
    <ul>
      <li>KDIGOステージ2以上（Cr≧基礎値の2倍、または尿量<0.5 mL/kg/時×12時間以上）</li>
      <li>原因不明のAKI</li>
      <li>蛋白尿＋血尿の合併（糸球体疾患の疑い）</li>
      <li>赤血球円柱の出現</li>
      <li>溶血性貧血＋血小板減少（TMAの疑い）</li>
      <li>電解質・酸塩基平衡のコントロール困難</li>
      <li>透析導入が視野に入る場合</li>
      <li>高度CKD（eGFR<30）の既存・単腎患者</li>
      <li>腎移植患者</li>
      <li>妊娠中のAKI</li>
    </ul>
  </div>`;

  // 注意事項
  html += \`<div class="summary-box" style="margin-top:16px;">
    <div class="summary-title">⚠️ AKI管理の注意事項</div>
    <strong>推奨されない治療：</strong>低用量ドパミン（AKI予防・治療目的）、ルーチンの利尿薬投与（容量過剰管理以外では推奨されない）<br>
    <strong>退院後フォロー：</strong>AKI後はCKD移行・心血管リスク増加のため、数週〜3か月でCr/eGFR再評価。原因薬剤の再投与は慎重に判断。血圧管理と脱水回避を指導。
  </div>\`;

  // KDIGOステージ表
  html += `<div style="margin-top:20px;">`;
  html += `<p style="font-weight:700;color:var(--navy);margin-bottom:8px;">📊 KDIGO AKIステージ分類（参考）</p>`;
  html += `<table class="kdigo-table">
    <thead>
      <tr><th>ステージ</th><th>血清Cr基準</th><th>尿量基準</th></tr>
    </thead>
    <tbody>
      <tr><td><strong>1</strong></td><td>≧0.3 mg/dL上昇 or 基礎値の1.5〜1.9倍</td><td><0.5 mL/kg/時 ×6〜12時間</td></tr>
      <tr><td><strong>2</strong></td><td>基礎値の2.0〜2.9倍</td><td><0.5 mL/kg/時 ×12時間以上</td></tr>
      <tr><td><strong>3</strong></td><td>基礎値の3倍以上 or ≧4.0 mg/dL or 透析導入</td><td><0.3 mL/kg/時 ×24時間以上 or 無尿12時間以上</td></tr>
    </tbody>
  </table>`;
  html += `</div>`;

  html += `</div></div>`;
  return html;
}

// 初期描画
render();
</script>
