<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>海綿静脈洞 解剖エクスプローラー</title>
<style>
:root {
  --navy: #1B3A5C;
  --blue: #2C5AA0;
  --light-blue: #E8F0FE;
  --bg: #f0f4f8;
  --card-bg: #fff;
  --cn3-color: #e67e22;
  --cn4-color: #27ae60;
  --v1-color: #8e44ad;
  --v2-color: #2980b9;
  --cn6-color: #f1c40f;
  --ica-color: #c0392b;
  --symp-color: #e74c8b;
  --ths-glow: rgba(255,80,50,0.35);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'BIZ UDPGothic', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: #333;
}
.header {
  background: linear-gradient(135deg, var(--navy), var(--blue));
  color: #fff;
  text-align: center;
  padding: 18px 16px 14px;
}
.header h1 { font-size: 1.35rem; margin-bottom: 4px; }
.header p { font-size: 0.85rem; opacity: 0.85; }
.back-link {
  position: absolute;
  top: 14px;
  left: 14px;
  color: #fff;
  text-decoration: none;
  font-size: 0.9rem;
  opacity: 0.8;
}
.back-link:hover { opacity: 1; }
.container {
  max-width: 880px;
  margin: 0 auto;
  padding: 16px;
}
.controls {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 16px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.view-toggle {
  display: flex;
  gap: 0;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
.view-btn {
  padding: 9px 22px;
  border: 2px solid var(--blue);
  background: #fff;
  color: var(--blue);
  font-size: 0.9rem;
  font-family: inherit;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.2s;
}
.view-btn.active {
  background: var(--blue);
  color: #fff;
}
.view-btn:hover:not(.active) { background: var(--light-blue); }
.ths-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.9rem;
  font-weight: bold;
  color: var(--navy);
}
.ths-switch {
  position: relative;
  width: 48px;
  height: 26px;
  background: #ccc;
  border-radius: 13px;
  cursor: pointer;
  transition: background 0.3s;
}
.ths-switch.on { background: #e74c3c; }
.ths-switch::after {
  content: '';
  position: absolute;
  top: 3px;
  left: 3px;
  width: 20px;
  height: 20px;
  background: #fff;
  border-radius: 50%;
  transition: transform 0.3s;
}
.ths-switch.on::after { transform: translateX(22px); }
.svg-container {
  background: var(--card-bg);
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  padding: 16px;
}
svg { width: 100%; height: auto; display: block; }
.hidden { display: none; }
.info-panel {
  margin-top: 14px;
  padding: 16px 20px;
  background: var(--card-bg);
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  min-height: 80px;
}
.info-panel h3 { color: var(--navy); margin-bottom: 8px; font-size: 1.1rem; }
.info-panel p { font-size: 0.93rem; line-height: 1.7; }
.info-panel .ths-freq {
  display: inline-block;
  margin-top: 8px;
  padding: 4px 12px;
  background: #fdecea;
  border: 1px solid #e74c3c;
  border-radius: 6px;
  color: #c0392b;
  font-weight: bold;
  font-size: 0.9rem;
}
.structure-item { cursor: pointer; transition: opacity 0.2s; }
.structure-item:hover { opacity: 0.75; }
.label-text { font-family: 'BIZ UDPGothic', sans-serif; pointer-events: none; }
/* THS炎症オーバーレイ */
.ths-overlay { transition: opacity 0.4s; }
.ths-overlay.hide { opacity: 0; pointer-events: none; }
.ths-overlay.show { opacity: 1; }
/* レスポンシブ */
@media (max-width: 640px) {
  .header h1 { font-size: 1.1rem; }
  .controls { gap: 10px; }
  .view-btn { padding: 8px 14px; font-size: 0.82rem; }
  .info-panel { padding: 12px 14px; }
  .info-panel h3 { font-size: 1rem; }
  .info-panel p { font-size: 0.88rem; }
}
</style>
</head>
<body>
<div class="header" style="position:relative;">

<div class="container">
  <!-- コントロール -->

    <!-- CN III -->
    <ellipse cx="537" cy="155" rx="13" ry="9" fill="#e67e22" stroke="#d35400" stroke-width="2" class="structure-item" onclick="showInfo('cn3')"/>

<script>
var INFO = {
  sinus: {
    title: '海綿静脈洞（Cavernous Sinus）',
    desc: '蝶形骨体の両側に位置する硬膜静脈洞。内部は線維性の小梁（trabeculae）で仕切られた「海綿状」構造を示す。内部をICAとCN VIが通過し、外側壁の硬膜内にCN III, IV, V1, V2が走行する。前方は上眼窩裂（SOF）に連続し、後方はDorello管・錐体静脈洞と連絡する。',
    ths: 'THSでは洞内およびその周囲に肉芽腫性炎症が生じ、これらの神経が障害される。'
  },
  ica: {
    title: '内頸動脈（Internal Carotid Artery: ICA）',
    desc: '海綿静脈洞内をS字状に走行する（C4セグメント）。後方から入り、前方で上行して床上部に出る。周囲を交感神経叢が取り囲む。',
    ths: 'THSでは内頸動脈狭窄を伴うことがある。海綿静脈洞部の内頸動脈瘤は重要な鑑別疾患。'
  },
  cn3: {
    title: 'CN III 動眼神経（Oculomotor Nerve）',
    desc: '外側壁の硬膜内の最上部を走行し、SOFから眼窩に入る。上眼瞼挙筋・上直筋・内側直筋・下直筋・下斜筋を支配。副交感線維で瞳孔括約筋・毛様体筋も支配。障害時：眼瞼下垂、散瞳、眼球の外下方偏位。',
    ths: 'THS障害頻度：約80%（最多）',
    freq: 80
  },
  cn4: {
    title: 'CN IV 滑車神経（Trochlear Nerve）',
    desc: '外側壁の硬膜内でCN IIIの下方を走行し、SOFから眼窩に入る。最も細い脳神経であり唯一背側から出る。上斜筋のみを支配。障害時：複視（特に下方視・内転位で顕著）、代償性頭位傾斜。',
    ths: 'THS障害頻度：約29%',
    freq: 29
  },
  v1: {
    title: 'V1 眼神経（Ophthalmic Nerve）',
    desc: '三叉神経第1枝。外側壁の硬膜内でCN IVの下方を走行し、SOFから眼窩に入る。前額部・上眼瞼・鼻背の感覚を支配。障害時：前額部の感覚低下、角膜反射低下。',
    ths: 'THS障害頻度：約30%。疼痛はV1領域（眼窩周囲・前額部）に生じることが多い。',
    freq: 30
  },
  v2: {
    title: 'V2 上顎神経（Maxillary Nerve）',
    desc: '三叉神経第2枝。外側壁の硬膜内で最下部を走行し、SOFは通過せず正円孔から翼口蓋窩に出る。頬部・上唇・上歯・鼻翼の感覚を支配。',
    ths: 'THS障害頻度：稀（後方への炎症波及時のみ）',
    freq: 5
  },
  cn6: {
    title: 'CN VI 外転神経（Abducens Nerve）',
    desc: 'Dorello管から入り、洞腔内をICAの外側で自由に走行してSOFから眼窩に入る。外側直筋を支配。壁内ではなく洞腔内にあるため圧迫を受けやすい。障害時：内斜視、外転制限、水平性複視。',
    ths: 'THS障害頻度：約70%（CN IIIに次いで高頻度）。頭蓋内圧亢進の偽局在徴候としても重要。',
    freq: 70
  },
  sympathetic: {
    title: '交感神経叢（Sympathetic Plexus）',
    desc: 'ICA周囲を網状に取り囲む交感神経線維。上頸神経節からの節後線維がICAに沿って上行。瞳孔散大筋・Muller筋・血管平滑筋を支配。障害時：Horner症候群（縮瞳・軽度眼瞼下垂・無汗症）。',
    ths: 'THS障害頻度：約20%',
    freq: 20
  },
  sof: {
    title: '上眼窩裂（Superior Orbital Fissure: SOF）',

    ths: 'SOF症候群（上眼窩裂症候群）ではこの裂隙を通る全神経が障害され、THSとの鑑別が重要。'
  },
  foramen_rotundum: {
    title: '正円孔（Foramen Rotundum）',
    desc: '蝶形骨大翼の円形の孔。V2のみがここを通過し翼口蓋窩に出る。他の神経はSOFを通るため、正円孔は海綿静脈洞から眼窩以外への唯一の神経出口。',
    ths: ''
  },
  dorello: {
    title: 'Dorello管（Dorello\'s Canal）',
    desc: '錐体尖部と斜台の間を通るCN VIの通路。狭い空間のため、頭蓋内圧亢進時にCN VIが圧迫されやすい。Gradenigo症候群（錐体尖端炎）でもこの部位でCN VIが障害される。',
    ths: ''
  }

var thsMode = false;

function showInfo(key) {
  var panel = document.getElementById('infoPanel');
  var data = INFO[key];
  if (!data) return;
  var html = '<h3>' + data.title + '</h3><p>' + data.desc + '</p>';
  if (thsMode && data.ths) {
    html += '<p style="margin-top:8px;color:#c0392b;font-weight:bold;">' + data.ths + '</p>';
    if (data.freq) {
      html += '<span class="ths-freq">THS障害率: ' + data.freq + '%</span>';
    }
  }
  panel.innerHTML = html;
}

function switchView(view) {
  var coronal = document.getElementById('coronalView');
  var sagittal = document.getElementById('sagittalView');
  var btnCoronal = document.getElementById('btnCoronal');
  var btnSagittal = document.getElementById('btnSagittal');
  if (view === 'coronal') {
    coronal.classList.remove('hidden');
    sagittal.classList.add('hidden');
    btnCoronal.classList.add('active');
    btnSagittal.classList.remove('active');
  } else {
    coronal.classList.add('hidden');
    sagittal.classList.remove('hidden');
    btnCoronal.classList.remove('active');
    btnSagittal.classList.add('active');
  }
  resetInfoPanel();
}

function toggleTHS() {
  thsMode = !thsMode;
  var sw = document.getElementById('thsSwitch');
  var overlayC = document.getElementById('thsCoronal');
  var overlayS = document.getElementById('thsSagittal');
  if (thsMode) {
    sw.classList.add('on');
    overlayC.classList.remove('hide');
    overlayC.classList.add('show');
    overlayS.classList.remove('hide');
    overlayS.classList.add('show');
  } else {
    sw.classList.remove('on');
    overlayC.classList.remove('show');
    overlayC.classList.add('hide');
    overlayS.classList.remove('show');
    overlayS.classList.add('hide');
  }
  resetInfoPanel();
}

function resetInfoPanel() {
  var panel = document.getElementById('infoPanel');
  if (thsMode) {
    panel.innerHTML = '<h3>THS モード ON</h3><p>Tolosa-Hunt症候群の炎症範囲と神経障害頻度を表示中です。各構造をクリックすると、THSに関連する臨床情報も表示されます。</p>';
  } else {
    panel.innerHTML = '<h3>構造を選択してください</h3><p>図中の各構造（神経・血管）をクリックすると、詳細情報が表示されます。<br><strong>重要な解剖ポイント：</strong>CN III, IV, V1, V2は外側壁の硬膜「内」を走行するのに対し、CN VIは洞腔「内」を自由に走行します。</p>';
  }
}
