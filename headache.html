<title>頭痛鑑別診断ツール</title>
<style>
  :root {
    --navy: #6B1D5E;
    --blue: #9B3D8E;
    --light-blue: #F5E8F3;
    --red: #DC3545;
    --yellow: #F5C518;
    --green: #28A745;
    --orange: #E8850C;
    --gray: #6C757D;
    --light-gray: #F4F6F8;
    --white: #FFFFFF;
    --shadow: 0 2px 8px rgba(107,29,94,0.10);
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "游ゴシック", "Yu Gothic", "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #F5E8F3 0%, #F4F6F8 100%);
    color: #222;
    min-height: 100vh;
    padding: 0 0 40px;
  }
  header {
    background: linear-gradient(135deg, var(--navy), var(--blue));
    color: var(--white);
    padding: 14px 20px 18px;
    text-align: center;
    box-shadow: 0 4px 16px rgba(107,29,94,0.18);
  }
  .back-bar {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
  }
  .back-bar a {
    color: rgba(255,255,255,0.85);
    text-decoration: none;
    font-size: 0.85em;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 8px;
    border-radius: 6px;
    transition: background 0.2s;
  }
  .back-bar a:active { background: rgba(255,255,255,0.15); }
  header h1 { font-size: 1.7em; font-weight: 700; letter-spacing: 0.04em; }
  header p { font-size: 0.92em; margin-top: 6px; opacity: 0.85; }

  .container { max-width: 820px; margin: 0 auto; padding: 24px 16px; }

  .step-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 18px;
    overflow: hidden;
    transition: opacity 0.3s;
  }
  .step-card.inactive { opacity: 0.45; pointer-events: none; }
  .step-card.completed { opacity: 1; }
  .step-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    background: var(--light-blue);
    border-bottom: 2px solid var(--blue);
    cursor: pointer;
  }
  .step-number {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--blue);
    color: var(--white);
    font-weight: 700;
    font-size: 0.95em;
    flex-shrink: 0;
  }
  .step-number.done { background: var(--green); }
  .step-title { font-weight: 700; font-size: 1.05em; color: var(--navy); }
  .step-body { padding: 18px; }

  .option-group { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
  .option-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border: 2px solid #D0D8E4;
    border-radius: 8px;
    background: var(--white);
    font-size: 0.97em;
    cursor: pointer;
    transition: all 0.18s;
    text-align: left;
    color: #222;
    font-family: inherit;
    width: 100%;
  }
  .option-btn:hover { border-color: var(--blue); background: var(--light-blue); }
  .option-btn.selected {
    border-color: var(--blue);
    background: var(--light-blue);
    font-weight: 700;
  }
  .option-btn .icon { font-size: 1.2em; flex-shrink: 0; width: 24px; text-align: center; }

  .checklist { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .check-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 8px;
    background: var(--light-gray);
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
    font-size: 0.95em;
  }
  .check-item:hover { background: #E8DDE6; }
  .check-item input[type="checkbox"] {
    width: 18px; height: 18px;
    accent-color: var(--blue);
    flex-shrink: 0;
    cursor: pointer;
  }
  .check-item label { cursor: pointer; flex: 1; }

  .result-panel {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: 0 4px 20px rgba(107,29,94,0.15);
    overflow: hidden;
    margin-top: 24px;
    display: none;
  }
  .result-panel.show { display: block; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .result-header {
    padding: 16px 20px;
    background: linear-gradient(135deg, var(--navy), var(--blue));
    color: var(--white);
    font-weight: 700;
    font-size: 1.15em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .result-body { padding: 20px; }

  .dx-card {
    border: 2px solid transparent;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 12px;
    position: relative;
    transition: all 0.2s;
  }
  .dx-card.high { border-color: var(--red); background: #FFF5F5; }
  .dx-card.medium { border-color: var(--orange); background: #FFF8F0; }
  .dx-card.low { border-color: var(--gray); background: var(--light-gray); }

  .dx-card .dx-name {
    font-weight: 700;
    font-size: 1.08em;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }
  .dx-card .prob-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 0.78em;
    font-weight: 700;
    color: var(--white);
  }
  .dx-card.high .prob-badge { background: var(--red); }
  .dx-card.medium .prob-badge { background: var(--orange); }
  .dx-card.low .prob-badge { background: var(--gray); }

  .dx-card .dx-detail { font-size: 0.9em; color: #444; line-height: 1.6; }
  .dx-card .dx-detail strong { color: var(--navy); }
  .dx-card .dx-workup {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed #ccc;
    font-size: 0.88em;
    color: var(--blue);
  }

  .next-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 14px;
    padding: 10px 22px;
    background: var(--blue);
    color: var(--white);
    border: none;
    border-radius: 8px;
    font-size: 0.95em;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    font-family: inherit;
  }
  .next-btn:hover { background: var(--navy); }
  .next-btn:disabled { background: #B0BEC5; cursor: not-allowed; }

  .reset-btn {
    display: block;
    margin: 24px auto 0;
    padding: 10px 32px;
    background: var(--white);
    color: var(--red);
    border: 2px solid var(--red);
    border-radius: 8px;
    font-size: 0.95em;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .reset-btn:hover { background: var(--red); color: var(--white); }

  .hint {
    font-size: 0.85em;
    color: var(--gray);
    margin-top: 6px;
    line-height: 1.5;
  }

  .divider { height: 1px; background: #D0D8E4; margin: 14px 0; }

  .algo-note {
    background: #FFFDE7;
    border-left: 4px solid var(--yellow);
    padding: 12px 16px;
    border-radius: 0 8px 8px 0;
    margin-bottom: 18px;
    font-size: 0.9em;
    line-height: 1.6;
    color: #555;
  }
  .algo-note strong { color: var(--navy); }

  .alert-box {
    background: #FFF3CD;
    border: 2px solid var(--orange);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 16px;
    font-size: 0.92em;
    line-height: 1.6;
  }
  .alert-box.danger {
    background: #F8D7DA;
    border-color: var(--red);
  }
  .alert-box .alert-title {
    font-weight: 700;
    color: var(--red);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .category-label {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 0.78em;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .cat-primary { background: #E8F5E9; color: #2E7D32; }
  .cat-secondary { background: #FCE4EC; color: #C62828; }
  .cat-tac { background: #E3F2FD; color: #1565C0; }

  .summary-box {
    background: var(--light-blue);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 16px;
    font-size: 0.92em;
    line-height: 1.6;
  }
  .summary-box .summary-title {
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 6px;
  }

  .red-flag-box {
    background: #F8D7DA;
    border: 2px solid var(--red);
    border-radius: 8px;
    padding: 14px 16px;
    margin-top: 16px;
    font-size: 0.9em;
    line-height: 1.6;
  }
  .red-flag-box .rf-title {
    font-weight: 700;
    color: var(--red);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .red-flag-box ul { padding-left: 20px; margin-top: 4px; }
  .red-flag-box li { margin-bottom: 4px; }

  .ref-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88em;
    margin: 12px 0;
  }
  .ref-table th, .ref-table td {
    border: 1px solid #D0D8E4;
    padding: 8px 10px;
    text-align: left;
  }
  .ref-table th {
    background: var(--light-blue);
    color: var(--navy);
    font-weight: 700;
  }
  .ref-table tr:nth-child(even) td { background: var(--light-gray); }

  @media (max-width: 600px) {
    header h1 { font-size: 1.3em; }
    .step-body, .result-body { padding: 14px; }
    .dx-card { padding: 12px; }
  }
</style>
</head>

function calcScores(answers) {
  var scores = {};
  var keys = Object.keys(DISEASES);
  for (var i = 0; i < keys.length; i++) { scores[keys[i]] = 0; }

  var onset = answers.onset || "";
  var red = answers.red_flags || [];
  var dur = answers.duration || "";
  var char_ = answers.character || [];
  var assoc = answers.associated || [];
  var eye = answers.eye_findings || [];
  var mod = answers.modifiers || [];

  // --- 発症様式 ---
  if (onset === "thunderclap") {
    scores.sah += 6;
    scores.rcvs += 5;
    scores.cvt += 3;
    scores.dissection += 3;
    scores.pituitary_apoplexy += 4;
  }
  if (onset === "acute") {
    scores.migraine_wo_aura += 2;
    scores.migraine_w_aura += 2;
    scores.cluster += 2;
    scores.meningitis += 3;
    scores.glaucoma += 2;
    scores.dissection += 2;
    scores.sah += 1;
  }
  if (onset === "subacute") {
    scores.brain_tumor += 4;
    scores.iih += 3;
    scores.cvt += 3;
    scores.gca += 3;
    scores.meningitis += 2;
  }
  if (onset === "recurrent") {
    scores.migraine_wo_aura += 4;
    scores.migraine_w_aura += 3;
    scores.cluster += 4;
    scores.tension_type += 3;
    scores.paroxysmal_hemicrania += 3;
    scores.sunct_suna += 3;
  }
  if (onset === "chronic") {
    scores.chronic_migraine += 4;
    scores.moh += 4;
    scores.tension_type += 3;
    scores.ndph += 3;
    scores.hemicrania_continua += 3;
    scores.iih += 2;
    scores.sih += 2;
  }

  // --- Red Flags ---
  if (red.indexOf("age_over50") >= 0) {
    scores.gca += 5;
    scores.brain_tumor += 2;
    // 一次性頭痛の確率を相対的に下げる
    scores.migraine_wo_aura -= 1;
    scores.tension_type -= 1;
  }
  if (red.indexOf("systemic") >= 0) {
    scores.meningitis += 3;
    scores.gca += 3;
    scores.brain_tumor += 2;
  }
  if (red.indexOf("neuro_deficit") >= 0) {
    scores.brain_tumor += 3;
    scores.cvt += 2;
    scores.dissection += 2;
    scores.sah += 2;
  }
  if (red.indexOf("cancer") >= 0) {
    scores.brain_tumor += 5;
  }
  if (red.indexOf("immunocompromised") >= 0) {
    scores.meningitis += 3;
    scores.brain_tumor += 3;
  }
  if (red.indexOf("pregnancy") >= 0) {
    scores.preeclampsia += 5;
    scores.cvt += 3;
    scores.rcvs += 3;
    scores.pituitary_apoplexy += 1;
  }
  if (red.indexOf("new_or_changed") >= 0) {
    // 二次性全般を少し上げる
    scores.sah += 1; scores.cvt += 1; scores.dissection += 1;
    scores.iih += 1; scores.sih += 1; scores.brain_tumor += 1;
    scores.gca += 1; scores.meningitis += 1;
  }
  if (red.indexOf("altered_consciousness") >= 0) {
    scores.meningitis += 3;
    scores.sah += 3;
    scores.cvt += 2;
    scores.preeclampsia += 2;
    scores.pituitary_apoplexy += 2;
  }

  // --- 持続時間 ---
  if (dur === "seconds") {
    scores.sunct_suna += 5;
    scores.paroxysmal_hemicrania += 2;
  }
  if (dur === "short_hours") {
    scores.cluster += 4;
    scores.paroxysmal_hemicrania += 4;
    scores.sunct_suna += 2;
  }
  if (dur === "medium_hours") {
    scores.migraine_wo_aura += 4;
    scores.migraine_w_aura += 4;
    scores.tension_type += 3;
  }
  if (dur === "long_hours") {
    scores.tension_type += 2;
    scores.migraine_wo_aura += 1;
    scores.meningitis += 2;
    scores.cvt += 2;
  }
  if (dur === "continuous") {
    scores.chronic_migraine += 3;
    scores.hemicrania_continua += 4;
    scores.ndph += 4;
    scores.moh += 3;
    scores.iih += 2;
    scores.sih += 2;
    scores.brain_tumor += 2;
  }

  // --- 性状・部位 ---
  if (char_.indexOf("unilateral") >= 0) {
    scores.migraine_wo_aura += 2;
    scores.migraine_w_aura += 2;
    scores.cluster += 3;
    scores.paroxysmal_hemicrania += 3;
    scores.sunct_suna += 3;
    scores.hemicrania_continua += 3;
    scores.dissection += 2;
  }
  if (char_.indexOf("bilateral") >= 0) {
    scores.tension_type += 3;
    scores.meningitis += 2;
    scores.iih += 1;
    scores.sih += 1;
  }
  if (char_.indexOf("pulsating") >= 0) {
    scores.migraine_wo_aura += 2;
    scores.migraine_w_aura += 2;
    scores.gca += 1;

  if (char_.indexOf("pressing") >= 0) {

    scores.iih += 1;
    scores.chronic_migraine += 1;

  if (char_.indexOf("stabbing") >= 0) {

    scores.sunct_suna += 3;
    scores.glaucoma += 1;
  }
  if (char_.indexOf("moderate_severe") >= 0) {
    scores.migraine_wo_aura += 2;
    scores.migraine_w_aura += 2;
    scores.cluster += 2;
    scores.sah += 1;
  }
  if (char_.indexOf("mild_moderate") >= 0) {
    scores.tension_type += 3;
  }
  if (char_.indexOf("orbital") >= 0) {
    scores.cluster += 3;
    scores.paroxysmal_hemicrania += 2;
    scores.sunct_suna += 2;
    scores.glaucoma += 2;
  }
  if (char_.indexOf("occipital_neck") >= 0) {
    scores.dissection += 2;
    scores.sah += 1;
    scores.sih += 1;
    scores.tension_type += 1;
  }

    scores.gca += 3;
    scores.migraine_wo_aura += 1;
  }

  // --- 随伴症状 ---
  if (assoc.indexOf("nausea") >= 0) {
    scores.migraine_wo_aura += 2;
    scores.migraine_w_aura += 2;
    scores.sah += 1;
    scores.glaucoma += 2;
    scores.iih += 1;
  }
  if (assoc.indexOf("photophobia") >= 0) {
    scores.migraine_wo_aura += 2;
    scores.migraine_w_aura += 2;
    scores.meningitis += 1;
  }
  if (assoc.indexOf("phonophobia") >= 0) {
    scores.migraine_wo_aura += 2;
    scores.migraine_w_aura += 2;
  }
  if (assoc.indexOf("aura") >= 0) {
    scores.migraine_w_aura += 5;
  }
  if (assoc.indexOf("autonomic") >= 0) {
    scores.cluster += 4;
    scores.paroxysmal_hemicrania += 4;
    scores.sunct_suna += 4;
    scores.hemicrania_continua += 2;
  }
  if (assoc.indexOf("horner_partial") >= 0) {
    scores.cluster += 3;
    scores.dissection += 3;
  }
  if (assoc.indexOf("fever") >= 0) {
    scores.meningitis += 4;
    scores.gca += 2;
    scores.brain_tumor += 1;
  }
  if (assoc.indexOf("meningism") >= 0) {
    scores.meningitis += 5;
    scores.sah += 3;
    scores.pituitary_apoplexy += 1;
  }
  if (assoc.indexOf("seizure") >= 0) {
    scores.meningitis += 2;
    scores.cvt += 3;
    scores.preeclampsia += 4;
    scores.brain_tumor += 2;
  }
  if (assoc.indexOf("scalp_jaw") >= 0) {
    scores.gca += 5;
  }
  if (assoc.indexOf("restlessness") >= 0) {
    scores.cluster += 3;
    scores.paroxysmal_hemicrania += 2;
  }

  // --- 眼症状・眼底 ---
  if (eye.indexOf("papilledema") >= 0) {
    scores.iih += 5;
    scores.brain_tumor += 3;
    scores.cvt += 3;
  }
  if (eye.indexOf("vision_loss") >= 0) {
    scores.gca += 4;
    scores.glaucoma += 3;
    scores.pituitary_apoplexy += 3;
    scores.iih += 2;
  }
  if (eye.indexOf("transient_visual") >= 0) {
    scores.gca += 3;
    scores.iih += 3;
  }
  if (eye.indexOf("diplopia") >= 0) {
    scores.iih += 3;
    scores.pituitary_apoplexy += 2;
    scores.brain_tumor += 2;
  }
  if (eye.indexOf("red_eye") >= 0) {
    scores.glaucoma += 5;
    scores.cluster += 1;
  }
  if (eye.indexOf("pupil_abnormal") >= 0) {
    scores.glaucoma += 3;
    scores.sah += 2;
    scores.pituitary_apoplexy += 2;
  }
  if (eye.indexOf("pulsatile_tinnitus") >= 0) {
    scores.iih += 4;
  }
  if (eye.indexOf("horner") >= 0) {
    scores.dissection += 5;
    scores.cluster += 2;
  }
  if (eye.indexOf("blurred_halos") >= 0) {
    scores.glaucoma += 4;
  }

  // --- 増悪・緩和因子 ---
  if (mod.indexOf("orthostatic") >= 0) {
    scores.sih += 6;
  }
  if (mod.indexOf("worse_supine") >= 0) {
    scores.iih += 3;
    scores.brain_tumor += 2;
  }
  if (mod.indexOf("valsalva_trigger") >= 0) {
    scores.rcvs += 3;
    scores.sah += 1;
    scores.iih += 1;
  }
  if (mod.indexOf("bath_trigger") >= 0) {
    scores.rcvs += 4;
  }
  if (mod.indexOf("morning_worse") >= 0) {
    scores.brain_tumor += 3;
    scores.iih += 2;
  }
  if (mod.indexOf("analgesic_overuse") >= 0) {
    scores.moh += 6;
    scores.chronic_migraine += 2;
  }
  if (mod.indexOf("vasoactive_drugs") >= 0) {
    scores.rcvs += 3;
  }
  if (mod.indexOf("ocp") >= 0) {
    scores.cvt += 2;
  }
  if (mod.indexOf("hypertension") >= 0) {
    scores.preeclampsia += 2;
    scores.sah += 1;
  }
  if (mod.indexOf("obesity") >= 0) {
    scores.iih += 3;
  }

  return scores;
}

// ===== UI描画 =====
var appEl = document.getElementById("app");
var currentStep = 0;
var answers = {};

function render() {
  var html = "";

  // アルゴリズム説明
  html += '<div class="algo-note">';
  html += '<strong>使い方：</strong>各ステップの質問に順番に回答してください。すべてのステップ完了後に鑑別診断の候補が優先順位付きで表示されます。<br>';
  html += '<strong>基本方針：</strong>「危険な二次性頭痛を先に除外する」→「red flagsがなければ一次性頭痛を積極的に診断する」（ICHD-3, SNNOOP10, NICE CG150, ACR 2023準拠）';
  html += '</div>';

  // 各ステップ
  for (var i = 0; i < STEPS.length; i++) {
    var step = STEPS[i];
    var isActive = i === currentStep;
    var isDone = i < currentStep;
    var cls = isDone ? "completed" : (isActive ? "" : "inactive");

    html += '<div class="step-card ' + cls + '" id="step-' + i + '">';
    html += '<div class="step-header">';
    html += '<span class="step-number ' + (isDone ? 'done' : '') + '">' + (isDone ? '✓' : (i + 1)) + '</span>';
    html += '<span class="step-title">' + step.title + '</span>';
    html += '</div>';

    if (isActive || isDone) {
      html += '<div class="step-body">';
      html += '<p style="font-weight:600;margin-bottom:4px;">' + step.question + '</p>';
      if (step.hint) html += '<p class="hint">' + step.hint + '</p>';

      if (step.type === "single") {
        html += '<div class="option-group">';
        for (var j = 0; j < step.options.length; j++) {
          var opt = step.options[j];
          var selected = answers[step.id] === opt.value;
          html += '<button class="option-btn ' + (selected ? 'selected' : '') + '"';
          html += ' onclick="selectSingle(\'' + step.id + '\', \'' + opt.value + '\', ' + i + ')"';
          if (isDone && !isActive) html += ' disabled';
          html += '>';
          html += '<span class="icon">' + (opt.icon || '') + '</span>' + opt.label;
          html += '</button>';
        }
        html += '</div>';
      } else {
        html += '<div class="checklist">';
        var currentAnswers = answers[step.id] || [];
        for (var j = 0; j < step.options.length; j++) {
          var opt = step.options[j];
          var checked = currentAnswers.indexOf(opt.value) >= 0;
          html += '<div class="check-item" onclick="toggleCheck(\'' + step.id + '\', \'' + opt.value + '\', this)">';
          html += '<input type="checkbox" ' + (checked ? 'checked' : '') + (isDone && !isActive ? ' disabled' : '') + '>';
          html += '<label>' + opt.label + '</label>';
          html += '</div>';
        }
        html += '</div>';
        if (isActive) {
          html += '<button class="next-btn" onclick="nextStep(' + i + ')">次へ ▶</button>';
        }
      }
      html += '</div>';
    }
    html += '</div>';
  }

  // 結果パネル
  if (currentStep >= STEPS.length) {
    html += renderResults();
  }

  // リセットボタン
  if (currentStep > 0) {
    html += '<button class="reset-btn" onclick="resetAll()">🔄 最初からやり直す</button>';
  }

  appEl.innerHTML = html;

  // 結果表示後スクロール
  if (currentStep >= STEPS.length) {
    setTimeout(function() {
      var panel = document.querySelector('.result-panel');
      if (panel) panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }
}

function selectSingle(stepId, value, stepIndex) {
  answers[stepId] = value;
  currentStep = stepIndex + 1;
  render();
  scrollToStep(currentStep);
}

function toggleCheck(stepId, value, el) {
  if (!answers[stepId]) answers[stepId] = [];
  var idx = answers[stepId].indexOf(value);
  if (idx >= 0) answers[stepId].splice(idx, 1);
  else answers[stepId].push(value);

  // 排他処理: "none"と他の選択肢
  if (value === "none" && answers[stepId].indexOf("none") >= 0) {
    answers[stepId] = ["none"];
  } else if (value !== "none" && answers[stepId].indexOf("none") >= 0) {
    var filtered = [];
    for (var i = 0; i < answers[stepId].length; i++) {
      if (answers[stepId][i] !== "none") filtered.push(answers[stepId][i]);
    }
    answers[stepId] = filtered;
  }

  render();
}

function nextStep(stepIndex) {
  currentStep = stepIndex + 1;
  render();
  scrollToStep(currentStep);
}

function scrollToStep(idx) {
  setTimeout(function() {
    var el = document.getElementById("step-" + idx) || document.querySelector('.result-panel');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function resetAll() {
  var keys = Object.keys(answers);
  for (var i = 0; i < keys.length; i++) { delete answers[keys[i]]; }
  currentStep = 0;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderResults() {
  var scores = calcScores(answers);
  var entries = [];
  var keys = Object.keys(scores);
  for (var i = 0; i < keys.length; i++) {
    if (scores[keys[i]] > 0) entries.push([keys[i], scores[keys[i]]]);
  }
  entries.sort(function(a, b) { return b[1] - a[1]; });

  var maxScore = entries.length > 0 ? entries[0][1] : 0;

  var html = '<div class="result-panel show">';
  html += '<div class="result-header">📋 鑑別診断の結果</div>';
  html += '<div class="result-body">';

  // 雷鳴頭痛アラート
  if (answers.onset === "thunderclap") {
    html += '<div class="alert-box danger">';
    html += '<div class="alert-title">🚨 雷鳴頭痛 — 緊急評価が必要</div>';
    html += '<div>1分以内に最大強度に達する頭痛は、<strong>くも膜下出血を最優先に除外</strong>してください。<br>';
    html += '初期評価：非造影頭部CT → CT陰性でも臨床的に疑えば腰椎穿刺（キサントクロミー）→ CTA<br>';
    html += 'RCVS、CVT、動脈解離、下垂体卒中も重要な鑑別です。</div>';
    html += '</div>';
  }

  // Red flags警告
  var redFlags = answers.red_flags || [];
  var hasRedFlags = redFlags.length > 0 && redFlags.indexOf("none") < 0;
  if (hasRedFlags) {
    html += '<div class="alert-box danger">';
    html += '<div class="alert-title">🚩 Red Flags検出 — 二次性頭痛の除外が必要</div>';
    html += '<div>';
    if (redFlags.indexOf("age_over50") >= 0) html += '・50歳以降の新規頭痛 → GCA、腫瘍の除外<br>';
    if (redFlags.indexOf("systemic") >= 0) html += '・発熱・全身症状 → 感染症、GCAの評価<br>';
    if (redFlags.indexOf("neuro_deficit") >= 0) html += '・神経脱落症候 → 画像検査（CT/MRI）<br>';
    if (redFlags.indexOf("cancer") >= 0) html += '・悪性腫瘍の既往 → 転移・髄膜癌腫症の除外<br>';
    if (redFlags.indexOf("immunocompromised") >= 0) html += '・免疫不全 → 日和見感染症の評価<br>';
    if (redFlags.indexOf("pregnancy") >= 0) html += '・妊娠・産褥 → 子癇前症、CVT、RCVSの除外<br>';
    if (redFlags.indexOf("new_or_changed") >= 0) html += '・新規/パターン変化 → 二次性頭痛の評価<br>';
    if (redFlags.indexOf("altered_consciousness") >= 0) html += '・意識障害 → 緊急画像・髄液検査<br>';
    if (redFlags.indexOf("trauma") >= 0) html += '・外傷後 → 硬膜下/硬膜外血腫の除外<br>';
    html += '</div></div>';
  }

  // 診断アプローチサマリー
  html += '<div class="summary-box">';
  html += '<div class="summary-title">🎯 頭痛鑑別の基本アプローチ</div>';
  html += '<strong>①</strong> 時間経過を見る（雷鳴 vs 急性 vs 亜急性進行 vs 反復 vs 慢性）<br>';
  html += '<strong>②</strong> 新しい頭痛か、いつもと違う頭痛かを見る<br>';
  html += '<strong>③</strong> 眼底・神経所見・全身背景を含むred flagsを拾う<br>';
  html += '<strong>④</strong> Red flagsがなければ一次性頭痛を積極的に診断する';
  html += '</div>';

  // 鑑別診断リスト
  if (entries.length === 0) {
    html += '<p style="color:var(--gray);text-align:center;padding:20px;">入力された情報からは特定の鑑別が示唆されませんでした。追加の情報を入力してください。</p>';
  } else {
    for (var i = 0; i < entries.length; i++) {
      var key = entries[i][0];
      var score = entries[i][1];
      var d = DISEASES[key];
      var level, levelLabel;
      if (score >= maxScore * 0.7 && score >= 4) { level = "high"; levelLabel = "可能性 高"; }
      else if (score >= maxScore * 0.4 && score >= 2) { level = "medium"; levelLabel = "可能性 中"; }
      else { level = "low"; levelLabel = "可能性 低"; }

      html += '<div class="dx-card ' + level + '">';
      html += '<div class="dx-name">';
      html += '<span>' + d.emoji + '</span>';
      html += '<span>' + d.name + '</span>';
      html += '<span class="prob-badge">' + levelLabel + '</span>';
      html += '</div>';
      html += '<span class="category-label ' + d.catClass + '">' + d.category + '</span>';
      html += '<div class="dx-detail">' + d.detail + '</div>';
      html += '<div class="dx-workup">🔍 追加検査: ' + d.workup + '</div>';
      html += '</div>';
    }
  }

  // 一次性頭痛鑑別の参考テーブル
  html += '<div style="margin-top:20px;">';
  html += '<p style="font-weight:700;color:var(--navy);margin-bottom:8px;">📊 一次性頭痛の鑑別ポイント（ICHD-3準拠）</p>';
  html += '<table class="ref-table">';
  html += '<thead><tr><th>疾患</th><th>持続時間</th><th>部位</th><th>特徴的所見</th></tr></thead>';
  html += '<tbody>';
  html += '<tr><td><strong>片頭痛</strong></td><td>4〜72時間</td><td>片側性（両側もあり）</td><td>拍動性、悪心、光/音過敏、動くと悪化</td></tr>';
  html += '<tr><td><strong>緊張型頭痛</strong></td><td>30分〜7日</td><td>両側性</td><td>圧迫感、軽〜中等度、動作で悪化しない</td></tr>';
  html += '<tr><td><strong>群発頭痛</strong></td><td>15〜180分</td><td>片側眼窩部</td><td>激痛、流涙/鼻閉、じっとしていられない</td></tr>';
  html += '<tr><td><strong>発作性片側頭痛</strong></td><td>2〜30分</td><td>片側</td><td>日5回以上、インドメタシン反応性</td></tr>';
  html += '<tr><td><strong>SUNCT/SUNA</strong></td><td>1〜600秒</td><td>片側眼窩部</td><td>結膜充血+流涙、多数回/日</td></tr>';
  html += '</tbody></table>';
  html += '</div>';

  // Red Flagsまとめ（SNNOOP10）
  html += '<div class="red-flag-box">';
  html += '<div class="rf-title">🚩 SNNOOP10 — 二次性頭痛を疑うred flags</div>';
  html += '<ul>';
  html += '<li><strong>S</strong>ystemic symptoms（発熱、体重減少）/ Secondary risk factors（悪性腫瘍、免疫不全）</li>';
  html += '<li><strong>N</strong>eurologic signs（神経脱落症候）</li>';
  html += '<li><strong>N</strong>ew onset / <strong>O</strong>nset sudden（突然発症 = 雷鳴頭痛）</li>';
  html += '<li><strong>O</strong>lder age > 50（50歳以降の新規頭痛）</li>';
  html += '<li><strong>P</strong>attern change（頭痛パターンの変化）/ Progressive（進行性）</li>';
  html += '<li><strong>P</strong>ositional（体位依存）/ Precipitated by Valsalva</li>';
  html += '<li><strong>P</strong>apilledema（うっ血乳頭）</li>';
  html += '<li><strong>P</strong>regnancy / Puerperium（妊娠・産褥）</li>';
  html += '<li><strong>P</strong>ainful eye（痛い赤い眼）+ autonomic features</li>';
  html += '<li><strong>P</strong>ost-traumatic（外傷後）</li>';
  html += '<li>薬剤使用過多 / 新規薬剤の開始</li>';
  html += '</ul>';
  html += '</div>';

  // 注意事項
  html += '<div class="summary-box" style="margin-top:16px;">';
  html += '<div class="summary-title">⚠️ よくあるピットフォール</div>';
  html += '<strong>・</strong>「両側の鈍い痛みだから緊張型頭痛」と決めつけない — red flagsがあれば二次性を優先<br>';
  html += '<strong>・</strong>片頭痛既往のある患者の頭痛を全部片頭痛にしない — 「今回もいつも通りか」を毎回確認<br>';
  html += '<strong>・</strong>慢性頭痛で鎮痛薬の使用日数を数えていない — MOHは日数を聞かないと見逃す<br>';
  html += '<strong>・</strong>眼底を見ない、視症状を聞かない — うっ血乳頭はIIH・CVT・腫瘍の入口<br>';
  html += '<strong>・</strong>産褥頭痛を軽く見る — RCVS、CVT、子癇前症の頻度が上がる時期<br>';
  html += '<strong>・</strong>典型的な一次性頭痛に安心目的だけで画像を重ねない — red flagsで画像の適応を上げる';
  html += '</div>';

  html += '</div></div>';
  return html;
}

// 初期描画
render();
</script>
