// ===== スコアリングエンジン =====
function calcScores(answers) {
  var scores = {};
  Object.keys(DISEASES).forEach(function(k) { scores[k] = 0; });

  // Step 1: 振戦のタイミング（最重要分岐）
  var timing = answers.vibration_timing;
  if (timing === "rest") {
    scores.parkinson += 5;
    scores.holmes_tremor += 3;
    scores.dystonic_tremor += 1;
  } else if (timing === "postural") {
    scores.essential_tremor += 5;
    scores.et_plus += 4;
    scores.enhanced_physiologic += 4;
    scores.drug_induced += 3;
    scores.neuropathic_tremor += 3;
  } else if (timing === "intention") {
    scores.cerebellar_tremor += 6;
    scores.holmes_tremor += 3;
  } else if (timing === "combined") {
    scores.holmes_tremor += 6;
    scores.wilson += 3;
  } else if (timing === "orthostatic") {
    scores.orthostatic_tremor += 10;
  } else if (timing === "variable") {
    scores.psychogenic += 5;
  }

  // Step 2: 左右差・分布
  var symmetry = answers.symmetry;
  if (symmetry === "bilateral") {
    scores.essential_tremor += 3;
    scores.enhanced_physiologic += 3;
    scores.et_plus += 2;
    scores.drug_induced += 2;
  } else if (symmetry === "unilateral") {
    scores.parkinson += 4;
    scores.dystonic_tremor += 3;
    scores.holmes_tremor += 2;
  } else if (symmetry === "focal") {
    scores.dystonic_tremor += 3;
    scores.palatal_tremor += 2;
    scores.orthostatic_tremor += 1;
  } else if (symmetry === "generalized") {
    scores.enhanced_physiologic += 2;
    scores.wilson += 2;
    scores.drug_induced += 1;
  } else if (symmetry === "variable") {
    scores.psychogenic += 4;
  }

  // Step 3: リズム・性状
  var rhythm = answers.rhythm;
  if (rhythm === "regular") {
    scores.essential_tremor += 3;
    scores.parkinson += 2;
    scores.et_plus += 2;
    scores.orthostatic_tremor += 2;
  } else if (rhythm === "irregular") {
    scores.dystonic_tremor += 4;
    scores.psychogenic += 2;
    scores.cerebellar_tremor += 1;
  } else if (rhythm === "large_amplitude") {
    scores.holmes_tremor += 4;
    scores.cerebellar_tremor += 3;
    scores.wilson += 2;
  } else if (rhythm === "fine_high_freq") {
    scores.enhanced_physiologic += 5;
    scores.drug_induced += 3;
    scores.orthostatic_tremor += 2;
  } else if (rhythm === "inconsistent") {
    scores.psychogenic += 5;
  }

  // Step 4: 随伴する神経学的所見
  var signs = answers.associated_signs || [];
  signs.forEach(function(v) {
    if (v === "bradykinesia") {
      scores.parkinson += 6;
      scores.et_plus += 1;
      scores.wilson += 1;
    }
    if (v === "rigidity") {
      scores.parkinson += 4;
      scores.wilson += 1;
    }
    if (v === "postural_instability") {
      scores.parkinson += 2;
      scores.cerebellar_tremor += 1;
    }
    if (v === "dystonia") {
      scores.dystonic_tremor += 5;
      scores.wilson += 2;
    }
    if (v === "sensory_trick") {
      scores.dystonic_tremor += 5;
    }
    if (v === "cerebellar_ataxia") {
      scores.cerebellar_tremor += 6;
      scores.holmes_tremor += 2;
      scores.wilson += 1;
    }
    if (v === "neuropathy") {
      scores.neuropathic_tremor += 6;
    }
    if (v === "cognitive") {
      scores.parkinson += 1;
      scores.wilson += 2;
      scores.et_plus += 1;
    }
    if (v === "kf_liver") {
      scores.wilson += 8;
    }
    if (v === "palatal") {
      scores.palatal_tremor += 10;
    }
  });

  // Step 5: 特殊な所見
  var features = answers.special_features || [];
  features.forEach(function(v) {
    if (v === "alcohol_responsive") {
      scores.essential_tremor += 5;
      scores.et_plus += 3;
    }
    if (v === "re_emergent") {
      scores.parkinson += 6;
    }
    if (v === "distraction") {
      scores.psychogenic += 6;
    }
    if (v === "entrainment") {
      scores.psychogenic += 6;
    }
    if (v === "family_history") {
      scores.essential_tremor += 3;
      scores.et_plus += 2;
      scores.wilson += 2;
    }
    if (v === "task_specific") {
      scores.dystonic_tremor += 4;
    }
    if (v === "head_tremor") {
      scores.essential_tremor += 2;
      scores.dystonic_tremor += 2;
      scores.et_plus += 1;
    }
    if (v === "voice_tremor") {
      scores.essential_tremor += 2;
      scores.dystonic_tremor += 1;
      scores.et_plus += 1;
    }
  });

  // Step 6: 発症年齢・経過
  var age = answers.onset_age;
  if (age === "young") {
    scores.wilson += 4;
    scores.dystonic_tremor += 2;
    scores.psychogenic += 1;
  } else if (age === "middle") {
    scores.essential_tremor += 2;
    scores.dystonic_tremor += 2;
    scores.et_plus += 1;
  } else if (age === "elderly") {
    scores.parkinson += 3;
    scores.essential_tremor += 2;
    scores.et_plus += 2;
    scores.neuropathic_tremor += 1;
  } else if (age === "acute") {
    scores.psychogenic += 4;
    scores.drug_induced += 3;
    scores.enhanced_physiologic += 2;
  }

  // Step 7: 関連薬剤・背景
  var meds = answers.medications || [];
  meds.forEach(function(v) {
    if (v === "valproate") {
      scores.drug_induced += 6;
      scores.enhanced_physiologic += 1;
    }
    if (v === "lithium") {
      scores.drug_induced += 6;
    }
    if (v === "dopamine_blocker") {
      scores.drug_induced += 6;
      scores.parkinson -= 2;
    }
    if (v === "ssri") {
      scores.drug_induced += 4;
    }
    if (v === "amiodarone") {
      scores.drug_induced += 5;
    }
    if (v === "bronchodilator") {
      scores.enhanced_physiologic += 4;
    }
    if (v === "hyperthyroid") {
      scores.enhanced_physiologic += 6;
    }
    if (v === "ms") {
      scores.cerebellar_tremor += 5;
      scores.holmes_tremor += 2;
    }
    if (v === "stroke") {
      scores.cerebellar_tremor += 3;
      scores.holmes_tremor += 4;
    }
  });

  return scores;
}

function rankDiseases(scores) {
  return Object.entries(scores)
    .map(function(entry) {
      var key = entry[0];
      var score = entry[1];
      var d = DISEASES[key];
      return { key: key, score: score, name: d.name, emoji: d.emoji, category: d.category, detail: d.detail, workup: d.workup };
    })
    .filter(function(d) { return d.score > 0; })
    .sort(function(a, b) { return b.score - a.score; });
}

function getProbLevel(score, maxScore) {
  var ratio = score / Math.max(maxScore, 1);
  if (ratio >= 0.7) return { level: "high", label: "\u53EF\u80FD\u6027 \u9AD8" };
  if (ratio >= 0.35) return { level: "medium", label: "\u53EF\u80FD\u6027 \u4E2D" };
  return { level: "low", label: "\u53EF\u80FD\u6027 \u4F4E" };
}

// ===== UIレンダリング =====
var currentStep = 0;
var answers = {};

function render() {
  var app = document.getElementById("app");
  var html = "";

  // アルゴリズムノート
  html += '<div class="algo-note">';
  html += '<strong>\uD83D\uDCA1 \u8A3A\u65AD\u30A2\u30EB\u30B4\u30EA\u30BA\u30E0:</strong> ';
  html += '\u632F\u6226\u306E\u30BF\u30A4\u30DF\u30F3\u30B0\u30FB\u5206\u5E03 \u2192 <strong>\u30EA\u30BA\u30E0\u30FB\u6027\u72B6</strong> \u2192 \u968F\u4F34\u6240\u898B \u2192 \u7279\u6B8A\u6240\u898B \u2192 \u767A\u75C7\u5E74\u9F62\u30FB\u85AC\u5264\u3067\u7CFB\u7D71\u7684\u306B\u9451\u5225\u3057\u307E\u3059';
  html += '</div>';

  STEPS.forEach(function(step, i) {
    var state = i < currentStep ? "completed" : i === currentStep ? "" : "inactive";
    var numClass = i < currentStep ? "done" : "";
    html += '<div class="step-card ' + state + '" id="step-' + i + '">';
    html += '<div class="step-header">';
    html += '<span class="step-number ' + numClass + '">' + (i < currentStep ? "\u2713" : i + 1) + '</span>';
    html += '<span class="step-title">' + step.title + '</span>';
    html += '</div>';

    if (i <= currentStep) {
      html += '<div class="step-body">';
      html += '<p style="font-weight:600; margin-bottom:4px;">' + step.question + '</p>';
      if (step.hint) html += '<p class="hint">' + step.hint + '</p>';

      if (step.type === "single") {
        html += '<div class="option-group">';
        step.options.forEach(function(opt) {
          var sel = answers[step.id] === opt.value ? "selected" : "";
          html += '<button class="option-btn ' + sel + '" onclick="selectOption(\'' + step.id + '\', \'' + opt.value + '\', ' + i + ')">';
          html += '<span class="icon">' + opt.icon + '</span> ' + opt.label;
          html += '</button>';
        });
        html += '</div>';
      } else {
        html += '<div class="checklist">';
        var checked = answers[step.id] || [];
        step.options.forEach(function(opt) {
          var isChecked = checked.indexOf(opt.value) >= 0;
          html += '<div class="check-item" onclick="toggleCheck(\'' + step.id + '\', \'' + opt.value + '\')">';
          html += '<input type="checkbox" ' + (isChecked ? "checked" : "") + ' tabindex="-1">';
          html += '<label>' + opt.label + '</label>';
          html += '</div>';
        });
        html += '</div>';
        if (i === currentStep) {
          var hasSelection = checked.length > 0;
          html += '<button class="next-btn" onclick="nextStep(' + i + ')" ' + (hasSelection ? "" : "disabled") + '>';
          html += '\u6B21\u3078 \u25B6';
          html += '</button>';
        }
      }
      html += '</div>';
    }
    html += '</div>';
  });

  // 結果表示
  if (currentStep >= STEPS.length) {
    var scores = calcScores(answers);
    var ranked = rankDiseases(scores);
    var maxScore = ranked.length > 0 ? ranked[0].score : 1;

    html += '<div class="result-panel show">';
    html += '<div class="result-header">\uD83D\uDCCA \u9451\u5225\u8A3A\u65AD\u7D50\u679C</div>';
    html += '<div class="result-body">';
    html += '<p style="margin-bottom:14px; color:#555; font-size:0.9em;">\u5165\u529B\u3055\u308C\u305F\u81E8\u5E8A\u60C5\u5831\u306B\u57FA\u3065\u304F\u9451\u5225\u75BE\u60A3\u306E\u512A\u5148\u5EA6\u3067\u3059\u3002\u78BA\u5B9A\u8A3A\u65AD\u306B\u306F\u8FFD\u52A0\u691C\u67FB\u304C\u5FC5\u8981\u3067\u3059\u3002</p>';

    ranked.forEach(function(d) {
      var prob = getProbLevel(d.score, maxScore);
      html += '<div class="dx-card ' + prob.level + '">';
      html += '<div class="dx-name">';
      html += d.emoji + ' ' + d.name;
      html += ' <span class="prob-badge">' + prob.label + '</span>';
      html += '</div>';
      html += '<div class="dx-detail">' + d.detail + '</div>';
      html += '<div class="dx-workup">\uD83D\uDD0D <strong>\u8FFD\u52A0\u691C\u67FB:</strong> ' + d.workup + '</div>';
      html += '</div>';
    });

    html += '<div class="divider"></div>';
    html += '<p style="font-size:0.82em; color:#888; line-height:1.6;">';
    html += '\u26A0\uFE0F \u672C\u30C4\u30FC\u30EB\u306F\u81E8\u5E8A\u5224\u65AD\u306E\u88DC\u52A9\u3092\u76EE\u7684\u3068\u3057\u3066\u304A\u308A\u3001\u78BA\u5B9A\u8A3A\u65AD\u3092\u884C\u3046\u3082\u306E\u3067\u306F\u3042\u308A\u307E\u305B\u3093\u3002<br>';
    html += '2018\u5E74MDS\u5206\u985E\u306B\u57FA\u3065\u304D\u3001\u632F\u6226\u306E\u30BF\u30A4\u30DF\u30F3\u30B0\u30FB\u968F\u4F34\u6240\u898B\u30FB\u7279\u6B8A\u6240\u898B\u3092\u7DCF\u5408\u7684\u306B\u8A55\u4FA1\u3057\u3066\u304F\u3060\u3055\u3044\u3002<br>';
    html += 'DAT\u30B9\u30AD\u30E3\u30F3\u306F\u30D1\u30FC\u30AD\u30F3\u30BD\u30F3\u75C5\u3068\u672C\u614B\u6027\u632F\u6226\u306E\u9451\u5225\u306B\u6709\u7528\u3067\u3059\u3002<br>';
    html += '\u5B9F\u81E8\u5E8A\u3067\u306F\u7DCF\u5408\u7684\u306A\u81E8\u5E8A\u5224\u65AD\u304C\u5FC5\u8981\u3067\u3059\u3002';
    html += '</p>';
    html += '</div></div>';
  }

  html += '<button class="reset-btn" onclick="resetAll()">\uD83D\uDD04 \u6700\u521D\u304B\u3089\u3084\u308A\u76F4\u3059</button>';
  app.innerHTML = html;

  if (currentStep < STEPS.length) {
    var el = document.getElementById("step-" + currentStep);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
  } else {
    var panel = document.querySelector(".result-panel");
    if (panel) panel.scrollIntoView({ behavior: "smooth", block: "start" });
  }
}

function selectOption(stepId, value, stepIndex) {
  answers[stepId] = value;
  currentStep = stepIndex + 1;
  render();
}

function toggleCheck(stepId, value) {
  if (!answers[stepId]) answers[stepId] = [];
  var arr = answers[stepId];
  var idx = arr.indexOf(value);

  if (value === "none" || value === "unknown") {
    answers[stepId] = idx >= 0 ? [] : [value];
  } else {
    var noneIdx = arr.indexOf("none");
    if (noneIdx >= 0) arr.splice(noneIdx, 1);
    var unkIdx = arr.indexOf("unknown");
    if (unkIdx >= 0) arr.splice(unkIdx, 1);
    if (idx >= 0) arr.splice(idx, 1);
    else arr.push(value);
  }
  render();
}

function nextStep(stepIndex) {
  currentStep = stepIndex + 1;
  render();
}

function resetAll() {
  currentStep = 0;
  Object.keys(answers).forEach(function(k) { delete answers[k]; });
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

render();
</script>
