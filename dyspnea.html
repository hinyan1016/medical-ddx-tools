// ===== スコアリング =====
function calcScores(ans) {
  var scores = {};
  var keys = Object.keys(DISEASES);
  for (var i = 0; i < keys.length; i++) { scores[keys[i]] = 0; }

  // --- Step 1: 重症度 ---
  var sev = ans.severity || "";
  if (sev === "critical") {
    scores.pe += 3; scores.pneumothorax += 3; scores.acute_hf += 3;
    scores.acs += 2; scores.upper_airway += 4; scores.pneumonia += 2;
    scores.asthma_copd += 2; scores.arrhythmia += 1;
  }
  if (sev === "moderate") {
    scores.pe += 2; scores.acute_hf += 2; scores.pneumonia += 2;
    scores.asthma_copd += 2; scores.acs += 1; scores.pleural_effusion += 1;
    scores.arrhythmia += 1; scores.anemia += 1;
  }
  if (sev === "mild") {
    scores.ild += 2; scores.pulm_htn += 2; scores.anemia += 2;
    scores.obesity_decond += 2; scores.anxiety_hv += 1;
    scores.thyroid += 1; scores.neuromuscular += 1;
  }

  // --- Step 2: 時間経過 ---
  var tl = ans.timeline || "";
  if (tl === "sudden") {
    scores.pe += 5; scores.pneumothorax += 5; scores.upper_airway += 4;
    scores.acs += 3; scores.arrhythmia += 3;
    scores.anxiety_hv += 1;
  }
  if (tl === "acute") {
    scores.pneumonia += 4; scores.acute_hf += 4; scores.asthma_copd += 3;
    scores.acs += 2; scores.pe += 2; scores.metabolic_acidosis += 2;
    scores.anemia += 1;
  }
  if (tl === "chronic") {
    scores.ild += 5; scores.pulm_htn += 4; scores.anemia += 4;
    scores.obesity_decond += 4; scores.neuromuscular += 3;
    scores.asthma_copd += 2; scores.acute_hf += 1;
    scores.thyroid += 2; scores.anxiety_hv += 2;
    scores.pleural_effusion += 1;
  }
  if (tl === "chronic_acute") {
    scores.asthma_copd += 5; scores.acute_hf += 4;
    scores.pneumonia += 2; scores.pe += 1;
  }

  // --- Step 3: バイタル ---
  var vit = ans.vitals || [];
  if (vit.indexOf("hypoxia") >= 0) {
    scores.pneumonia += 2; scores.pe += 2; scores.acute_hf += 2;
    scores.asthma_copd += 2; scores.pneumothorax += 2;
    scores.ild += 1; scores.pleural_effusion += 1;
  }
  if (vit.indexOf("severe_hypoxia") >= 0) {
    scores.pneumonia += 2; scores.pe += 3; scores.acute_hf += 2;
    scores.pneumothorax += 2; scores.asthma_copd += 2;
    scores.ild += 2; scores.neuromuscular += 2;
  }
  if (vit.indexOf("tachycardia") >= 0) {
    scores.pe += 3; scores.anemia += 3; scores.arrhythmia += 2;
    scores.acute_hf += 1; scores.pneumonia += 1; scores.thyroid += 2;
    scores.anxiety_hv += 1; scores.metabolic_acidosis += 1;
  }
  if (vit.indexOf("bradycardia") >= 0) {
    scores.arrhythmia += 4;
  }
  if (vit.indexOf("hypertension") >= 0) {
    scores.acute_hf += 3; scores.thyroid += 1;
  }
  if (vit.indexOf("hypotension") >= 0) {
    scores.pe += 3; scores.pneumothorax += 3; scores.acs += 2;
    scores.upper_airway += 2; scores.anemia += 2;
  }
  if (vit.indexOf("fever") >= 0) {
    scores.pneumonia += 5; scores.upper_airway += 1;
  }
  if (vit.indexOf("tachypnea") >= 0) {
    scores.pe += 2; scores.pneumonia += 1; scores.metabolic_acidosis += 2;
    scores.acute_hf += 1;
  }
  if (vit.indexOf("irregular_pulse") >= 0) {
    scores.arrhythmia += 5; scores.acute_hf += 1;
  }

  // --- Step 4: 呼吸器所見 ---
  var resp = ans.resp_exam || [];
  if (resp.indexOf("wheezing") >= 0) {
    scores.asthma_copd += 6; scores.acute_hf += 2;
  }
  if (resp.indexOf("fine_crackles") >= 0) {
    scores.ild += 5; scores.pneumonia += 3; scores.acute_hf += 2;
  }
  if (resp.indexOf("coarse_crackles") >= 0) {
    scores.acute_hf += 4; scores.pneumonia += 3;
  }
  if (resp.indexOf("unilateral_decreased") >= 0) {
    scores.pneumothorax += 5; scores.pleural_effusion += 5;
    scores.pneumonia += 1;
  }
  if (resp.indexOf("stridor") >= 0) {
    scores.upper_airway += 8;
  }
  if (resp.indexOf("accessory_muscle") >= 0) {
    scores.asthma_copd += 2; scores.pneumonia += 1;
    scores.acute_hf += 1; scores.neuromuscular += 2;
  }
  if (resp.indexOf("hyperresonance") >= 0) {
    scores.pneumothorax += 5;
  }
  if (resp.indexOf("dullness") >= 0) {
    scores.pleural_effusion += 5; scores.pneumonia += 2;
  }
  if (resp.indexOf("clubbing") >= 0) {
    scores.ild += 4; scores.pulm_htn += 1;
  }
  if (resp.indexOf("none_resp") >= 0) {
    scores.anemia += 2; scores.metabolic_acidosis += 2;
    scores.neuromuscular += 1; scores.thyroid += 1;
    scores.anxiety_hv += 2; scores.obesity_decond += 1;
    scores.arrhythmia += 1;
  }

  // --- Step 5: 循環器所見 ---
  var card = ans.cardio_exam || [];
  if (card.indexOf("orthopnea") >= 0) {
    scores.acute_hf += 5; scores.asthma_copd += 1;
    scores.neuromuscular += 2;
  }
  if (card.indexOf("pnd") >= 0) {
    scores.acute_hf += 5;
  }
  if (card.indexOf("jvd") >= 0) {
    scores.acute_hf += 4; scores.pneumothorax += 2;
    scores.pe += 2; scores.pulm_htn += 2;
  }
  if (card.indexOf("leg_edema") >= 0) {
    scores.acute_hf += 4; scores.pulm_htn += 2;
  }
  if (card.indexOf("unilateral_leg") >= 0) {
    scores.pe += 5;
  }
  if (card.indexOf("chest_pain") >= 0) {
    scores.acs += 5; scores.pe += 3; scores.pneumothorax += 3;
    scores.pneumonia += 1;
  }
  if (card.indexOf("palpitation") >= 0) {
    scores.arrhythmia += 5; scores.thyroid += 2;
    scores.anxiety_hv += 2;
  }
  if (card.indexOf("syncope") >= 0) {
    scores.pe += 3; scores.arrhythmia += 3; scores.pulm_htn += 2;
    scores.acs += 1;
  }
  if (card.indexOf("murmur") >= 0) {
    scores.acute_hf += 2; scores.pulm_htn += 1;
  }
  if (card.indexOf("none_cardio") >= 0) {
    scores.ild += 1; scores.anemia += 1;
    scores.neuromuscular += 1; scores.obesity_decond += 1;
  }

  // --- Step 6: 随伴症状 ---
  var assoc = ans.associated || [];
  if (assoc.indexOf("cough_sputum") >= 0) {
    scores.pneumonia += 3; scores.asthma_copd += 2;
    scores.acute_hf += 1;
  }
  if (assoc.indexOf("hemoptysis") >= 0) {
    scores.pe += 3; scores.pneumonia += 2;
  }
  if (assoc.indexOf("pleuritic_pain") >= 0) {
    scores.pe += 4; scores.pneumothorax += 3; scores.pneumonia += 2;
    scores.pleural_effusion += 2;
  }
  if (assoc.indexOf("pallor") >= 0) {
    scores.anemia += 6;
  }
  if (assoc.indexOf("kussmaul") >= 0) {
    scores.metabolic_acidosis += 7;
  }
  if (assoc.indexOf("dysphagia") >= 0) {
    scores.neuromuscular += 5;
  }
  if (assoc.indexOf("weak_cough") >= 0) {
    scores.neuromuscular += 5;
  }
  if (assoc.indexOf("morning_headache") >= 0) {
    scores.neuromuscular += 4; scores.obesity_decond += 2;
  }
  if (assoc.indexOf("supine_worse") >= 0) {
    scores.neuromuscular += 5; scores.acute_hf += 2;
  }
  if (assoc.indexOf("urticaria") >= 0) {
    scores.upper_airway += 6;
  }
  if (assoc.indexOf("weight_change") >= 0) {
    scores.thyroid += 3; scores.acute_hf += 1;
    scores.anemia += 1;
  }
  if (assoc.indexOf("numbness_limbs") >= 0) {
    scores.anxiety_hv += 3; scores.neuromuscular += 1;
  }
  if (assoc.indexOf("anxiety") >= 0) {
    scores.anxiety_hv += 3;
  }

  // --- Step 7: 背景因子 ---
  var bg = ans.background || [];
  if (bg.indexOf("smoking") >= 0) {
    scores.asthma_copd += 3; scores.ild += 1;
    scores.acs += 1; scores.pneumonia += 1;
  }
  if (bg.indexOf("copd_asthma_hx") >= 0) {
    scores.asthma_copd += 5;
  }
  if (bg.indexOf("hf_history") >= 0) {
    scores.acute_hf += 5;
  }
  if (bg.indexOf("dvt_pe_hx") >= 0) {
    scores.pe += 5;
  }
  if (bg.indexOf("diabetes") >= 0) {
    scores.metabolic_acidosis += 2; scores.acs += 1;
  }
  if (bg.indexOf("neuromuscular_hx") >= 0) {
    scores.neuromuscular += 6;
  }
  if (bg.indexOf("obesity") >= 0) {
    scores.obesity_decond += 4; scores.pe += 1;
  }
  if (bg.indexOf("renal_disease") >= 0) {
    scores.metabolic_acidosis += 2; scores.pleural_effusion += 1;
    scores.acute_hf += 1; scores.anemia += 2;
  }
  if (bg.indexOf("connective_tissue") >= 0) {
    scores.ild += 3; scores.pulm_htn += 2;
    scores.pleural_effusion += 1;
  }
  if (bg.indexOf("malignancy") >= 0) {
    scores.pleural_effusion += 3; scores.pe += 2;
    scores.anemia += 1;
  }
  if (bg.indexOf("allergy_hx") >= 0) {
    scores.upper_airway += 3; scores.asthma_copd += 1;
  }
  if (bg.indexOf("deconditioning") >= 0) {
    scores.obesity_decond += 4; scores.pe += 1;
  }
  if (bg.indexOf("psychiatric_hx") >= 0) {
    scores.anxiety_hv += 4;
  }

  return scores;
}

// ===== UI描画 =====
var appEl = document.getElementById("app");
var currentStep = 0;
var answers = {};

function render() {
  var html = "";

  // アルゴリズム説明
  html += '<div class="algo-note">';
  html += '<strong>使い方：</strong>各ステップの質問に順番に回答してください。すべてのステップ完了後に鑑別診断の候補が優先順位付きで表示されます。<br>';
  html += '<strong>3つの問い：</strong>①いますぐ危ないか ②急性か慢性か ③主座はどこか（肺・心・血液代謝・神経筋・精神）';
  html += '<br><small>（ATS Dyspnea Statement 2012; ESC HF GL 2021; AHA/ACC PE GL 2026; ACCP NM-GL 2023 準拠）</small>';
  html += '</div>';

  // 各ステップ
  for (var i = 0; i < STEPS.length; i++) {
    var step = STEPS[i];
    var isActive = i === currentStep;
    var isDone = i < currentStep;
    var cls = isDone ? "completed" : (isActive ? "" : "inactive");

    html += '<div class="step-card ' + cls + '" id="step-' + i + '">';
    html += '<div class="step-header">';
    html += '<span class="step-number ' + (isDone ? 'done' : '') + '">' + (isDone ? '✓' : (i + 1)) + '</span>';
    html += '<span class="step-title">' + step.title + '</span>';
    html += '</div>';

    if (isActive || isDone) {
      html += '<div class="step-body">';
      html += '<p style="font-weight:600;margin-bottom:4px;">' + step.question + '</p>';
      if (step.hint) html += '<p class="hint">' + step.hint + '</p>';

      if (step.type === "single") {
        html += '<div class="option-group">';
        for (var j = 0; j < step.options.length; j++) {
          var opt = step.options[j];
          var selected = answers[step.id] === opt.value;
          html += '<button class="option-btn ' + (selected ? 'selected' : '') + '"';
          html += ' onclick="selectSingle(\'' + step.id + '\', \'' + opt.value + '\', ' + i + ')"';
          if (isDone && !isActive) html += ' disabled';
          html += '>';
          html += '<span class="icon">' + (opt.icon || '') + '</span>' + opt.label;
          html += '</button>';
        }
        html += '</div>';
      } else {
        html += '<div class="checklist">';
        var currentAnswers = answers[step.id] || [];
        for (var j = 0; j < step.options.length; j++) {
          var opt = step.options[j];
          var checked = currentAnswers.indexOf(opt.value) >= 0;
          html += '<div class="check-item" onclick="toggleCheck(\'' + step.id + '\', \'' + opt.value + '\', this)">';
          html += '<input type="checkbox" ' + (checked ? 'checked' : '') + (isDone && !isActive ? ' disabled' : '') + '>';
          html += '<label>' + opt.label + '</label>';
          html += '</div>';
        }
        html += '</div>';
        if (isActive) {
          html += '<button class="next-btn" onclick="nextStep(' + i + ')">次へ ▶</button>';
        }
      }
      html += '</div>';
    }
    html += '</div>';
  }

  // 結果パネル
  if (currentStep >= STEPS.length) {
    html += renderResults();
  }

  // リセットボタン
  if (currentStep > 0) {
    html += '<button class="reset-btn" onclick="resetAll()">🔄 最初からやり直す</button>';
  }

  appEl.innerHTML = html;

  // 結果表示後スクロール
  if (currentStep >= STEPS.length) {
    setTimeout(function() {
      var panel = document.querySelector('.result-panel');
      if (panel) panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }
}

function selectSingle(stepId, value, stepIndex) {
  answers[stepId] = value;
  currentStep = stepIndex + 1;
  render();
  scrollToStep(currentStep);
}

function toggleCheck(stepId, value, el) {
  if (!answers[stepId]) answers[stepId] = [];
  var arr = answers[stepId];
  var idx = arr.indexOf(value);
  if (idx >= 0) { arr.splice(idx, 1); } else { arr.push(value); }
  var cb = el.querySelector('input[type="checkbox"]');
  if (cb) cb.checked = idx < 0;
}

function nextStep(stepIndex) {
  currentStep = stepIndex + 1;
  render();
  scrollToStep(currentStep);
}

function scrollToStep(idx) {
  setTimeout(function() {
    var el = document.getElementById("step-" + idx) || document.querySelector('.result-panel');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function resetAll() {
  var keys = Object.keys(answers);
  for (var i = 0; i < keys.length; i++) { delete answers[keys[i]]; }
  currentStep = 0;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== 結果描画 =====
function renderResults() {
  var scores = calcScores(answers);
  var entries = [];
  var keys = Object.keys(scores);
  for (var i = 0; i < keys.length; i++) {
    entries.push([keys[i], scores[keys[i]]]);
  }
  entries.sort(function(a, b) { return b[1] - a[1]; });

  var maxScore = entries.length > 0 ? entries[0][1] : 1;
  if (maxScore < 1) maxScore = 1;

  var html = '<div class="result-panel">';
  html += '<h2>📋 鑑別診断の結果</h2>';

  // --- 重症アラート ---
  if (answers.severity === "critical") {
    html += '<div class="alert-box alert-red">';
    html += '<strong>🚨 緊急：原因検索より先に安定化を優先</strong><br>';
    html += '・気道・換気・循環の安定化を最優先<br>';
    html += '・<strong>SpO2 + ECG + 胸部X線</strong>を同時に進める<br>';
    html += '・換気障害/意識障害 → 血液ガスを急ぐ<br>';
    html += '・ベッドサイドPOCUS → 急性心不全、肺炎、胸水、気胸の初期分岐に有用';
    html += '</div>';
  }

  // --- 突然発症アラート ---
  if (answers.timeline === "sudden") {
    html += '<div class="alert-box alert-red">';
    html += '<strong>⚡ 突然発症の呼吸困難 — 致死的疾患を先に除外</strong><br>';
    html += '<strong>肺塞栓、気胸、上気道閉塞/アナフィラキシー、ACS、不整脈</strong>を最優先で鑑別<br>';
    html += '重要な手がかり：胸膜痛、失神、片脚腫脹、片側呼吸音低下、stridor';
    html += '</div>';
  }

  // --- PE戦略 ---
  var card = answers.cardio_exam || [];
  var assoc = answers.associated || [];
  if (scores.pe >= 6) {
    html += '<div class="alert-box alert-yellow">';
    html += '<strong>⚠️ 肺塞栓の検査戦略</strong><br>';
    html += '「息切れがあるからとりあえずD-dimer」ではなく、<strong>前確率を見積もったうえで</strong>検査を進める：<br>';
    html += '・低〜中等度前確率 → <strong>年齢補正D-dimer</strong>（50歳超：年齢 × 10 μg/L FEU）<br>';
    html += '・高前確率 → CTPAへ直接進む';
    html += '</div>';
  }

  // --- BNP解釈ガイド ---
  if (scores.acute_hf >= 6) {
    html += '<div class="alert-box alert-blue">';
    html += '<strong>📊 BNP/NT-proBNP 解釈ガイド</strong><br>';
    html += '<table class="ref-table" style="margin-top:8px;">';
    html += '<tr><th>状況</th><th>BNP</th><th>NT-proBNP</th><th>解釈</th></tr>';
    html += '<tr><td>急性HF除外</td><td>&lt; 100 pg/mL</td><td>&lt; 300 pg/mL</td><td>急性心不全の可能性低い</td></tr>';
    html += '<tr><td>慢性HF除外</td><td>&lt; 35 pg/mL</td><td>&lt; 125 pg/mL</td><td>未治療心不全は考えにくい</td></tr>';
    html += '</table>';
    html += '</div>';
  }

  // --- 神経筋警告 ---
  if (scores.neuromuscular >= 6) {
    html += '<div class="alert-box alert-yellow">';
    html += '<strong>⚠️ 神経筋性呼吸障害 — 見落としやすいが重要</strong><br>';
    html += '<strong>SpO2だけではCO2貯留は否定できない</strong><br>';
    html += '呼吸筋評価：FVC/SVC、MIP/MEP（またはSNIP）、ピーク咳流量<br>';
    html += '必要に応じてCO2評価（血液ガスまたはEtCO2/TcCO2）を行う';
    html += '</div>';
  }

  // --- 5群分類ガイド ---
  html += '<div class="section-title">🗂️ 5病態群チェックリスト</div>';
  html += '<div class="alert-box" style="background:#F5F5F5;border:1px solid #ddd;">';
  html += '① <strong>肺・気道</strong> — 喘鳴、crackles、胸膜痛、呼吸音異常、stridor<br>';
  html += '② <strong>心血管</strong> — 起座呼吸、JVD、浮腫、胸痛、動悸、心雑音<br>';
  html += '③ <strong>血液・代謝</strong> — 顔色不良、頻脈、深大呼吸、体重変化<br>';
  html += '④ <strong>神経・筋</strong> — 嚥下障害、弱い咳、仰臥位悪化、朝の頭痛<br>';
  html += '⑤ <strong>精神・機能性・その他</strong> — 不安、過換気、肥満、廃用';
  html += '</div>';

  // --- 疾患カード ---
  html += '<div class="section-title">🔍 鑑別候補（スコア順）</div>';
  var shown = 0;
  for (var i = 0; i < entries.length; i++) {
    var id = entries[i][0];
    var score = entries[i][1];
    if (score <= 0) continue;

    var d = DISEASES[id];
    var level = getProbLevel(score, maxScore);
    var catLabel = getCatLabel(d.category);
    var catClass = "cat-" + d.category;

    html += '<div class="disease-card ' + level + '">';
    html += '<div class="disease-header">';
    html += '<span class="disease-name">' + d.emoji + ' ' + d.name + '</span>';
    html += '<span class="badge ' + level + '">';
    html += level === "high" ? "可能性 高" : (level === "medium" ? "可能性 中" : "可能性 低");
    html += '</span>';
    html += '</div>';
    html += '<span class="cat-tag ' + catClass + '">' + catLabel + '</span>';
    html += '<div class="disease-detail">' + d.detail + '</div>';
    html += '<div class="workup-line">🔍 追加検査: ' + d.workup + '</div>';
    html += '</div>';
    shown++;
  }

  if (shown === 0) {
    html += '<p style="color:var(--gray);text-align:center;padding:16px;">スコアが0以上の疾患はありませんでした。入力を見直してください。</p>';
  }

  // --- 急性 vs 慢性 検査比較 ---
  html += '<div class="section-title">📊 急性 vs 慢性 — 検査の優先順位</div>';
  html += '<table class="ref-table">';
  html += '<tr><th>検査</th><th>急性</th><th>慢性</th></tr>';
  html += '<tr><td>SpO2</td><td>必須（初期から）</td><td>必須</td></tr>';
  html += '<tr><td>ECG</td><td>必須</td><td>必須</td></tr>';
  html += '<tr><td>胸部X線</td><td>必須</td><td>必須</td></tr>';
  html += '<tr><td>血液ガス</td><td>重症/換気障害疑いで</td><td>必要に応じて</td></tr>';
  html += '<tr><td>POCUS</td><td>初期分岐に有用</td><td>心エコーとして</td></tr>';
  html += '<tr><td>BNP/NT-proBNP</td><td>心不全鑑別時</td><td>心不全鑑別時</td></tr>';
  html += '<tr><td>トロポニン</td><td>ACS鑑別時</td><td>通常不要</td></tr>';
  html += '<tr><td>D-dimer</td><td>PE前確率に応じて</td><td>通常不要</td></tr>';
  html += '<tr><td>CBC</td><td>並行して</td><td>必須</td></tr>';
  html += '<tr><td>スパイロメトリー</td><td>安定後に</td><td>必須</td></tr>';
  html += '<tr><td>呼吸筋評価</td><td>GBS疑いなど</td><td>神経筋疾患疑いで</td></tr>';
  html += '</table>';

  // --- 落とし穴 ---
  html += '<div class="pitfall-box">';
  html += '<strong>⚠️ 見落としやすいポイント</strong><br>';
  html += '・<strong>慢性例の多因子性</strong>：「心臓か肺か」だけでなく、貧血・代謝異常・神経筋疾患まで含めて整理する<br>';
  html += '・<strong>神経筋性呼吸障害</strong>：SpO2が保たれていてもCO2貯留は否定できない → 呼吸筋評価を忘れない<br>';
  html += '・<strong>ACSの非典型的プレゼンテーション</strong>：高齢者・糖尿病では息切れが唯一の症状のことがある<br>';
  html += '・「説明できる異常が1つ見つかったら終了」としない — 慢性呼吸困難では複数原因が併存しうる<br>';
  html += '・「不安だから過換気」と決めつけない — PEやACSでも不安感は伴う';
  html += '</div>';

  html += '</div>';
  return html;
}

function getProbLevel(score, maxScore) {
  if (score >= maxScore * 0.7 && score >= 4) return "high";
  if (score >= maxScore * 0.4 && score >= 2) return "medium";
  return "low";
}

function getCatLabel(cat) {
  if (cat === "pulm") return "肺・気道";
  if (cat === "cardio") return "心血管";
  if (cat === "heme") return "血液・代謝";
  if (cat === "neuro") return "神経・筋";
  if (cat === "other") return "精神・機能性";
  return cat;
}

// 初期描画
render();
</script>

</html>
