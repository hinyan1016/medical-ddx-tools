<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神経障害部位推測ツール — MMTから脊髄レベル・神経・束・幹を推定</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI','游ゴシック','Yu Gothic',sans-serif;background:#f0f4f8;color:#1a1a2e;line-height:1.6}
  .header{background:linear-gradient(135deg,#1B3A5C 0%,#2C5AA0 100%);color:#fff;padding:24px 20px;text-align:center}
  .header h1{font-size:1.5rem;margin-bottom:4px}
  .header p{font-size:.85rem;opacity:.85}
  .container{max-width:1060px;margin:0 auto;padding:16px}

  /* Tab */
  .tab-bar{display:flex;gap:4px;margin-bottom:16px}
  .tab-btn{flex:1;padding:12px 8px;border:none;border-radius:8px 8px 0 0;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;background:#d0d8e4;color:#4a5568}
  .tab-btn.active{background:#fff;color:#1B3A5C;box-shadow:0 -2px 8px rgba(0,0,0,.08)}
  .tab-content{display:none;background:#fff;border-radius:0 0 12px 12px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
  .tab-content.active{display:block}

  /* Table wrapper for horizontal scroll on mobile */
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:16px}

  /* Muscle table */
  .muscle-table{width:100%;border-collapse:collapse;font-size:.9rem;min-width:700px}
  .muscle-table th{background:#1B3A5C;color:#fff;padding:8px 6px;text-align:center;font-size:.8rem;position:sticky;top:0;z-index:2;white-space:nowrap}
  .muscle-table th:first-child,.muscle-table th:nth-child(2){text-align:left}
  .muscle-table td{padding:6px;border-bottom:1px solid #e8ecf1;text-align:center;vertical-align:middle}
  .muscle-table td:first-child{text-align:left;font-weight:600;font-size:.85rem;white-space:nowrap}
  .muscle-table td:nth-child(2){text-align:left;font-size:.78rem;color:#5a6a7e}
  .muscle-table tr:hover{background:#f0f5ff}

  /* Badge styles */
  .nerve-badge,.cord-badge,.trunk-badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:.72rem;line-height:1.2;font-weight:600;white-space:nowrap}
  .badge-none{color:#bbb;font-size:.72rem}

  /* Weight cell coloring */
  .w0{color:#ccc;font-size:.75rem}
  .w1{background:#e8f4fd;color:#2C5AA0;font-weight:600}
  .w2{background:#c8e0f8;color:#1B3A5C;font-weight:700}
  .w3{background:#93c5f8;color:#0d2b4d;font-weight:700}
  .w4{background:#2C5AA0;color:#fff;font-weight:800}

  /* MMT select */
  .mmt-select{width:56px;padding:4px 2px;border:2px solid #d0d8e4;border-radius:6px;font-size:.9rem;text-align:center;font-weight:700;cursor:pointer;transition:border-color .2s}
  .mmt-select:focus{border-color:#2C5AA0;outline:none}
  .mmt-select.mmt-reduced{border-color:#DC3545;background:#fff5f5;color:#DC3545}

  /* Action buttons */
  .action-row{display:flex;gap:12px;margin:16px 0;flex-wrap:wrap}
  .btn{padding:10px 24px;border:none;border-radius:8px;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s}
  .btn-primary{background:#2C5AA0;color:#fff}
  .btn-primary:hover{background:#1B3A5C}
  .btn-reset{background:#e8ecf1;color:#4a5568}
  .btn-reset:hover{background:#d0d8e4}
  .btn-all{background:#28A745;color:#fff}
  .btn-all:hover{background:#1e8035}

  /* Result panel */
  .result-panel{margin-top:20px;display:none}
  .result-panel.show{display:block}
  .result-section{margin-bottom:24px}
  .result-section h3{font-size:1rem;color:#1B3A5C;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #2C5AA0}

  /* Bar chart */
  .bar-chart{display:flex;flex-direction:column;gap:6px}
  .bar-row{display:flex;align-items:center;gap:8px}
  .bar-label{min-width:100px;font-weight:600;font-size:.85rem;text-align:right}
  .bar-track{flex:1;height:28px;background:#e8ecf1;border-radius:6px;position:relative;overflow:hidden}
  .bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding:0 8px;font-size:.78rem;font-weight:700;color:#fff;transition:width .5s ease;min-width:fit-content}
  .bar-fill.spinal{background:linear-gradient(90deg,#2C5AA0,#4a7ec7)}
  .bar-fill.nerve{background:linear-gradient(90deg,#E8850C,#f0a848)}
  .bar-fill.cord{background:linear-gradient(90deg,#10b981,#34d399)}
  .bar-fill.trunk{background:linear-gradient(90deg,#8b5cf6,#a78bfa)}
  .bar-value{min-width:48px;font-size:.82rem;font-weight:700;color:#1a1a2e}

  /* Detail cards */
  .detail-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-top:12px}
  .detail-card{background:#fff;border:1px solid #e0e6ed;border-radius:10px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
  .detail-card h4{font-size:.9rem;color:#1B3A5C;margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .detail-card .count-badge{color:#fff;border-radius:12px;padding:2px 8px;font-size:.75rem}
  .detail-card .muscle-list{font-size:.82rem;color:#4a5568}
  .detail-card .muscle-item{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid #f0f2f5}
  .detail-card .muscle-item:last-child{border:none}
  .mmt-val{font-weight:700}
  .mmt-val.reduced{color:#DC3545}

  /* Interpretation */
  .interpretation{background:#f0f8ff;border-left:4px solid #2C5AA0;padding:16px;border-radius:0 8px 8px 0;margin-top:16px}
  .interpretation h4{color:#1B3A5C;margin-bottom:8px}
  .interpretation ul{padding-left:18px}
  .interpretation li{margin-bottom:6px;font-size:.88rem}
  .highlight{color:#DC3545;font-weight:700}
  .note-box{background:#fff8e1;border-left:4px solid #F5C518;padding:12px;border-radius:0 8px 8px 0;margin-top:12px;font-size:.84rem}

  /* Localization summary box */
  .localization-box{background:#f0fdf4;border:2px solid #10b981;border-radius:10px;padding:16px;margin-top:16px}
  .localization-box h4{color:#065f46;margin-bottom:10px;font-size:1rem}
  .loc-level{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #d1fae5}
  .loc-level:last-child{border:none}
  .loc-icon{font-size:1.2rem;width:28px;text-align:center}
  .loc-name{font-weight:700;min-width:120px;color:#1B3A5C}
  .loc-detail{font-size:.85rem;color:#4a5568}
  .loc-match{color:#10b981;font-weight:700}
  .loc-partial{color:#f59e0b;font-weight:700}
  .loc-no{color:#d1d5db;font-weight:600}

  /* Responsive */
  @media(max-width:640px){
    .muscle-table{font-size:.78rem}
    .muscle-table th,.muscle-table td{padding:4px 3px}
    .bar-label{min-width:70px;font-size:.78rem}
    .mmt-select{width:48px;font-size:.82rem}
    .detail-cards{grid-template-columns:1fr}
    .cord-badge,.trunk-badge{font-size:.65rem;padding:1px 4px}
  }
</style>
</head>
<body>

<div class="header">
  <h1>🔍 神経障害部位推測ツール</h1>
  <p>MMT（徒手筋力検査）の結果から、障害されている脊髄レベル・末梢神経・神経束・神経幹を推測します</p>
</div>

<div class="container">
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('upper')">🦾 上肢</button>
    <button class="tab-btn" onclick="switchTab('lower')">🦿 下肢</button>
    <button class="tab-btn" onclick="switchTab('both')">🔄 上下肢統合</button>
  </div>

  <!-- ===== 上肢タブ ===== -->
  <div id="tab-upper" class="tab-content active">
    <div class="table-wrap">
      <table class="muscle-table" id="table-upper">
        <thead id="thead-upper"></thead>
        <tbody id="tbody-upper"></tbody>
      </table>
    </div>
    <div class="action-row">
      <button class="btn btn-primary" onclick="analyze('upper')">📊 解析する</button>
      <button class="btn btn-all" onclick="setAllNormal('upper')">全て5（正常）</button>
      <button class="btn btn-reset" onclick="resetMMT('upper')">リセット</button>
    </div>
    <div id="result-upper" class="result-panel"></div>
  </div>

  <!-- ===== 下肢タブ ===== -->
  <div id="tab-lower" class="tab-content">
    <div class="table-wrap">
      <table class="muscle-table" id="table-lower">
        <thead id="thead-lower"></thead>
        <tbody id="tbody-lower"></tbody>
      </table>
    </div>
    <div class="action-row">
      <button class="btn btn-primary" onclick="analyze('lower')">📊 解析する</button>
      <button class="btn btn-all" onclick="setAllNormal('lower')">全て5（正常）</button>
      <button class="btn btn-reset" onclick="resetMMT('lower')">リセット</button>
    </div>
    <div id="result-lower" class="result-panel"></div>
  </div>

  <!-- ===== 統合タブ ===== -->
  <div id="tab-both" class="tab-content">
    <p style="margin-bottom:12px;font-size:.9rem;color:#5a6a7e">上肢・下肢の両方の入力結果を統合して解析します。先に各タブでMMTを入力してください。</p>
    <div class="action-row">
      <button class="btn btn-primary" onclick="analyzeBoth()">📊 統合解析する</button>
    </div>
    <div id="result-both" class="result-panel"></div>
  </div>
</div>

<script>
// ===== データ定義 =====
const DATA = {
  upper: {
    levels: ['C5','C6','C7','C8','T1'],
    hasCordTrunk: true,
    muscles: [
      {name:'前鋸筋',       nerve:'長胸神経',   cord:null,  trunk:null,   weights:[2,1,1,0,0]},
      {name:'棘下筋',       nerve:'肩甲上神経', cord:null,  trunk:'上',   weights:[4,3,0,0,0]},
      {name:'広背筋',       nerve:'胸背神経',   cord:'後',  trunk:'中',   weights:[0,1,4,1,0]},
      {name:'三角筋',       nerve:'腋窩神経',   cord:'後',  trunk:'上',   weights:[4,1,0,0,0]},
      {name:'上腕二頭筋',   nerve:'筋皮神経',   cord:'外',  trunk:'上',   weights:[4,3,0,0,0]},
      {name:'上腕三頭筋',   nerve:'橈骨神経',   cord:'後',  trunk:'中',   weights:[0,1,4,3,0]},
      {name:'腕橈骨筋',     nerve:'橈骨神経',   cord:'後',  trunk:'上',   weights:[4,1,0,0,0]},
      {name:'総指伸筋',     nerve:'橈骨神経',   cord:'後',  trunk:'下',   weights:[0,0,3,4,0]},
      {name:'尺側手根伸筋', nerve:'橈骨神経',   cord:'後',  trunk:'中下', weights:[0,1,4,2,0]},
      {name:'長母指伸筋',   nerve:'橈骨神経',   cord:'後',  trunk:'中下', weights:[0,0,1,4,1]},
      {name:'短母指伸筋',   nerve:'橈骨神経',   cord:'後',  trunk:'中下', weights:[0,0,1,4,1]},
      {name:'円回内筋',     nerve:'正中神経',   cord:'外',  trunk:'上',   weights:[0,4,1,0,0]},
      {name:'浅指屈筋',     nerve:'正中神経',   cord:'内',  trunk:'下',   weights:[0,0,1,3,4]},
      {name:'深指屈筋(示)', nerve:'正中神経',   cord:'内',  trunk:'下',   weights:[0,0,0,1,4]},
      {name:'長母指屈筋',   nerve:'正中神経',   cord:'外内',trunk:'上中下',weights:[0,0,0,3,4]},
      {name:'方形回内筋',   nerve:'正中神経',   cord:'外内',trunk:'上中下',weights:[0,0,0,1,4]},
      {name:'短母指外転筋', nerve:'正中神経',   cord:'内',  trunk:'下',   weights:[0,0,0,1,4]},
      {name:'深指屈筋(小)', nerve:'尺骨神経',   cord:'内',  trunk:'下',   weights:[0,0,0,4,2]},
      {name:'小指外転筋',   nerve:'尺骨神経',   cord:'内',  trunk:'下',   weights:[0,0,0,4,4]},
      {name:'橈側手根伸筋', nerve:'橈骨神経',   cord:'内',  trunk:'下',   weights:[0,4,0,0,0]},
      {name:'尺側手根屈筋', nerve:'尺骨神経',   cord:'内',  trunk:'下',   weights:[0,0,4,3,1]},
      {name:'第一背側骨間筋',nerve:'尺骨神経',  cord:'内',  trunk:'下',   weights:[0,0,0,4,2]},
      {name:'第一掌側骨間筋',nerve:'尺骨神経',  cord:'内',  trunk:'下',   weights:[0,0,0,3,2]},
      {name:'母指対立筋',   nerve:'正中神経',   cord:'内',  trunk:'下',   weights:[0,0,0,0,4]},
      {name:'母指内転筋',   nerve:'尺骨神経',   cord:'内',  trunk:'下',   weights:[0,0,0,3,3]},
      {name:'第１第２虫様筋',nerve:'正中神経',   cord:'内',  trunk:'下',   weights:[0,0,0,4,2]},
      {name:'第３第４虫様筋',nerve:'尺骨神経',   cord:'内',  trunk:'下',   weights:[0,0,0,2,4]}
    ]
  },
  lower: {
    levels: ['L1','L2','L3','L4','L5','S1','S2'],
    hasCordTrunk: false,
    muscles: [
      {name:'腸腰筋',     nerve:'大腿神経/腰神経叢',     weights:[1,1,1,0,0,0,0]},
      {name:'中殿筋',     nerve:'上殿神経',               weights:[0,0,0,1,4,1,0]},
      {name:'大殿筋',     nerve:'下殿神経',               weights:[0,0,0,0,1,2,1]},
      {name:'前脛骨筋',   nerve:'深腓骨神経',             weights:[0,0,0,2,4,0,0]},
      {name:'後脛骨筋',   nerve:'脛骨神経',               weights:[0,0,0,1,4,0,0]},
      {name:'長趾屈筋',   nerve:'脛骨神経',               weights:[0,0,0,0,4,2,0]},
      {name:'内転筋群',   nerve:'閉鎖神経',               weights:[0,2,2,2,0,0,0]},
      {name:'大腿四頭筋', nerve:'大腿神経',               weights:[0,0,3,3,0,0,0]},
      {name:'大腿屈筋群', nerve:'脛骨神経/総腓骨神経',    weights:[0,0,0,0,2,2,1]},
      {name:'足趾背屈',   nerve:'深腓骨神経',             weights:[0,0,0,0,4,0,0]},
      {name:'母趾背屈',   nerve:'深腓骨神経',             weights:[0,0,0,0,4,0,0]},
      {name:'腓骨筋群',   nerve:'浅腓骨神経',             weights:[0,0,0,0,4,1,0]},
      {name:'下腿三頭筋', nerve:'脛骨神経',               weights:[0,0,0,0,2,4,0]},
      {name:'短趾屈筋',   nerve:'脛骨神経',               weights:[0,0,0,0,0,4,2]},
      {name:'長母趾屈筋', nerve:'脛骨神経',               weights:[0,0,0,0,4,2,0]},
      {name:'短母趾屈筋', nerve:'脛骨神経',               weights:[0,0,0,0,0,4,2]}
    ]
  }
};

// ===== 色定義 =====
const NERVE_COLORS = {
  '長胸神経':'#6b7280','肩甲上神経':'#8b5cf6','胸背神経':'#06b6d4','腋窩神経':'#f59e0b',
  '筋皮神経':'#10b981','橈骨神経':'#ef4444','正中神経':'#3b82f6','尺骨神経':'#ec4899',
  '大腿神経/腰神経叢':'#6b7280','上殿神経':'#8b5cf6','下殿神経':'#06b6d4',
  '深腓骨神経':'#ef4444','脛骨神経':'#3b82f6','閉鎖神経':'#f59e0b',
  '大腿神経':'#10b981','脛骨神経/総腓骨神経':'#ec4899','浅腓骨神経':'#f97316'
};

const CORD_COLORS = {'外':'#10b981','内':'#ec4899','後':'#f59e0b'};
const CORD_LABELS = {'外':'外側束','内':'内側束','後':'後束'};
const CORD_ORDER = ['外','内','後'];

const TRUNK_COLORS = {'上':'#ef4444','中':'#8b5cf6','下':'#3b82f6'};
const TRUNK_LABELS = {'上':'上幹','中':'中幹','下':'下幹'};
const TRUNK_ORDER = ['上','中','下'];

// 複合値を分解するユーティリティ
function parseCord(val) {
  if (!val) return [];
  if (val === '外内') return ['外','内'];
  return [val];
}
function parseTrunk(val) {
  if (!val) return [];
  if (val === '上中下') return ['上','中','下'];
  if (val === '中下') return ['中','下'];
  return [val];
}

// ===== テーブル生成 =====
function buildTable(region) {
  const d = DATA[region];
  const thead = document.getElementById('thead-' + region);
  const tbody = document.getElementById('tbody-' + region);

  // ヘッダー生成
  let hdr = '<tr><th>筋肉</th><th>支配神経</th>';
  if (d.hasCordTrunk) {
    hdr += '<th>束</th><th>幹</th>';
  }
  d.levels.forEach(l => { hdr += `<th>${l}</th>`; });
  hdr += '<th>MMT</th></tr>';
  thead.innerHTML = hdr;

  // ボディ生成
  tbody.innerHTML = '';
  d.muscles.forEach((m, i) => {
    const tr = document.createElement('tr');
    let cells = `<td>${m.name}</td>`;
    const nc = NERVE_COLORS[m.nerve] || '#6b7280';
    cells += `<td><span class="nerve-badge" style="background:${nc}20;color:${nc};border:1px solid ${nc}60">${m.nerve}</span></td>`;

    if (d.hasCordTrunk) {
      // 束セル
      if (m.cord) {
        const cords = parseCord(m.cord);
        const badges = cords.map(c => {
          const cc = CORD_COLORS[c];
          return `<span class="cord-badge" style="background:${cc}20;color:${cc};border:1px solid ${cc}60">${c}</span>`;
        }).join(' ');
        cells += `<td>${badges}</td>`;
      } else {
        cells += '<td><span class="badge-none">-</span></td>';
      }
      // 幹セル
      if (m.trunk) {
        const trunks = parseTrunk(m.trunk);
        const badges = trunks.map(t => {
          const tc = TRUNK_COLORS[t];
          return `<span class="trunk-badge" style="background:${tc}20;color:${tc};border:1px solid ${tc}60">${t}</span>`;
        }).join(' ');
        cells += `<td>${badges}</td>`;
      } else {
        cells += '<td><span class="badge-none">-</span></td>';
      }
    }

    m.weights.forEach(w => {
      cells += `<td class="w${w}">${w}</td>`;
    });
    cells += `<td><select class="mmt-select" id="mmt-${region}-${i}" onchange="onMMTChange(this)">
      <option value="">-</option>
      <option value="5">5</option><option value="4">4</option><option value="3">3</option>
      <option value="2">2</option><option value="1">1</option><option value="0">0</option>
    </select></td>`;
    tr.innerHTML = cells;
    tbody.appendChild(tr);
  });
}

function onMMTChange(sel) {
  const v = parseInt(sel.value);
  if (!isNaN(v) && v < 5) {
    sel.classList.add('mmt-reduced');
  } else {
    sel.classList.remove('mmt-reduced');
  }
}

function setAllNormal(region) {
  DATA[region].muscles.forEach((_, i) => {
    const sel = document.getElementById(`mmt-${region}-${i}`);
    sel.value = '5';
    sel.classList.remove('mmt-reduced');
  });
}

function resetMMT(region) {
  DATA[region].muscles.forEach((_, i) => {
    const sel = document.getElementById(`mmt-${region}-${i}`);
    sel.value = '';
    sel.classList.remove('mmt-reduced');
  });
  document.getElementById('result-' + region).classList.remove('show');
  document.getElementById('result-' + region).innerHTML = '';
}

// ===== タブ切替 =====
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['upper','lower','both'][i] === tab);
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
}

// ===== 解析ロジック =====
function getMMTValues(region) {
  const d = DATA[region];
  return d.muscles.map((m, i) => {
    const sel = document.getElementById(`mmt-${region}-${i}`);
    const v = sel.value === '' ? null : parseInt(sel.value);
    return { ...m, mmt: v, index: i };
  });
}

function computeScores(region, mmtData) {
  const d = DATA[region];
  const levelScores = {};
  d.levels.forEach(l => levelScores[l] = 0);
  const nerveImpaired = {};
  const cordImpaired = {};
  const trunkImpaired = {};

  mmtData.forEach(m => {
    if (m.mmt === null || m.mmt >= 5) return;
    const deficit = 5 - m.mmt;

    // 脊髄レベルスコア
    m.weights.forEach((w, li) => {
      if (w > 0) levelScores[d.levels[li]] += w * deficit;
    });

    // 末梢神経
    if (!nerveImpaired[m.nerve]) nerveImpaired[m.nerve] = [];
    nerveImpaired[m.nerve].push({ name: m.name, mmt: m.mmt });

    // 神経束（Cord）
    if (m.cord) {
      parseCord(m.cord).forEach(c => {
        if (!cordImpaired[c]) cordImpaired[c] = [];
        cordImpaired[c].push({ name: m.name, mmt: m.mmt });
      });
    }

    // 神経幹（Trunk）
    if (m.trunk) {
      parseTrunk(m.trunk).forEach(t => {
        if (!trunkImpaired[t]) trunkImpaired[t] = [];
        trunkImpaired[t].push({ name: m.name, mmt: m.mmt });
      });
    }
  });

  return { levelScores, nerveImpaired, cordImpaired, trunkImpaired };
}

function analyze(region) {
  const mmtData = getMMTValues(region);
  if (!mmtData.some(m => m.mmt !== null)) {
    alert('MMTの値を少なくとも1つ入力してください。');
    return;
  }
  const scores = computeScores(region, mmtData);
  renderResult(region, scores, mmtData);
}

function analyzeBoth() {
  const upperMMT = getMMTValues('upper');
  const lowerMMT = getMMTValues('lower');
  const hasU = upperMMT.some(m => m.mmt !== null);
  const hasL = lowerMMT.some(m => m.mmt !== null);
  if (!hasU && !hasL) {
    alert('上肢または下肢のMMTを入力してください。');
    return;
  }

  const allLevels = ['C5','C6','C7','C8','T1','L1','L2','L3','L4','L5','S1','S2'];
  const combined = { levelScores:{}, nerveImpaired:{}, cordImpaired:{}, trunkImpaired:{} };
  allLevels.forEach(l => combined.levelScores[l] = 0);

  ['upper','lower'].forEach(region => {
    const mmtData = region === 'upper' ? upperMMT : lowerMMT;
    const hasData = mmtData.some(m => m.mmt !== null);
    if (!hasData) return;
    const s = computeScores(region, mmtData);
    Object.entries(s.levelScores).forEach(([k,v]) => combined.levelScores[k] += v);
    Object.entries(s.nerveImpaired).forEach(([k,v]) => {
      if (!combined.nerveImpaired[k]) combined.nerveImpaired[k] = [];
      combined.nerveImpaired[k].push(...v);
    });
    Object.entries(s.cordImpaired).forEach(([k,v]) => {
      if (!combined.cordImpaired[k]) combined.cordImpaired[k] = [];
      combined.cordImpaired[k].push(...v);
    });
    Object.entries(s.trunkImpaired).forEach(([k,v]) => {
      if (!combined.trunkImpaired[k]) combined.trunkImpaired[k] = [];
      combined.trunkImpaired[k].push(...v);
    });
  });

  const allMMT = [...upperMMT.map(m=>({...m,region:'上肢'})), ...lowerMMT.map(m=>({...m,region:'下肢'}))];
  renderResult('both', combined, allMMT);
}

// ===== 結果表示 =====
function renderResult(region, scores, mmtData) {
  const { levelScores, nerveImpaired, cordImpaired, trunkImpaired } = scores;
  const panel = document.getElementById('result-' + region);
  const hasImpairment = Object.values(levelScores).some(v => v > 0);

  if (!hasImpairment) {
    panel.innerHTML = `<div class="interpretation"><h4>✅ 筋力低下なし</h4><p>全てMMT 5（正常）のため、神経障害は示唆されません。</p></div>`;
    panel.classList.add('show');
    panel.scrollIntoView({ behavior:'smooth', block:'start' });
    return;
  }

  let html = '';

  // ■ 脊髄レベル別スコア
  const sortedLevels = Object.entries(levelScores).sort((a,b) => b[1] - a[1]);
  const maxLevel = Math.max(...Object.values(levelScores), 1);
  html += `<div class="result-section"><h3>🔷 脊髄レベル別スコア（重み付け加重合計）</h3><div class="bar-chart">`;
  sortedLevels.forEach(([lv, score]) => {
    const pct = (score / maxLevel * 100).toFixed(0);
    html += `<div class="bar-row">
      <span class="bar-label">${lv}</span>
      <div class="bar-track"><div class="bar-fill spinal" style="width:${Math.max(pct, score>0?8:0)}%">${score>0?score:''}</div></div>
      <span class="bar-value">${score>0? score+' pt':'-'}</span>
    </div>`;
  });
  html += '</div></div>';

  // ■ 末梢神経別
  const nerveEntries = Object.entries(nerveImpaired).sort((a,b) => b[1].length - a[1].length);
  html += `<div class="result-section"><h3>🔶 末梢神経別 — 障害筋数</h3>`;
  if (nerveEntries.length > 0) {
    const maxN = Math.max(...nerveEntries.map(([_,v])=>v.length), 1);
    html += '<div class="bar-chart">';
    nerveEntries.forEach(([nv, muscles]) => {
      const pct = (muscles.length / maxN * 100).toFixed(0);
      html += `<div class="bar-row">
        <span class="bar-label">${nv}</span>
        <div class="bar-track"><div class="bar-fill nerve" style="width:${Math.max(pct,8)}%">${muscles.length}</div></div>
        <span class="bar-value">${muscles.length} 筋</span>
      </div>`;
    });
    html += '</div>';
    html += renderDetailCards(nerveEntries, NERVE_COLORS, '#E8850C');
  }
  html += '</div>';

  // ■ 神経束（Cord）別
  const cordEntries = CORD_ORDER.filter(c => cordImpaired[c]).map(c => [c, cordImpaired[c]]);
  if (cordEntries.length > 0) {
    const maxC = Math.max(...cordEntries.map(([_,v])=>v.length), 1);
    html += `<div class="result-section"><h3>🟢 神経束（Cord）別 — 障害筋数</h3><div class="bar-chart">`;
    cordEntries.forEach(([c, muscles]) => {
      const pct = (muscles.length / maxC * 100).toFixed(0);
      const label = CORD_LABELS[c];
      html += `<div class="bar-row">
        <span class="bar-label">${label}</span>
        <div class="bar-track"><div class="bar-fill cord" style="width:${Math.max(pct,8)}%">${muscles.length}</div></div>
        <span class="bar-value">${muscles.length} 筋</span>
      </div>`;
    });
    html += '</div>';
    const cardData = cordEntries.map(([c, muscles]) => [CORD_LABELS[c], muscles]);
    html += renderDetailCards(cardData, Object.fromEntries(Object.entries(CORD_LABELS).map(([k,v])=>[v, CORD_COLORS[k]])), '#10b981');
    html += '</div>';
  }

  // ■ 神経幹（Trunk）別
  const trunkEntries = TRUNK_ORDER.filter(t => trunkImpaired[t]).map(t => [t, trunkImpaired[t]]);
  if (trunkEntries.length > 0) {
    const maxT = Math.max(...trunkEntries.map(([_,v])=>v.length), 1);
    html += `<div class="result-section"><h3>🟣 神経幹（Trunk）別 — 障害筋数</h3><div class="bar-chart">`;
    trunkEntries.forEach(([t, muscles]) => {
      const pct = (muscles.length / maxT * 100).toFixed(0);
      const label = TRUNK_LABELS[t];
      html += `<div class="bar-row">
        <span class="bar-label">${label}</span>
        <div class="bar-track"><div class="bar-fill trunk" style="width:${Math.max(pct,8)}%">${muscles.length}</div></div>
        <span class="bar-value">${muscles.length} 筋</span>
      </div>`;
    });
    html += '</div>';
    const cardData = trunkEntries.map(([t, muscles]) => [TRUNK_LABELS[t], muscles]);
    html += renderDetailCards(cardData, Object.fromEntries(Object.entries(TRUNK_LABELS).map(([k,v])=>[v, TRUNK_COLORS[k]])), '#8b5cf6');
    html += '</div>';
  }

  // ■ 階層的局在診断
  html += renderLocalization(sortedLevels, nerveEntries, cordEntries, trunkEntries, mmtData);

  // ■ 臨床解釈
  html += renderInterpretation(sortedLevels, nerveEntries, cordEntries, trunkEntries, levelScores);

  html += `<div class="note-box">⚠️ 本ツールはあくまで補助的な推測です。臨床所見・画像検査・電気生理学的検査と合わせて総合的に判断してください。</div>`;

  panel.innerHTML = html;
  panel.classList.add('show');
  panel.scrollIntoView({ behavior:'smooth', block:'start' });
}

// 詳細カード共通レンダラー
function renderDetailCards(entries, colorMap, defaultColor) {
  let html = '<div class="detail-cards">';
  entries.forEach(([label, muscles]) => {
    const color = colorMap[label] || defaultColor;
    html += `<div class="detail-card" style="border-left:4px solid ${color}">
      <h4>${label} <span class="count-badge" style="background:${color}">${muscles.length}筋低下</span></h4>
      <div class="muscle-list">`;
    muscles.forEach(m => {
      const cls = m.mmt < 3 ? 'reduced' : '';
      html += `<div class="muscle-item"><span>${m.name}</span><span class="mmt-val ${cls}">MMT ${m.mmt}</span></div>`;
    });
    html += '</div></div>';
  });
  html += '</div>';
  return html;
}

// 階層的局在診断ボックス
function renderLocalization(sortedLevels, nerveEntries, cordEntries, trunkEntries, mmtData) {
  const impairedMuscles = mmtData.filter(m => m.mmt !== null && m.mmt < 5);
  if (impairedMuscles.length === 0) return '';

  const totalImpaired = impairedMuscles.length;

  // 各レベルで最も多くの障害筋を説明できるものを探す
  // 末梢神経レベル
  let bestNerve = null;
  if (nerveEntries.length > 0) {
    bestNerve = nerveEntries[0];
  }

  // 束レベル
  let bestCord = null;
  if (cordEntries.length > 0) {
    const sorted = [...cordEntries].sort((a,b) => b[1].length - a[1].length);
    bestCord = sorted[0];
  }

  // 幹レベル
  let bestTrunk = null;
  if (trunkEntries.length > 0) {
    const sorted = [...trunkEntries].sort((a,b) => b[1].length - a[1].length);
    bestTrunk = sorted[0];
  }

  // 脊髄レベル
  const topSpinal = sortedLevels.filter(([_,v]) => v > 0);

  let html = `<div class="localization-box"><h4>🎯 階層的局在診断サマリー（障害筋 ${totalImpaired}筋）</h4>`;

  // 末梢神経
  if (bestNerve) {
    const ratio = bestNerve[1].length;
    const cls = ratio === totalImpaired ? 'loc-match' : ratio >= totalImpaired * 0.7 ? 'loc-partial' : 'loc-no';
    const explanation = ratio === totalImpaired
      ? '→ 全障害筋を説明可能 ✓'
      : `→ ${ratio}/${totalImpaired}筋を説明`;
    html += `<div class="loc-level">
      <span class="loc-icon">🔶</span>
      <span class="loc-name">末梢神経</span>
      <span class="loc-detail"><span class="${cls}">${bestNerve[0]}（${ratio}筋）</span> ${explanation}</span>
    </div>`;
  }

  // 束
  if (bestCord) {
    const label = CORD_LABELS[bestCord[0]] || bestCord[0];
    const ratio = bestCord[1].length;
    const cls = ratio === totalImpaired ? 'loc-match' : ratio >= totalImpaired * 0.7 ? 'loc-partial' : 'loc-no';
    const explanation = ratio === totalImpaired
      ? '→ 全障害筋を説明可能 ✓'
      : `→ ${ratio}/${totalImpaired}筋を説明`;
    html += `<div class="loc-level">
      <span class="loc-icon">🟢</span>
      <span class="loc-name">神経束</span>
      <span class="loc-detail"><span class="${cls}">${label}（${ratio}筋）</span> ${explanation}</span>
    </div>`;
  }

  // 幹
  if (bestTrunk) {
    const label = TRUNK_LABELS[bestTrunk[0]] || bestTrunk[0];
    const ratio = bestTrunk[1].length;
    const cls = ratio === totalImpaired ? 'loc-match' : ratio >= totalImpaired * 0.7 ? 'loc-partial' : 'loc-no';
    const explanation = ratio === totalImpaired
      ? '→ 全障害筋を説明可能 ✓'
      : `→ ${ratio}/${totalImpaired}筋を説明`;
    html += `<div class="loc-level">
      <span class="loc-icon">🟣</span>
      <span class="loc-name">神経幹</span>
      <span class="loc-detail"><span class="${cls}">${label}（${ratio}筋）</span> ${explanation}</span>
    </div>`;
  }

  // 脊髄
  if (topSpinal.length > 0) {
    const top = topSpinal.slice(0, 3).map(([l,v]) => `${l}(${v}pt)`).join(', ');
    html += `<div class="loc-level">
      <span class="loc-icon">🔷</span>
      <span class="loc-name">脊髄レベル</span>
      <span class="loc-detail">最高スコア: ${top}</span>
    </div>`;
  }

  html += '</div>';
  return html;
}

// 臨床解釈
function renderInterpretation(sortedLevels, nerveEntries, cordEntries, trunkEntries, levelScores) {
  let html = '<div class="interpretation"><h4>💡 解釈の手引き</h4><ul>';

  // 脊髄レベル解釈
  const topLevels = sortedLevels.filter(([_,v]) => v > 0);
  if (topLevels.length > 0) {
    const top3 = topLevels.slice(0, 3);
    html += `<li><strong>最もスコアが高い脊髄レベル:</strong> <span class="highlight">${top3.map(([l,v])=>`${l}(${v}pt)`).join(' > ')}</span></li>`;

    // 連続性チェック
    const allLevels = Object.keys(levelScores);
    const impaired = topLevels.map(([l]) => l);
    const indices = impaired.map(l => allLevels.indexOf(l)).sort((a,b) => a - b);
    if (indices.length >= 2) {
      const isContiguous = indices.every((v, i) => i === 0 || v === indices[i-1] + 1);
      if (isContiguous) {
        html += `<li>障害レベルが <strong>${impaired[0]}〜${impaired[impaired.length-1]}</strong> と連続 → <strong>脊髄症/神経根障害</strong>を示唆</li>`;
      } else {
        html += `<li>障害レベルが非連続 → <strong>多発性神経根障害</strong>や<strong>末梢神経障害の組み合わせ</strong>を考慮</li>`;
      }
    }
  }

  // 末梢神経解釈
  if (nerveEntries.length > 0) {
    const topNerve = nerveEntries[0];
    html += `<li><strong>最も障害筋が多い神経:</strong> <span class="highlight">${topNerve[0]}（${topNerve[1].length}筋）</span></li>`;
    if (nerveEntries.length === 1) {
      html += `<li>単一神経の支配筋のみ低下 → <strong>末梢神経単独障害</strong>の可能性が高い</li>`;
    } else if (nerveEntries.length >= 3) {
      html += `<li>複数の神経に跨る筋力低下 → <strong>より近位（束・幹・脊髄根）の障害</strong>を考慮</li>`;
    }
  }

  // 神経束解釈
  if (cordEntries.length > 0) {
    const affectedCords = cordEntries.map(([c]) => CORD_LABELS[c] || c);
    if (cordEntries.length === 1) {
      const c = cordEntries[0][0];
      const label = CORD_LABELS[c];
      html += `<li><strong>${label}のみの障害</strong> → <span class="highlight">${label}単独障害</span>の可能性</li>`;
    } else if (cordEntries.length >= 3) {
      html += `<li>全ての神経束に障害 → <strong>神経幹レベル以上の近位障害</strong>を考慮</li>`;
    } else {
      html += `<li>障害された神経束: <strong>${affectedCords.join('、')}</strong></li>`;
    }
  }

  // 神経幹解釈
  if (trunkEntries.length > 0) {
    if (trunkEntries.length === 1) {
      const t = trunkEntries[0][0];
      const label = TRUNK_LABELS[t];
      if (t === '上') {
        html += `<li><strong>${label}のみの障害</strong> → <span class="highlight">Erb-Duchenne型（上位型）麻痺パターン</span>（C5-C6優位）</li>`;
      } else if (t === '下') {
        html += `<li><strong>${label}のみの障害</strong> → <span class="highlight">Klumpke型（下位型）麻痺パターン</span>（C8-T1優位）</li>`;
      } else {
        html += `<li><strong>${label}のみの障害</strong> → <span class="highlight">${label}単独障害パターン</span></li>`;
      }
    } else if (trunkEntries.length >= 3) {
      html += `<li>全ての神経幹に障害 → <strong>広範な腕神経叢障害</strong>を考慮</li>`;
    } else {
      const labels = trunkEntries.map(([t]) => TRUNK_LABELS[t]);
      html += `<li>障害された神経幹: <strong>${labels.join('、')}</strong></li>`;
    }
  }

  html += '</ul></div>';
  return html;
}
